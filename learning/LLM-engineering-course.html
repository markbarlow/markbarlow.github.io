nging facts (use RAG)<\u002Ftd><\u002Ftr><tr><td>Teach a narrow skill or domain<\u002Ftd><td>One-off tweaks (just edit the prompt)<\u002Ftd><\u002Ftr><tr><td>Shrink long prompts into the model<\u002Ftd><td>You only have a handful of examples<\u002Ftd><\u002Ftr><\u002Ftable>\" +\n          \"<p>Rule of thumb: <strong>try prompting first<\u002Fstrong>, then <strong>RAG<\u002Fstrong> for knowledge, and reach for fine-tuning when you need consistent <em>behaviour<\u002Fem> that prompts can’t reliably get. Most people fine-tune cheaply with <strong>LoRA\u002FQLoRA<\u002Fstrong> (next module) rather than retraining every weight.<\u002Fp>\",\n        model:\n          \"Fine-tuning is <strong>specialist school<\u002Fstrong> for a model that already finished general school. Use it to fix <em>behaviour and style<\u002Fem>, not to inject changing <em>facts<\u002Fem>.\",\n        mistakes: [\n          { t: \"Fine-tuning to add knowledge\", d: \"For facts that change, RAG (retrieval) is usually better and cheaper than baking them into weights.\" },\n          { t: \"Reaching for it too early\", d: \"Try a better prompt and few-shot examples first; they’re free and instant.\" },\n          { t: \"Too little or messy data\", d: \"A handful of inconsistent examples won’t move the model and can make it worse.\" }\n        ],\n        terms: [\n          { t: \"Fine-tuning\", d: \"Extra training on top of a pretrained model to specialise it.\" },\n          { t: \"Base vs fine-tuned\", d: \"Base is the general model; fine-tuned is your specialised version.\" },\n          { t: \"LoRA\u002FQLoRA\", d: \"Cheap fine-tuning methods that train a small add-on instead of all weights.\" }\n        ],\n        quiz: [\n          { q: \"Fine-tuning is best for…\", options: [\"Making the model bigger\", \"Locking in consistent behaviour, style, or a narrow skill\", \"Replacing the tokenizer\", \"Adding daily-changing facts\"], answer: 1, explain: \"It shapes behaviour\u002Fstyle; changing facts are better handled by RAG.\" },\n          { q: \"Before fine-tuning, you should usually try…\", options: [\"Better prompting and few-shot examples\", \"Buying more GPUs\", \"Nothing\", \"Deleting the model\"], answer: 0, explain: \"Prompting\u002Ffew-shot is free and instant; fine-tune when that’s not enough.\" }\n        ],\n        cards: [\n          { q: \"What is fine-tuning?\", a: \"A short extra round of training on your data to specialise a pretrained model.\" },\n          { q: \"Facts vs behaviour — which is fine-tuning for?\", a: \"Behaviour\u002Fstyle; use RAG for changing facts.\" }\n        ],\n        recap: \"Fine-tuning is specialist school for an existing model — best for consistent behaviour, style, or a narrow skill. Try prompting and RAG first; fine-tune when you need reliable behaviour, usually cheaply via LoRA\u002FQLoRA.\"\n      },\n      {\n        id: \"continued-pretraining\",\n        title: \"Continued pretraining\",\n        lesson:\n          \"<p><strong>Continued pretraining<\u002Fstrong> (a.k.a. domain-adaptive pretraining) keeps training a base model on a <strong>large pile of raw text<\u002Fstrong> from a new domain — no question\u002Fanswer pairs, just lots of documents — so it absorbs the <em>vocabulary and style<\u002Fem> of that field.<\u002Fp>\" +\n          \"<div class='analogy'><p>Imagine a smart generalist moving to a new country and reading thousands of local newspapers for months. They’re not memorising answers — they’re soaking up the language, idioms, and norms. That’s continued pretraining for, say, legal or medical text.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>How it differs from fine-tuning<\u002Fh3>\" +\n          \"<table class='compare'><tr><th><\u002Fth><th>Continued pretraining<\u002Fth><th>Fine-tuning (SFT)<\u002Fth><\u002Ftr><tr><th>Data<\u002Fth><td>Raw text, lots of it<\u002Ftd><td>Input→output examples<\u002Ftd><\u002Ftr><tr><th>Teaches<\u002Fth><td>Domain language &amp; knowledge<\u002Ftd><td>Specific behaviour\u002Fformat<\u002Ftd><\u002Ftr><tr><th>Scale<\u002Fth><td>Large (GBs of text)<\u002Ftd><td>Smaller (curated pairs)<\u002Ftd><\u002Ftr><\u002Ftable>\" +\n          \"<p>The usual recipe: <strong>continued pretraining first<\u002Fstrong> (learn the domain), then <strong>SFT\u002Finstruction tuning<\u002Fstrong> (learn to be helpful in it). Watch out for <em>catastrophic forgetting<\u002Fem> — over-training on narrow text can make the model worse at general tasks.<\u002Fp>\",\n        model:\n          \"Continued pretraining is <strong>immersion abroad<\u002Fstrong>: read mountains of domain text to absorb its language, then do SFT to learn how to act helpfully within it.\",\n        mistakes: [\n          { t: \"Expecting it to follow instructions\", d: \"Raw-text training builds domain fluency, not obedience — you still need SFT afterward.\" },\n          { t: \"Catastrophic forgetting\", d: \"Over-fitting to narrow text can erode general ability; mix in some general data.\" },\n          { t: \"Using tiny data\", d: \"It needs a lot of text to shift the model; small piles barely move it.\" }\n        ],\n        terms: [\n          { t: \"Continued pretraining\", d: \"Further base-model training on large raw domain text.\" },\n          { t: \"Domain adaptation\", d: \"Making a general model fluent in a specific field.\" },\n          { t: \"Catastrophic forgetting\", d: \"Losing earlier general skills after over-training on narrow data.\" }\n        ],\n        quiz: [\n          { q: \"Continued pretraining uses what kind of data?\", options: [\"Preference pairs\", \"Input→output pairs\", \"Large amounts of raw domain text\", \"Only images\"], answer: 2, explain: \"It trains on lots of raw text to absorb domain language.\" },\n          { q: \"What is catastrophic forgetting?\", options: [\"A tokenizer bug\", \"A storage error\", \"Losing general skills after over-training on narrow data\", \"A faster GPU mode\"], answer: 2, explain: \"Narrow over-training can erode previously learned general ability.\" }\n        ],\n        cards: [\n          { q: \"What is continued pretraining?\", a: \"Further training a base model on large raw domain text to absorb its language.\" },\n          { q: \"Typical order with SFT?\", a: \"Continued pretraining first (domain), then SFT (helpful behaviour).\" }\n        ],\n        recap: \"Continued pretraining immerses a base model in lots of raw domain text to absorb its language and knowledge. Do it before SFT, use enough data, and guard against catastrophic forgetting of general skills.\"\n      },\n      {\n        id: \"hallucination-reduction\",\n        title: \"Hallucination reduction\",\n        lesson:\n          \"<p>A <strong>hallucination<\u002Fstrong> is when a model states something false <strong>with full confidence<\u002Fstrong> — a made-up citation, a wrong date, an invented API. It happens because the model predicts <em>plausible<\u002Fem> text, and plausible isn’t always true.<\u002Fp>\" +\n          \"<div class='analogy'><p>Picture a student who never says “I don’t know.” Faced with a hard exam question, they write a confident, well-phrased guess. Sometimes it’s right, sometimes it’s elegant nonsense. LLMs have the same instinct.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Practical ways to reduce it<\u002Fh3>\" +\n          \"<ul><li><strong>Ground it (RAG).<\u002Fstrong> Give the model the real source text and tell it to answer only from that.<\u002Fli>\" +\n          \"<li><strong>Allow “I don’t know.”<\u002Fstrong> In prompts and training data, reward admitting uncertainty over guessing.<\u002Fli>\" +\n          \"<li><strong>Ask for citations<\u002Fstrong> the answer must point back to, so claims are checkable.<\u002Fli>\" +\n          \"<li><strong>Lower randomness<\u002Fstrong> (temperature) for factual tasks.<\u002Fli>\" +\n          \"<li><strong>Verify<\u002Fstrong> critical outputs with a second check or tool.<\u002Fli><\u002Ful>\" +\n          \"<p>You can’t fully eliminate hallucinations — but grounding plus permission to say “I’m not sure” cuts them dramatically.<\u002Fp>\",\n        model:\n          \"A hallucination is a <strong>confident guess<\u002Fstrong>, not a lie. Fix it by giving the model real sources to lean on and making ‘I don’t know’ an acceptable answer.\",\n        mistakes: [\n          { t: \"Trusting confident tone as truth\", d: \"Fluency and confidence are not evidence — always verify high-stakes claims.\" },\n          { t: \"Punishing ‘I don’t know’\", d: \"If your data\u002Fprompts never reward uncertainty, the model learns to always guess.\" },\n          { t: \"Expecting fine-tuning alone to fix facts\", d: \"Grounding with retrieval (RAG) usually beats trying to memorise every fact in weights.\" }\n        ],\n        terms: [\n          { t: \"Hallucination\", d: \"A confident but false or fabricated model output.\" },\n          { t: \"Grounding\", d: \"Tying answers to provided source text so claims are checkable.\" },\n          { t: \"Temperature\", d: \"A setting controlling randomness; lower is steadier for factual tasks.\" }\n        ],\n        quiz: [\n          { q: \"Why do hallucinations happen?\", options: [\"It predicts plausible text, which isn’t always true\", \"The model is broken\", \"Bad internet\", \"Too few GPUs\"], answer: 0, explain: \"Plausible-sounding ≠ factual; the model optimises for likely text.\" },\n          { q: \"Which most reliably reduces hallucinations?\", options: [\"More emoji\", \"Grounding answers in real sources (RAG) and allowing ‘I don’t know’\", \"Higher temperature\", \"Bigger fonts\"], answer: 1, explain: \"Grounding plus permitting uncertainty cuts confident guessing.\" }\n        ],\n        cards: [\n          { q: \"What is a hallucination?\", a: \"A confident but false\u002Ffabricated model output.\" },\n          { q: \"Best ways to reduce hallucinations?\", a: \"Ground in real sources (RAG), allow ‘I don’t know’, ask for citations, lower temperature.\" }\n        ],\n        recap: \"Hallucinations are confident guesses, not lies — the model predicts plausible text. Reduce them by grounding answers in real sources, rewarding ‘I don’t know’, requesting citations, and verifying critical claims.\"\n      }\n    ]\n  },\n  {\n    id: \"fine-tuning\",\n    title: \"Fine-Tuning\",\n    topics: [\n      {\n        id: \"lora\",\n        title: \"LoRA\",\n        lesson:\n          \"<p><strong>LoRA<\u002Fstrong> (Low-Rank Adaptation) is a cheap, popular way to fine-tune. Instead of updating all of a model’s billions of weights, you <strong>freeze the original model<\u002Fstrong> and train a tiny set of new “adapter” weights bolted on the side.<\u002Fp>\" +\n          \"<div class='analogy'><p>You don’t rewrite an entire textbook to add your notes — you stick on a few sticky-notes. LoRA is those sticky-notes: small, removable add-ons that change behaviour without touching the original pages.<\u002Fp><\u002Fdiv>\" +\n          \"<p>The trick is mathematical: the big change a full fine-tune would make can be approximated by two <strong>small<\u002Fstrong> matrices multiplied together (that’s the “low-rank” part). Training only those small matrices needs a fraction of the memory and time.<\u002Fp>\" +\n          \"<h3>Why people love it<\u002Fh3>\" +\n          \"<ul><li><strong>Cheap.<\u002Fstrong> Train on one modest GPU instead of a cluster.<\u002Fli>\" +\n          \"<li><strong>Tiny output.<\u002Fstrong> The adapter is a few MB, not many GB.<\u002Fli>\" +\n          \"<li><strong>Swappable.<\u002Fstrong> Keep one base model and snap different LoRAs on for different tasks.<\u002Fli><\u002Ful>\",\n        model:\n          \"LoRA is <strong>sticky-notes on a frozen textbook<\u002Fstrong>: train a small add-on, leave the giant model untouched, and swap notes per task.\",\n        mistakes: [\n          { t: \"Setting the rank wrong\", d: \"Rank too low = not enough capacity to learn; too high = wasted memory and overfitting risk. Tune it.\" },\n          { t: \"Forgetting the base model\", d: \"A LoRA adapter is useless without its matching base; you ship both (or merge them).\" },\n          { t: \"Mixing mismatched bases\", d: \"An adapter trained on one base won’t behave on a different base model.\" }\n        ],\n        terms: [\n          { t: \"LoRA\", d: \"Low-Rank Adaptation — fine-tuning small add-on matrices instead of all weights.\" },\n          { t: \"Adapter\", d: \"The small trained add-on that modifies a frozen base model’s behaviour.\" },\n          { t: \"Rank\", d: \"The size of the LoRA matrices; higher = more capacity but more memory.\" }\n        ],\n        quiz: [\n          { q: \"What does LoRA train instead of all the weights?\", options: [\"Only the embeddings\", \"A new tokenizer\", \"Small add-on adapter matrices\", \"The whole model again\"], answer: 2, explain: \"It freezes the base and trains tiny low-rank matrices.\" },\n          { q: \"A big practical benefit of LoRA is…\", options: [\"Cheap training and tiny, swappable adapters\", \"It needs no base model\", \"It removes the tokenizer\", \"It makes models larger\"], answer: 0, explain: \"Low memory cost and small, task-swappable outputs.\" }\n        ],\n        cards: [\n          { q: \"What is LoRA?\", a: \"Fine-tuning small add-on matrices while freezing the base model.\" },\n          { q: \"What is ‘rank’ in LoRA?\", a: \"The size of the adapter matrices — higher means more capacity but more memory.\" }\n        ],\n        recap: \"LoRA freezes the base model and trains tiny low-rank adapter matrices — cheap, fast, and producing small swappable add-ons. Tune the rank, and always keep the matching base model.\"\n      },\n      {\n        id: \"qlora\",\n        title: \"QLoRA\",\n        lesson:\n          \"<p><strong>QLoRA<\u002Fstrong> = <strong>Quantized LoRA<\u002Fstrong>. It takes LoRA one step cheaper: first <strong>shrink the frozen base model<\u002Fstrong> with quantization (store its weights in 4 bits instead of 16), then train LoRA adapters on top.<\u002Fp>\" +\n          \"<div class='analogy'><p>LoRA let you add sticky-notes to the textbook. QLoRA also <em>photo-shrinks the textbook<\u002Fem> to pocket size first, so the whole thing fits on a small desk (a single consumer GPU) — while you still write full-quality notes.<\u002Fp><\u002Fdiv>\" +\n          \"<p>The clever part: the giant base is kept in low-precision 4-bit (saving most of the memory), but the <strong>adapters are trained in full precision<\u002Fstrong>, so you keep most of the quality. This is why people can fine-tune a 70B model on a single 24–48GB GPU.<\u002Fp>\" +\n          \"<table class='compare'><tr><th><\u002Fth><th>Full fine-tune<\u002Fth><th>LoRA<\u002Fth><th>QLoRA<\u002Fth><\u002Ftr><tr><th>Memory<\u002Fth><td>Huge<\u002Ftd><td>Low<\u002Ftd><td>Lowest<\u002Ftd><\u002Ftr><tr><th>Base stored as<\u002Fth><td>16-bit<\u002Ftd><td>16-bit<\u002Ftd><td>4-bit<\u002Ftd><\u002Ftr><\u002Ftable>\",\n        model:\n          \"QLoRA = <strong>shrink the book, then sticky-note it<\u002Fstrong>. 4-bit base for cheap memory + full-precision adapters for quality = fine-tune big models on one GPU.\",\n        mistakes: [\n          { t: \"Expecting zero quality loss\", d: \"4-bit quantization costs a little accuracy; usually small, but test it for your task.\" },\n          { t: \"Confusing it with quantizing the output\", d: \"QLoRA quantizes the base for training; you still decide how to quantize for serving separately.\" },\n          { t: \"Under-powered settings on hard tasks\", d: \"Very low rank + 4-bit can underfit complex behaviours; bump rank if results are weak.\" }\n        ],\n        terms: [\n          { t: \"QLoRA\", d: \"Quantized LoRA — LoRA on top of a 4-bit-quantized frozen base model.\" },\n          { t: \"4-bit\", d: \"Storing each weight in 4 bits instead of 16 to slash memory use.\" },\n          { t: \"Precision\", d: \"How many bits represent each number; fewer bits = smaller but less exact.\" }\n        ],\n        quiz: [\n          { q: \"What does the ‘Q’ in QLoRA add over plain LoRA?\", options: [\"Quantizing the frozen base to 4-bit to save memory\", \"Bigger adapters\", \"Cloud hosting\", \"Faster tokenizer\"], answer: 0, explain: \"It compresses the base to 4-bit so training fits in less memory.\" },\n          { q: \"In QLoRA, the adapters are trained in…\", options: [\"Images\", \"No precision\", \"Full\u002Fhigher precision to preserve quality\", \"4-bit too\"], answer: 2, explain: \"Base is 4-bit; adapters stay higher-precision for quality.\" }\n        ],\n        cards: [\n          { q: \"What is QLoRA?\", a: \"LoRA trained on top of a 4-bit quantized base model to save memory.\" },\n          { q: \"Why can QLoRA fine-tune huge models on one GPU?\", a: \"The 4-bit base slashes memory while full-precision adapters keep quality.\" }\n        ],\n        recap: \"QLoRA quantizes the frozen base to 4-bit, then trains full-precision LoRA adapters on top — letting you fine-tune very large models on a single GPU with only a small quality cost.\"\n      },\n      {\n        id: \"dpo\",\n        title: \"DPO\",\n        lesson:\n          \"<p><strong>DPO<\u002Fstrong> (Direct Preference Optimization) teaches a model <strong>which answers humans prefer<\u002Fstrong> — using the chosen\u002Frejected preference pairs from the last module — but in a simple, direct way that skips the complicated machinery of older methods (RLHF).<\u002Fp>\" +\n          \"<div class='analogy'><p>Coaching by comparison. You show the model two responses and say <em>“more like this one, less like that one,”<\u002Fem> and it nudges itself to make the preferred answer more likely and the rejected one less likely. Repeat over many pairs.<\u002Fp><\u002Fdiv>\" +\n          \"<p>Why it’s popular: RLHF needs a separate <em>reward model<\u002Fem> and a tricky reinforcement-learning loop. DPO gets similar results with <strong>plain fine-tuning on preference pairs<\u002Fstrong> — fewer moving parts, more stable, easier to run.<\u002Fp>\" +\n          \"<table class='compare'><tr><th><\u002Fth><th>DPO<\u002Fth><th>RLHF<\u002Fth><\u002Ftr><tr><th>Reward model<\u002Fth><td>Not needed<\u002Ftd><td>Required<\u002Ftd><\u002Ftr><tr><th>Complexity<\u002Fth><td>Lower, more stable<\u002Ftd><td>Higher, fiddly<\u002Ftd><\u002Ftr><tr><th>Input<\u002Fth><td>Chosen\u002Frejected pairs<\u002Ftd><td>Chosen\u002Frejected pairs<\u002Ftd><\u002Ftr><\u002Ftable>\",\n        model:\n          \"DPO is <strong>‘more like this, less like that’<\u002Fstrong> applied directly to preference pairs — the simple, stable cousin of RLHF with no separate reward model.\",\n        mistakes: [\n          { t: \"Weak preference data\", d: \"DPO is only as good as the pairs; noisy or inconsistent preferences teach noise.\" },\n          { t: \"Over-optimising\", d: \"Push too hard and the model can drift from the base, getting repetitive or bland — keep the base anchor.\" },\n          { t: \"Skipping SFT first\", d: \"DPO usually refines an already instruction-tuned model; run SFT before it.\" }\n        ],\n        terms: [\n          { t: \"DPO\", d: \"Direct Preference Optimization — training directly on chosen\u002Frejected pairs.\" },\n          { t: \"Reward model\", d: \"A separate model that scores answers; required by RLHF but not DPO.\" },\n          { t: \"Alignment\", d: \"Shaping a model toward preferred, helpful, safe behaviour.\" }\n        ],\n        quiz: [\n          { q: \"What is DPO’s main advantage over RLHF?\", options: [\"It needs no data\", \"It’s always smarter\", \"Similar results without a separate reward model or RL loop\", \"It trains the tokenizer\"], answer: 2, explain: \"DPO is simpler and more stable — direct training on preference pairs.\" },\n          { q: \"DPO trains on…\", options: [\"Chosen vs rejected answer pairs\", \"Nothing\", \"Images\", \"Raw text only\"], answer: 0, explain: \"It uses preference pairs to push toward preferred answers.\" }\n        ],\n        cards: [\n          { q: \"What does DPO do?\", a: \"Trains directly on chosen\u002Frejected pairs to prefer better answers.\" },\n          { q: \"DPO vs RLHF key difference?\", a: \"DPO needs no separate reward model or RL loop — simpler and more stable.\" }\n        ],\n        recap: \"DPO aligns a model to human preferences by training directly on chosen\u002Frejected pairs — ‘more like this, less like that.’ It achieves RLHF-like results without a reward model or fiddly RL loop. Run SFT first.\"\n      },\n      {\n        id: \"rlhf\",\n        title: \"RLHF\",\n        lesson:\n          \"<p><strong>RLHF<\u002Fstrong> = <strong>Reinforcement Learning from Human Feedback<\u002Fstrong>. It’s the classic recipe that made chat assistants feel helpful and polite. The idea: let humans judge answers, turn those judgements into a <em>reward<\u002Fem>, and train the model to chase that reward.<\u002Fp>\" +\n          \"<h3>The three steps<\u002Fh3>\" +\n          \"<ul><li><strong>1. SFT<\u002Fstrong> — first teach basic instruction-following with example answers.<\u002Fli>\" +\n          \"<li><strong>2. Reward model<\u002Fstrong> — humans rank answers; you train a separate model to predict ‘how much would a human like this?’<\u002Fli>\" +\n          \"<li><strong>3. RL loop<\u002Fstrong> — the main model generates answers, the reward model scores them, and the model updates to score higher.<\u002Fli><\u002Ful>\" +\n          \"<div class='analogy'><p>Like training a dog with treats. The reward model is the ‘treat dispenser’ that learned your preferences; the RL step is the dog trying behaviours and repeating the ones that earn treats.<\u002Fp><\u002Fdiv>\" +\n          \"<p>RLHF is powerful but <strong>complex and finicky<\u002Fstrong> — three stages, a separate reward model, and an unstable RL loop. That’s exactly why simpler alternatives like <strong>DPO<\u002Fstrong> have become popular for many teams.<\u002Fp>\",\n        model:\n          \"RLHF is <strong>training with treats<\u002Fstrong>: a reward model learns human taste, then the model practises to earn higher rewards. Powerful, but three fiddly stages.\",\n        mistakes: [\n          { t: \"Reward hacking\", d: \"Models find loopholes that score high but aren’t actually good (e.g. overly long, sycophantic answers).\" },\n          { t: \"Believing it adds knowledge\", d: \"RLHF shapes behaviour and tone, not facts — it won’t make the model more correct about the world.\" },\n          { t: \"Underestimating its complexity\", d: \"Three stages and an unstable RL loop; for many goals DPO is simpler and good enough.\" }\n        ],\n        terms: [\n          { t: \"RLHF\", d: \"Reinforcement Learning from Human Feedback — align models via a learned reward.\" },\n          { t: \"Reward model\", d: \"A model trained to predict how much humans would like an answer.\" },\n          { t: \"Reward hacking\", d: \"Exploiting the reward to score high without truly being better.\" }\n        ],\n        quiz: [\n          { q: \"What does the reward model in RLHF do?\", options: [\"Predicts how much a human would like an answer\", \"Generates final answers\", \"Tokenizes text\", \"Stores facts\"], answer: 0, explain: \"It scores answers as a stand-in for human preference.\" },\n          { q: \"What is ‘reward hacking’?\", options: [\"A faster tokenizer\", \"A storage format\", \"Stealing GPUs\", \"Scoring high via loopholes without truly being better\"], answer: 3, explain: \"The model games the reward instead of genuinely improving.\" }\n        ],\n        cards: [\n          { q: \"What are RLHF’s three steps?\", a: \"SFT, train a reward model from human rankings, then an RL loop to chase reward.\" },\n          { q: \"Why do teams prefer DPO sometimes?\", a: \"RLHF is complex\u002Funstable; DPO gets similar results more simply.\" }\n        ],\n        recap: \"RLHF aligns models in three stages — SFT, a human-preference reward model, then an RL loop chasing that reward. It’s powerful but complex and prone to reward hacking, which is why simpler DPO is often chosen.\"\n      },\n      {\n        id: \"quantization\",\n        title: \"Quantization\",\n        lesson:\n          \"<p><strong>Quantization<\u002Fstrong> shrinks a model by storing its numbers with <strong>fewer bits<\u002Fstrong> — e.g. 16-bit → 8-bit → 4-bit. Smaller numbers mean less memory and faster maths, so big models fit on smaller hardware.<\u002Fp>\" +\n          \"<div class='analogy'><p>Like saving a photo as a smaller JPEG. The image looks almost the same but the file is a fraction of the size. Push the compression too far, though, and you start to see fuzziness. Same trade-off with model weights.<\u002Fp><\u002Fdiv>\" +\n          \"<table class='compare'><tr><th>Precision<\u002Fth><th>Memory for 7B<\u002Fth><th>Quality<\u002Fth><\u002Ftr><tr><td>16-bit (full)<\u002Ftd><td>~14 GB<\u002Ftd><td>Best<\u002Ftd><\u002Ftr><tr><td>8-bit<\u002Ftd><td>~7 GB<\u002Ftd><td>Nearly identical<\u002Ftd><\u002Ftr><tr><td>4-bit<\u002Ftd><td>~3.5 GB<\u002Ftd><td>Slightly lower, usually fine<\u002Ftd><\u002Ftr><\u002Ftable>\" +\n          \"<p>The sweet spot for running models locally is often <strong>4-bit<\u002Fstrong> — a big memory saving for a small quality dip. Common formats you’ll see: <code>Q4_K_M<\u002Fcode>, <code>Q5<\u002Fcode>, <code>Q8<\u002Fcode> (GGUF), and methods like GPTQ\u002FAWQ.<\u002Fp>\",\n        model:\n          \"Quantization is <strong>saving the model as a smaller JPEG<\u002Fstrong>: fewer bits per number = far less memory, with a small, usually acceptable quality dip.\",\n        mistakes: [\n          { t: \"Going too low too fast\", d: \"2–3 bit can degrade noticeably; 4-bit is usually the safe floor for quality.\" },\n          { t: \"Assuming all quant methods are equal\", d: \"GPTQ, AWQ, and GGUF quants differ in quality and speed — test for your model.\" },\n          { t: \"Confusing training vs serving quant\", d: \"Quantizing to run (serving) is separate from QLoRA quantizing to train.\" }\n        ],\n        terms: [\n          { t: \"Quantization\", d: \"Storing model weights with fewer bits to save memory and speed.\" },\n          { t: \"Bit-width\", d: \"Bits per number (16, 8, 4…); fewer means smaller and less exact.\" },\n          { t: \"GPTQ \u002F AWQ\", d: \"Popular methods to quantize a model with minimal quality loss.\" }\n        ],\n        quiz: [\n          { q: \"What does quantization reduce?\", options: [\"The context window\", \"The number of topics\", \"The dataset size\", \"Bits per weight, cutting memory use\"], answer: 3, explain: \"Fewer bits per number means smaller, faster models.\" },\n          { q: \"A common local sweet spot is…\", options: [\"4-bit\", \"32-bit\", \"No quantization\", \"2-bit\"], answer: 0, explain: \"4-bit gives big savings for a small quality dip.\" }\n        ],\n        cards: [\n          { q: \"What is quantization?\", a: \"Storing model weights with fewer bits to save memory and speed up maths.\" },\n          { q: \"Common local sweet spot?\", a: \"4-bit — large memory savings with a small quality cost.\" }\n        ],\n        recap: \"Quantization stores weights with fewer bits (16→8→4), shrinking memory and speeding maths like a smaller JPEG. 4-bit is the usual local sweet spot; go too low and quality visibly drops.\"\n      },\n      {\n        id: \"model-checkpoints\",\n        title: \"Model checkpoints\",\n        lesson:\n          \"<p>A <strong>checkpoint<\u002Fstrong> is a <strong>saved snapshot of a model’s weights<\u002Fstrong> at a moment in training. Think of it as a “save game” — you can stop, reload, or share the model exactly as it was.<\u002Fp>\" +\n          \"<div class='analogy'><p>Just like saving your progress in a video game before a boss fight. If training goes wrong later, you don’t start over — you reload the last good checkpoint.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Why checkpoints matter<\u002Fh3>\" +\n          \"<ul><li><strong>Resume<\u002Fstrong> long training runs after a crash without losing days of work.<\u002Fli>\" +\n          \"<li><strong>Compare<\u002Fstrong> versions — keep the checkpoint that scored best, not just the last one.<\u002Fli>\" +\n          \"<li><strong>Share \u002F deploy<\u002Fstrong> — a checkpoint <em>is<\u002Fem> the model you hand to others.<\u002Fli><\u002Ful>\" +\n          \"<p>A common gotcha: the <strong>final<\u002Fstrong> checkpoint isn’t always the best — a model can <em>overfit<\u002Fem> late in training and get worse. Teams often keep several and pick the one with the best validation score (‘early stopping’).<\u002Fp>\",\n        model:\n          \"A checkpoint is a <strong>save game for a model<\u002Fstrong>. Save often, keep the best — not necessarily the last — and you can always reload instead of restarting.\",\n        mistakes: [\n          { t: \"Keeping only the final checkpoint\", d: \"Late training can overfit; the best checkpoint may be an earlier one.\" },\n          { t: \"Not saving often enough\", d: \"A crash between rare saves can cost hours or days of compute.\" },\n          { t: \"Losing the config\", d: \"A checkpoint needs its tokenizer\u002Fconfig to load correctly — save them together.\" }\n        ],\n        terms: [\n          { t: \"Checkpoint\", d: \"A saved snapshot of model weights during or after training.\" },\n          { t: \"Overfitting\", d: \"When a model memorises training data and does worse on new data.\" },\n          { t: \"Early stopping\", d: \"Halting training at the best validation point to avoid overfitting.\" }\n        ],\n        quiz: [\n          { q: \"What is a model checkpoint?\", options: [\"A tokenizer\", \"A benchmark\", \"A type of GPU\", \"A saved snapshot of the model’s weights\"], answer: 3, explain: \"It’s a ‘save game’ of the weights at a point in training.\" },\n          { q: \"Why isn’t the final checkpoint always best?\", options: [\"The model can overfit late in training\", \"Files corrupt\", \"It loses the tokenizer\", \"It’s smaller\"], answer: 0, explain: \"Overfitting can make later checkpoints worse than earlier ones.\" }\n        ],\n        cards: [\n          { q: \"What is a checkpoint?\", a: \"A saved snapshot of model weights you can reload, compare, or deploy.\" },\n          { q: \"Best vs last checkpoint?\", a: \"Keep the best (by validation); the last can be overfit.\" }\n        ],\n        recap: \"Checkpoints are save-games of a model’s weights — for resuming runs, comparing versions, and deploying. Save often and keep the best by validation score, since the final checkpoint can be overfit.\"\n      },\n      {\n        id: \"adapter-tuning\",\n        title: \"Adapter tuning\",\n        lesson:\n          \"<p><strong>Adapter tuning<\u002Fstrong> is the general family that LoRA belongs to: instead of retraining a whole model, you insert <strong>small trainable modules (“adapters”)<\u002Fstrong> and train only those. The big model stays frozen.<\u002Fp>\" +\n          \"<div class='analogy'><p>Camera lenses. You keep one camera body (the base model) and screw on different lenses (adapters) for portraits, macro, or wide-angle. Each lens is small, cheap, and swappable — the body never changes.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Why it’s a big deal<\u002Fh3>\" +\n          \"<ul><li><strong>One base, many skills.<\u002Fstrong> Store one large model and dozens of small adapters, loading whichever task you need.<\u002Fli>\" +\n          \"<li><strong>Cheap to train and store.<\u002Fstrong> Adapters are MBs, not GBs.<\u002Fli>\" +\n          \"<li><strong>Composable.<\u002Fstrong> You can even hot-swap adapters per request on a server.<\u002Fli><\u002Ful>\" +\n          \"<p>This approach is also called <strong>PEFT<\u002Fstrong> — Parameter-Efficient Fine-Tuning (covered in the tooling module). LoRA\u002FQLoRA are the most common kinds of adapter tuning today.<\u002Fp>\",\n        model:\n          \"Adapter tuning is <strong>swappable lenses on one camera body<\u002Fstrong>: train small modules per task, keep the giant base frozen and shared.\",\n        mistakes: [\n          { t: \"Expecting adapters to rewrite the model\", d: \"They nudge behaviour; for deep domain shifts you may still need continued pretraining.\" },\n          { t: \"Adapter\u002Fbase mismatch\", d: \"An adapter only works with the exact base it was trained on.\" },\n          { t: \"Stacking too many blindly\", d: \"Combining many adapters can interfere; test the combination, don’t assume it composes cleanly.\" }\n        ],\n        terms: [\n          { t: \"Adapter tuning\", d: \"Training small inserted modules while freezing the base model.\" },\n          { t: \"PEFT\", d: \"Parameter-Efficient Fine-Tuning — the umbrella term for these methods.\" },\n          { t: \"Hot-swap\", d: \"Loading\u002Funloading adapters at serving time without changing the base.\" }\n        ],\n        quiz: [\n          { q: \"In adapter tuning, what stays frozen?\", options: [\"The large base model\", \"Nothing\", \"The adapters\", \"The tokenizer only\"], answer: 0, explain: \"The base is frozen; only the small adapters train.\" },\n          { q: \"A key benefit of adapters is…\", options: [\"They replace the base\", \"They need no base\", \"One base model can serve many small swappable skills\", \"They’re always huge\"], answer: 2, explain: \"Store one base + many tiny task adapters.\" }\n        ],\n        cards: [\n          { q: \"What is adapter tuning?\", a: \"Training small inserted modules while keeping the base model frozen.\" },\n          { q: \"What’s the umbrella term?\", a: \"PEFT — Parameter-Efficient Fine-Tuning (LoRA\u002FQLoRA are examples).\" }\n        ],\n        recap: \"Adapter tuning trains small swappable modules on a frozen base — one camera body, many lenses. It’s cheap, storable, and composable, and is the PEFT family that LoRA and QLoRA belong to.\"\n      },\n      {\n        id: \"gguf-models\",\n        title: \"GGUF models\",\n        lesson:\n          \"<p><strong>GGUF<\u002Fstrong> is a <strong>file format<\u002Fstrong> for packaging a model so it runs easily on regular computers — especially with <code>llama.cpp<\u002Fcode> and tools built on it like Ollama and LM Studio. It bundles the weights, tokenizer, and settings into one tidy file.<\u002Fp>\" +\n          \"<div class='analogy'><p>Think of GGUF like a <em>.zip or .mp4<\u002Fem> for models: a single self-contained file your player knows how to open. You download one file and it just runs — no fiddly setup.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What to know in practice<\u002Fh3>\" +\n          \"<ul><li>GGUF files usually come <strong>pre-quantized<\u002Fstrong>. You’ll pick a variant like <code>Q4_K_M<\u002Fcode> (4-bit, balanced) or <code>Q8_0<\u002Fcode> (8-bit, higher quality, bigger).<\u002Fli>\" +\n          \"<li>It’s optimised to run on <strong>CPU as well as GPU<\u002Fstrong>, which is why it’s the go-to for laptops and local use.<\u002Fli>\" +\n          \"<li>It replaced the older ‘GGML’ format — if you see GGML, it’s the legacy version.<\u002Fli><\u002Ful>\" +\n          \"<p>Rule of thumb for picking a file: <strong>more bits = better quality but bigger and slower<\u002Fstrong>. <code>Q4_K_M<\u002Fcode> is a popular default that fits most machines.<\u002Fp>\",\n        model:\n          \"GGUF is the <strong>.mp4 of local models<\u002Fstrong>: one self-contained, pre-quantized file that runs on a laptop. Pick the bit-variant that balances quality against your RAM.\",\n        mistakes: [\n          { t: \"Grabbing the biggest file\", d: \"An 8-bit GGUF may not fit your RAM; match the variant to your machine.\" },\n          { t: \"Wrong runner\", d: \"GGUF is for llama.cpp-family tools; other stacks (e.g. vLLM) prefer different formats.\" },\n          { t: \"Confusing format with method\", d: \"GGUF is packaging; the quantization (Q4, Q8) is the compression inside it.\" }\n        ],\n        terms: [\n          { t: \"GGUF\", d: \"A single-file model format for llama.cpp-based local runners.\" },\n          { t: \"Q4_K_M \u002F Q8_0\", d: \"Quantization variants inside a GGUF; more bits = better but bigger.\" },\n          { t: \"llama.cpp\", d: \"The popular C++ engine that runs GGUF models on CPU\u002FGPU.\" }\n        ],\n        quiz: [\n          { q: \"What is GGUF?\", options: [\"A benchmark\", \"A GPU brand\", \"A training method\", \"A single-file model format for local runners like llama.cpp\"], answer: 3, explain: \"It’s a packaging format, not a training technique.\" },\n          { q: \"When picking a GGUF variant, more bits means…\", options: [\"Worse quality\", \"No difference\", \"Fewer tokens\", \"Better quality but a bigger, slower file\"], answer: 3, explain: \"Higher bit-width trades size\u002Fspeed for quality.\" }\n        ],\n        cards: [\n          { q: \"What is GGUF?\", a: \"A single-file, usually pre-quantized model format for llama.cpp-family local tools.\" },\n          { q: \"What does Q4_K_M mean?\", a: \"A balanced 4-bit quantization variant inside a GGUF file.\" }\n        ],\n        recap: \"GGUF is the ‘.mp4’ of local models — one self-contained, pre-quantized file that runs on CPU\u002FGPU via llama.cpp, Ollama, and friends. Pick a bit-variant (like Q4_K_M) that balances quality with your RAM.\"\n      }\n    ]\n  },\n  {\n    id: \"inference\",\n    title: \"Inference & Optimization\",\n    topics: [\n      {\n        id: \"kv-cache\",\n        title: \"KV cache\",\n        lesson:\n          \"<p>When a model writes an answer, it produces <strong>one token at a time<\u002Fstrong>, and for each new token it normally has to look back over everything written so far. The <strong>KV cache<\u002Fstrong> stores that look-back work so it doesn’t get redone every step.<\u002Fp>\" +\n          \"<div class='analogy'><p>Imagine writing a story and re-reading the <em>entire<\u002Fem> page before adding each new word. Exhausting. Instead you keep notes in the margin about what matters. The KV cache is those margin notes — computed once, reused for every following word.<\u002Fp><\u002Fdiv>\" +\n          \"<p>The name: attention turns each earlier token into a <strong>Key<\u002Fstrong> and a <strong>Value<\u002Fstrong>. The cache saves those K and V so generating token #500 doesn’t recompute tokens #1–499 from scratch. This is the single biggest reason generation is fast.<\u002Fp>\" +\n          \"<p>The catch: the cache <strong>lives in memory (VRAM)<\u002Fstrong> and grows with conversation length. Long chats = big KV cache = more memory used per user. Managing it well is central to serving many users at once.<\u002Fp>\",\n        model:\n          \"The KV cache is <strong>margin notes for the model<\u002Fstrong>: compute each token’s key\u002Fvalue once, reuse them forever — fast generation, but the notes pile up in memory as the chat grows.\",\n        mistakes: [\n          { t: \"Forgetting it eats VRAM\", d: \"Long contexts and many concurrent users blow up KV-cache memory — often the real serving bottleneck.\" },\n          { t: \"Thinking it stores text\", d: \"It stores computed key\u002Fvalue tensors, not the raw words.\" },\n          { t: \"Assuming it’s free across requests\", d: \"By default the cache is per-conversation; reusing it across requests needs special techniques (prefix caching).\" }\n        ],\n        terms: [\n          { t: \"KV cache\", d: \"Stored attention Keys and Values for past tokens, reused during generation.\" },\n          { t: \"Autoregressive\", d: \"Generating one token at a time, each depending on the previous ones.\" },\n          { t: \"Prefill vs decode\", d: \"Prefill processes the prompt; decode generates new tokens using the cache.\" }\n        ],\n        quiz: [\n          { q: \"What does the KV cache save?\", options: [\"The GPU\", \"Computed attention keys\u002Fvalues for past tokens\", \"The tokenizer\", \"The raw text\"], answer: 1, explain: \"It caches K\u002FV so earlier tokens aren’t recomputed each step.\" },\n          { q: \"A practical downside of the KV cache is…\", options: [\"It needs the internet\", \"It deletes the model\", \"It slows generation\", \"It consumes VRAM that grows with context length\"], answer: 3, explain: \"Memory use scales with conversation length and users.\" }\n        ],\n        cards: [\n          { q: \"What is the KV cache?\", a: \"Stored attention keys\u002Fvalues for past tokens, reused so generation stays fast.\" },\n          { q: \"What’s its main cost?\", a: \"VRAM that grows with context length and number of users.\" }\n        ],\n        recap: \"The KV cache stores each token’s attention keys\u002Fvalues so the model doesn’t recompute the whole history per step — the key to fast generation. The cost is VRAM that grows with context length and concurrent users.\"\n      },\n      {\n        id: \"flash-attention\",\n        title: \"Flash Attention\",\n        lesson:\n          \"<p><strong>Flash Attention<\u002Fstrong> is a smarter way to compute the attention step that is <strong>much faster and uses far less memory<\u002Fstrong> — without changing the model’s answers. It’s a pure efficiency win.<\u002Fp>\" +\n          \"<div class='analogy'><p>Same recipe, better kitchen workflow. Instead of dirtying every bowl (writing huge intermediate results to slow memory), the chef works in small batches on the counter (fast on-chip memory) and never lets things pile up. The dish is identical; it’s just cooked more efficiently.<\u002Fp><\u002Fdiv>\" +\n          \"<p>Technically, standard attention creates a giant intermediate table comparing every token to every other and writes it to slow GPU memory. Flash Attention <strong>fuses the steps<\u002Fstrong> and processes in tiles using ultra-fast on-chip memory, so that giant table never has to be stored.<\u002Fp>\" +\n          \"<h3>Why you care<\u002Fh3>\" +\n          \"<ul><li><strong>Longer contexts<\u002Fstrong> become feasible (memory no longer explodes with length).<\u002Fli>\" +\n          \"<li><strong>Faster<\u002Fstrong> training and inference, same results.<\u002Fli>\" +\n          \"<li>It’s usually a <strong>flag to switch on<\u002Fstrong>, not something you build.<\u002Fli><\u002Ful>\",\n        model:\n          \"Flash Attention is a <strong>tidier kitchen, same recipe<\u002Fstrong>: it computes attention in fast on-chip tiles instead of dumping a giant table to slow memory — faster and lighter, identical output.\",\n        mistakes: [\n          { t: \"Thinking it changes the answers\", d: \"It’s mathematically equivalent — only speed and memory improve, not quality.\" },\n          { t: \"Assuming it’s always on\", d: \"Some stacks\u002Fhardware need it explicitly enabled or a compatible GPU.\" },\n          { t: \"Expecting it to fix a small model\", d: \"It optimises the attention step; it won’t make a weak model smarter.\" }\n        ],\n        terms: [\n          { t: \"Flash Attention\", d: \"A memory-efficient, fused algorithm for computing attention.\" },\n          { t: \"On-chip memory (SRAM)\", d: \"Tiny ultra-fast GPU memory used to avoid slow trips to VRAM.\" },\n          { t: \"Kernel fusion\", d: \"Combining steps into one operation to avoid writing intermediates to memory.\" }\n        ],\n        quiz: [\n          { q: \"What does Flash Attention improve?\", options: [\"The model’s accuracy\", \"The tokenizer\", \"The dataset\", \"Attention speed and memory use, with identical results\"], answer: 3, explain: \"It’s an efficiency optimisation, not a quality change.\" },\n          { q: \"How does it save memory?\", options: [\"It shortens prompts\", \"It deletes weights\", \"It avoids storing the giant all-pairs attention table in slow memory\", \"It quantizes the model\"], answer: 2, explain: \"Tiled, fused computation skips the huge intermediate table.\" }\n        ],\n        cards: [\n          { q: \"What is Flash Attention?\", a: \"A faster, memory-light way to compute attention with identical results.\" },\n          { q: \"Does it change model output?\", a: \"No — only speed and memory improve.\" }\n        ],\n        recap: \"Flash Attention computes attention in fast on-chip tiles instead of writing a giant table to slow memory — faster, lighter, and mathematically identical. It enables longer contexts and is usually just a flag to enable.\"\n      },\n      {\n        id: \"speculative-decoding\",\n        title: \"Speculative decoding\",\n        lesson:\n          \"<p><strong>Speculative decoding<\u002Fstrong> speeds up generation by using a <strong>small fast model to guess ahead<\u002Fstrong>, then letting the big model <strong>check several guesses at once<\u002Fstrong> instead of producing every token itself.<\u002Fp>\" +\n          \"<div class='analogy'><p>A junior writer drafts the next few words quickly; the senior editor skims and approves the ones that are right, fixing only where the draft went wrong. Approving a batch is much faster than writing every word from scratch.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>How it works<\u002Fh3>\" +\n          \"<ul><li>A tiny <strong>draft model<\u002Fstrong> proposes, say, the next 4 tokens.<\u002Fli>\" +\n          \"<li>The big <strong>target model<\u002Fstrong> verifies all 4 in a single pass.<\u002Fli>\" +\n          \"<li>Correct guesses are kept; the first wrong one is corrected and the rest discarded.<\u002Fli><\u002Ful>\" +\n          \"<p>The output is <strong>identical<\u002Fstrong> to what the big model would have produced alone — it’s just faster when the draft model guesses well. Best gains on predictable text; less benefit on highly surprising content.<\u002Fp>\",\n        model:\n          \"Speculative decoding is a <strong>junior drafting, senior approving<\u002Fstrong>: a small model guesses several tokens, the big model verifies them in one pass — same output, fewer slow steps.\",\n        mistakes: [\n          { t: \"Expecting different (worse) output\", d: \"Verification guarantees the same result as the big model alone — quality is unchanged.\" },\n          { t: \"Mismatched draft model\", d: \"If the draft model guesses poorly, few tokens are accepted and you gain little.\" },\n          { t: \"Assuming it always helps\", d: \"On very unpredictable text, acceptance drops and the speedup shrinks.\" }\n        ],\n        terms: [\n          { t: \"Speculative decoding\", d: \"Using a small draft model to propose tokens the big model verifies in batches.\" },\n          { t: \"Draft \u002F target model\", d: \"The small guesser and the large verifier, respectively.\" },\n          { t: \"Acceptance rate\", d: \"How often the big model approves the draft’s guesses; higher = faster.\" }\n        ],\n        quiz: [\n          { q: \"How does speculative decoding speed things up?\", options: [\"By skipping verification\", \"By shrinking the model\", \"A small model guesses ahead and the big model verifies batches\", \"By using more RAM\"], answer: 2, explain: \"Batch verification beats generating every token one by one.\" },\n          { q: \"What happens to output quality?\", options: [\"It loses tokens\", \"It gets worse\", \"It’s identical to the big model alone\", \"It becomes random\"], answer: 2, explain: \"Verification ensures the same result as the target model.\" }\n        ],\n        cards: [\n          { q: \"What is speculative decoding?\", a: \"A small draft model proposes tokens; the big model verifies them in batches.\" },\n          { q: \"Effect on output quality?\", a: \"None — output is identical to the big model alone, just faster.\" }\n        ],\n        recap: \"Speculative decoding uses a small draft model to guess several tokens that the big model verifies in one pass — junior drafts, senior approves. Output is identical and it’s faster when guesses are accepted often.\"\n      },\n      {\n        id: \"inference-optimization\",\n        title: \"Inference optimization\",\n        lesson:\n          \"<p><strong>Inference optimization<\u002Fstrong> is the umbrella goal: make a model serve answers <strong>faster, cheaper, and to more users<\u002Fstrong> — without (much) quality loss. It’s where most production AI engineering effort goes.<\u002Fp>\" +\n          \"<p>The main levers, most of which have their own topic:<\u002Fp>\" +\n          \"<table class='compare'><tr><th>Lever<\u002Fth><th>What it buys you<\u002Fth><\u002Ftr><tr><td>Quantization<\u002Ftd><td>Smaller, faster, fits cheaper GPUs<\u002Ftd><td><\u002Ftd><\u002Ftr><tr><td>KV cache + paging<\u002Ftd><td>Avoids recompute; serves more users<\u002Ftd><\u002Ftr><tr><td>Flash Attention<\u002Ftd><td>Faster, longer contexts<\u002Ftd><\u002Ftr><tr><td>Batching<\u002Ftd><td>More requests per GPU-second<\u002Ftd><\u002Ftr><tr><td>Speculative decoding<\u002Ftd><td>Lower latency per answer<\u002Ftd><\u002Ftr><\u002Ftable>\" +\n          \"<div class='analogy'><p>Think of it like tuning a restaurant kitchen: prep ingredients ahead (cache), cook several orders together (batching), use a faster stove (Flash Attention), and serve smaller portions where nobody notices (quantization). Same food, far more covers per night.<\u002Fp><\u002Fdiv>\" +\n          \"<p>The golden rule: <strong>measure first.<\u002Fstrong> Find the actual bottleneck (memory? compute? latency?) before optimising, or you’ll speed up the wrong thing.<\u002Fp>\",\n        model:\n          \"Inference optimization is <strong>tuning the kitchen<\u002Fstrong>: combine quantization, caching, batching, and faster attention to serve more covers per night — but measure to find the real bottleneck first.\",\n        mistakes: [\n          { t: \"Optimising before measuring\", d: \"Guessing the bottleneck wastes effort; profile latency, memory, and throughput first.\" },\n          { t: \"Chasing one metric only\", d: \"Latency, throughput, and cost trade off — improving one can hurt another.\" },\n          { t: \"Ignoring quality regressions\", d: \"Aggressive speedups (low-bit quant) can quietly degrade answers; always re-evaluate.\" }\n        ],\n        terms: [\n          { t: \"Latency\", d: \"Time to get a response (or first token).\" },\n          { t: \"Throughput\", d: \"Total tokens\u002Frequests served per second across users.\" },\n          { t: \"Bottleneck\", d: \"The limiting resource — memory, compute, or bandwidth.\" }\n        ],\n        quiz: [\n          { q: \"What should you do before optimising inference?\", options: [\"Delete the cache\", \"Buy more GPUs\", \"Quantize to 2-bit\", \"Measure to find the real bottleneck\"], answer: 3, explain: \"Profile first so you fix the actual limiting factor.\" },\n          { q: \"Latency and throughput…\", options: [\"Can trade off against each other\", \"Are the same thing\", \"Never matter\", \"Are set by the tokenizer\"], answer: 0, explain: \"E.g. big batches raise throughput but can raise per-request latency.\" }\n        ],\n        cards: [\n          { q: \"What is inference optimization?\", a: \"Serving a model faster, cheaper, and to more users without much quality loss.\" },\n          { q: \"First rule of optimising?\", a: \"Measure to find the real bottleneck before changing anything.\" }\n        ],\n        recap: \"Inference optimization combines quantization, KV caching, Flash Attention, batching, and speculative decoding to serve more users faster and cheaper. Measure first — latency, throughput, and cost trade off, so fix the real bottleneck.\"\n      },\n      {\n        id: \"model-serving\",\n        title: \"Model serving\",\n        lesson:\n          \"<p><strong>Model serving<\u002Fstrong> is the engineering of <strong>running a model as a live service<\u002Fstrong> that apps can call — taking requests, scheduling them on GPUs, and returning answers reliably at scale.<\u002Fp>\" +\n          \"<div class='analogy'><p>A trained model is a chef who can cook. Serving is the whole <em>restaurant<\u002Fem> around them — taking orders, queuing tickets, plating, and handling a rush without the kitchen melting down.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What a serving system handles<\u002Fh3>\" +\n          \"<ul><li><strong>An API endpoint<\u002Fstrong> apps send prompts to.<\u002Fli>\" +\n          \"<li><strong>Batching &amp; scheduling<\u002Fstrong> — combining many users’ requests efficiently.<\u002Fli>\" +\n          \"<li><strong>Streaming<\u002Fstrong> tokens back as they’re generated.<\u002Fli>\" +\n          \"<li><strong>Scaling<\u002Fstrong> across GPUs and handling failures.<\u002Fli><\u002Ful>\" +\n          \"<p>Popular serving engines include <strong>vLLM<\u002Fstrong>, <strong>TGI<\u002Fstrong>, and <strong>Ollama<\u002Fstrong> (local). They bake in the optimizations (KV cache paging, batching) so you don’t hand-roll them. Key metrics: <strong>time-to-first-token<\u002Fstrong>, <strong>tokens\u002Fsecond<\u002Fstrong>, and <strong>requests handled concurrently<\u002Fstrong>.<\u002Fp>\",\n        model:\n          \"Serving is the <strong>restaurant around the chef<\u002Fstrong>: an API, a scheduler that batches orders, streaming plates out, and scaling for the dinner rush — not just the cooking itself.\",\n        mistakes: [\n          { t: \"Testing only single requests\", d: \"Real load is many concurrent users; benchmark concurrency, not one-at-a-time.\" },\n          { t: \"Ignoring time-to-first-token\", d: \"Users feel responsiveness via the first token; raw tokens\u002Fsec isn’t the whole story.\" },\n          { t: \"Reinventing the engine\", d: \"Mature servers (vLLM\u002FTGI) handle batching and caching — rarely worth building from scratch.\" }\n        ],\n        terms: [\n          { t: \"Serving\", d: \"Running a model as a scalable, callable live service.\" },\n          { t: \"Time-to-first-token (TTFT)\", d: \"How long until the first output token appears.\" },\n          { t: \"Continuous batching\", d: \"Dynamically merging incoming requests to keep GPUs busy.\" }\n        ],\n        quiz: [\n          { q: \"Model serving is mainly about…\", options: [\"Training the model\", \"Running it as a reliable, scalable live service\", \"Quantizing weights\", \"Writing datasets\"], answer: 1, explain: \"It’s the production system around a trained model.\" },\n          { q: \"Which metric best reflects perceived responsiveness?\", options: [\"Disk size\", \"Vocabulary size\", \"Time-to-first-token\", \"Parameter count\"], answer: 2, explain: \"Users notice how quickly the first token arrives.\" }\n        ],\n        cards: [\n          { q: \"What is model serving?\", a: \"Running a model as a scalable live service: API, batching, streaming, scaling.\" },\n          { q: \"Name common serving engines.\", a: \"vLLM, TGI, and Ollama (local).\" }\n        ],\n        recap: \"Serving is the restaurant around the model: an API, request scheduling\u002Fbatching, token streaming, and scaling across GPUs. Use engines like vLLM or TGI, and judge them by time-to-first-token, tokens\u002Fsec, and concurrency.\"\n      },\n      {\n        id: \"batch-inference\",\n        title: \"Batch inference\",\n        lesson:\n          \"<p><strong>Batch inference<\u002Fstrong> means processing <strong>many inputs together in one go<\u002Fstrong> rather than one at a time. GPUs are built for parallel work, so handling 32 prompts at once is far more efficient than 32 separate runs.<\u002Fp>\" +\n          \"<div class='analogy'><p>A bus vs 32 taxis. Same passengers, one trip. The bus (batch) uses the road far more efficiently — lower cost per passenger — even if any single rider could’ve gotten a taxi door-to-door slightly faster.<\u002Fp><\u002Fdiv>\" +\n          \"<table class='compare'><tr><th><\u002Fth><th>Offline batch<\u002Fth><th>Online (real-time)<\u002Fth><\u002Ftr><tr><th>Use<\u002Fth><td>Process 1M docs overnight<\u002Ftd><td>Live chat responses<\u002Ftd><\u002Ftr><tr><th>Goal<\u002Fth><td>Max throughput, low cost<\u002Ftd><td>Low latency per user<\u002Ftd><\u002Ftr><\u002Ftable>\" +\n          \"<p>For live services, modern servers use <strong>continuous batching<\u002Fstrong>: they don’t wait to gather a fixed group — they slot new requests into the running batch on the fly, getting batch efficiency <em>and<\u002Fem> low latency. The trade-off to know: <strong>bigger batches raise throughput but can add a little latency<\u002Fstrong> per request.<\u002Fp>\",\n        model:\n          \"Batch inference is a <strong>bus, not taxis<\u002Fstrong>: process many inputs together for big efficiency gains. Continuous batching gets that efficiency live without making users wait for a full bus.\",\n        mistakes: [\n          { t: \"Batching real-time work naively\", d: \"Waiting to fill a fixed batch adds latency; use continuous batching for live traffic.\" },\n          { t: \"Batches too big for memory\", d: \"Each item adds KV-cache VRAM; oversized batches cause out-of-memory errors.\" },\n          { t: \"Assuming batching helps a single user\", d: \"One user’s lone request gets no batching benefit; it shines under concurrent load.\" }\n        ],\n        terms: [\n          { t: \"Batch inference\", d: \"Running many inputs through the model together for efficiency.\" },\n          { t: \"Continuous batching\", d: \"Adding new requests into a running batch dynamically.\" },\n          { t: \"Throughput vs latency\", d: \"Total work\u002Fsec vs time per single request; batching favours throughput.\" }\n        ],\n        quiz: [\n          { q: \"Why is batch inference efficient?\", options: [\"It skips the model\", \"It uses the internet\", \"GPUs process many inputs in parallel cheaply\", \"It shrinks the model\"], answer: 2, explain: \"Parallel hardware handles a batch far better than one-by-one.\" },\n          { q: \"What does continuous batching achieve?\", options: [\"Smaller datasets\", \"Bigger models\", \"No GPU use\", \"Batch efficiency with low latency for live traffic\"], answer: 3, explain: \"It slots new requests into a running batch on the fly.\" }\n        ],\n        cards: [\n          { q: \"What is batch inference?\", a: \"Processing many inputs together to use the GPU efficiently.\" },\n          { q: \"What is continuous batching?\", a: \"Dynamically adding new requests to a running batch for live, low-latency serving.\" }\n        ],\n        recap: \"Batch inference runs many inputs together — a bus, not taxis — for big GPU efficiency. Offline batches maximise throughput; continuous batching brings that efficiency to live traffic. Watch batch size against VRAM.\"\n      },\n      {\n        id: \"gpu-basics\",\n        title: \"GPU basics\",\n        lesson:\n          \"<p>A <strong>GPU<\u002Fstrong> (Graphics Processing Unit) is the hardware that makes modern AI practical. Where a CPU has a few powerful cores that do tasks one after another, a GPU has <strong>thousands of small cores<\u002Fstrong> doing many simple maths operations <strong>at the same time<\u002Fstrong>.<\u002Fp>\" +\n          \"<div class='analogy'><p>A CPU is a few master chefs cooking complex dishes sequentially. A GPU is a stadium of line cooks each chopping one onion at once. For ‘multiply these millions of numbers together’ — exactly what models do — the stadium wins overwhelmingly.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What matters when picking a GPU<\u002Fh3>\" +\n          \"<ul><li><strong>VRAM<\u002Fstrong> (memory) — decides what size model fits at all. The #1 spec for LLMs.<\u002Fli>\" +\n          \"<li><strong>Compute<\u002Fstrong> (FLOPS) — how fast the maths runs.<\u002Fli>\" +\n          \"<li><strong>Memory bandwidth<\u002Fstrong> — how fast data moves to the cores; often the real speed limit for generation.<\u002Fli><\u002Ful>\" +\n          \"<p>You’ll hear names like the data-center <strong>A100\u002FH100<\u002Fstrong> and consumer <strong>RTX<\u002Fstrong> cards. Apple’s <strong>M-series<\u002Fstrong> chips share memory between CPU\u002FGPU (‘unified memory’), which is why Macs can run surprisingly large local models.<\u002Fp>\",\n        model:\n          \"A GPU is a <strong>stadium of line cooks<\u002Fstrong> doing simple maths in parallel. For LLMs, the seat count that matters most is <strong>VRAM<\u002Fstrong> — it decides what fits at all.\",\n        mistakes: [\n          { t: \"Focusing on compute over VRAM\", d: \"For LLMs, if the model doesn’t fit in VRAM it won’t run at all — memory comes first.\" },\n          { t: \"Ignoring memory bandwidth\", d: \"Token generation is often bandwidth-bound, not compute-bound; raw FLOPS can mislead.\" },\n          { t: \"Assuming a gaming GPU equals a data-center one\", d: \"They differ in VRAM, interconnects, and multi-GPU scaling.\" }\n        ],\n        terms: [\n          { t: \"GPU\", d: \"Hardware with thousands of cores for massively parallel maths.\" },\n          { t: \"FLOPS\", d: \"Floating-point operations per second — a measure of compute speed.\" },\n          { t: \"Memory bandwidth\", d: \"Rate of moving data between VRAM and the cores.\" }\n        ],\n        quiz: [\n          { q: \"Why are GPUs better than CPUs for AI?\", options: [\"They store more files\", \"They’re cheaper always\", \"They use the internet\", \"Thousands of cores do parallel maths at once\"], answer: 3, explain: \"Massive parallelism suits the model’s matrix maths.\" },\n          { q: \"For running LLMs, the #1 spec is usually…\", options: [\"Fan size\", \"VRAM (memory capacity)\", \"Number of USB ports\", \"Clock speed\"], answer: 1, explain: \"VRAM decides whether the model fits at all.\" }\n        ],\n        cards: [\n          { q: \"Why GPUs for AI?\", a: \"Thousands of cores do the model’s parallel matrix maths simultaneously.\" },\n          { q: \"Most important GPU spec for LLMs?\", a: \"VRAM — it determines what model size fits.\" }\n        ],\n        recap: \"GPUs run AI by doing massively parallel maths — a stadium of line cooks vs a CPU’s few chefs. For LLMs, VRAM matters most (what fits), with memory bandwidth often the real speed limit for generation.\"\n      },\n      {\n        id: \"vram-basics\",\n        title: \"VRAM basics\",\n        lesson:\n          \"<p><strong>VRAM<\u002Fstrong> is the GPU’s own fast memory — the workbench where the model and its working data must <strong>physically fit<\u002Fstrong> to run. If a model doesn’t fit in VRAM, it either won’t run or gets painfully slow.<\u002Fp>\" +\n          \"<h3>What’s competing for VRAM<\u002Fh3>\" +\n          \"<ul><li><strong>The weights<\u002Fstrong> — roughly <em>2&nbsp;GB per billion params<\u002Fem> at 16-bit (about <em>0.5&nbsp;GB\u002FB<\u002Fem> at 4-bit).<\u002Fli>\" +\n          \"<li><strong>The KV cache<\u002Fstrong> — grows with context length and number of users.<\u002Fli>\" +\n          \"<li><strong>Overhead<\u002Fstrong> — activations and framework buffers.<\u002Fli><\u002Ful>\" +\n          \"<div class='analogy'><p>VRAM is the size of your desk. The model is a big book you must lay open on it, and the KV cache is the growing stack of notes beside it. Too small a desk and you simply can’t work.<\u002Fp><\u002Fdiv>\" +\n          \"<p>Quick estimate for fitting a model: <strong>params × bytes-per-param + room for KV cache<\u002Fstrong>. A 7B model at 4-bit (~4&nbsp;GB) fits an 8&nbsp;GB card; the same model at 16-bit (~14&nbsp;GB) does not. This is exactly why quantization matters so much for local use.<\u002Fp>\",\n        model:\n          \"VRAM is the <strong>desk size<\u002Fstrong>: the model must lie open on it, with room for the growing KV-cache notes. Too small a desk = it won’t run. Quantization shrinks the book to fit.\",\n        mistakes: [\n          { t: \"Counting only the weights\", d: \"The KV cache and overhead also need VRAM — leave headroom or you’ll hit out-of-memory.\" },\n          { t: \"Ignoring context length\", d: \"Long contexts inflate KV-cache memory fast; a model that fits empty may not fit a long chat.\" },\n          { t: \"Forgetting precision changes the math\", d: \"Same model is ~4× smaller at 4-bit than 16-bit — precision decides if it fits.\" }\n        ],\n        terms: [\n          { t: \"VRAM\", d: \"The GPU’s dedicated memory where the model and working data must fit.\" },\n          { t: \"Bytes per param\", d: \"~2 at 16-bit, ~1 at 8-bit, ~0.5 at 4-bit.\" },\n          { t: \"OOM\", d: \"Out Of Memory — the error when something doesn’t fit in VRAM.\" }\n        ],\n        quiz: [\n          { q: \"Roughly how much VRAM do a 7B model’s weights need at 16-bit?\", options: [\"~1.5 GB\", \"~70 GB\", \"~0.5 GB\", \"~14 GB\"], answer: 3, explain: \"~2 GB per billion params at 16-bit ≈ 14 GB.\" },\n          { q: \"Besides weights, what else consumes VRAM?\", options: [\"The KV cache and overhead, growing with context\u002Fusers\", \"The tokenizer file only\", \"Nothing\", \"The internet\"], answer: 0, explain: \"KV cache plus activations\u002Fbuffers need headroom too.\" }\n        ],\n        cards: [\n          { q: \"What is VRAM?\", a: \"The GPU’s fast memory where the model and working data must physically fit.\" },\n          { q: \"Rough VRAM for weights at 16-bit?\", a: \"~2 GB per billion parameters (~0.5 GB\u002FB at 4-bit).\" }\n        ],\n        recap: \"VRAM is the desk the model must fit on — weights (~2 GB\u002FB at 16-bit), plus a KV cache that grows with context and users. Leave headroom, mind context length, and use quantization to make big models fit.\"\n      },\n      {\n        id: \"latency-quality\",\n        title: \"Latency vs quality tradeoffs\",\n        lesson:\n          \"<p>Almost every inference choice is a <strong>trade-off triangle<\u002Fstrong>: <strong>speed<\u002Fstrong>, <strong>quality<\u002Fstrong>, and <strong>cost<\u002Fstrong>. Push one corner and you usually pull on another. Good engineering is picking the right balance for <em>your<\u002Fem> use case, not maxing one blindly.<\u002Fp>\" +\n          \"<table class='compare'><tr><th>Choice<\u002Fth><th>Faster\u002FCheaper<\u002Fth><th>Higher quality<\u002Fth><\u002Ftr><tr><td>Model size<\u002Ftd><td>Smaller model<\u002Ftd><td>Bigger model<\u002Ftd><\u002Ftr><tr><td>Quantization<\u002Ftd><td>4-bit<\u002Ftd><td>16-bit<\u002Ftd><\u002Ftr><tr><td>Output length<\u002Ftd><td>Short answers<\u002Ftd><td>Long, detailed<\u002Ftd><\u002Ftr><tr><td>Reasoning steps<\u002Ftd><td>Answer directly<\u002Ftd><td>Think step-by-step<\u002Ftd><\u002Ftr><\u002Ftable>\" +\n          \"<div class='analogy'><p>Like shipping a package: <em>overnight<\u002Fem> (fast, pricey), <em>standard<\u002Fem> (balanced), or <em>economy<\u002Fem> (cheap, slow). There’s no universally ‘best’ option — it depends on what the delivery is for.<\u002Fp><\u002Fdiv>\" +\n          \"<p>Match the tier to the job: a <strong>live chat<\u002Fstrong> needs low latency (favor a smaller\u002Fquantized model, short first response), while an <strong>overnight report<\u002Fstrong> can use a big model at full quality. Many systems route easy requests to a cheap model and hard ones to a strong model.<\u002Fp>\",\n        model:\n          \"It’s a <strong>speed–quality–cost triangle<\u002Fstrong>: you pick two, you pay on the third. Choose the shipping tier that fits the job, and route easy vs hard requests differently.\",\n        mistakes: [\n          { t: \"Using the biggest model for everything\", d: \"Most requests are easy; a huge model wastes money and latency on them.\" },\n          { t: \"Optimising speed past the point users notice\", d: \"Below a certain latency, users can’t tell — extra effort there is wasted.\" },\n          { t: \"Ignoring quality floors\", d: \"Cutting cost with low-bit quant or tiny models can drop below an acceptable quality bar — measure it.\" }\n        ],\n        terms: [\n          { t: \"Trade-off triangle\", d: \"Speed, quality, and cost — improving one tends to cost another.\" },\n          { t: \"Model routing\", d: \"Sending easy requests to cheap models and hard ones to strong models.\" },\n          { t: \"Good enough\", d: \"The minimum quality that satisfies the use case; the real target.\" }\n        ],\n        quiz: [\n          { q: \"The core inference trade-off is between…\", options: [\"CPU and RAM only\", \"Tokens and words\", \"Colour and font\", \"Speed, quality, and cost\"], answer: 3, explain: \"These three pull against each other in most choices.\" },\n          { q: \"A smart way to balance them across requests is…\", options: [\"Never quantize\", \"One giant model for all\", \"Always use 2-bit\", \"Route easy requests to cheap models, hard ones to strong models\"], answer: 3, explain: \"Routing matches cost\u002Fquality to each request’s difficulty.\" }\n        ],\n        cards: [\n          { q: \"What three things trade off in inference?\", a: \"Speed, quality, and cost — improve one and you usually pay on another.\" },\n          { q: \"What is model routing?\", a: \"Sending easy requests to cheap models and hard ones to strong models.\" }\n        ],\n        recap: \"Inference is a speed–quality–cost triangle — pick the tier that fits the job rather than maxing one blindly. Use small\u002Fquantized models for live chat, big models for offline quality, and route easy vs hard requests differently.\"\n      }\n    ]\n  },\n  {\n    id: \"local-ecosystem\",\n    title: \"Local AI Ecosystem\",\n    topics: [\n      {\n        id: \"llama-cpp\",\n        title: \"llama.cpp\",\n        lesson:\n          \"<p><strong>llama.cpp<\u002Fstrong> is a small, fast engine (written in C++) that <strong>runs LLMs on ordinary computers<\u002Fstrong> — including on the CPU alone, with no giant data-center GPU required. It’s the foundation that much of the local-AI world is built on.<\u002Fp>\" +\n          \"<div class='analogy'><p>If models are engines, llama.cpp is a brilliantly efficient car that runs on regular fuel. It made ‘run a real LLM on your laptop’ go from impossible to ordinary.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Why it matters<\u002Fh3>\" +\n          \"<ul><li>Runs the <strong>GGUF<\u002Fstrong> format (one self-contained, quantized file).<\u002Fli>\" +\n          \"<li>Works on <strong>CPU, and most GPUs<\u002Fstrong> (Apple Metal, NVIDIA, AMD).<\u002Fli>\" +\n          \"<li>It’s the engine <em>inside<\u002Fem> friendlier tools like <strong>Ollama<\u002Fstrong> and <strong>LM Studio<\u002Fstrong> — so even if you never touch it directly, you’re probably using it.<\u002Fli><\u002Ful>\" +\n          \"<p>It’s lower-level than Ollama: more control and efficiency, but you deal with files and flags. Most beginners use it through a wrapper; power users call it directly.<\u002Fp>\",\n        model:\n          \"llama.cpp is the <strong>efficient engine under the hood<\u002Fstrong> of local AI: it runs quantized GGUF models on everyday hardware, and most friendly local tools are wrappers around it.\",\n        mistakes: [\n          { t: \"Thinking it’s a chat app\", d: \"It’s an engine\u002Flibrary; the nice chat UI you use is usually a wrapper (Ollama, LM Studio).\" },\n          { t: \"Loading the wrong format\", d: \"It runs GGUF — not raw Hugging Face safetensors directly.\" },\n          { t: \"Ignoring the quant choice\", d: \"Pick a GGUF quant (e.g. Q4_K_M) that fits your RAM; too big won’t load.\" }\n        ],\n        terms: [\n          { t: \"llama.cpp\", d: \"A C++ engine for running LLMs efficiently on CPU\u002FGPU.\" },\n          { t: \"GGUF\", d: \"The single-file quantized model format llama.cpp uses.\" },\n          { t: \"Wrapper\", d: \"A friendlier tool built on top of an engine (e.g. Ollama over llama.cpp).\" }\n        ],\n        quiz: [\n          { q: \"What is llama.cpp?\", options: [\"A dataset\", \"A tokenizer\", \"A cloud provider\", \"A C++ engine that runs LLMs on regular hardware\"], answer: 3, explain: \"It’s the efficient local-inference engine, runnable even on CPU.\" },\n          { q: \"Which format does llama.cpp run?\", options: [\"GGUF\", \"PDF\", \"MP3\", \"CSV\"], answer: 0, explain: \"It loads single-file quantized GGUF models.\" }\n        ],\n        cards: [\n          { q: \"What is llama.cpp?\", a: \"A fast C++ engine that runs quantized GGUF models on CPU\u002FGPU.\" },\n          { q: \"What popular tools wrap it?\", a: \"Ollama and LM Studio.\" }\n        ],\n        recap: \"llama.cpp is the efficient C++ engine that runs quantized GGUF models on everyday hardware — even CPU-only. It powers friendlier tools like Ollama and LM Studio, so you’re likely using it even indirectly.\"\n      },\n      {\n        id: \"ollama\",\n        title: \"Ollama\",\n        lesson:\n          \"<p><strong>Ollama<\u002Fstrong> is the <strong>easy button<\u002Fstrong> for running models locally. It wraps llama.cpp in a simple tool: install it, type one command, and a model downloads and runs — with a built-in API so your apps can call it too.<\u002Fp>\" +\n          \"<pre><code>ollama run llama3        # download + chat in one line\\nollama pull mistral      # just download\\n# then your app calls http:\u002F\u002Flocalhost:11434<\u002Fcode><\u002Fpre>\" +\n          \"<div class='analogy'><p>If llama.cpp is the engine, Ollama is the <em>turn-key car<\u002Fem>: you don’t pop the hood or pick fuel grades. It handles downloading, quantization choice, and serving for you.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Why beginners love it<\u002Fh3>\" +\n          \"<ul><li><strong>One-command<\u002Fstrong> model download and run.<\u002Fli>\" +\n          \"<li><strong>Local API<\u002Fstrong> on your machine — swap it in where you’d call a cloud API.<\u002Fli>\" +\n          \"<li><strong>Model library<\u002Fstrong> with sensible default quantizations.<\u002Fli><\u002Ful>\" +\n          \"<p>Trade-off: convenience over control. For maximum throughput serving many users, teams often move to <strong>vLLM<\u002Fstrong>; for a single developer or a local app, Ollama is usually perfect.<\u002Fp>\",\n        model:\n          \"Ollama is the <strong>turn-key car<\u002Fstrong> over llama.cpp’s engine: one command to download, run, and serve a local model with an API — convenience over fine control.\",\n        mistakes: [\n          { t: \"Expecting data-center throughput\", d: \"It’s tuned for local\u002Fsingle-user ease; heavy multi-user serving favours vLLM\u002FTGI.\" },\n          { t: \"Forgetting it exposes a local API\", d: \"Point your app at localhost:11434 instead of hand-running the model.\" },\n          { t: \"Picking a model too big for your RAM\", d: \"Even with easy defaults, a 70B model won’t fit a small machine.\" }\n        ],\n        terms: [\n          { t: \"Ollama\", d: \"A user-friendly local model runner built on llama.cpp, with a local API.\" },\n          { t: \"Local API\", d: \"An endpoint on your own machine your apps can call like a cloud API.\" },\n          { t: \"Model library\", d: \"Ollama’s catalogue of ready-to-pull models with default quants.\" }\n        ],\n        quiz: [\n          { q: \"What is Ollama best described as?\", options: [\"An easy local model runner with a built-in API\", \"A training framework\", \"A GPU\", \"A vector database\"], answer: 0, explain: \"It’s a convenient wrapper to download, run, and serve models locally.\" },\n          { q: \"When might you outgrow Ollama?\", options: [\"For high-throughput multi-user serving (use vLLM)\", \"For a single developer\", \"For small models\", \"For offline use\"], answer: 0, explain: \"Heavy concurrent serving favours engines like vLLM\u002FTGI.\" }\n        ],\n        cards: [\n          { q: \"What is Ollama?\", a: \"A turn-key local runner over llama.cpp: one command to download, run, and serve with an API.\" },\n          { q: \"Ollama vs vLLM?\", a: \"Ollama = local ease; vLLM = high-throughput multi-user serving.\" }\n        ],\n        recap: \"Ollama is the easy button for local models — one command to download, run, and serve via a local API, built on llama.cpp. Great for single users and local apps; switch to vLLM for heavy multi-user throughput.\"\n      },\n      {\n        id: \"vllm\",\n        title: \"vLLM\",\n        lesson:\n          \"<p><strong>vLLM<\u002Fstrong> is a high-performance <strong>serving engine<\u002Fstrong> built to run models for <strong>many users at once<\u002Fstrong>, fast and efficiently. Where Ollama optimises for one-person ease, vLLM optimises for <em>throughput at scale<\u002Fem>.<\u002Fp>\" +\n          \"<div class='analogy'><p>Ollama is your personal car. vLLM is a <em>fleet of buses with an expert dispatcher<\u002Fem> — it keeps the GPUs packed with passengers so cost-per-rider drops dramatically under load.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Its signature trick: PagedAttention<\u002Fh3>\" +\n          \"<p>vLLM manages the KV cache like a computer manages RAM — in small <strong>pages<\u002Fstrong> instead of one big reserved block. This wastes far less memory, so it can serve <strong>more users with longer contexts<\u002Fstrong> on the same GPU. Combined with <strong>continuous batching<\u002Fstrong>, it delivers excellent tokens\u002Fsecond under heavy concurrent load.<\u002Fp>\" +\n          \"<p>It speaks an <strong>OpenAI-compatible API<\u002Fstrong>, so apps written for cloud APIs often work against vLLM with just a URL change. It’s a common choice for self-hosting open models in production.<\u002Fp>\",\n        model:\n          \"vLLM is a <strong>bus fleet with a smart dispatcher<\u002Fstrong>: PagedAttention + continuous batching pack the GPU efficiently, serving many users with long contexts at high throughput.\",\n        mistakes: [\n          { t: \"Using it for a single local chat\", d: \"Its edge is concurrency; for one user, Ollama is simpler and just as good.\" },\n          { t: \"Undersizing the GPU\", d: \"It’s GPU-first; it shines on proper GPUs, not CPU-only laptops.\" },\n          { t: \"Ignoring API compatibility\", d: \"Its OpenAI-compatible endpoint means you often don’t need to rewrite clients — use that.\" }\n        ],\n        terms: [\n          { t: \"vLLM\", d: \"A high-throughput GPU serving engine for LLMs.\" },\n          { t: \"PagedAttention\", d: \"Managing the KV cache in small pages to cut memory waste.\" },\n          { t: \"OpenAI-compatible API\", d: \"An endpoint that mimics the popular API shape, easing drop-in use.\" }\n        ],\n        quiz: [\n          { q: \"vLLM is optimised primarily for…\", options: [\"Drawing graphics\", \"Training datasets\", \"Single-user laptop ease\", \"High-throughput serving of many concurrent users\"], answer: 3, explain: \"It maximises throughput under concurrent load.\" },\n          { q: \"What does PagedAttention improve?\", options: [\"Tokenizer speed\", \"KV-cache memory efficiency\", \"Dataset cleaning\", \"Font rendering\"], answer: 1, explain: \"Paging the KV cache reduces memory waste, serving more users.\" }\n        ],\n        cards: [\n          { q: \"What is vLLM?\", a: \"A high-throughput GPU serving engine for many concurrent users.\" },\n          { q: \"What is PagedAttention?\", a: \"Managing the KV cache in small pages to cut memory waste and serve more users.\" }\n        ],\n        recap: \"vLLM is a production serving engine built for concurrency: PagedAttention and continuous batching pack the GPU to serve many users with long contexts fast. It offers an OpenAI-compatible API for easy drop-in.\"\n      },\n      {\n        id: \"mlx\",\n        title: \"MLX\",\n        lesson:\n          \"<p><strong>MLX<\u002Fstrong> is Apple’s machine-learning framework, built specifically for <strong>Apple Silicon<\u002Fstrong> (M1\u002FM2\u002FM3\u002F
