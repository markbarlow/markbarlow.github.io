    // would push the parser into quirks mode. DOMParser always emits a <head>

ont-mono); font-size: .86em; background: var(--bg-code); border: 1px solid var(--border); border-radius: 5px; padding: .1em .4em; }\n  .lesson pre { background: var(--bg-code); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; overflow-x: auto; margin: 0 0 1.3em; line-height: 1.55; }\n  .lesson pre code { background: none; border: 0; padding: 0; font-size: 13.5px; color: var(--text); }\n  .analogy { border-left: 3px solid var(--accent-line); background: var(--accent-soft); padding: 4px 18px; border-radius: 0 8px 8px 0; margin: 0 0 1.3em; }\n  .analogy p:last-child { margin-bottom: 0; }\n  .compare { width: 100%; border-collapse: collapse; margin: 0 0 1.4em; font-size: .92em; font-family: var(--font-ui); }\n  .compare th, .compare td { border: 1px solid var(--border); padding: 9px 12px; text-align: left; vertical-align: top; }\n  .compare th { background: var(--card-tint); font-weight: 650; font-size: 12.5px; }\n\n  \u002F* section cards *\u002F\n  .card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin: 22px 0; overflow: hidden; }\n  .card-h { display: flex; align-items: center; gap: 10px; padding: 16px 20px; font-family: var(--font-ui); }\n  .card-h .ic { width: 20px; height: 20px; color: var(--accent); flex: none; }\n  .card-h b { font-size: 14.5px; font-weight: 650; letter-spacing: .01em; }\n  .card-b { padding: 0 20px 18px; }\n  .card-b > :first-child { margin-top: 0; }\n\n  .model-card { background: var(--accent-soft); border-color: var(--accent-line); }\n  .model-card .card-b p { font-family: var(--font-head); font-size: 1.12em; line-height: 1.5; color: var(--text); margin: 0; }\n\n  .mistakes li { margin: 0 0 12px; padding-left: 4px; list-style: none; display: grid; grid-template-columns: 20px 1fr; gap: 11px; }\n  .mistakes { padding: 0; margin: 0; }\n  .mistakes .x { width: 19px; height: 19px; color: #d6643c; margin-top: 2px; }\n  html[data-theme=\"dark\"] .mistakes .x { color: #f0855e; }\n  .mistakes b { font-weight: 650; }\n  .mistakes small { display: block; color: var(--text-soft); font-size: .92em; margin-top: 2px; }\n\n  .terms { display: grid; gap: 12px; }\n  .term { }\n  .term dt { font-family: var(--font-ui); font-weight: 650; font-size: 13.5px; color: var(--text); }\n  .term dd { margin: 2px 0 0; color: var(--text-soft); font-size: .95em; }\n\n  \u002F* quiz *\u002F\n  .q { margin: 0 0 22px; }\n  .q:last-child { margin-bottom: 0; }\n  .q-stem { font-weight: 600; margin: 0 0 12px; }\n  .q-stem .n { color: var(--accent); font-family: var(--font-ui); font-size: .8em; font-weight: 700; margin-right: 8px; }\n  .opts { display: grid; gap: 8px; }\n  .opt {\n    display: flex; align-items: flex-start; gap: 11px; text-align: left;\n    background: var(--card-tint); border: 1px solid var(--border); border-radius: 9px;\n    padding: 11px 14px; cursor: pointer; font-family: var(--font-ui); font-size: 14px; color: var(--text);\n    transition: border-color .15s, background .15s;\n  }\n  .opt:hover { border-color: var(--border-strong); }\n  .opt .mk { width: 19px; height: 19px; flex: none; border-radius: 50%; border: 1.5px solid var(--border-strong); display: grid; place-items: center; margin-top: 1px; }\n  .opt .mk svg { width: 11px; height: 11px; opacity: 0; }\n  .opt.correct { border-color: #2f9e63; background: color-mix(in oklch, #2f9e63 12%, transparent); }\n  .opt.correct .mk { background: #2f9e63; border-color: #2f9e63; }\n  .opt.correct .mk svg { opacity: 1; color: #fff; }\n  .opt.wrong { border-color: #d6643c; background: color-mix(in oklch, #d6643c 12%, transparent); }\n  .opt.wrong .mk { background: #d6643c; border-color: #d6643c; }\n  .opt.wrong .mk svg { opacity: 1; color: #fff; }\n  .opt.locked { cursor: default; }\n  .q-explain { margin: 10px 0 0; font-size: .92em; color: var(--text-soft); padding-left: 2px; display: none; }\n  .q-explain.show { display: block; }\n  .q-explain b { color: var(--accent); font-family: var(--font-ui); font-size: .82em; text-transform: uppercase; letter-spacing: .06em; }\n\n  \u002F* flashcards *\u002F\n  .fc-stage { perspective: 1400px; }\n  .fc {\n    position: relative; min-height: 150px; cursor: pointer;\n    transform-style: preserve-3d; transition: transform .5s cubic-bezier(.2,.7,.3,1);\n  }\n  .fc.flipped { transform: rotateY(180deg); }\n  .fc-face {\n    position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;\n    border-radius: var(--radius); border: 1px solid var(--border); background: var(--card-tint);\n    display: grid; place-items: center; text-align: center; padding: 26px 30px;\n  }\n  .fc-face .lab { position: absolute; top: 12px; left: 16px; font-family: var(--font-ui); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-mute); }\n  .fc-front .txt { font-family: var(--font-head); font-size: 1.32em; font-weight: 600; }\n  .fc-back { transform: rotateY(180deg); background: var(--accent-soft); border-color: var(--accent-line); }\n  .fc-back .txt { font-size: .98em; color: var(--text); line-height: 1.55; }\n  .fc-tap { position: absolute; bottom: 12px; right: 16px; font-family: var(--font-ui); font-size: 11px; color: var(--text-mute); }\n  .fc-foot { display: flex; align-items: center; gap: 10px; margin-top: 14px; font-family: var(--font-ui); }\n  .fc-count { font-size: 12.5px; color: var(--text-mute); font-variant-numeric: tabular-nums; }\n  .fc-rate { display: flex; gap: 8px; margin-left: auto; }\n  .rate-btn { font-family: var(--font-ui); font-size: 12.5px; font-weight: 550; padding: 7px 13px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--text-soft); cursor: pointer; }\n  .rate-btn:hover { border-color: var(--border-strong); color: var(--text); }\n  .rate-btn.again:hover { border-color: #d6643c; color: #d6643c; }\n  .rate-btn.good:hover { border-color: #2f9e63; color: #2f9e63; }\n  .fc-prev, .fc-next { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--text-soft); cursor: pointer; display: grid; place-items: center; }\n  .fc-prev:hover, .fc-next:hover { color: var(--text); border-color: var(--border-strong); }\n  .fc-prev svg, .fc-next svg { width: 15px; height: 15px; }\n\n  \u002F* recap callout *\u002F\n  .recap { border-radius: var(--radius); border: 1px dashed var(--accent-line); background: var(--accent-soft); padding: 18px 22px; margin: 26px 0; }\n  .recap .rh { font-family: var(--font-ui); font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 7px; }\n  .recap .rh svg { width: 15px; height: 15px; }\n  .recap p { margin: 0; font-family: var(--font-head); font-size: 1.08em; line-height: 1.55; }\n\n  \u002F* footer nav + complete *\u002F\n  .foot { display: flex; align-items: center; gap: 14px; margin-top: 40px; padding-top: 26px; border-top: 1px solid var(--border); font-family: var(--font-ui); }\n  .pgbtn { display: flex; align-items: center; gap: 8px; padding: 11px 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-elev); color: var(--text-soft); cursor: pointer; font-size: 13px; font-weight: 550; max-width: 44%; }\n  .pgbtn:hover { color: var(--text); border-color: var(--border-strong); }\n  .pgbtn:disabled { opacity: .4; cursor: default; }\n  .pgbtn svg { width: 15px; height: 15px; flex: none; }\n  .pgbtn .lab { display: flex; flex-direction: column; line-height: 1.2; min-width: 0; }\n  .pgbtn .lab small { font-size: 10.5px; color: var(--text-mute); letter-spacing: .04em; text-transform: uppercase; }\n  .pgbtn .lab span { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }\n  .pgbtn.next { margin-left: auto; text-align: right; }\n  .pgbtn.next .lab { align-items: flex-end; }\n  .complete-btn {\n    margin: 0 auto; display: flex; align-items: center; gap: 9px;\n    padding: 12px 22px; border-radius: 10px; border: 1.5px solid var(--accent); background: var(--accent); color: #fff;\n    cursor: pointer; font-size: 14px; font-weight: 600;\n  }\n  .complete-btn:hover { filter: brightness(1.06); }\n  .complete-btn.is-done { background: transparent; color: var(--accent); }\n  .complete-btn svg { width: 17px; height: 17px; }\n\n  \u002F* empty\u002Fdraft state *\u002F\n  .draft { text-align: center; color: var(--text-mute); font-family: var(--font-ui); font-size: 13.5px; border: 1px dashed var(--border-strong); border-radius: var(--radius); padding: 30px; margin: 24px 0; }\n\n  \u002F* ---------- SETTINGS PANEL ---------- *\u002F\n  .scrim { position: fixed; inset: 0; background: rgba(10,8,4,.34); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 40; }\n  .scrim.open { opacity: 1; pointer-events: auto; }\n  .panel {\n    position: fixed; top: 0; right: 0; height: 100%; width: 340px; max-width: 88vw; z-index: 50;\n    background: var(--bg-elev); border-left: 1px solid var(--border); box-shadow: var(--shadow);\n    transform: translateX(100%); transition: transform .26s cubic-bezier(.3,.8,.3,1);\n    display: flex; flex-direction: column; font-family: var(--font-ui);\n  }\n  .panel.open { transform: none; }\n  .panel-h { display: flex; align-items: center; padding: 18px 20px; border-bottom: 1px solid var(--border); }\n  .panel-h b { font-size: 15px; font-weight: 650; flex: 1; }\n  .panel-body { padding: 20px; overflow-y: auto; display: grid; gap: 24px; }\n  .set-group > .lab { font-size: 11px; font-weight: 650; letter-spacing: .07em; text-transform: uppercase; color: var(--text-mute); margin-bottom: 11px; }\n  .swatches { display: flex; gap: 10px; }\n  .sw { width: 30px; height: 30px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; outline: 1px solid var(--border); }\n  .sw.sel { border-color: var(--bg-elev); outline: 2px solid var(--text); }\n  .seg { display: flex; gap: 6px; background: var(--bg-side); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }\n  .seg button { flex: 1; border: 0; background: none; color: var(--text-soft); font-family: var(--font-ui); font-size: 12.5px; font-weight: 550; padding: 8px 6px; border-radius: 7px; cursor: pointer; }\n  .seg button.sel { background: var(--accent); color: #fff; }\n  .danger { font-size: 12.5px; font-weight: 550; color: #d6643c; background: none; border: 1px solid color-mix(in oklch,#d6643c 40%, var(--border)); border-radius: 9px; padding: 10px; cursor: pointer; width: 100%; }\n  .danger:hover { background: color-mix(in oklch,#d6643c 10%, transparent); }\n  .set-note { font-size: 11.5px; color: var(--text-mute); line-height: 1.5; }\n\n  \u002F* toast *\u002F\n  .toast { position: fixed; bottom: 24px; left: 50%; transform: translate(-50%, 16px); z-index: 60; background: var(--text); color: var(--bg); font-family: var(--font-ui); font-size: 13px; font-weight: 550; padding: 11px 18px; border-radius: 10px; box-shadow: var(--shadow); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; }\n  .toast.show { opacity: 1; transform: translate(-50%, 0); }\n\n  \u002F* mobile *\u002F\n  .menu-btn { display: none; }\n  @media (max-width: 880px) {\n    .app { grid-template-columns: 1fr; }\n    .side { position: fixed; z-index: 45; width: 300px; height: 100%; transform: translateX(-100%); transition: transform .26s; }\n    .side.open { transform: none; }\n    .menu-btn { display: grid; }\n    .reading { padding: 28px 20px 120px; }\n  }\n\n  \u002F* keyboard hint *\u002F\n  kbd { font-family: var(--font-ui); font-size: 11px; background: var(--bg-code); border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 5px; padding: 1px 6px; color: var(--text-soft); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"app\">\n  <!-- SIDEBAR -->\n  <aside class=\"side\" id=\"side\">\n    <div class=\"side-head\">\n      <div class=\"brand\">\n        <div class=\"brand-mark\">LLM<\u002Fdiv>\n        <div>\n          <div class=\"brand-title\" id=\"courseTitle\">LLM Engineering<\u002Fdiv>\n          <div class=\"brand-sub\">From basics to advanced<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"overall\">\n        <div class=\"overall-row\"><b>Your progress<\u002Fb><span id=\"overallPct\">0%<\u002Fspan><\u002Fdiv>\n        <div class=\"bar\"><i id=\"overallBar\"><\u002Fi><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"search-wrap\">\n      <input class=\"search\" id=\"search\" type=\"search\" placeholder=\"Search topics…\" autocomplete=\"off\">\n    <\u002Fdiv>\n    <nav class=\"nav\" id=\"nav\"><\u002Fnav>\n  <\u002Faside>\n\n  <!-- MAIN -->\n  <main class=\"main\" id=\"main\">\n    <div class=\"topbar\">\n      <button class=\"iconbtn menu-btn\" id=\"menuBtn\" title=\"Topics\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M3 6h18M3 12h18M3 18h18\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n      <div class=\"crumb\" id=\"crumb\"><\u002Fdiv>\n      <button class=\"iconbtn\" id=\"themeBtn\" title=\"Toggle theme (T)\"><\u002Fbutton>\n      <button class=\"iconbtn\" id=\"setBtn\" title=\"Settings\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n    <article class=\"reading\" id=\"reading\"><\u002Farticle>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<!-- SETTINGS -->\n<div class=\"scrim\" id=\"scrim\"><\u002Fdiv>\n<aside class=\"panel\" id=\"panel\">\n  <div class=\"panel-h\">\n    <b>Settings<\u002Fb>\n    <button class=\"iconbtn\" id=\"setClose\" title=\"Close\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"panel-body\">\n    <div class=\"set-group\">\n      <div class=\"lab\">Accent color<\u002Fdiv>\n      <div class=\"swatches\" id=\"swatches\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"set-group\">\n      <div class=\"lab\">Typeface<\u002Fdiv>\n      <div class=\"seg\" id=\"segFont\">\n        <button data-v=\"serif\">Serif<\u002Fbutton>\n        <button data-v=\"sans\">Sans<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"set-group\">\n      <div class=\"lab\">Density<\u002Fdiv>\n      <div class=\"seg\" id=\"segDensity\">\n        <button data-v=\"roomy\">Roomy<\u002Fbutton>\n        <button data-v=\"compact\">Compact<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"set-group\">\n      <div class=\"lab\">Progress<\u002Fdiv>\n      <button class=\"danger\" id=\"resetBtn\">Reset all progress<\u002Fbutton>\n      <p class=\"set-note\">Everything is saved on this device only. Keyboard: <kbd>←<\u002Fkbd> <kbd>→<\u002Fkbd> change topic, <kbd>T<\u002Fkbd> theme, <kbd>\u002F<\u002Fkbd> search.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Faside>\n\n<div class=\"toast\" id=\"toast\"><\u002Fdiv>\n\n<!-- ============================================================ COURSE DATA -->\n<script id=\"course-data\">\nwindow.COURSE = {\n  title: \"LLM Engineering\",\n  modules: [\n  {\n    id: \"foundations\",\n    title: \"Foundations\",\n    topics: [\n      {\n        id: \"llm-basics\",\n        title: \"LLM basics\",\n        lesson:\n          \"<p>A <strong>Large Language Model (LLM)<\u002Fstrong> is a computer program that has read an enormous amount of text and learned the patterns of how words follow each other. When you give it some words, its only real job is to guess the next word — then the next, then the next — until it has written a full answer.<\u002Fp>\" +\n          \"<div class='analogy'><p>Think of the autocomplete on your phone. You type <em>“I’m running a bit…”<\u002Fem> and it suggests <em>“late.”<\u002Fem> An LLM is the same idea, scaled up billions of times and trained on a huge slice of the internet, so its guesses are good enough to write essays, code, and explanations.<\u002Fp><\u002Fdiv>\" +\n          \"<p>The word <strong>“large”<\u002Fstrong> is doing a lot of work. These models have learned from trillions of words and have billions of internal dials (called <em>parameters<\u002Fem>) that store what they’ve learned. That scale is why they can hold a conversation instead of just finishing one sentence.<\u002Fp>\" +\n          \"<h3>What an LLM is — and is not<\u002Fh3>\" +\n          \"<p>It is <strong>not<\u002Fstrong> a database that looks up facts, and it does not “understand” the way a person does. It is a very sophisticated pattern-matcher for language. That single fact explains most of its strengths (fluent writing) and most of its weaknesses (it can sound confident while being wrong).<\u002Fp>\",\n        model:\n          \"An LLM is a <strong>next-word prediction machine<\u002Fstrong>. Everything else — answering questions, writing code, summarising — is that one trick repeated, one word at a time.\",\n        mistakes: [\n          { t: \"Thinking the model “knows” facts\", d: \"It predicts likely text. Likely-sounding and true are not the same thing — always verify important facts.\" },\n          { t: \"Assuming bigger is always better\", d: \"A smaller model that fits your task and budget often beats a giant one you can’t afford to run.\" },\n          { t: \"Expecting the same answer every time\", d: \"Models add a bit of randomness, so the same prompt can give different wording on different runs.\" }\n        ],\n        terms: [\n          { t: \"LLM\", d: \"Large Language Model — a program trained on lots of text to predict and generate language.\" },\n          { t: \"Parameter\", d: \"One of the billions of internal numbers a model adjusts during training to store what it has learned.\" },\n          { t: \"Generation\", d: \"The act of the model producing text, one token (word-piece) at a time.\" }\n        ],\n        quiz: [\n          { q: \"At its core, what is an LLM actually doing when it answers you?\", options: [\"Copying the closest webpage it has seen\", \"Running a fixed script written by engineers\", \"Predicting the next word over and over\", \"Searching a database of stored answers\"], answer: 2, explain: \"It generates text token by token by predicting what is most likely to come next.\" },\n          { q: \"Why can the same prompt give slightly different answers?\", options: [\"It’s a bug\", \"The internet changed\", \"Models include some controlled randomness when picking words\", \"The model retrains every time\"], answer: 2, explain: \"Sampling adds variety so output isn’t robotically identical each run.\" }\n        ],\n        cards: [\n          { q: \"In one line, what is an LLM?\", a: \"A next-word prediction machine trained on huge amounts of text.\" },\n          { q: \"Does an LLM look facts up in a database?\", a: \"No — it predicts likely text, which is why it can be fluent but wrong.\" }\n        ],\n        recap: \"An LLM reads tons of text, learns word patterns, and answers by predicting the next word again and again. Fluent ≠ factual — treat it as a brilliant guesser, not an oracle.\"\n      },\n      {\n        id: \"how-models-work\",\n        title: \"How AI models work\",\n        lesson:\n          \"<p>Every AI model is really just a giant <strong>maths function<\u002Fstrong>: numbers go in, numbers come out. The magic is in <em>which<\u002Fem> numbers and how they were tuned.<\u002Fp>\" +\n          \"<h3>The three-step loop<\u002Fh3>\" +\n          \"<ul><li><strong>Input → numbers.<\u002Fstrong> Your text is chopped into pieces and turned into lists of numbers the computer can work with.<\u002Fli>\" +\n          \"<li><strong>Numbers → numbers.<\u002Fstrong> Those numbers flow through many layers of multiplications and additions, shaped by the model’s parameters.<\u002Fli>\" +\n          \"<li><strong>Numbers → output.<\u002Fstrong> The final numbers are turned back into a word (or pixel, or sound).<\u002Fli><\u002Ful>\" +\n          \"<div class='analogy'><p>Picture a row of coffee filters. Raw beans (your input) pour in the top; each filter removes or emphasises something; what drips out the bottom is the finished coffee (the answer). “Training” is adjusting every filter until the coffee tastes right.<\u002Fp><\u002Fdiv>\" +\n          \"<p>During <strong>training<\u002Fstrong>, the model makes a guess, checks how wrong it was, and nudges its parameters a tiny bit in the right direction. Do that billions of times and the function slowly becomes good at the task.<\u002Fp>\",\n        model:\n          \"A model is a <strong>stack of adjustable filters<\u002Fstrong>. Training is the slow process of tuning every filter until the right thing comes out the bottom.\",\n        mistakes: [\n          { t: \"Believing there’s a “little brain” inside\", d: \"There’s no reasoning homunculus — it’s layers of arithmetic tuned by examples.\" },\n          { t: \"Confusing training with using\", d: \"Training (tuning the filters) happens once and is expensive; using the trained model (inference) is comparatively cheap and fast.\" }\n        ],\n        terms: [\n          { t: \"Layer\", d: \"One stage of the model’s maths; outputs of one layer feed the next.\" },\n          { t: \"Weights\", d: \"Another word for parameters — the tuned numbers inside each layer.\" },\n          { t: \"Loss\", d: \"A score of how wrong the model’s guess was; training tries to make it small.\" }\n        ],\n        quiz: [\n          { q: \"What does “training” a model mean in plain terms?\", options: [\"Writing more rules by hand\", \"Slowly nudging its internal numbers to reduce mistakes\", \"Restarting it until it works\", \"Downloading more data into a database\"], answer: 1, explain: \"Training adjusts weights to lower the loss — the measure of error.\" },\n          { q: \"Which step happens every time you use a trained model?\", options: [\"Buying more GPUs\", \"Inference\", \"Re-labelling data\", \"Training\"], answer: 1, explain: \"Using a finished model to get an answer is called inference.\" }\n        ],\n        cards: [\n          { q: \"What is a model, mathematically?\", a: \"A big function: numbers in, numbers out, shaped by tuned parameters.\" },\n          { q: \"What is 'loss'?\", a: \"A score of how wrong a guess was; training minimises it.\" }\n        ],\n        recap: \"Models are stacks of tunable maths. Training nudges the numbers to cut mistakes; using the result is inference. No magic brain — just arithmetic tuned by examples.\"\n      },\n      {\n        id: \"tokens\",\n        title: \"Tokens\",\n        lesson:\n          \"<p>Models don’t read whole words the way we do. They read <strong>tokens<\u002Fstrong> — small chunks of text. A token is often a word, but long or rare words get split into pieces.<\u002Fp>\" +\n          \"<p>For English, a rough rule of thumb is <strong>1 token ≈ ¾ of a word<\u002Fstrong>, or about 4 characters. So <em>“unbelievable”<\u002Fem> might become <code>un<\u002Fcode> + <code>believ<\u002Fcode> + <code>able<\u002Fcode> (3 tokens), while <em>“cat”<\u002Fem> is just one.<\u002Fp>\" +\n          \"<div class='analogy'><p>Think of Lego. You don’t describe a castle brick-by-brick using whole walls — you use standard bricks. Tokens are the standard language-bricks the model snaps together.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Why you should care<\u002Fh3>\" +\n          \"<ul><li><strong>Cost.<\u002Fstrong> Most AI APIs charge per token, not per word.<\u002Fli>\" +\n          \"<li><strong>Limits.<\u002Fstrong> A model’s memory (context window) is measured in tokens.<\u002Fli>\" +\n          \"<li><strong>Speed.<\u002Fstrong> More tokens to read or write = slower responses.<\u002Fli><\u002Ful>\",\n        model:\n          \"Tokens are <strong>language Lego bricks<\u002Fstrong>. The model counts bricks, not words — and you pay and wait per brick.\",\n        mistakes: [\n          { t: \"Counting words instead of tokens\", d: \"Code, emoji, and non-English text use far more tokens per word than you’d expect.\" },\n          { t: \"Forgetting the prompt counts too\", d: \"Your instructions, examples, and the model’s reply all consume tokens from the same budget.\" }\n        ],\n        terms: [\n          { t: \"Token\", d: \"A chunk of text (word or word-piece) that the model actually processes.\" },\n          { t: \"Tokens-per-word\", d: \"Roughly 1.3 for English; higher for code and other languages.\" }\n        ],\n        quiz: [\n          { q: \"Roughly how many tokens is one English word?\", options: [\"Exactly 1\", \"It’s always 4\", \"About 5\", \"About 1.3\"], answer: 3, explain: \"≈1.3 tokens per English word, or ~¾ word per token.\" },\n          { q: \"Which uses the MOST tokens for the same visible length?\", options: [\"Plain English prose\", \"A dense block of code with symbols\", \"A short name\", \"A single common word\"], answer: 1, explain: \"Symbols and rare strings get split into many small tokens.\" }\n        ],\n        cards: [\n          { q: \"What is a token?\", a: \"A small chunk of text — a word or word-piece — that the model processes.\" },\n          { q: \"Why do tokens matter practically?\", a: \"Cost, context limits, and speed are all measured in tokens.\" }\n        ],\n        recap: \"Models see tokens (word-pieces), not words. ~1.3 tokens per English word. Cost, memory limits, and speed are all counted in tokens — including your prompt.\"\n      },\n      {\n        id: \"tokenization\",\n        title: \"Tokenization\",\n        lesson:\n          \"<p><strong>Tokenization<\u002Fstrong> is the step that turns your raw text into tokens before the model sees it. A small program called a <em>tokenizer<\u002Fem> does this, using a fixed vocabulary it learned ahead of time.<\u002Fp>\" +\n          \"<p>The most common method is <strong>subword<\u002Fstrong> tokenization (e.g. BPE — Byte Pair Encoding). It keeps frequent words whole and breaks rare ones into reusable pieces, so the model can still handle words it has never seen.<\u002Fp>\" +\n          \"<pre><code>\\\"tokenizing\\\"  ->  [\\\"token\\\", \\\"izing\\\"]\\n\\\"GPT-4\\\"       ->  [\\\"G\\\", \\\"PT\\\", \\\"-\\\", \\\"4\\\"]<\u002Fcode><\u002Fpre>\" +\n          \"<div class='analogy'><p>It’s like spelling an unfamiliar name on the phone: you break it into familiar syllables the other person already knows. The tokenizer breaks unknown words into known pieces.<\u002Fp><\u002Fdiv>\" +\n          \"<p>Every model ships with its <strong>own<\u002Fstrong> tokenizer. The same sentence can become a different number of tokens on different models — which is why token counts (and bills) vary between providers.<\u002Fp>\",\n        model:\n          \"The tokenizer is a <strong>translator at the door<\u002Fstrong>: it converts human text into the model’s numbered vocabulary on the way in, and back again on the way out.\",\n        mistakes: [\n          { t: \"Assuming one tokenizer fits all models\", d: \"Each model family has its own; never reuse counts across providers.\" },\n          { t: \"Ignoring whitespace and capitalisation\", d: \"“ Cat”, “cat”, and “Cat” can be different tokens — small changes shift counts.\" }\n        ],\n        terms: [\n          { t: \"Tokenizer\", d: \"The program that splits text into tokens and maps them to numbers.\" },\n          { t: \"BPE\", d: \"Byte Pair Encoding — a popular method that merges frequent character pairs into subword tokens.\" },\n          { t: \"Vocabulary\", d: \"The fixed list of tokens a model knows (often 30k–200k entries).\" }\n        ],\n        quiz: [\n          { q: \"Why use subword tokenization instead of whole words?\", options: [\"So the model can handle rare or unseen words from familiar pieces\", \"It looks nicer\", \"To make text longer\", \"It removes the need for training\"], answer: 0, explain: \"Subwords let unseen words be built from known pieces.\" },\n          { q: \"Do two different models always produce the same token count for a sentence?\", options: [\"No — each has its own tokenizer\", \"Yes, always\", \"Only for code\", \"Only for English\"], answer: 0, explain: \"Different vocabularies mean different counts.\" }\n        ],\n        cards: [\n          { q: \"What does a tokenizer do?\", a: \"Splits text into tokens and maps them to numbers the model uses.\" },\n          { q: \"What is BPE?\", a: \"Byte Pair Encoding: merges frequent character pairs into subword tokens.\" }\n        ],\n        recap: \"Tokenization converts text into the model’s numbered vocabulary, usually with subwords so rare words still work. Each model has its own tokenizer, so counts differ across providers.\"\n      },\n      {\n        id: \"context-windows\",\n        title: \"Context windows\",\n        lesson:\n          \"<p>The <strong>context window<\u002Fstrong> is how much text a model can “hold in mind” at once, measured in tokens. It covers <em>everything<\u002Fem> in the conversation: the system instructions, your messages, any documents you paste, and the model’s own replies.<\u002Fp>\" +\n          \"<div class='analogy'><p>Think of a desk of a fixed size. You can spread out only so many papers before older ones fall off the edge. The context window is that desk — once it’s full, the earliest text drops away.<\u002Fp><\u002Fdiv>\" +\n          \"<p>Windows have grown fast — from a couple of thousand tokens to hundreds of thousands. But bigger isn’t free: more context means <strong>slower<\u002Fstrong> and <strong>more expensive<\u002Fstrong> responses, and models often pay less attention to stuff buried in the middle (the “lost in the middle” effect).<\u002Fp>\" +\n          \"<h3>Practical takeaways<\u002Fh3>\" +\n          \"<ul><li>Put the most important instructions near the start or end, not buried mid-way.<\u002Fli><li>Don’t dump entire documents if you only need a paragraph — trim first.<\u002Fli><\u002Ful>\",\n        model:\n          \"The context window is a <strong>desk of fixed size<\u002Fstrong>. Everything shares the space, and when it’s full the oldest papers slide off the edge.\",\n        mistakes: [\n          { t: \"Thinking the model remembers past chats\", d: \"It only ‘remembers’ what’s currently in the window. Close the chat and it’s gone unless you store it yourself.\" },\n          { t: \"Stuffing the window to the brim\", d: \"Long context is slower, costlier, and the middle gets less attention.\" }\n        ],\n        terms: [\n          { t: \"Context window\", d: \"Max tokens a model can consider at once, including prompt and reply.\" },\n          { t: \"Lost in the middle\", d: \"Tendency to under-use information placed in the centre of a long context.\" }\n        ],\n        quiz: [\n          { q: \"What counts toward the context window?\", options: [\"Only your latest message\", \"Only documents\", \"Everything: instructions, history, pasted docs, and the reply\", \"Only the model’s reply\"], answer: 2, explain: \"The whole conversation shares the token budget.\" },\n          { q: \"A downside of using a very long context is…\", options: [\"It retrains the model\", \"It’s always more accurate\", \"It’s slower and more expensive, and the middle may be ignored\", \"Nothing — bigger is strictly better\"], answer: 2, explain: \"Cost, latency, and the lost-in-the-middle effect all rise.\" }\n        ],\n        cards: [\n          { q: \"What is the context window?\", a: \"The max tokens a model can hold at once — prompt, history, docs, and reply combined.\" },\n          { q: \"What is 'lost in the middle'?\", a: \"Models under-use info placed in the centre of a long context.\" }\n        ],\n        recap: \"The context window is the model’s desk — a fixed token budget shared by everything in the chat. Bigger windows cost more and slow down, and mid-context info gets less attention.\"\n      },\n      {\n        id: \"embeddings\",\n        title: \"Embeddings\",\n        lesson:\n          \"<p>An <strong>embedding<\u002Fstrong> turns a piece of text into a list of numbers (a <em>vector<\u002Fem>) that captures its <strong>meaning<\u002Fstrong>. Texts with similar meaning get similar number-lists, even if they share no words.<\u002Fp>\" +\n          \"<div class='analogy'><p>Imagine a giant map where every idea has a location. “Dog” and “puppy” sit close together; “dog” and “tax form” sit far apart. An embedding is just those map coordinates for a piece of text.<\u002Fp><\u002Fdiv>\" +\n          \"<p>Because meaning becomes geometry, you can measure <strong>closeness<\u002Fstrong> between texts with simple maths. That’s the engine behind semantic search, recommendations, and Retrieval (RAG) — find the chunks whose vectors are nearest to the question’s vector.<\u002Fp>\" +\n          \"<pre><code>\\\"How do I reset my password?\\\"\\n  ~ near ~  \\\"steps to recover a forgotten login\\\"\\n  ~ far  ~  \\\"history of the Roman Empire\\\"<\u002Fcode><\u002Fpre>\",\n        model:\n          \"An embedding is a <strong>GPS coordinate for meaning<\u002Fstrong>. Similar ideas land near each other; distance on the map = difference in meaning.\",\n        mistakes: [\n          { t: \"Comparing embeddings from different models\", d: \"Each model’s ‘map’ is its own coordinate system — vectors aren’t interchangeable.\" },\n          { t: \"Expecting exact-keyword behaviour\", d: \"Embeddings match meaning, not spelling — great for synonyms, but can miss exact codes or IDs.\" }\n        ],\n        terms: [\n          { t: \"Embedding\", d: \"A numeric vector representing the meaning of text.\" },\n          { t: \"Vector\", d: \"An ordered list of numbers (e.g. 768 or 1536 of them).\" },\n          { t: \"Cosine similarity\", d: \"A common way to score how close two vectors point in the same direction.\" }\n        ],\n        quiz: [\n          { q: \"Two sentences with the same meaning but no shared words will have…\", options: [\"Identical text\", \"Similar embeddings (close vectors)\", \"No embedding at all\", \"Very different embeddings\"], answer: 1, explain: \"Embeddings capture meaning, so similar meaning → nearby vectors.\" },\n          { q: \"Embeddings are the core of which feature?\", options: [\"Spell-check\", \"Faster GPUs\", \"Semantic search \u002F retrieval\", \"Bigger context windows\"], answer: 2, explain: \"Nearest-vector lookup powers semantic search and RAG.\" }\n        ],\n        cards: [\n          { q: \"What is an embedding?\", a: \"A vector of numbers that represents the meaning of text.\" },\n          { q: \"How do you compare two embeddings?\", a: \"Measure distance\u002Fcloseness, often with cosine similarity.\" }\n        ],\n        recap: \"Embeddings are coordinates for meaning: similar ideas get nearby vectors. Measuring closeness powers semantic search and RAG. Don’t mix vectors from different models.\"\n      },\n      {\n        id: \"transformers\",\n        title: \"Transformers\",\n        lesson:\n          \"<p>The <strong>Transformer<\u002Fstrong> is the design (architecture) behind almost every modern LLM. Its breakthrough was reading all the words in a sentence <strong>at the same time<\u002Fstrong> rather than strictly one after another, while still tracking how each word relates to the others.<\u002Fp>\" +\n          \"<p>Older designs (RNNs) read left-to-right like reading with a finger, which was slow and forgetful over long passages. Transformers look at the whole passage at once, which is faster to train and far better at long-range connections.<\u002Fp>\" +\n          \"<div class='analogy'><p>Reading a contract: an RNN reads word by word and may forget clause 2 by the time it reaches clause 40. A Transformer spreads the whole page on the table and can glance back to any clause instantly.<\u002Fp><\u002Fdiv>\" +\n          \"<p>The part that lets it do this is the <strong>attention mechanism<\u002Fstrong> (next topic). Stack many attention layers and you get a Transformer.<\u002Fp>\",\n        model:\n          \"A Transformer reads the <strong>whole page at once<\u002Fstrong> and lets every word look at every other word — instead of crawling left to right.\",\n        mistakes: [\n          { t: \"Confusing the architecture with a specific model\", d: \"‘Transformer’ is the blueprint; GPT, Llama, etc. are buildings made from it.\" },\n          { t: \"Thinking it reads in order like we do\", d: \"It processes positions in parallel; word order is added separately as ‘position’ information.\" }\n        ],\n        terms: [\n          { t: \"Transformer\", d: \"The neural-network architecture using attention layers, introduced in 2017.\" },\n          { t: \"Architecture\", d: \"The overall design\u002Fblueprint of a model, separate from its trained weights.\" },\n          { t: \"RNN\", d: \"An older sequential design that processed text one step at a time.\" }\n        ],\n        quiz: [\n          { q: \"What made Transformers a leap over older RNNs?\", options: [\"They have no parameters\", \"They use less electricity\", \"They don’t need training\", \"They process the whole sequence in parallel and link distant words well\"], answer: 3, explain: \"Parallel processing + attention = faster training and better long-range links.\" },\n          { q: \"‘Transformer’ refers to…\", options: [\"A tokenizer\", \"A type of GPU\", \"The architecture\u002Fblueprint many models are built from\", \"A single specific model\"], answer: 2, explain: \"It’s the design; GPT and Llama are instances of it.\" }\n        ],\n        cards: [\n          { q: \"What is a Transformer?\", a: \"The architecture behind modern LLMs that uses attention to read all words at once.\" },\n          { q: \"Transformer vs RNN — the key difference?\", a: \"Transformers process in parallel and handle long-range links; RNNs crawl step by step.\" }\n        ],\n        recap: \"The Transformer reads a whole passage at once and uses attention to relate every word to every other — faster to train and better over long text than the older sequential RNNs.\"\n      },\n      {\n        id: \"attention\",\n        title: \"Attention mechanism\",\n        lesson:\n          \"<p><strong>Attention<\u002Fstrong> is how a Transformer decides which other words matter when it’s processing a given word. For each word, it asks: <em>“which of the other words should I focus on to understand this one?”<\u002Fem> and weighs them accordingly.<\u002Fp>\" +\n          \"<div class='analogy'><p>In the sentence <em>“The trophy didn’t fit in the suitcase because it was too big,”<\u002Fem> what does <em>“it”<\u002Fem> mean? Attention lets the model put more weight on <em>“trophy”<\u002Fem> than <em>“suitcase,”<\u002Fem> resolving the pronoun — exactly what you do when you re-read and glance back.<\u002Fp><\u002Fdiv>\" +\n          \"<p>Mechanically, each word produces a <strong>query<\u002Fstrong> (what am I looking for?), and every word offers a <strong>key<\u002Fstrong> (what do I contain?). Matching queries to keys decides how much of each word’s <strong>value<\u002Fstrong> to blend in. Models run many of these in parallel — <strong>multi-head attention<\u002Fstrong> — so different ‘heads’ can track grammar, topic, tone, etc.<\u002Fp>\",\n        model:\n          \"Attention is <strong>spotlights<\u002Fstrong>: for every word, the model shines brighter light on the other words that help explain it, and dimmer light on the rest.\",\n        mistakes: [\n          { t: \"Thinking attention = importance ranking only\", d: \"It’s relational — how much word A should listen to word B — not a single global ‘top words’ list.\" },\n          { t: \"Ignoring its cost\", d: \"Standard attention compares every word with every other, so cost grows fast with length — the reason long context is pricey.\" }\n        ],\n        terms: [\n          { t: \"Attention\", d: \"Mechanism that weighs how much each token should consider every other token.\" },\n          { t: \"Query \u002F Key \u002F Value\", d: \"Three vectors per token; query·key sets the weight, value is what gets blended.\" },\n          { t: \"Multi-head\", d: \"Running several attention patterns in parallel to capture different relationships.\" }\n        ],\n        quiz: [\n          { q: \"What problem does attention solve in the ‘it was too big’ example?\", options: [\"Counting tokens\", \"Choosing a font\", \"Deciding which earlier word a word refers to\", \"Spelling\"], answer: 2, explain: \"It weights related words to resolve meaning like pronouns.\" },\n          { q: \"Why does long context get expensive with standard attention?\", options: [\"It retrains the model\", \"Every token is compared with every other token\", \"More disk space\", \"Bigger fonts\"], answer: 1, explain: \"All-pairs comparison grows quickly as length increases.\" }\n        ],\n        cards: [\n          { q: \"In one line, what is attention?\", a: \"A way for each word to weigh how much to focus on every other word.\" },\n          { q: \"What are Query, Key, Value?\", a: \"Per-token vectors: query·key sets focus weight; value is what gets mixed in.\" }\n        ],\n        recap: \"Attention lets every word focus on the other words that explain it, using query–key–value matching across multiple heads. It’s powerful but compares all pairs — which is why long context costs more.\"\n      },\n      {\n        id: \"parameters\",\n        title: \"Parameters\",\n        lesson:\n          \"<p><strong>Parameters<\u002Fstrong> (also called weights) are the model’s learned numbers — the dials that training adjusts. When you hear “a 7B model,” that means <strong>7 billion<\u002Fstrong> parameters.<\u002Fp>\" +\n          \"<div class='analogy'><p>Imagine a mixing desk with billions of sliders. Training is the long process of setting every slider so the right sound comes out. The finished positions of all those sliders <em>are<\u002Fem> the model.<\u002Fp><\u002Fdiv>\" +\n          \"<p>More parameters generally means more capacity to learn, but also <strong>more memory and compute<\u002Fstrong> to run. A rough guide: at common precision, every billion parameters needs about <strong>2&nbsp;GB<\u002Fstrong> of memory just to load (less if you <em>quantize<\u002Fem> — a later topic).<\u002Fp>\" +\n          \"<table class='compare'><tr><th>Size<\u002Fth><th>Feel<\u002Fth><th>Runs on<\u002Fth><\u002Ftr><tr><td>~1–3B<\u002Ftd><td>Snappy, basic<\u002Ftd><td>A laptop \u002F phone<\u002Ftd><\u002Ftr><tr><td>~7–13B<\u002Ftd><td>Solid all-rounder<\u002Ftd><td>One good GPU<\u002Ftd><\u002Ftr><tr><td>70B+<\u002Ftd><td>Strong reasoning<\u002Ftd><td>Multiple GPUs \u002F cloud<\u002Ftd><\u002Ftr><\u002Ftable>\",\n        model:\n          \"Parameters are <strong>billions of tiny sliders<\u002Fstrong>. The trained model is just the final position of every slider — and more sliders means more memory to hold them.\",\n        mistakes: [\n          { t: \"Assuming more parameters always wins\", d: \"A well-tuned small model can beat a poorly-used large one — and it’s cheaper to run.\" },\n          { t: \"Forgetting parameters ≠ knowledge you can edit\", d: \"You can’t open a model and edit a fact; knowledge is smeared across all the weights.\" }\n        ],\n        terms: [\n          { t: \"Parameter \u002F weight\", d: \"A learned number inside the model; adjusted during training.\" },\n          { t: \"B (as in 7B)\", d: \"Billions of parameters.\" },\n          { t: \"Capacity\", d: \"How much a model can potentially learn; loosely tied to parameter count.\" }\n        ],\n        quiz: [\n          { q: \"What does ‘7B’ describe?\", options: [\"7 benchmarks passed\", \"7 GB file size always\", \"7 billion words of training\", \"7 billion parameters\"], answer: 3, explain: \"B = billions of parameters.\" },\n          { q: \"A practical cost of more parameters is…\", options: [\"Smaller files\", \"Nothing\", \"More memory and compute to run\", \"No training needed\"], answer: 2, explain: \"Capacity rises but so do memory and compute needs.\" }\n        ],\n        cards: [\n          { q: \"What are parameters?\", a: \"The model’s learned numbers (weights) — the dials training adjusts.\" },\n          { q: \"What does '7B' mean?\", a: \"7 billion parameters.\" }\n        ],\n        recap: \"Parameters are the billions of learned dials that make up a model. More can mean more capability but always more memory and compute. Bigger isn’t automatically better for your task.\"\n      },\n      {\n        id: \"train-vs-infer\",\n        title: \"Training vs inference\",\n        lesson:\n          \"<p>These are the two phases of a model’s life. <strong>Training<\u002Fstrong> is teaching the model (setting the parameters). <strong>Inference<\u002Fstrong> is using the trained model to get answers.<\u002Fp>\" +\n          \"<div class='analogy'><p>Training is like years of medical school — slow, expensive, done once. Inference is the doctor seeing a patient — fast, repeated, cheap by comparison. You don’t re-do medical school for every appointment.<\u002Fp><\u002Fdiv>\" +\n          \"<table class='compare'><tr><th><\u002Fth><th>Training<\u002Fth><th>Inference<\u002Fth><\u002Ftr><tr><th>Goal<\u002Fth><td>Learn \u002F set weights<\u002Ftd><td>Produce an answer<\u002Ftd><\u002Ftr><tr><th>When<\u002Fth><td>Once (or occasional updates)<\u002Ftd><td>Every request<\u002Ftd><\u002Ftr><tr><th>Cost<\u002Fth><td>Huge, many GPUs, days–months<\u002Ftd><td>Small per request<\u002Ftd><\u002Ftr><tr><th>Changes the model?<\u002Fth><td>Yes<\u002Ftd><td>No<\u002Ftd><\u002Ftr><\u002Ftable>\" +\n          \"<p>Key point: normal use (and even fine-tuning prompts) does <strong>not<\u002Fstrong> change the base model. Inference leaves the weights untouched.<\u002Fp>\",\n        model:\n          \"Training = <strong>going to school<\u002Fstrong> (slow, once, changes you). Inference = <strong>doing the job<\u002Fstrong> (fast, repeated, no learning).\",\n        mistakes: [\n          { t: \"Thinking chatting with a model trains it\", d: \"Inference doesn’t update weights; the model doesn’t ‘learn’ from your chat unless you explicitly fine-tune.\" },\n          { t: \"Budgeting them the same way\", d: \"Training is a big one-off; inference is an ongoing per-request cost — plan each separately.\" }\n        ],\n        terms: [\n          { t: \"Training\", d: \"The process of setting a model’s parameters from data.\" },\n          { t: \"Inference\", d: \"Running a trained model to generate output.\" },\n          { t: \"Fine-tuning\", d: \"A smaller, extra round of training on top of a base model.\" }\n        ],\n        quiz: [\n          { q: \"Which phase changes the model’s weights?\", options: [\"Inference\", \"Neither\", \"Training\", \"Both equally\"], answer: 2, explain: \"Only training updates the parameters.\" },\n          { q: \"Does normal chatting teach the model new things?\", options: [\"Yes, instantly\", \"Only on weekends\", \"No — inference doesn’t update weights\", \"Only with images\"], answer: 2, explain: \"It must be explicitly trained\u002Ffine-tuned to learn.\" }\n        ],\n        cards: [\n          { q: \"Training vs inference?\", a: \"Training sets the weights (slow, once); inference uses the model (fast, repeated).\" },\n          { q: \"Does inference change the model?\", a: \"No — weights stay fixed during inference.\" }\n        ],\n        recap: \"Training teaches the model and sets its weights — expensive and occasional. Inference is everyday use — cheap per request and leaves the model unchanged. Chatting alone never trains it.\"\n      },\n      {\n        id: \"open-vs-closed\",\n        title: \"Open-source vs closed-source models\",\n        lesson:\n          \"<p><strong>Closed<\u002Fstrong> models (like the ones behind many popular chat apps) live on a company’s servers. You send text, you get text back through an API — but you can’t see or download the weights.<\u002Fp>\" +\n          \"<p><strong>Open<\u002Fstrong> (open-weight) models can be downloaded and run on your own hardware. You control them fully, can fine-tune them, and run offline — but you’re responsible for the compute and setup.<\u002Fp>\" +\n          \"<table class='compare'><tr><th><\u002Fth><th>Closed (API)<\u002Fth><th>Open-weight<\u002Fth><\u002Ftr><tr><th>Setup<\u002Fth><td>None — just call the API<\u002Ftd><td>You host and maintain it<\u002Ftd><\u002Ftr><tr><th>Privacy<\u002Fth><td>Data leaves your machine<\u002Ftd><td>Can stay fully local<\u002Ftd><\u002Ftr><tr><th>Cost shape<\u002Fth><td>Pay per token<\u002Ftd><td>Pay for hardware\u002Ftime<\u002Ftd><\u002Ftr><tr><th>Customise<\u002Fth><td>Limited<\u002Ftd><td>Full — fine-tune freely<\u002Ftd><\u002Ftr><tr><th>Top-end quality<\u002Fth><td>Often the frontier<\u002Ftd><td>Closing the gap fast<\u002Ftd><\u002Ftr><\u002Ftable>\" +\n          \"<div class='analogy'><p>Closed is <em>riding in a taxi<\u002Fem>: effortless, you pay per trip, you don’t touch the engine. Open is <em>owning a car<\u002Fem>: more setup and upkeep, but it’s yours to drive anywhere and modify.<\u002Fp><\u002Fdiv>\",\n        model:\n          \"Closed = <strong>taxi<\u002Fstrong> (easy, pay per ride, can’t touch the engine). Open = <strong>owning a car<\u002Fstrong> (more upkeep, full control, drive it offline).\",\n        mistakes: [\n          { t: \"Choosing on hype, not fit\", d: \"Pick based on privacy needs, budget shape, and customisation — not which name is trending.\" },\n          { t: \"Assuming open = free\", d: \"The weights are free, but GPUs, electricity, and engineering time are not.\" },\n          { t: \"Confusing ‘open-weight’ with ‘fully open’\", d: \"Many models share weights but not their training data or full licence freedoms — read the licence.\" }\n        ],\n        terms: [\n          { t: \"Open-weight\", d: \"A model whose trained weights you can download and run yourself.\" },\n          { t: \"Closed \u002F proprietary\", d: \"A model accessible only via the provider’s API.\" },\n          { t: \"API\", d: \"A way to use a remote model by sending requests over the internet.\" }\n        ],\n        quiz: [\n          { q: \"A key advantage of open-weight models is…\", options: [\"You can run them locally\u002Foffline and fine-tune freely\", \"Zero cost\", \"No hardware needed\", \"They’re always smarter\"], answer: 0, explain: \"Control, privacy, and customisation — though you supply the compute.\" },\n          { q: \"Closed models are best described as…\", options: [\"Accessed via an API on the provider’s servers\", \"Downloadable files\", \"Impossible to use\", \"Always free\"], answer: 0, explain: \"You call them remotely and can’t see the weights.\" }\n        ],\n        cards: [\n          { q: \"Open vs closed in one line?\", a: \"Open = download & run\u002Ffine-tune yourself; closed = use via the provider’s API.\" },\n          { q: \"Does open-weight mean free?\", a: \"The weights are free, but you pay for hardware, power, and setup.\" }\n        ],\n        recap: \"Closed models are effortless APIs you rent per token but can’t inspect. Open-weight models you download, control, fine-tune, and run offline — at the cost of hardware and upkeep. Choose by fit, not hype.\"\n      }\n    ]\n  },\n  {\n    id: \"datasets\",\n    title: \"Datasets & Training\",\n    topics: [\n      {\n        id: \"sft-datasets\",\n        title: \"SFT datasets\",\n        lesson:\n          \"<p><strong>SFT<\u002Fstrong> stands for <strong>Supervised Fine-Tuning<\u002Fstrong>. An SFT dataset is simply a big pile of <strong>example pairs<\u002Fstrong>: an input (what the user might say) and the ideal output (what you want the model to say back).<\u002Fp>\" +\n          \"<div class='analogy'><p>It’s like training a new hire by showing them a binder of <em>“when a customer asks X, reply Y.”<\u002Fem> Show enough good examples and they pick up the house style. SFT shows the model thousands of these worked examples.<\u002Fp><\u002Fdiv>\" +\n          \"<p>Each example usually has a few parts — an optional <em>instruction\u002Fsystem<\u002Fem> line, the <em>user<\u002Fem> message, and the <em>assistant<\u002Fem> answer you’re teaching:<\u002Fp>\" +\n          \"<pre><code>{\\n  \\\"instruction\\\": \\\"Reply like a friendly support agent.\\\",\\n  \\\"input\\\": \\\"My order hasn't arrived.\\\",\\n  \\\"output\\\": \\\"So sorry about that! Can you share your order number so I can track it?\\\"\\n}<\u002Fcode><\u002Fpre>\" +\n          \"<p>The model learns to imitate the <strong>output<\u002Fstrong> given the input. That means your data quality <em>is<\u002Fem> your model quality — sloppy or off-brand answers teach sloppy, off-brand behaviour.<\u002Fp>\",\n        model:\n          \"An SFT dataset is a <strong>worked-example binder<\u002Fstrong>. The model copies the style and substance of the answers you show it — so every example is a vote for how it should behave.\",\n        mistakes: [\n          { t: \"Chasing quantity over quality\", d: \"A few thousand clean, on-target examples usually beat a million messy ones.\" },\n          { t: \"Inconsistent answer style\", d: \"If examples disagree on tone or format, the model learns a muddled average of all of them.\" },\n          { t: \"Leaking the wrong behaviour\", d: \"Examples that hedge, ramble, or refuse teach the model to hedge, ramble, and refuse.\" }\n        ],\n        terms: [\n          { t: \"SFT\", d: \"Supervised Fine-Tuning — training on input→ideal-output example pairs.\" },\n          { t: \"Example pair\", d: \"One input and its target answer; the basic unit of an SFT dataset.\" },\n          { t: \"Supervised\", d: \"‘With answers provided’ — the dataset includes the correct output to imitate.\" }\n        ],\n        quiz: [\n          { q: \"What does an SFT dataset mainly consist of?\", options: [\"Raw web pages\", \"Only questions, no answers\", \"Images\", \"Input → ideal-output example pairs\"], answer: 3, explain: \"SFT trains on pairs of input and the desired response.\" },\n          { q: \"What most determines the quality of an SFT-tuned model?\", options: [\"The model’s name\", \"The file format\", \"The number of GPUs\", \"The quality and consistency of the example answers\"], answer: 3, explain: \"The model imitates your examples, so their quality is decisive.\" }\n        ],\n        cards: [\n          { q: \"What does SFT stand for?\", a: \"Supervised Fine-Tuning — training on input→ideal-output pairs.\" },\n          { q: \"Quality vs quantity for SFT data?\", a: \"A few thousand clean, consistent examples beat a million messy ones.\" }\n        ],\n        recap: \"SFT teaches a model by showing it input→ideal-answer pairs, like a binder of worked examples. The model imitates what you show, so clean, consistent, on-brand answers matter far more than sheer volume.\"\n      },\n      {\n        id: \"instruction-tuning\",\n        title: \"Instruction tuning\",\n        lesson:\n          \"<p><strong>Instruction tuning<\u002Fstrong> is a specific kind of SFT where the examples are written as <strong>instructions and their responses<\u002Fstrong>. It’s what turns a raw “predict next word” model into a helpful assistant that <em>follows directions<\u002Fem>.<\u002Fp>\" +\n          \"<div class='analogy'><p>A fresh base model is like a brilliant person who only ever finishes your sentences. Instruction tuning teaches them: <em>“when I ask you to do something, actually do that thing”<\u002Fem> — summarise, translate, list, explain — instead of just continuing the text.<\u002Fp><\u002Fdiv>\" +\n          \"<p>The dataset covers a <strong>wide variety of task types<\u002Fstrong> so the skill of “following instructions” generalises:<\u002Fp>\" +\n          \"<ul><li><code>Summarise this email in one line.<\u002Fcode><\u002Fli><li><code>Translate to French: …<\u002Fcode><\u002Fli><li><code>List three risks of …<\u002Fcode><\u002Fli><\u002Ful>\" +\n          \"<p>After instruction tuning, the model handles tasks it never saw exactly, because it learned the general habit of obeying instructions — not just memorised answers.<\u002Fp>\",\n        model:\n          \"Instruction tuning flips a model from <strong>“finish my text”<\u002Fstrong> to <strong>“follow my request.”<\u002Fstrong> Variety in the tasks is what makes the obedience generalise.\",\n        mistakes: [\n          { t: \"Too few task types\", d: \"If every example is summarisation, the model gets great at summarising and stays weak elsewhere.\" },\n          { t: \"Confusing it with teaching facts\", d: \"Instruction tuning teaches behaviour (following directions), not new knowledge.\" },\n          { t: \"Vague instructions in the data\", d: \"Fuzzy prompts paired with great answers teach the model to guess; keep instructions clear.\" }\n        ],\n        terms: [\n          { t: \"Instruction tuning\", d: \"SFT using instruction→response examples to make a model follow directions.\" },\n          { t: \"Base model\", d: \"A pretrained model before instruction tuning; good at completing text, not obeying requests.\" },\n          { t: \"Generalisation\", d: \"Performing well on new tasks not seen exactly in training.\" }\n        ],\n        quiz: [\n          { q: \"What is the main goal of instruction tuning?\", options: [\"Add new facts\", \"Teach the model to follow directions, not just continue text\", \"Make the model bigger\", \"Speed up inference\"], answer: 1, explain: \"It converts a text-completer into an instruction-follower.\" },\n          { q: \"Why include many different task types in the dataset?\", options: [\"So the ‘follow instructions’ skill generalises to new tasks\", \"It has no effect\", \"To use more disk\", \"To slow training\"], answer: 0, explain: \"Variety makes the obedience skill transfer beyond seen examples.\" }\n        ],\n        cards: [\n          { q: \"Instruction tuning turns a base model into…?\", a: \"An assistant that follows directions instead of just completing text.\" },\n          { q: \"Why use varied task types?\", a: \"So the instruction-following skill generalises to unseen tasks.\" }\n        ],\n        recap: \"Instruction tuning is SFT with instruction→response examples. It teaches the habit of obeying requests rather than just continuing text, and broad task variety makes that obedience generalise to new tasks.\"\n      },\n      {\n        id: \"preference-datasets\",\n        title: \"Preference datasets\",\n        lesson:\n          \"<p>SFT teaches the model <em>one<\u002Fem> good answer per prompt. But often there isn’t a single right answer — there’s <strong>better<\u002Fstrong> and <strong>worse<\u002Fstrong>. A <strong>preference dataset<\u002Fstrong> captures that by showing the model <strong>two answers and which one humans preferred<\u002Fstrong>.<\u002Fp>\" +\n          \"<pre><code>{\\n  \\\"prompt\\\": \\\"Explain gravity to a 5-year-old.\\\",\\n  \\\"chosen\\\":   \\\"It's the invisible pull that keeps your feet on the ground.\\\",\\n  \\\"rejected\\\": \\\"Gravity is a fundamental force described by general relativity...\\\"\\n}<\u002Fcode><\u002Fpre>\" +\n          \"<div class='analogy'><p>Instead of handing the trainee a perfect script, you show them two replies and say <em>“this one’s better — see why?”<\u002Fem> Over many comparisons they internalise your taste, not just your words.<\u002Fp><\u002Fdiv>\" +\n          \"<p>These <em>chosen vs rejected<\u002Fem> pairs are the fuel for preference-based training methods like <strong>DPO<\u002Fstrong> and <strong>RLHF<\u002Fstrong> (later module). They’re how you tune <em>tone, helpfulness, and safety<\u002Fem> — the fuzzy stuff that’s hard to write as one ideal answer.<\u002Fp>\",\n        model:\n          \"A preference dataset teaches <strong>taste, not scripts<\u002Fstrong>: ‘this answer beats that answer.’ It shapes the qualities too subtle to pin down in a single perfect response.\",\n        mistakes: [\n          { t: \"Pairs that aren’t comparable\", d: \"Chosen and rejected should answer the same prompt; comparing apples to oranges teaches noise.\" },\n          { t: \"Rejected answer is obviously broken\", d: \"If ‘rejected’ is gibberish, the model learns ‘avoid gibberish,’ not real preference. Make it a plausible-but-worse answer.\" },\n          { t: \"Inconsistent rater taste\", d: \"If different labellers prefer opposite things, the signal cancels out.\" }\n        ],\n        terms: [\n          { t: \"Preference data\", d: \"Examples of a prompt with a preferred (‘chosen’) and dispreferred (‘rejected’) answer.\" },\n          { t: \"Chosen \u002F rejected\", d: \"The better and worse responses in a preference pair.\" },\n          { t: \"Reward signal\", d: \"The notion of ‘better’ that preference data provides to training.\" }\n        ],\n        quiz: [\n          { q: \"How does a preference example differ from an SFT example?\", options: [\"It gives two answers and says which is better\", \"It has no prompt\", \"It only has images\", \"It’s always shorter\"], answer: 0, explain: \"Preference data compares a chosen vs rejected answer.\" },\n          { q: \"What should the ‘rejected’ answer ideally be?\", options: [\"Random gibberish\", \"A plausible but clearly worse response\", \"Empty\", \"Identical to chosen\"], answer: 1, explain: \"Plausible-but-worse gives a meaningful preference signal.\" }\n        ],\n        cards: [\n          { q: \"What does a preference dataset contain?\", a: \"A prompt plus a ‘chosen’ (better) and ‘rejected’ (worse) answer.\" },\n          { q: \"What are preference datasets used for?\", a: \"Preference training like DPO\u002FRLHF — tuning tone, helpfulness, safety.\" }\n        ],\n        recap: \"Preference data shows the model two answers and which one humans liked better. It teaches taste rather than a single script and fuels methods like DPO and RLHF for tuning tone, helpfulness, and safety.\"\n      },\n      {\n        id: \"synthetic-datasets\",\n        title: \"Synthetic datasets\",\n        lesson:\n          \"<p>A <strong>synthetic dataset<\u002Fstrong> is training data <strong>generated by an AI model<\u002Fstrong> rather than collected from humans. You prompt a strong model to produce examples, then use those examples to train (often a smaller) model.<\u002Fp>\" +\n          \"<div class='analogy'><p>Think of a master chef writing out hundreds of practice recipes for an apprentice. The apprentice never had to invent them — they learn from the master’s generated examples. That’s a strong model teaching a smaller one.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Why people use it<\u002Fh3>\" +\n          \"<ul><li><strong>Cheap and fast.<\u002Fstrong> Generating 10,000 examples costs far less than paying humans to write them.<\u002Fli>\" +\n          \"<li><strong>Coverage.<\u002Fstrong> You can target rare cases (‘give me 500 tricky refund scenarios’) on demand.<\u002Fli>\" +\n          \"<li><strong>Privacy.<\u002Fstrong> No real customer data required.<\u002Fli><\u002Ful>\" +\n          \"<p>The catch: synthetic data inherits the generator’s <strong>biases and mistakes<\u002Fstrong>, and training only on a model’s own output can cause <em>model collapse<\u002Fem> — quality slowly degrading like a photocopy of a photocopy. Always spot-check and mix in real data.<\u002Fp>\",\n        model:\n          \"Synthetic data is a <strong>strong model writing the textbook<\u002Fstrong> for a smaller one. Cheap and scalable — but a photocopy of a photocopy fades, so check it and blend in real examples.\",\n        mistakes: [\n          { t: \"Trusting it blindly\", d: \"Generated examples can be confidently wrong; review a sample before training on them.\" },\n          { t: \"100% synthetic loops\", d: \"Training only on a model’s own output risks ‘model collapse’ — declining quality and diversity.\" },\n          { t: \"Ignoring licence\u002Fterms\", d: \"Some providers restrict using their outputs to train competing models — check before you generate.\" }\n        ],\n        terms: [\n          { t: \"Synthetic data\", d: \"Training examples produced by an AI model rather than humans.\" },\n          { t: \"Distillation\", d: \"Training a smaller model on a larger model’s outputs.\" },\n          { t: \"Model collapse\", d: \"Quality decline when models train repeatedly on AI-generated data.\" }\n        ],\n        quiz: [\n          { q: \"What is synthetic data?\", options: [\"Data from sensors\", \"Only numbers\", \"Training examples generated by an AI model\", \"Encrypted data\"], answer: 2, explain: \"It’s AI-generated training data, often from a stronger model.\" },\n          { q: \"A key risk of training only on synthetic data is…\", options: [\"It’s too accurate\", \"It can’t be generated quickly\", \"It needs no review\", \"Model collapse — fading quality and diversity\"], answer: 3, explain: \"Repeatedly learning from AI output degrades quality over time.\" }\n        ],\n        cards: [\n          { q: \"What is a synthetic dataset?\", a: \"Training data generated by an AI model instead of collected from humans.\" },\n          { q: \"What is model collapse?\", a: \"Declining quality\u002Fdiversity when models keep training on AI-generated data.\" }\n        ],\n        recap: \"Synthetic datasets are AI-generated examples — cheap, fast, and good for rare cases. But they inherit the generator’s flaws and risk model collapse if used alone, so review them and mix in real data.\"\n      },\n      {\n        id: \"data-curation\",\n        title: \"Data curation\",\n        lesson:\n          \"<p><strong>Data curation<\u002Fstrong> is the deliberate work of <strong>choosing what goes into your dataset<\u002Fstrong> — and just as importantly, what stays out. It’s the difference between a random pile of data and a carefully selected teaching set.<\u002Fp>\" +\n          \"<div class='analogy'><p>A great teacher doesn’t hand students the entire library. They pick the right books, in the right order, for the lesson. Curation is that editorial judgement applied to training data.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What curation decides<\u002Fh3>\" +\n          \"<ul><li><strong>Relevance<\u002Fstrong> — does this example match the task we care about?<\u002Fli>\" +\n          \"<li><strong>Balance<\u002Fstrong> — are all the important cases represented, not just the easy ones?<\u002Fli>\" +\n          \"<li><strong>Diversity<\u002Fstrong> — enough variety to generalise, without 1,000 near-duplicates.<\u002Fli>\" +\n          \"<li><strong>Quality bar<\u002Fstrong> — is this example good enough to imitate?<\u002Fli><\u002Ful>\" +\n          \"<p>The guiding principle is <strong>“garbage in, garbage out.”<\u002Fstrong> Most real-world model improvements come from better curation, not bigger models.<\u002Fp>\",\n        model:\n          \"Curation is being a <strong>picky editor<\u002Fstrong>, not a hoarder. You’re choosing the syllabus — relevance, balance, diversity, quality — because the model becomes what it’s fed.\",\n        mistakes: [\n          { t: \"Collecting everything ‘just in case’\", d: \"More isn’t better; irrelevant or low-quality data dilutes the good signal.\" },\n          { t: \"Hidden imbalance\", d: \"If 90% of examples are one easy case, the model nails that and fumbles the rest.\" },\n          { t: \"Near-duplicate overload\", d: \"Many slight variations of the same example waste capacity and skew the model.\" }\n        ],\n        terms: [\n          { t: \"Curation\", d: \"Selecting, balancing, and filtering examples to form a high-quality dataset.\" },\n          { t: \"Class balance\", d: \"Having a fair representation of each important case or category.\" },\n          { t: \"Diversity\", d: \"Variety across examples so the model generalises rather than memorises.\" }\n        ],\n        quiz: [\n          { q: \"Data curation is mainly about…\", options: [\"Compressing files\", \"Collecting as much data as possible\", \"Renaming columns\", \"Deliberately choosing what to include and exclude\"], answer: 3, explain: \"It’s editorial selection for relevance, balance, and quality.\" },\n          { q: \"Why is class balance important?\", options: [\"It speeds the GPU\", \"It looks tidy\", \"It reduces file size\", \"So the model handles all important cases, not just the common one\"], answer: 3, explain: \"Imbalance makes the model strong on the majority case and weak elsewhere.\" }\n        ],\n        cards: [\n          { q: \"What is data curation?\", a: \"Deliberately selecting, balancing, and filtering examples for quality.\" },\n          { q: \"Why curate instead of collecting everything?\", a: \"Garbage in, garbage out — irrelevant\u002Flow-quality data dilutes the signal.\" }\n        ],\n        recap: \"Curation is editorial judgement over your dataset: relevance, balance, diversity, and a quality bar. Better curation — not bigger models — drives most real-world gains. Garbage in, garbage out.\"\n      },\n      {\n        id: \"dataset-cleaning\",\n        title: \"Dataset cleaning\",\n        lesson:\n          \"<p>If curation is <em>choosing<\u002Fem> the right examples, <strong>cleaning<\u002Fstrong> is <em>fixing<\u002Fem> the ones you keep. It’s the unglamorous step of removing errors, duplicates, and junk so the model learns from tidy data.<\u002Fp>\" +\n          \"<h3>The usual cleaning checklist<\u002Fh3>\" +\n          \"<ul><li><strong>Deduplicate<\u002Fstrong> — drop exact and near-identical copies.<\u002Fli>\" +\n          \"<li><strong>Remove junk<\u002Fstrong> — broken encoding, HTML tags, empty fields, truncated text.<\u002Fli>\" +\n          \"<li><strong>Strip PII<\u002Fstrong> — names, emails, phone numbers, secrets you don’t want memorised.<\u002Fli>\" +\n          \"<li><strong>Filter toxicity \u002F off-topic<\u002Fstrong> — content you don’t want the model to imitate.<\u002Fli>\" +\n          \"<li><strong>Fix formatting<\u002Fstrong> — consistent fields, no stray whitespace.<\u002Fli><\u002Ful>\" +\n          \"<div class='analogy'><p>It’s washing vegetables before cooking. The recipe (training) can be perfect, but grit in the ingredients ends up in the meal.<\u002Fp><\u002Fdiv>\" +\n          \"<p>One sneaky issue: <strong>train\u002Ftest leakage<\u002Fstrong> — if a test example also appears in training, your scores look great but are fake. De-duplicate <em>across<\u002Fem> splits too.<\u002Fp>\",\n        model:\n          \"Cleaning is <strong>washing the ingredients<\u002Fstrong>. Dedupe, de-junk, de-PII — because any grit left in the data ends up baked into the model.\",\n        mistakes: [\n          { t: \"Skipping de-duplication\", d: \"Duplicates make the model over-weight repeated examples and inflate scores.\" },\n          { t: \"Train\u002Ftest leakage\", d: \"Test items hiding in training data give fake-good results — clean across splits.\" },\n          { t: \"Leaving PII in\", d: \"Models can memorise and later regurgitate emails, keys, or names left in the data.\" }\n        ],\n        terms: [\n          { t: \"Deduplication\", d: \"Removing exact or near-identical examples.\" },\n          { t: \"PII\", d: \"Personally Identifiable Information — names, emails, phone numbers, etc.\" },\n          { t: \"Leakage\", d: \"Test data accidentally present in training, inflating measured performance.\" }\n        ],\n        quiz: [\n          { q: \"What is train\u002Ftest leakage?\", options: [\"Test examples also appearing in training, faking high scores\", \"A type of GPU\", \"Slow data loading\", \"A memory bug\"], answer: 0, explain: \"Overlap between splits makes evaluation results misleadingly good.\" },\n          { q: \"Why remove PII from training data?\", options: [\"It’s not necessary\", \"To save space\", \"To make it colourful\", \"So the model can’t memorise and leak personal info\"], answer: 3, explain: \"Models can regurgitate memorised personal data — strip it first.\" }\n        ],\n        cards: [\n          { q: \"What does dataset cleaning involve?\", a: \"Dedupe, remove junk, strip PII, filter toxic\u002Foff-topic, fix formatting.\" },\n          { q: \"What is leakage?\", a: \"Test data hiding in training, producing fake-good evaluation scores.\" }\n        ],\n        recap: \"Cleaning fixes the data you keep: deduplicate, remove junk and PII, filter toxic content, and standardise formatting. Watch for train\u002Ftest leakage, which fakes high scores. Grit in the data ends up in the model.\"\n      },\n      {\n        id: \"dataset-formatting\",\n        title: \"Dataset formatting\",\n        lesson:\n          \"<p>Models expect data in a <strong>specific shape<\u002Fstrong>. <strong>Formatting<\u002Fstrong> is converting your cleaned examples into the exact structure the training tool and model expect — usually JSON lines with named fields, wrapped in a <em>chat template<\u002Fem>.<\u002Fp>\" +\n          \"<p>The most common container is <strong>JSONL<\u002Fstrong> (one JSON object per line):<\u002Fp>\" +\n          \"<pre><code>{\\\"messages\\\":[{\\\"role\\\":\\\"system\\\",\\\"content\\\":\\\"You are helpful.\\\"},\\n             {\\\"role\\\":\\\"user\\\",\\\"content\\\":\\\"Hi!\\\"},\\n             {\\\"role\\\":\\\"assistant\\\",\\\"content\\\":\\\"Hello! How can I help?\\\"}]}<\u002Fcode><\u002Fpre>\" +\n          \"<p>Each model family also has a <strong>chat template<\u002Fstrong> — special marker tokens that show where each turn starts and ends (e.g. who is speaking). Using the <em>wrong<\u002Fem> template is one of the most common fine-tuning bugs: training runs fine, but the model behaves oddly because the turns were marked incorrectly.<\u002Fp>\" +\n          \"<div class='analogy'><p>Same letter, wrong envelope. The content can be perfect, but if it’s not addressed in the format the postal system expects, it gets misrouted.<\u002Fp><\u002Fdiv>\",\n        model:\n          \"Formatting is <strong>putting the right letter in the right envelope<\u002Fstrong>. The model only reads correctly if turns are marked with its expected chat template.\",\n        mistakes: [\n          { t: \"Using the wrong chat template\", d: \"Mismatched role markers make the model learn broken turn boundaries — a top cause of weird outputs.\" },\n          { t: \"Invalid JSON\", d: \"A single missing comma or unescaped quote can break the whole file; validate before training.\" },\n          { t: \"Forgetting special tokens\", d: \"Omitting end-of-turn markers can make the model ramble or never stop.\" }\n        ],\n        terms: [\n          { t: \"JSONL\", d: \"JSON Lines — one JSON object per line; the common training file format.\" },\n          { t: \"Chat template\", d: \"The model-specific pattern of marker tokens that delimits each conversation turn.\" },\n          { t: \"Role\", d: \"Who is speaking in a turn: system, user, or assistant.\" }\n        ],\n        quiz: [\n          { q: \"What is JSONL?\", options: [\"A GPU type\", \"A file format with one JSON object per line\", \"A model\", \"A tokenizer\"], answer: 1, explain: \"JSON Lines stores one example per line.\" },\n          { q: \"Why does the chat template matter?\", options: [\"It changes the colour\", \"It speeds the GPU\", \"It compresses data\", \"Wrong turn markers make the model behave oddly\"], answer: 3, explain: \"Each model expects specific role\u002Fturn markers; the wrong ones break behaviour.\" }\n        ],\n        cards: [\n          { q: \"What format is common for training data?\", a: \"JSONL — one JSON object (example) per line.\" },\n          { q: \"What’s a frequent formatting bug?\", a: \"Using the wrong chat template, so turn boundaries are marked incorrectly.\" }\n        ],\n        recap: \"Formatting shapes cleaned data into what the tool\u002Fmodel expect — usually JSONL with system\u002Fuser\u002Fassistant roles and the model’s chat template. Wrong templates or invalid JSON are top fine-tuning bugs.\"\n      },\n      {\n        id: \"fine-tuning-basics\",\n        title: \"Fine-tuning basics\",\n        lesson:\n          \"<p><strong>Fine-tuning<\u002Fstrong> takes an already-trained model and gives it a <strong>short extra round of training<\u002Fstrong> on your own data, to specialise it for your task, tone, or domain.<\u002Fp>\" +\n          \"<div class='analogy'><p>A general doctor going for a few months of specialist training. They don’t re-learn medicine from scratch — they build on it to become a cardiologist. Fine-tuning specialises an existing model instead of starting over.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>When fine-tuning helps — and when it doesn’t<\u002Fh3>\" +\n          \"<table class='compare'><tr><th>Good fit<\u002Fth><th>Usually NOT the answer<\u002Fth><\u002Ftr><tr><td>Lock in a consistent style\u002Fformat<\u002Ftd><td>Adding fresh, cha
