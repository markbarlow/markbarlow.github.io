n.\" }\n        ],\n        terms: [\n          { t: \"Dense model\", d: \"A model where all parameters are used for every token.\" },\n          { t: \"Active parameters\", d: \"Parameters actually used per token — in dense models, all of them.\" },\n          { t: \"Baseline\", d: \"The standard design others (like MoE) are compared against.\" }\n        ],\n        quiz: [\n          { q: \"In a dense model, how many parameters are used per token?\", options: [\"All of them\", \"A small subset\", \"None\", \"Only the embeddings\"], answer: 0, explain: \"Every parameter fires on every token.\" },\n          { q: \"Why does the term ‘dense’ even come up?\", options: [\"To contrast with MoE models that use only part of the network\", \"It means small\", \"It means quantized\", \"It’s a special feature\"], answer: 0, explain: \"Dense is the default; the label distinguishes it from MoE.\" }\n        ],\n        cards: [\n          { q: \"What is a dense model?\", a: \"One where all parameters are used for every token (the default design).\" },\n          { q: \"Dense vs MoE in one line?\", a: \"Dense uses all params per token; MoE uses only a relevant subset.\" }\n        ],\n        recap: \"Dense models use all their parameters on every token — the standard, predictable design where everyone attends every meeting. Strong but costly to scale per token. The term mainly exists to contrast with the cheaper-per-token MoE approach.\"\n      },\n      {\n        id: \"moe-models\",\n        title: \"MoE models\",\n        lesson:\n          \"<p><strong>MoE<\u002Fstrong> = <strong>Mixture of Experts<\u002Fstrong>. Instead of using every parameter on every token (dense), an MoE model contains many ‘expert’ sub-networks and a <strong>router<\u002Fstrong> that picks just a <strong>few experts per token<\u002Fstrong>. Most of the model sits idle for any given token.<\u002Fp>\" +\n          \"<div class='analogy'><p>A hospital with many specialists. You don’t see <em>every<\u002Fem> doctor for a sore throat — a triage nurse (the router) sends you to the right couple of specialists. Huge total expertise on staff; only a few consulted per visit.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Why it’s clever<\u002Fh3>\" +\n          \"<ul><li><strong>Big capacity, lower cost:<\u002Fstrong> a model can have, say, 100B+ total parameters but only ‘activate’ ~10B per token — quality of a big model at the speed of a smaller one.<\u002Fli>\" +\n          \"<li>The router <strong>learns<\u002Fstrong> which experts suit which tokens.<\u002Fli><\u002Ful>\" +\n          \"<table class='compare'><tr><th><\u002Fth><th>Dense<\u002Fth><th>MoE<\u002Fth><\u002Ftr><tr><th>Params used\u002Ftoken<\u002Fth><td>All<\u002Ftd><td>A few experts<\u002Ftd><\u002Ftr><tr><th>Memory to load<\u002Fth><td>= size<\u002Ftd><td>Full size (all experts)<\u002Ftd><\u002Ftr><\u002Ftable>\" +\n          \"<p>Catch: you still need <strong>VRAM for all the experts<\u002Fstrong> (they all must be loaded), and routing adds complexity. So MoE saves <em>compute<\u002Fem>, not memory.<\u002Fp>\",\n        model:\n          \"MoE is a <strong>hospital of specialists with a triage nurse<\u002Fstrong>: a router sends each token to a few relevant experts. Big-model quality at small-model compute — but you still pay memory to keep all experts on staff.\",\n        mistakes: [\n          { t: \"Thinking MoE saves memory\", d: \"All experts must be loaded into VRAM; MoE cuts compute per token, not memory.\" },\n          { t: \"Comparing total vs active params naively\", d: \"A ‘100B MoE’ may only use ~10B\u002Ftoken — compare active params for speed, total for memory.\" },\n          { t: \"Expecting it to always win\", d: \"Routing adds complexity and can be uneven; dense is still simpler and strong.\" }\n        ],\n        terms: [\n          { t: \"MoE\", d: \"Mixture of Experts — many expert sub-networks, few used per token.\" },\n          { t: \"Router \u002F gating\", d: \"The part that picks which experts handle each token.\" },\n          { t: \"Active vs total params\", d: \"Used per token vs the full count that must be loaded.\" }\n        ],\n        quiz: [\n          { q: \"What does an MoE router do?\", options: [\"Serves the API\", \"Picks a few experts to handle each token\", \"Compresses weights\", \"Tokenizes text\"], answer: 1, explain: \"It routes each token to the most relevant experts.\" },\n          { q: \"MoE mainly saves…\", options: [\"Memory\", \"Nothing\", \"Disk only\", \"Compute per token (not memory)\"], answer: 3, explain: \"All experts load into VRAM; only a few compute per token.\" }\n        ],\n        cards: [\n          { q: \"What is an MoE model?\", a: \"Mixture of Experts — a router activates only a few expert sub-networks per token.\" },\n          { q: \"Does MoE save memory or compute?\", a: \"Compute per token — all experts still must be loaded into VRAM.\" }\n        ],\n        recap: \"MoE models hold many expert sub-networks and route each token to just a few — big-model quality at lower per-token compute, like a hospital triaging to specialists. But all experts must be loaded, so MoE saves compute, not memory.\"\n      },\n      {\n        id: \"coding-models\",\n        title: \"Coding models\",\n        lesson:\n          \"<p><strong>Coding models<\u002Fstrong> are LLMs specialised for <strong>programming<\u002Fstrong> — trained heavily on source code so they’re strong at writing, explaining, fixing, and completing code across many languages.<\u002Fp>\" +\n          \"<div class='analogy'><p>A general writer vs a technical author who lives in code all day. Both write, but the specialist knows the syntax, libraries, and idioms cold — and makes fewer rookie mistakes.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What makes them different<\u002Fh3>\" +\n          \"<ul><li><strong>Code-heavy training<\u002Fstrong> and code-aware tokenization (handling indentation, symbols well).<\u002Fli>\" +\n          \"<li><strong>Fill-in-the-middle<\u002Fstrong> ability — completing code with context on <em>both<\u002Fem> sides, not just before (key for autocomplete).<\u002Fli>\" +\n          \"<li>Often paired with <strong>large context windows<\u002Fstrong> to fit whole files or repos.<\u002Fli><\u002Ful>\" +\n          \"<p>They power IDE autocomplete and coding assistants. Caveats: they can <strong>confidently produce buggy or insecure code<\u002Fstrong> and <strong>invent libraries\u002FAPIs<\u002Fstrong> that don’t exist — always review, run, and test. They’re a fast pair-programmer, not an infallible one.<\u002Fp>\",\n        model:\n          \"A coding model is a <strong>specialist pair-programmer<\u002Fstrong>: trained on mountains of code, great at writing\u002Ffixing\u002Fcompleting it (including fill-in-the-middle). Fast and fluent — but it can confidently ship bugs, so review and test.\",\n        mistakes: [\n          { t: \"Trusting code without running it\", d: \"Generated code can be subtly wrong or insecure — review, run, and test it.\" },\n          { t: \"Accepting invented APIs\", d: \"Models hallucinate functions\u002Flibraries that don’t exist; check the docs.\" },\n          { t: \"Ignoring security\", d: \"Code may include vulnerabilities or leaked secrets patterns — audit before shipping.\" }\n        ],\n        terms: [\n          { t: \"Coding model\", d: \"An LLM specialised for programming tasks.\" },\n          { t: \"Fill-in-the-middle (FIM)\", d: \"Completing code using context both before and after the cursor.\" },\n          { t: \"Autocomplete\", d: \"Suggesting the next code as you type, powered by such models.\" }\n        ],\n        quiz: [\n          { q: \"What is ‘fill-in-the-middle’?\", options: [\"Centering text\", \"A dataset\", \"Completing code using context on both sides of the cursor\", \"A GPU mode\"], answer: 2, explain: \"FIM uses surrounding code, key for autocomplete.\" },\n          { q: \"A key caution with coding models is…\", options: [\"They need no review\", \"They can’t write code\", \"They never err\", \"They can confidently produce buggy\u002Finsecure or invented code\"], answer: 3, explain: \"Always review, run, and test generated code.\" }\n        ],\n        cards: [\n          { q: \"What is a coding model?\", a: \"An LLM specialised for writing, fixing, and completing code.\" },\n          { q: \"What is fill-in-the-middle?\", a: \"Completing code using context both before and after the cursor (for autocomplete).\" }\n        ],\n        recap: \"Coding models are LLMs specialised on source code — strong at writing, fixing, and completing it, including fill-in-the-middle for autocomplete. They’re a fast pair-programmer, but can confidently produce buggy, insecure, or invented code, so always review and test.\"\n      },\n      {\n        id: \"reasoning-models\",\n        title: \"Reasoning models\",\n        lesson:\n          \"<p><strong>Reasoning models<\u002Fstrong> are trained to <strong>think before they answer<\u002Fstrong> — generating a hidden chain of internal steps to work through hard problems (maths, logic, multi-step planning) instead of blurting the first response.<\u002Fp>\" +\n          \"<div class='analogy'><p>A student who shows their working vs one who guesses instantly. On a tricky maths problem, the one who pauses, writes out steps, and checks gets it right far more often. Reasoning models build in that pause.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What’s different<\u002Fh3>\" +\n          \"<ul><li>They produce extra <strong>‘thinking’ tokens<\u002Fstrong> (often hidden) before the final answer.<\u002Fli>\" +\n          \"<li>They’re trained to <strong>self-check and backtrack<\u002Fstrong>, which lifts accuracy on hard problems.<\u002Fli>\" +\n          \"<li>You can sometimes spend more <strong>‘thinking time’<\u002Fstrong> for better answers (test-time compute).<\u002Fli><\u002Ful>\" +\n          \"<table class='compare'><tr><th><\u002Fth><th>Standard model<\u002Fth><th>Reasoning model<\u002Fth><\u002Ftr><tr><th>Best at<\u002Fth><td>Fast, everyday tasks<\u002Ftd><td>Hard, multi-step problems<\u002Ftd><\u002Ftr><tr><th>Cost\u002Flatency<\u002Fth><td>Lower<\u002Ftd><td>Higher (more tokens, slower)<\u002Ftd><\u002Ftr><\u002Ftable>\" +\n          \"<p>Trade-off: that thinking costs <strong>more tokens, money, and time<\u002Fstrong>. Use reasoning models for genuinely hard problems; for simple tasks they’re overkill (slower and pricier for no benefit).<\u002Fp>\",\n        model:\n          \"A reasoning model is the <strong>student who shows their working<\u002Fstrong>: it spends hidden ‘thinking’ tokens to plan and self-check before answering. Big wins on hard problems — overkill (slow, pricey) for easy ones.\",\n        mistakes: [\n          { t: \"Using them for everything\", d: \"On simple tasks they’re slower and costlier for no gain — reserve them for hard problems.\" },\n          { t: \"Expecting instant replies\", d: \"The ‘thinking’ adds latency and tokens by design.\" },\n          { t: \"Assuming they never err\", d: \"Reasoning lowers but doesn’t eliminate mistakes — still verify critical answers.\" }\n        ],\n        terms: [\n          { t: \"Reasoning model\", d: \"A model trained to generate internal steps before answering.\" },\n          { t: \"Chain of thought\", d: \"The step-by-step working a model produces to reason.\" },\n          { t: \"Test-time compute\", d: \"Spending more thinking\u002Ftokens at answer time to improve quality.\" }\n        ],\n        quiz: [\n          { q: \"What do reasoning models do differently?\", options: [\"Use no tokens\", \"Generate internal thinking steps before answering\", \"Only handle images\", \"Skip training\"], answer: 1, explain: \"They ‘think’ (often hidden) before giving the final answer.\" },\n          { q: \"When are reasoning models a poor choice?\", options: [\"Hard maths\", \"Simple everyday tasks where they’re slow and costly\", \"Multi-step logic\", \"Planning\"], answer: 1, explain: \"Their extra thinking is overkill for easy tasks.\" }\n        ],\n        cards: [\n          { q: \"What is a reasoning model?\", a: \"One trained to generate internal step-by-step thinking before answering.\" },\n          { q: \"Main trade-off of reasoning models?\", a: \"Better on hard problems, but more tokens, cost, and latency.\" }\n        ],\n        recap: \"Reasoning models think before answering — producing hidden step-by-step working to crack hard maths, logic, and planning, and self-checking as they go. That accuracy costs more tokens, money, and time, so save them for genuinely hard problems.\"\n      }\n    ]\n  },\n  {\n    id: \"deployment\",\n    title: \"Deployment\",\n    topics: [\n      {\n        id: \"local-inference\",\n        title: \"Local inference\",\n        lesson:\n          \"<p><strong>Local inference<\u002Fstrong> means running a model on <strong>your own machine<\u002Fstrong> — your laptop, desktop, or server — instead of calling someone else’s cloud API. The model file lives on your disk and the maths happens on your hardware.<\u002Fp>\" +\n          \"<div class='analogy'><p>Cooking at home vs ordering delivery. Delivery (cloud API) is effortless but you pay per meal and your order goes to their kitchen. Cooking at home (local) means buying equipment once, then everything stays in your kitchen, free per meal, even with the internet down.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Why run locally<\u002Fh3>\" +\n          \"<ul><li><strong>Privacy:<\u002Fstrong> data never leaves your machine.<\u002Fli>\" +\n          \"<li><strong>No per-call cost:<\u002Fstrong> after hardware, inference is ‘free.’<\u002Fli>\" +\n          \"<li><strong>Offline:<\u002Fstrong> works with no internet.<\u002Fli>\" +\n          \"<li><strong>Control:<\u002Fstrong> pick the model, version, and settings.<\u002Fli><\u002Ful>\" +\n          \"<p>The trade-offs: you’re limited by <strong>your hardware<\u002Fstrong> (VRAM decides model size), you handle <strong>setup and updates<\u002Fstrong>, and a laptop won’t match a data-center GPU’s speed. Tools like <strong>Ollama<\u002Fstrong> and <strong>LM Studio<\u002Fstrong> make local inference approachable; <strong>llama.cpp<\u002Fstrong> sits underneath.<\u002Fp>\",\n        model:\n          \"Local inference is <strong>cooking at home<\u002Fstrong>: buy the equipment once, then run private, offline, per-call-free — bounded by your own hardware and the setup you maintain.\",\n        mistakes: [\n          { t: \"Picking a model too big for your hardware\", d: \"VRAM\u002FRAM caps model size; an oversized model won’t load or crawls.\" },\n          { t: \"Expecting cloud-grade speed\", d: \"A laptop can’t match a data-center GPU; right-size your expectations and model.\" },\n          { t: \"Forgetting maintenance\", d: \"Local means you handle updates, drivers, and storage yourself.\" }\n        ],\n        terms: [\n          { t: \"Local inference\", d: \"Running a model on your own hardware rather than a cloud API.\" },\n          { t: \"Local runner\", d: \"Software like Ollama or LM Studio that runs models locally.\" },\n          { t: \"Offline-capable\", d: \"Works without an internet connection.\" }\n        ],\n        quiz: [\n          { q: \"A key benefit of local inference is…\", options: [\"Unlimited speed\", \"Always the best quality\", \"Privacy, no per-call cost, and offline use\", \"No hardware needed\"], answer: 2, explain: \"Data stays put, calls are free, and it works offline.\" },\n          { q: \"What mainly limits which model you can run locally?\", options: [\"The font\", \"The browser\", \"Your keyboard\", \"Your hardware (especially VRAM)\"], answer: 3, explain: \"Memory capacity decides the model size that fits.\" }\n        ],\n        cards: [\n          { q: \"What is local inference?\", a: \"Running a model on your own hardware instead of a cloud API.\" },\n          { q: \"Main trade-off of local inference?\", a: \"Privacy\u002Foffline\u002Ffree-per-call vs hardware limits and self-maintenance.\" }\n        ],\n        recap: \"Local inference runs models on your own hardware — private, offline, and free per call after the equipment, like cooking at home. The cost is hardware limits (VRAM caps model size), self-maintenance, and no data-center speed.\"\n      },\n      {\n        id: \"on-device-ai\",\n        title: \"On-device AI\",\n        lesson:\n          \"<p><strong>On-device AI<\u002Fstrong> is local inference taken to <strong>phones, tablets, wearables, and other small gadgets<\u002Fstrong> — the model runs on the device in your pocket, not a server. It’s a stricter version of ‘local,’ with tight power, memory, and heat limits.<\u002Fp>\" +\n          \"<div class='analogy'><p>If local inference is a home kitchen, on-device is a <em>camping stove<\u002Fem>: it cooks anywhere with no hookup, but you’re limited to small, efficient meals — you’re not roasting a whole turkey on it.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What makes it hard — and worth it<\u002Fh3>\" +\n          \"<ul><li><strong>Constraints:<\u002Fstrong> small memory, limited battery, no big GPU — so models must be tiny and heavily <strong>quantized<\u002Fstrong> (SLMs shine here).<\u002Fli>\" +\n          \"<li><strong>Payoffs:<\u002Fstrong> instant responses (no network round-trip), works on a plane, and <strong>maximum privacy<\u002Fstrong> — data never leaves the device.<\u002Fli>\" +\n          \"<li>Phones increasingly ship <strong>NPUs<\u002Fstrong> (neural chips) to run these models efficiently.<\u002Fli><\u002Ful>\" +\n          \"<p>Typical uses: keyboard suggestions, voice transcription, photo features, and offline assistants. Big reasoning tasks still go to the cloud — a common pattern is <strong>on-device for quick\u002Fprivate, cloud for heavy<\u002Fstrong>.<\u002Fp>\",\n        model:\n          \"On-device AI is a <strong>camping stove<\u002Fstrong>: it runs anywhere with no connection and total privacy, but only small, efficient (quantized SLM) ‘meals’ — heavy cooking still goes to the cloud kitchen.\",\n        mistakes: [\n          { t: \"Trying to run big models on a phone\", d: \"Memory\u002Fbattery\u002Fheat limits demand small, quantized models — not 70B giants.\" },\n          { t: \"Ignoring battery and heat\", d: \"Sustained inference drains battery and throttles; budget for it.\" },\n          { t: \"Assuming it replaces the cloud\", d: \"On-device handles light\u002Fprivate tasks; heavy reasoning usually still needs the cloud.\" }\n        ],\n        terms: [\n          { t: \"On-device AI\", d: \"Running models directly on phones\u002Fwearables\u002Fsmall gadgets.\" },\n          { t: \"NPU\", d: \"Neural Processing Unit — a chip for efficient on-device ML.\" },\n          { t: \"Hybrid\", d: \"Splitting work: on-device for light\u002Fprivate, cloud for heavy.\" }\n        ],\n        quiz: [\n          { q: \"On-device AI is best suited to…\", options: [\"Only servers\", \"Giant reasoning models\", \"Training from scratch\", \"Small, quantized models for quick, private tasks\"], answer: 3, explain: \"Tight constraints favour small efficient models.\" },\n          { q: \"A standout benefit of on-device AI is…\", options: [\"Unlimited compute\", \"Best accuracy always\", \"Maximum privacy and offline, instant responses\", \"No model needed\"], answer: 2, explain: \"Data stays on the device and there’s no network round-trip.\" }\n        ],\n        cards: [\n          { q: \"What is on-device AI?\", a: \"Running models directly on phones\u002Fwearables\u002Fgadgets, under tight constraints.\" },\n          { q: \"Common on-device pattern?\", a: \"Hybrid — on-device for light\u002Fprivate tasks, cloud for heavy reasoning.\" }\n        ],\n        recap: \"On-device AI runs models on phones and gadgets — a camping stove offering instant, offline, maximally private inference, but only for small quantized models. Heavy reasoning still goes to the cloud, so hybrid splits are common.\"\n      },\n      {\n        id: \"api-serving\",\n        title: \"API serving\",\n        lesson:\n          \"<p><strong>API serving<\u002Fstrong> is exposing a model behind a <strong>web endpoint<\u002Fstrong> so any app can use it by sending a request over the internet (or your network) and getting an answer back — no need to bundle the model into each app.<\u002Fp>\" +\n          \"<div class='analogy'><p>A central power plant vs everyone owning a generator. Apps just ‘plug into the socket’ (call the API); the heavy machinery lives in one place you maintain and scale.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What it gives you<\u002Fh3>\" +\n          \"<ul><li><strong>One model, many apps:<\u002Fstrong> update it in one place; every client benefits.<\u002Fli>\" +\n          \"<li><strong>Standard shape:<\u002Fstrong> most expose an <strong>OpenAI-compatible<\u002Fstrong> endpoint, so clients are easy to swap.<\u002Fli>\" +\n          \"<li><strong>Centralised control:<\u002Fstrong> auth, rate limits, logging, and cost tracking in one spot.<\u002Fli><\u002Ful>\" +\n          \"<pre><code>POST \u002Fv1\u002Fchat\u002Fcompletions\\n{ \\\"model\\\": \\\"my-model\\\", \\\"messages\\\": [{\\\"role\\\":\\\"user\\\",\\\"content\\\":\\\"Hi\\\"}] }<\u002Fcode><\u002Fpre>\" +\n          \"<p>You can call a <strong>provider’s<\u002Fstrong> API (no infra) or self-host one with <strong>vLLM\u002FTGI\u002FOllama<\u002Fstrong>. Things to handle: <strong>authentication<\u002Fstrong> (API keys), <strong>rate limiting<\u002Fstrong>, <strong>streaming<\u002Fstrong> responses, and <strong>monitoring<\u002Fstrong>.<\u002Fp>\",\n        model:\n          \"API serving is a <strong>power plant with sockets<\u002Fstrong>: the model lives in one managed place and apps plug in over the network — one update, many clients, central auth and limits.\",\n        mistakes: [\n          { t: \"Exposing it without auth\u002Flimits\", d: \"An open endpoint invites abuse and runaway cost — require keys and rate-limit.\" },\n          { t: \"Skipping streaming\", d: \"Without token streaming, users wait for the whole answer; stream for responsiveness.\" },\n          { t: \"No monitoring\", d: \"Track latency, errors, and spend, or problems hide until the bill or outage arrives.\" }\n        ],\n        terms: [\n          { t: \"API serving\", d: \"Exposing a model via a network endpoint apps can call.\" },\n          { t: \"Endpoint\", d: \"The URL apps send requests to (e.g. \u002Fv1\u002Fchat\u002Fcompletions).\" },\n          { t: \"Rate limiting\", d: \"Capping requests per client to control load and cost.\" }\n        ],\n        quiz: [\n          { q: \"API serving lets you…\", options: [\"Avoid models entirely\", \"Run the model once and let many apps call it over the network\", \"Train faster\", \"Bundle the model into every app\"], answer: 1, explain: \"One central model serves many clients via an endpoint.\" },\n          { q: \"A must-have when exposing an API is…\", options: [\"No logging\", \"Authentication and rate limiting\", \"Bigger fonts\", \"More emoji\"], answer: 1, explain: \"Keys and limits prevent abuse and runaway cost.\" }\n        ],\n        cards: [\n          { q: \"What is API serving?\", a: \"Exposing a model behind a network endpoint that apps call for answers.\" },\n          { q: \"Three things to handle in API serving?\", a: \"Auth (keys), rate limiting, streaming\u002Fmonitoring.\" }\n        ],\n        recap: \"API serving puts a model behind a network endpoint so many apps can call it — a power plant with sockets, updated in one place. Use a standard (often OpenAI-compatible) shape and handle auth, rate limits, streaming, and monitoring.\"\n      },\n      {\n        id: \"cloud-gpus\",\n        title: \"Cloud GPUs\",\n        lesson:\n          \"<p><strong>Cloud GPUs<\u002Fstrong> are powerful GPUs you <strong>rent by the hour<\u002Fstrong> from providers instead of buying. You spin one up, run training or serving, and shut it down — paying only for the time you use.<\u002Fp>\" +\n          \"<div class='analogy'><p>Renting a pro kitchen by the hour vs building one at home. For an occasional big event (training a model), renting the high-end gear is far cheaper than owning a $30k oven you rarely use.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>When to rent vs own<\u002Fh3>\" +\n          \"<table class='compare'><tr><th>Rent (cloud)<\u002Fth><th>Own (local)<\u002Fth><\u002Ftr><tr><td>Occasional big jobs (training)<\u002Ftd><td>Constant, predictable use<\u002Ftd><\u002Ftr><tr><td>Need top-tier GPUs (A100\u002FH100)<\u002Ftd><td>Privacy \u002F no recurring bill<\u002Ftd><\u002Ftr><tr><td>Scale up\u002Fdown on demand<\u002Ftd><td>Full control of hardware<\u002Ftd><\u002Ftr><\u002Ftable>\" +\n          \"<h3>Watch the meter<\u002Fh3>\" +\n          \"<ul><li><strong>Idle = paying:<\u002Fstrong> a GPU left running bills even when doing nothing — shut it down.<\u002Fli>\" +\n          \"<li><strong>Egress &amp; storage<\u002Fstrong> can add hidden cost beyond the GPU hour.<\u002Fli>\" +\n          \"<li><strong>Spot\u002Fpreemptible<\u002Fstrong> instances are cheaper but can be reclaimed mid-job.<\u002Fli><\u002Ful>\",\n        model:\n          \"Cloud GPUs are a <strong>pro kitchen rented by the hour<\u002Fstrong>: access top-tier hardware on demand, pay only while it runs — perfect for occasional heavy jobs, but the meter never sleeps, so shut it off.\",\n        mistakes: [\n          { t: \"Leaving GPUs running idle\", d: \"You’re billed by time, not use — forgetting to stop instances is the classic costly mistake.\" },\n          { t: \"Ignoring hidden costs\", d: \"Storage and data egress add up beyond the headline GPU\u002Fhour price.\" },\n          { t: \"Spot instances for fragile jobs\", d: \"Cheaper spot\u002Fpreemptible GPUs can vanish mid-run — checkpoint, or use on-demand for critical work.\" }\n        ],\n        terms: [\n          { t: \"Cloud GPU\", d: \"A rentable GPU billed by the hour from a provider.\" },\n          { t: \"Spot \u002F preemptible\", d: \"Discounted instances that can be reclaimed at short notice.\" },\n          { t: \"Egress\", d: \"Charges for moving data out of the cloud provider.\" }\n        ],\n        quiz: [\n          { q: \"Cloud GPUs are billed mainly by…\", options: [\"Files stored only\", \"Number of tokens\", \"Per user\", \"Time the instance runs\"], answer: 3, explain: \"You pay for runtime, so idle instances still cost money.\" },\n          { q: \"Renting beats owning when…\", options: [\"Use is constant and predictable\", \"You need offline privacy\", \"You need top GPUs for occasional big jobs and want to scale on demand\", \"You want no bills ever\"], answer: 2, explain: \"On-demand access to high-end GPUs suits occasional heavy work.\" }\n        ],\n        cards: [\n          { q: \"What are cloud GPUs?\", a: \"Powerful GPUs rented by the hour instead of bought.\" },\n          { q: \"Classic cloud-GPU mistake?\", a: \"Leaving instances running idle — you pay for time, not use.\" }\n        ],\n        recap: \"Cloud GPUs let you rent top-tier hardware by the hour — a pro kitchen on demand, ideal for occasional heavy jobs and scaling. But billing is by runtime (idle still costs), with hidden storage\u002Fegress fees, and spot instances can be reclaimed.\"\n      },\n      {\n        id: \"edge-ai\",\n        title: \"Edge AI basics\",\n        lesson:\n          \"<p><strong>Edge AI<\u002Fstrong> runs models at the <strong>‘edge’ of the network — close to where data is created<\u002Fstrong> — like a factory sensor, a store camera, a car, or a smart speaker, rather than in a distant cloud data center.<\u002Fp>\" +\n          \"<div class='analogy'><p>A local branch office vs head office. Instead of sending every question to HQ (the cloud) and waiting for a reply, the branch handles it on the spot. Faster, and the paperwork never leaves the building.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Why push AI to the edge<\u002Fh3>\" +\n          \"<ul><li><strong>Low latency:<\u002Fstrong> no round-trip to the cloud — vital for cars, robots, live video.<\u002Fli>\" +\n          \"<li><strong>Reliability:<\u002Fstrong> keeps working if the network drops.<\u002Fli>\" +\n          \"<li><strong>Privacy\u002Fbandwidth:<\u002Fstrong> raw data (e.g. video) is processed locally; only results are sent.<\u002Fli><\u002Ful>\" +\n          \"<p>How it relates to terms you know: <strong>on-device AI<\u002Fstrong> (phones) is one flavour of edge; edge also covers dedicated boxes and industrial hardware. Like on-device, the edge has <strong>limited compute<\u002Fstrong>, so models are small and <strong>quantized<\u002Fstrong>. A frequent design is <strong>edge + cloud<\u002Fstrong>: handle the fast\u002Fcommon case locally, escalate hard cases to the cloud.<\u002Fp>\",\n        model:\n          \"Edge AI is a <strong>branch office<\u002Fstrong>: process data where it’s born — fast, network-resilient, and private — using small quantized models, escalating the hard cases to the cloud HQ.\",\n        mistakes: [\n          { t: \"Over-spec’ing the model\", d: \"Edge hardware is constrained; use small, quantized models, not giants.\" },\n          { t: \"Confusing edge with cloud\", d: \"Edge is near the data source for low latency\u002Foffline; cloud is centralised power.\" },\n          { t: \"Forgetting fleet management\", d: \"Many edge devices need updates and monitoring at scale — plan for it.\" }\n        ],\n        terms: [\n          { t: \"Edge AI\", d: \"Running models near where data is created, not in a central cloud.\" },\n          { t: \"Edge device\", d: \"Hardware at the data source (sensor, camera, car, speaker).\" },\n          { t: \"Edge + cloud\", d: \"Handling common cases locally and escalating hard ones to the cloud.\" }\n        ],\n        quiz: [\n          { q: \"Edge AI runs models…\", options: [\"Close to where data is created\", \"Only on phones\", \"Only in big data centers\", \"Without any model\"], answer: 0, explain: \"The ‘edge’ is near the data source — sensors, cameras, cars.\" },\n          { q: \"A key reason to use edge AI is…\", options: [\"No model needed\", \"Bigger models\", \"Unlimited compute\", \"Low latency and working even if the network drops\"], answer: 3, explain: \"Local processing avoids the cloud round-trip and survives outages.\" }\n        ],\n        cards: [\n          { q: \"What is edge AI?\", a: \"Running models near where data is created (sensors, cameras, cars), not in the cloud.\" },\n          { q: \"Edge vs on-device?\", a: \"On-device (phones) is one flavour of edge; edge also covers dedicated\u002Findustrial hardware.\" }\n        ],\n        recap: \"Edge AI runs models close to where data is created — a branch office handling things on the spot for low latency, reliability, and privacy. Hardware is constrained, so models are small and quantized, often paired with the cloud for hard cases.\"\n      }\n    ]\n  },\n  {\n    id: \"evaluation\",\n    title: \"Evaluation\",\n    topics: [\n      {\n        id: \"benchmarks\",\n        title: \"AI benchmarks\",\n        lesson:\n          \"<p><strong>Benchmarks<\u002Fstrong> are <strong>standardised tests for models<\u002Fstrong> — fixed sets of questions with known answers that everyone runs, so you can compare models on the same yardstick. You’ll see names like MMLU (general knowledge), GSM8K (maths), HumanEval (coding).<\u002Fp>\" +\n          \"<div class='analogy'><p>Like the SAT for models. A single score lets you line candidates up side by side. But just as a high SAT doesn’t guarantee a great employee, a high benchmark doesn’t guarantee a great fit for <em>your<\u002Fem> task.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>How to read them sensibly<\u002Fh3>\" +\n          \"<ul><li><strong>Match the test to your need:<\u002Fstrong> a top coding score is irrelevant if you’re doing customer support.<\u002Fli>\" +\n          \"<li><strong>Beware contamination:<\u002Fstrong> if benchmark questions leaked into training data, scores are inflated and meaningless.<\u002Fli>\" +\n          \"<li><strong>Look at multiple benchmarks<\u002Fstrong> plus your own tests — one number hides weaknesses.<\u002Fli><\u002Ful>\" +\n          \"<p>Benchmarks are a useful <strong>first filter<\u002Fstrong>, not the final word. The model that tops a leaderboard may still lose on <em>your<\u002Fem> data — which is why your own evaluation set matters most.<\u002Fp>\",\n        model:\n          \"A benchmark is the <strong>SAT for models<\u002Fstrong>: a shared yardstick for quick comparison — useful as a first filter, but a high score never guarantees a good fit for your specific task.\",\n        mistakes: [\n          { t: \"Picking a model on one leaderboard number\", d: \"A single benchmark hides weaknesses; check several plus your own tests.\" },\n          { t: \"Ignoring contamination\", d: \"Leaked test questions inflate scores — a suspiciously perfect result is a red flag.\" },\n          { t: \"Mismatching test and task\", d: \"Great maths scores don’t help a writing task; match the benchmark to your use case.\" }\n        ],\n        terms: [\n          { t: \"Benchmark\", d: \"A standardised test with known answers for comparing models.\" },\n          { t: \"Contamination\", d: \"Benchmark questions leaking into training data, inflating scores.\" },\n          { t: \"Leaderboard\", d: \"A ranking of models by benchmark scores.\" }\n        ],\n        quiz: [\n          { q: \"What are AI benchmarks for?\", options: [\"Serving APIs\", \"Training models\", \"Comparing models on a standardised test\", \"Cleaning data\"], answer: 2, explain: \"They’re shared yardsticks for comparison.\" },\n          { q: \"Why be cautious about a perfect benchmark score?\", options: [\"It’s always great\", \"Benchmarks don’t matter\", \"It may signal contamination (leaked test data)\", \"It means low cost\"], answer: 2, explain: \"Leaked questions inflate scores misleadingly.\" }\n        ],\n        cards: [\n          { q: \"What is a benchmark?\", a: \"A standardised test with known answers used to compare models.\" },\n          { q: \"What is benchmark contamination?\", a: \"Test questions leaking into training data, inflating scores.\" }\n        ],\n        recap: \"Benchmarks are the SAT for models — standardised tests for quick side-by-side comparison and a useful first filter. But match the test to your task, watch for contamination, check several, and trust your own evaluation set most.\"\n      },\n      {\n        id: \"human-evals\",\n        title: \"Human evals\",\n        lesson:\n          \"<p><strong>Human evaluation<\u002Fstrong> means having <strong>people judge model outputs<\u002Fstrong> — rating quality, picking the better of two answers, or flagging problems. For fuzzy qualities like helpfulness, tone, and safety, humans are still the gold standard.<\u002Fp>\" +\n          \"<div class='analogy'><p>Automated benchmarks are like grading a multiple-choice test — fast and objective. Human eval is like judging an essay: slower and more subjective, but the only way to assess things a tick-box can’t capture.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Common forms<\u002Fh3>\" +\n          \"<ul><li><strong>Pairwise:<\u002Fstrong> ‘Which answer is better, A or B?’ (easy and reliable).<\u002Fli>\" +\n          \"<li><strong>Rating scales:<\u002Fstrong> score helpfulness 1–5.<\u002Fli>\" +\n          \"<li><strong>Rubric-based:<\u002Fstrong> check specific criteria (accurate? safe? on-tone?).<\u002Fli><\u002Ful>\" +\n          \"<p>The catch: it’s <strong>slow, costly, and subjective<\u002Fstrong>. Reduce noise with <strong>clear guidelines<\u002Fstrong>, multiple raters per item, and agreement checks. A popular middle ground is <strong>LLM-as-judge<\u002Fstrong> — using a strong model to approximate human ratings cheaply — but it has its own biases and should be validated against real humans.<\u002Fp>\",\n        model:\n          \"Human eval is <strong>judging an essay, not a quiz<\u002Fstrong>: the gold standard for fuzzy qualities like helpfulness and tone. Slow and subjective, so use clear rubrics and multiple raters — or an LLM-judge, validated against humans.\",\n        mistakes: [\n          { t: \"Vague instructions to raters\", d: \"Without a clear rubric, scores are noisy and inconsistent across people.\" },\n          { t: \"One rater per item\", d: \"Single opinions are unreliable; use multiple raters and check agreement.\" },\n          { t: \"Trusting LLM-as-judge blindly\", d: \"It’s cheap but biased (e.g. favouring longer answers) — validate against human ratings.\" }\n        ],\n        terms: [\n          { t: \"Human eval\", d: \"People judging model outputs for quality and problems.\" },\n          { t: \"Pairwise comparison\", d: \"Choosing the better of two answers — simple and reliable.\" },\n          { t: \"LLM-as-judge\", d: \"Using a strong model to approximate human ratings cheaply.\" }\n        ],\n        quiz: [\n          { q: \"Human eval is especially valuable for…\", options: [\"Exact maths answers\", \"Fuzzy qualities like helpfulness, tone, and safety\", \"Token counts\", \"File sizes\"], answer: 1, explain: \"Humans judge subjective qualities tick-boxes miss.\" },\n          { q: \"What is ‘LLM-as-judge’?\", options: [\"A courtroom AI\", \"Using a strong model to approximate human ratings\", \"A tokenizer\", \"A benchmark\"], answer: 1, explain: \"A cheaper stand-in for human raters — but validate it.\" }\n        ],\n        cards: [\n          { q: \"What is human evaluation?\", a: \"Having people judge model outputs for quality, tone, safety, etc.\" },\n          { q: \"What is LLM-as-judge?\", a: \"Using a strong model to approximate human ratings cheaply (validate against humans).\" }\n        ],\n        recap: \"Human evals have people judge outputs — the gold standard for fuzzy qualities like helpfulness and tone, like grading an essay. They’re slow and subjective, so use clear rubrics and multiple raters; LLM-as-judge is a cheaper stand-in to validate against humans.\"\n      },\n      {\n        id: \"cost-per-token\",\n        title: \"Cost-per-token analysis\",\n        lesson:\n          \"<p>Most AI usage is <strong>billed per token<\u002Fstrong>, and crucially <strong>input and output tokens are priced separately<\u002Fstrong> (output is usually pricier). <strong>Cost-per-token analysis<\u002Fstrong> is working out what your real spend will be — before the bill surprises you.<\u002Fp>\" +\n          \"<div class='analogy'><p>Like a phone plan charging per minute, with incoming and outgoing calls at different rates. A single call is trivial; a call center’s monthly bill needs real math. Same with tokens at scale.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>The back-of-envelope<\u002Fh3>\" +\n          \"<pre><code>cost = (input_tokens  × input_price)\\n     + (output_tokens × output_price)\\n# then × requests per day × 30 for monthly<\u002Fcode><\u002Fpre>\" +\n          \"<p>What blows budgets up: <strong>long prompts<\u002Fstrong> (system prompt + RAG context repeated every call), <strong>long outputs<\u002Fstrong>, and <strong>reasoning models<\u002Fstrong> that spend many hidden ‘thinking’ tokens. Levers to cut cost: trim prompts, cap output length, <strong>cache<\u002Fstrong> repeated context, and <strong>route<\u002Fstrong> easy requests to cheaper\u002Fsmaller models.<\u002Fp>\",\n        model:\n          \"Cost-per-token analysis is <strong>reading the phone plan before the call-center opens<\u002Fstrong>: input and output are metered separately, so estimate <em>tokens × price × volume<\u002Fem> up front and trim the biggest drivers.\",\n        mistakes: [\n          { t: \"Forgetting input ≠ output price\", d: \"Output usually costs more; mixing them up underestimates the bill.\" },\n          { t: \"Ignoring repeated context\", d: \"A big system prompt or RAG block is paid on every call — it adds up fast.\" },\n          { t: \"Overlooking reasoning ‘thinking’ tokens\", d: \"Reasoning models bill for hidden steps; budget for far more output than you see.\" }\n        ],\n        terms: [\n          { t: \"Cost per token\", d: \"Price charged for each input\u002Foutput token, billed separately.\" },\n          { t: \"Input vs output pricing\", d: \"Different rates; output is typically more expensive.\" },\n          { t: \"Caching\", d: \"Reusing repeated context to avoid re-paying for it each call.\" }\n        ],\n        quiz: [\n          { q: \"In token pricing, input and output tokens are…\", options: [\"Counted as one\", \"Priced separately, output usually higher\", \"Always the same price\", \"Free\"], answer: 1, explain: \"They’re billed at different rates; output costs more.\" },\n          { q: \"A common hidden cost driver is…\", options: [\"Small models\", \"Short prompts\", \"Long repeated context (system prompt + RAG) on every call\", \"Caching\"], answer: 2, explain: \"Repeated context is paid every request and adds up.\" }\n        ],\n        cards: [\n          { q: \"How is most AI usage billed?\", a: \"Per token, with input and output priced separately (output usually higher).\" },\n          { q: \"Top levers to cut token cost?\", a: \"Trim prompts, cap output, cache repeated context, route easy requests to cheaper models.\" }\n        ],\n        recap: \"Cost-per-token analysis estimates real spend up front: input and output tokens are metered separately (output costs more), times your volume. Long repeated context and reasoning ‘thinking’ tokens blow budgets — trim, cap, cache, and route to control them.\"\n      },\n      {\n        id: \"speed-benchmarking\",\n        title: \"Speed benchmarking\",\n        lesson:\n          \"<p><strong>Speed benchmarking<\u002Fstrong> measures how <strong>fast<\u002Fstrong> a model responds. ‘Fast’ has two distinct meanings, and confusing them leads to bad decisions.<\u002Fp>\" +\n          \"<table class='compare'><tr><th>Metric<\u002Fth><th>Means<\u002Fth><th>Felt by<\u002Fth><\u002Ftr><tr><td><strong>Latency (TTFT)<\u002Fstrong><\u002Ftd><td>Time to the <em>first<\u002Fem> token<\u002Ftd><td>How snappy it feels to start<\u002Ftd><\u002Ftr><tr><td><strong>Throughput (tok\u002Fs)<\u002Fstrong><\u002Ftd><td>Tokens generated per second<\u002Ftd><td>How fast the answer streams \u002F total capacity<\u002Ftd><\u002Ftr><\u002Ftable>\" +\n          \"<div class='analogy'><p>Ordering at a café: <strong>latency<\u002Fstrong> is how long before the barista <em>starts<\u002Fem> your drink; <strong>throughput<\u002Fstrong> is how many drinks the café makes per hour. A chatty user cares about the first; a busy shop owner cares about the second.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Measuring fairly<\u002Fh3>\" +\n          \"<ul><li>Test under <strong>realistic load<\u002Fstrong> (many concurrent users), not one lonely request.<\u002Fli>\" +\n          \"<li>Use <strong>your real prompt sizes<\u002Fstrong> — long inputs change the numbers.<\u002Fli>\" +\n          \"<li>Report <strong>percentiles<\u002Fstrong> (p95\u002Fp99), not just the average — tail latency is what users complain about.<\u002Fli><\u002Ful>\",\n        model:\n          \"Speed has two faces: <strong>latency<\u002Fstrong> (when the barista starts your drink) and <strong>throughput<\u002Fstrong> (drinks per hour). Measure both under real load and real prompt sizes, and watch the slow tail (p95\u002Fp99).\",\n        mistakes: [\n          { t: \"Confusing latency with throughput\", d: \"Fast first-token ≠ high total capacity; optimise the one your users actually feel.\" },\n          { t: \"Benchmarking a single request\", d: \"Real performance shows under concurrent load, not one isolated call.\" },\n          { t: \"Reporting only the average\", d: \"Averages hide bad tail latency; p95\u002Fp99 reveal the experience users complain about.\" }\n        ],\n        terms: [\n          { t: \"Latency \u002F TTFT\", d: \"Time to first token — how quickly a response starts.\" },\n          { t: \"Throughput\", d: \"Tokens (or requests) produced per second.\" },\n          { t: \"p95 \u002F p99\", d: \"Percentile latencies showing the slow tail, not just the average.\" }\n        ],\n        quiz: [\n          { q: \"Time-to-first-token measures…\", options: [\"Cost\", \"How quickly a response starts (latency)\", \"Total tokens per second\", \"Model size\"], answer: 1, explain: \"TTFT is the latency users feel at the start.\" },\n          { q: \"Why report p95\u002Fp99 latency?\", options: [\"They’re cheaper\", \"They look nicer\", \"Averages hide the slow tail users actually complain about\", \"They measure cost\"], answer: 2, explain: \"Tail latency reflects real worst-case experience.\" }\n        ],\n        cards: [\n          { q: \"Latency vs throughput?\", a: \"Latency = time to first token (snappiness); throughput = tokens\u002Fsec (capacity).\" },\n          { q: \"Why use p95\u002Fp99, not averages?\", a: \"Averages hide the slow tail that users actually notice and complain about.\" }\n        ],\n        recap: \"Speed benchmarking separates latency (time to first token — how snappy it feels) from throughput (tokens\u002Fsec — total capacity). Measure both under realistic concurrent load with your real prompt sizes, and report p95\u002Fp99 to catch the slow tail.\"\n      },\n      {\n        id: \"quality-benchmarking\",\n        title: \"Quality benchmarking\",\n        lesson:\n          \"<p><strong>Quality benchmarking<\u002Fstrong> is measuring how <em>good<\u002Fem> a model’s answers are <strong>for your specific task<\u002Fstrong> — not on generic public tests, but on examples that look like your real work.<\u002Fp>\" +\n          \"<div class='analogy'><p>A test drive on <em>your<\u002Fem> daily commute, not the showroom’s smooth track. The only quality that matters is how it performs on the roads you actually drive.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Building your own eval set<\u002Fh3>\" +\n          \"<ul><li><strong>Collect real examples<\u002Fstrong> — 50–200 representative inputs from your use case.<\u002Fli>\" +\n          \"<li><strong>Define ‘good’<\u002Fstrong> — a rubric or known-correct answers (the ‘golden set’).<\u002Fli>\" +\n          \"<li><strong>Score consistently<\u002Fstrong> — exact-match where possible; human or LLM-judge for open-ended.<\u002Fli>\" +\n          \"<li><strong>Re-run on every change<\u002Fstrong> — model swaps, prompt edits, new versions.<\u002Fli><\u002Ful>\" +\n          \"<p>This is the single highest-value habit in applied AI: a small, trusted eval set turns ‘it feels better’ into <strong>evidence<\u002Fstrong>, catches <strong>regressions<\u002Fstrong> before users do, and lets you compare options objectively. Combine it with cost and speed, and you can choose models on facts, not vibes.<\u002Fp>\",\n        model:\n          \"Quality benchmarking is a <strong>test drive on your own commute<\u002Fstrong>: judge models on a small, trusted set of your real examples. It turns ‘feels better’ into evidence and catches regressions before users do.\",\n        mistakes: [\n          { t: \"Judging quality by vibes\", d: \"‘It seems better’ isn’t evidence; a fixed eval set makes comparisons objective.\" },\n          { t: \"Relying only on public benchmarks\", d: \"They don’t reflect your data; build a task-specific golden set.\" },\n          { t: \"Never re-running it\", d: \"Without re-testing on changes, prompt\u002Fmodel tweaks can silently cause regressions.\" }\n        ],\n        terms: [\n          { t: \"Quality benchmarking\", d: \"Measuring answer quality on your own task-specific examples.\" },\n          { t: \"Golden set\", d: \"A trusted set of inputs with known-good answers for evaluation.\" },\n          { t: \"Regression\", d: \"A change that quietly makes quality worse than before.\" }\n        ],\n        quiz: [\n          { q: \"The best measure of quality for your app is…\", options: [\"A public leaderboard\", \"Your own task-specific eval set\", \"Token price\", \"Model size\"], answer: 1, explain: \"Real examples from your use case matter most.\" },\n          { q: \"Why re-run your eval set on every change?\", options: [\"For fun\", \"To catch regressions before users do\", \"To use more GPUs\", \"It’s required by law\"], answer: 1, explain: \"Changes can silently degrade quality; testing catches it.\" }\n        ],\n        cards: [\n          { q: \"What is quality benchmarking?\", a: \"Measuring answer quality on a trusted set of your own real examples.\" },\n          { q: \"What is a golden set?\", a: \"A trusted set of inputs with known-good answers used to evaluate quality.\" }\n        ],\n        recap: \"Quality benchmarking judges models on your own task — a test drive on your real commute, not the showroom track. Build a small golden set, score it consistently, and re-run on every change to turn ‘feels better’ into evidence and catch regressions early.\"\n      }\n    ]\n  },\n  {\n    id: \"real-world\",\n    title: \"Real-World Skills\",\n    topics: [\n      {\n        id: \"chatbots\",\n        title: \"Building chatbots\",\n        lesson:\n          \"<p>A <strong>chatbot<\u002Fstrong> is the most common AI product: a back-and-forth conversation where the model answers in context. Simple to start, but a <em>good<\u002Fem> one is more than ‘call the model and print the reply.’<\u002Fp>\" +\n          \"<div class='analogy'><p>The model is a brilliant temp who forgets everything between sentences. Your job as builder is to give them a name badge (persona), a notepad (conversation history), and a reference binder (knowledge) so they act like a real team member.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>The anatomy of a solid chatbot<\u002Fh3>\" +\n          \"<ul><li><strong>System prompt<\u002Fstrong> — role, tone, rules, boundaries.<\u002Fli>\" +\n          \"<li><strong>Conversation history<\u002Fstrong> — feed past turns back so it remembers the thread (within the context window).<\u002Fli>\" +\n          \"<li><strong>RAG<\u002Fstrong> — pull in your real docs so answers are grounded, not guessed.<\u002Fli>\" +\n          \"<li><strong>Streaming<\u002Fstrong> — show tokens as they arrive so it feels fast.<\u002Fli>\" +\n          \"<li><strong>Guardrails<\u002Fstrong> — handle off-topic, unsafe, or ‘I don’t know’ cases gracefully.<\u002Fli><\u002Ful>\" +\n          \"<p>Start tiny (model + system prompt), then add history, then RAG, then polish. Most ‘bad chatbot’ complaints trace back to <strong>missing grounding<\u002Fstrong> (hallucinations) or <strong>lost context<\u002Fstrong> (forgetting the conversation).<\u002Fp>\",\n        model:\n          \"A chatbot is a <strong>temp given a badge, a notepad, and a binder<\u002Fstrong>: system prompt (who), history (memory of the thread), and RAG (real knowledge). Build it up in that order.\",\n        mistakes: [\n          { t: \"No grounding\", d: \"Without RAG\u002Fsources, the bot confidently makes things up — the #1 complaint.\" },\n          { t: \"Dropping conversation history\", d: \"Forget to feed past turns and it ‘forgets’ what was just said.\" },\n          { t: \"Skipping streaming\", d: \"Waiting for the whole reply feels sluggish; stream tokens for responsiveness.\" }\n        ],\n        terms: [\n          { t: \"Conversation history\", d: \"Past turns fed back so the bot remembers the thread.\" },\n          { t: \"Grounding (RAG)\", d: \"Supplying real documents so answers are factual and citable.\" },\n          { t: \"Guardrails\", d: \"Rules for handling unsafe, off-topic, or unknown queries.\" }\n        ],\n        quiz: [\n          { q: \"The most common cause of a ‘bad chatbot’ is…\", options: [\"Too many GPUs\", \"Missing grounding (hallucinations) or lost context\", \"Too small a font\", \"Streaming\"], answer: 1, explain: \"Ungrounded answers and forgotten context drive most complaints.\" },\n          { q: \"What makes a chatbot ‘remember’ the conversation?\", options: [\"A new tokenizer\", \"A bigger model\", \"Feeding past turns (history) back into the prompt\", \"More VRAM\"], answer: 2, explain: \"History within the context window provides memory.\" }\n        ],\n        cards: [\n          { q: \"Core parts of a solid chatbot?\", a: \"System prompt, conversation history, RAG grounding, streaming, guardrails.\" },\n          { q: \"Two top chatbot failure modes?\", a: \"No grounding (hallucination) and dropped history (forgetting context).\" }\n        ],\n        recap: \"A good chatbot is a temp given a badge (system prompt), a notepad (history), and a binder (RAG). Build up from model + prompt to history to grounding to polish — most failures come from missing grounding or lost context.\"\n      },\n      {\n        id: \"copilots\",\n        title: \"Building AI copilots\",\n        lesson:\n          \"<p>A <strong>copilot<\u002Fstrong> is AI <strong>embedded inside a tool to assist while you work<\u002Fstrong> — suggesting code in an editor, drafting replies in an inbox, summarising in a doc. Unlike a standalone chatbot, it lives <em>in context<\u002Fem> and the human stays in charge.<\u002Fp>\" +\n          \"<div class='analogy'><p>A driving copilot, not a self-driving car. It reads the map, suggests turns, and warns of hazards — but your hands stay on the wheel. The human accepts, edits, or ignores each suggestion.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What makes copilots work<\u002Fh3>\" +\n          \"<ul><li><strong>Rich context:<\u002Fstrong> it sees what you’re doing (the file, the email thread, the selection) — that context is its superpower.<\u002Fli>\" +\n          \"<li><strong>In-place suggestions:<\u002Fstrong> right where you work, not in a separate window.<\u002Fli>\" +\n          \"<li><strong>Easy accept\u002Freject\u002Fedit:<\u002Fstrong> low-friction control keeps the human in the loop.<\u002Fli>\" +\n          \"<li><strong>Non-intrusive:<\u002Fstrong> helpful when wanted, invisible when not.<\u002Fli><\u002Ful>\" +\n          \"<p>Design rule: <strong>augment, don’t replace.<\u002Fstrong> The best copilots make a skilled person faster and keep them in control — wrong suggestions are cheap to dismiss, so the bar is ‘often helpful,’ not ‘always perfect.’<\u002Fp>\",\n        model:\n          \"A copilot is a <strong>navigator, not a driverless car<\u002Fstrong>: it uses rich in-app context to suggest, while the human accepts, edits, or ignores. Augment the expert; keep them in control.\",\n        mistakes: [\n          { t: \"Trying to fully automate\", d: \"Copilots assist; removing human control turns small errors into shipped mistakes.\" },\n          { t: \"Starving it of context\", d: \"Its value comes from seeing your work — feed it the file\u002Fthread\u002Fselection.\" },\n          { t: \"High-friction UX\", d: \"If accepting\u002Frejecting is clumsy, users stop using it; make control effortless.\" }\n        ],\n        terms: [\n          { t: \"Copilot\", d: \"AI embedded in a tool to assist a user in context.\" },\n          { t: \"Human-in-the-loop\", d: \"The user reviews and controls each AI suggestion.\" },\n          { t: \"Context awareness\", d: \"The copilot seeing your current work to give relevant help.\" }\n        ],\n        quiz: [\n          { q: \"A copilot differs from a chatbot by…\", options: [\"Being bigger\", \"Never using a model\", \"Working offline only\", \"Living inside a tool, in-context, with the human in control\"], answer: 3, explain: \"It assists in-place while you stay in charge.\" },\n          { q: \"A copilot’s ‘superpower’ is…\", options: [\"Rich context about what you’re doing\", \"No UI\", \"A huge model\", \"Full autonomy\"], answer: 0, explain: \"Seeing your current work makes its help relevant.\" }\n        ],\n        cards: [\n          { q: \"What is an AI copilot?\", a: \"AI embedded in a tool to assist you in context, with the human in control.\" },\n          { q: \"Copilot design rule?\", a: \"Augment, don’t replace — keep the human in the loop with easy accept\u002Freject.\" }\n        ],\n        recap: \"A copilot is AI embedded in a tool — a navigator, not a driverless car. Its power is rich in-app context; its rule is augment-don’t-replace, with effortless accept\u002Freject keeping the human in control. Aim for ‘often helpful,’ not ‘always perfect.’\"\n      },\n      {\n        id: \"ai-automation\",\n        title: \"AI automation\",\n        lesson:\n          \"<p><strong>AI automation<\u002Fstrong> uses models to <strong>handle tasks with little or no human involvement<\u002Fstrong> — sorting incoming emails, tagging tickets, extracting data from documents, generating routine reports. The goal: remove repetitive work, not impress with chat.<\u002Fp>\" +\n          \"<div class='analogy'><p>A tireless assistant doing the boring paperwork. They don’t need to be a genius — they need to be <em>reliable<\u002Fem> at the same dull task thousands of times without complaint.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Where AI fits in automation<\u002Fh3>\" +\n          \"<ul><li>It shines on tasks that are <strong>fuzzy<\u002Fstrong> (free text, varied formats) where old rule-based automation broke.<\u002Fli>\" +\n          \"<li>Often a <strong>small step<\u002Fstrong> in a bigger pipeline: classify → route → act.<\u002Fli>\" +\n          \"<li>Best with a <strong>narrow, well-defined job<\u002Fstrong> and structured output (function calling).<\u002Fli><\u002Ful>\" +\n          \"<p>Crucial design choice: <strong>match autonomy to the stakes.<\u002Fstrong> Auto-tagging tickets can run unattended; auto-issuing refunds needs a human check or tight limits. Always log decisions and have a <strong>fallback<\u002Fstrong> for low-confidence cases (‘send to a human’).<\u002Fp>\",\n        model:\n          \"AI automation is a <strong>tireless paperwork clerk<\u002Fstrong>: reliable on narrow, fuzzy tasks at scale. Match autonomy to the stakes, log everything, and route low-confidence cases to a human.\",\n        mistakes: [\n          { t: \"Automating high-stakes actions unchecked\", d: \"Refunds, deletes, sends — gate these behind approval or strict limits.\" },\n          { t: \"No fallback for uncertainty\", d: \"When the model is unsure, route to a human instead of guessing.\" },\n          { t: \"Over-scoping the task\", d: \"Narrow, well-defined jobs work; vague ‘do everything’ automations fail.\" }\n        ],\n        terms: [\n          { t: \"AI automation\", d: \"Using models to handle tasks with little\u002Fno human involvement.\" },\n          { t: \"Pipeline step\", d: \"AI as one stage (e.g. classify) within a larger automated flow.\" },\n          { t: \"Fallback\", d: \"Routing low-confidence or risky cases to a human.\" }\n        ],\n        quiz: [\n          { q: \"AI automation is best for…\", options: [\"Impressive open chat\", \"Training models\", \"Narrow, repetitive, fuzzy tasks at scale\", \"Drawing UIs\"], answer: 2, explain: \"Reliability on a well-defined job is the point.\" },\n          { q: \"For high-stakes automated actions you should…\", options: [\"Add human approval or tight limits and a fallback\", \"Use a bigger font\", \"Skip logging\", \"Run them unattended\"], answer: 0, explain: \"Match autonomy to stakes; gate risky actions.\" }\n        ],\n        cards: [\n          { q: \"What is AI automation?\", a: \"Using models to handle narrow, repetitive tasks with little human involvement.\" },\n          { q: \"Key automation safety rule?\", a: \"Match autonomy to stakes; log decisions and route low-confidence cases to a human.\" }\n        ],\n        recap: \"AI automation is a tireless clerk handling narrow, fuzzy, repetitive tasks at scale — often one step in a bigger pipeline. Keep jobs well-defined, match autonomy to the stakes, log decisions, and fall back to a human when confidence is low.\"\n      },\n      {\n        id: \"saas-workflows\",\n        title: \"AI SaaS workflows\",\n        lesson:\n          \"<p><strong>AI SaaS workflows<\u002Fstrong> are about turning AI features into a real <strong>software product people pay for<\u002Fstrong> — which means thinking beyond the model: pricing, reliability, multi-user data, and margins.<\u002Fp>\" +\n          \"<div class='analogy'><p>A great recipe isn’t a restaurant. To run the restaurant you need consistent service, sensible prices, clean tables for every guest, and a kitchen that doesn’t lose money per dish. AI SaaS is the restaurant around the recipe.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What changes at product scale<\u002Fh3>\" +\n          \"<ul><li><strong>Unit economics:<\u002Fstrong> if each user costs more in tokens than they pay, you lose money as you grow. Track cost-per-user.<\u002Fli>\" +\n          \"<li><strong>Multi-tenancy:<\u002Fstrong> strict data isolation so one customer never sees another’s data (filter RAG by tenant!).<\u002Fli>\" +\n          \"<li><strong>Reliability:<\u002Fstrong> handle provider outages, rate limits, and retries — don’t let one API hiccup break the app.<\u002Fli>\" +\n          \"<li><strong>Caching &amp; routing:<\u002Fstrong> cut cost by caching repeats and routing easy work to cheaper models.<\u002Fli><\u002Ful>\" +\n          \"<p>The mindset shift: a demo proves it <em>can<\u002Fem> work once; a SaaS proves it works <strong>reliably, securely, and profitably<\u002Fstrong> for thousands of users.<\u002Fp>\",\n        model:\n          \"AI SaaS is the <strong>restaurant, not the recipe<\u002Fstrong>: pricing that beats token cost, strict per-tenant isolation, and reliability under load. A demo works once; a product works profitably for thousands.\",\n        mistakes: [\n          { t: \"Ignoring unit economics\", d: \"If token cost per user exceeds revenue, scaling loses more money — model the margins early.\" },\n          { t: \"Weak tenant isolation\", d: \"Cross-customer data leaks are catastrophic; filter every retrieval by tenant.\" },\n          { t: \"No resilience to provider issues\", d: \"Outages and rate limits happen — add retries, fallbacks, and graceful errors.\" }\n        ],\n        terms: [\n          { t: \"Unit economics\", d: \"Cost vs revenue per user — must be sustainable to scale.\" },\n          { t: \"Multi-tenancy\", d: \"Serving many customers with strict data isolation between them.\" },\n          { t: \"Resilience\", d: \"Staying up despite provider outages, rate limits, and errors.\" }\n        ],\n        quiz: [\n          { q: \"Why do unit economics matter in AI SaaS?\", options: [\"They speed the GPU\", \"They set the font\", \"If per-user token cost beats revenue, growth loses money\", \"They don’t\"], answer: 2, explain: \"Margins must be sustainable to scale profitably.\" },\n          { q: \"A critical multi-tenant requirement is…\", options: [\"Bigger models\", \"One shared chat\", \"Strict data isolation between customers (filter RAG by tenant)\", \"No caching\"], answer: 2, explain: \"Customers must never see each other’s data.\" }\n        ],\n        cards: [\n          { q: \"What do AI SaaS workflows add beyond the model?\", a: \"Pricing\u002Funit economics, multi-tenant isolation, reliability, caching\u002Frouting.\" },\n          { q: \"Demo vs SaaS mindset?\", a: \"A demo works once; a SaaS works reliably, securely, and profitably at scale.\" }\n        ],\n        recap: \"AI SaaS is the restaurant around the recipe: it demands sustainable unit economics, strict multi-tenant data isolation, and resilience to provider issues. A demo proves it can work once; a product proves it works profitably for thousands.\"\n      },\n      {\n        id: \"coding-workflows\",\n        title: \"AI coding workflows\",\n        lesson:\n          \"<p><strong>AI coding workflows<\u002Fstrong> are how you actually <strong>build software with AI as a partner<\u002Fstrong> — using coding models and copilots effectively across the day, from autocomplete to whole features.<\u002Fp>\" +\n          \"<div class='analogy'><p>AI is a fast, eager junior developer: great at boilerplate and first drafts, occasionally confidently wrong. You’re the senior reviewing every pull request — you ship nothing you haven’t understood.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>A practical loop<\u002Fh3>\" +\n          \"<ul><li><strong>Scaffold:<\u002Fstrong> let AI draft boilerplate, tests, and repetitive code.<\u002Fli>\" +\n          \"<li><strong>Steer with context:<\u002Fstrong> give it the relevant files, types, and examples — vague prompts get vague code.<\u002Fli>\" +\n          \"<li><strong>Review &amp; run:<\u002Fstrong> read it, run it, test it — never paste-and-pray.<\u002Fli>\" +\n          \"<li><strong>Iterate in small steps:<\u002Fstrong> small, checkable changes beat giant AI-written dumps.<\u002Fli><\u002Ful>\" +\n          \"<p>Biggest leverage: <strong>tests and small diffs.<\u002Fstrong> AI is fastest when each change is small enough to verify quickly. Biggest danger: <strong>shipping code you don’t understand<\u002Fstrong> — if you can’t explain it, you can’t maintain or debug it later.<\u002Fp>\",\n        model:\n          \"AI coding is <strong>pairing with an eager junior<\u002Fstrong>: brilliant at drafts and boilerplate, sometimes confidently wrong. You stay the reviewing senior — small diffs, real tests, ship nothing you don’t understand.\",\n        mistakes: [\n          { t: \"Paste-and-pray\", d: \"Shipping unread AI code invites subtle bugs and security holes — review and run it.\" },\n          { t: \"Giant one-shot generations\", d: \"Big AI dumps are hard to verify; prefer small, checkable diffs.\" },\n          { t: \"Starving it of context\", d: \"Without the relevant files\u002Ftypes, it guesses and invents APIs — feed it context.\" }\n        ],\n        terms: [\n          { t: \"AI coding workflow\", d: \"Practices for building software with AI as a coding partner.\" },\n          { t: \"Small diffs\", d: \"Tiny, verifiable changes that are easy to review and test.\" },\n          { t: \"Paste-and-pray\", d: \"Shipping AI code without reading or testing it (an anti-pattern).\" }\n        ],\n        quiz: [\n          { q: \"The biggest danger in AI coding is…\", options: [\"Small diffs\", \"Shipping code you don’t understand\", \"Typing too fast\", \"Using tests\"], answer: 1, explain: \"Ununderstood code can’t be maintained or debugged safely.\" },\n          { q: \"AI coding works best with…\", options: [\"Small, checkable diffs and real tests\", \"Giant one-shot generations\", \"No context\", \"No review\"], answer: 0, explain: \"Small verifiable steps plus context and tests are the leverage.\" }\n        ],\n        cards: [\n          { q: \"Mental model for AI coding?\", a: \"An eager junior dev — great at drafts, sometimes wrong; you review every change.\" },\n          { q: \"Biggest AI-coding danger?\", a: \"Shipping code you don’t understand; use small diffs, context, and tests.\" }\n        ],\n        recap: \"AI coding workflows treat the model as an eager junior dev — great at boilerplate and drafts, sometimes confidently wrong. Steer it with context, work in small diffs backed by tests, and never ship code you don’t understand.\"\n      },\n      {\n        id: \"orchestration\",\n        title: \"AI orchestration systems\",\n        lesson:\n          \"<p><strong>AI orchestration<\u002Fstrong> is the <strong>conductor layer<\u002Fstrong> that coordinates many AI pieces — models, tools, retrieval, agents, and plain code — into one reliable system. As apps grow past a single model call, orchestration is what keeps them coherent.<\u002Fp>\" +\n          \"<div class='analogy'><p>An orchestra conductor. The violinist (one model), percussionist (a tool), and pianist (retrieval) are each skilled, but without a conductor coordinating who plays when, you get noise. Orchestration is the conductor.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What it handles<\u002Fh3>\" +\n          \"<ul><li><strong>Flow control:<\u002Fstrong> which step runs when, branching, loops, retries.<\u002Fli>\" +\n          \"<li><strong>State &amp; memory:<\u002Fstrong> passing context between steps.<\u002Fli>\" +\n          \"<li><strong>Error handling:<\u002Fstrong> what to do when a step fails or a tool times out.<\u002Fli>\" +\n          \"<li><strong>Observability:<\u002Fstrong> tracing each step to debug and measure.<\u002Fli><\u002Ful>\" +\n          \"<p>Frameworks (e.g. LangChain, LlamaIndex, or your own code) help, but the principle matters more than the tool: <strong>keep it as simple as the task allows.<\u002Fstrong> Over-orchestrating turns a 2-step job into a fragile 10-box diagram. Add complexity only when the task truly needs it — and make every step <strong>observable<\u002Fstrong> so you can debug it.<\u002Fp>\",\n        model:\n          \"Orchestration is the <strong>conductor<\u002Fstrong> coordinating models, tools, and retrieval into one coherent system — flow, state, errors, and tracing. Keep the score as simple as the music allows.\",\n        mistakes: [\n          { t: \"Over-orchestrating\", d: \"Don’t build a 10-box pipeline for a 2-step task; complexity is fragile and slow.\" },\n          { t: \"No observability\", d: \"Without per-step tracing, multi-step systems are nearly impossible to debug.\" },\n          { t: \"Ignoring partial failures\", d: \"Any step (tool\u002Fmodel) can fail — plan retries and fallbacks, don’t assume success.\" }\n        ],\n        terms: [\n          { t: \"Orchestration\", d: \"Coordinating multiple AI\u002Fcode components into one reliable system.\" },\n          { t: \"Flow control\", d: \"Deciding which steps run when, with branching, loops, and retries.\" },\n          { t: \"Observability\", d: \"Tracing each step to debug and measure the system.\" }\n        ],\n        quiz: [\n          { q: \"AI orchestration mainly does what?\", options: [\"Quantizes weights\", \"Coordinates models, tools, and retrieval into one reliable flow\", \"Draws charts\", \"Trains models\"], answer: 1, explain: \"It’s the conductor layer over many AI pieces.\" },\n          { q: \"A common orchestration mistake is…\", options: [\"Handling errors\", \"Keeping it simple\", \"Adding tracing\", \"Over-orchestrating a simple task into a fragile pipeline\"], answer: 3, explain: \"Needless complexity makes systems fragile and hard to debug.\" }\n        ],\n        cards: [\n          { q: \"What is AI orchestration?\", a: \"The conductor layer coordinating models, tools, and retrieval into one reliable system.\" },\n          { q: \"Two orchestration principles?\", a: \"Keep it as simple as the task allows; make every step observable.\" }\n        ],\n        recap: \"Orchestration is the conductor coordinating models, tools, and retrieval — handling flow, state, errors, and tracing. Frameworks help, but the principle rules: keep it as simple as the task allows and make every step observable for debugging.\"\n      },\n      {\n        id: \"product-thinking\",\n        title: \"AI product thinking\",\n        lesson:\n          \"<p><strong>AI product thinking<\u002Fstrong> is the most important skill of all: deciding <strong>what to build and why<\u002Fstrong>, so AI solves a real problem instead of being a gimmick bolted on. The model is a means, not the point.<\u002Fp>\" +\n          \"<div class='analogy'><p>Owning a powerful new power tool doesn’t mean drilling holes everywhere. The craft is knowing <em>which<\u002Fem> holes the project actually needs. AI is the tool; the user’s problem is the project.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Principles that separate good AI products from demos<\u002Fh3>\" +\n          \"<ul><li><strong>Start from the problem,<\u002Fstrong> not ‘let’s add AI.’ Would a user pay for this outcome without knowing AI was involved?<\u002Fli>\" +\n          \"<li><strong>Design for being wrong:<\u002Fstrong> models err, so make mistakes cheap — easy undo, human review, clear confidence.<\u002Fli>\" +\n          \"<li><strong>Set expectations:<\u002Fstrong> show sources, allow ‘I don’t know,’ don’t over-promise certainty.<\u002Fli>\" +\n          \"<li><strong>Measure real value:<\u002Fstrong> time saved, tasks completed — not ‘messages sent.’<\u002Fli>\" +\n          \"<li><strong>Right-size:<\u002Fstrong> the cheapest, simplest approach that solves it (prompt &gt; RAG &gt; fine-tune &gt; agent) usually wins.<\u002Fli><\u002Ful>\" +\n          \"<p>The throughline of this whole course: powerful tech only matters when it’s aimed at a genuine need, designed for its own fallibility, and delivered reliably and affordably. That judgement — not any single technique — is what makes you an AI <em>engineer<\u002Fem>, not just an AI user.<\u002Fp>\",\n        model:\n          \"AI product thinking is <strong>‘which holes does this project need?’<\u002Fstrong>: start from the user’s problem, design for the model being wrong, set honest expectations, and pick the simplest approach that works.\",\n        mistakes: [\n          { t: \"AI for AI’s sake\", d: \"Bolting a chatbot on without a real problem creates a gimmick users ignore.\" },\n          { t: \"Designing as if the model is perfect\", d: \"It will be wrong sometimes; make errors cheap with undo, review, and confidence cues.\" },\n          { t: \"Reaching for the heaviest solution\", d: \"Try prompt → RAG → fine-tune → agent in that order; don’t over-engineer.\" }\n        ],\n        terms: [\n          { t: \"AI product thinking\", d: \"Deciding what to build and why so AI solves a real problem.\" },\n          { t: \"Design for failure\", d: \"Making model mistakes cheap via undo, review, and clear confidence.\" },\n          { t: \"Right-sizing\", d: \"Choosing the simplest approach that solves the problem.\" }\n        ],\n        quiz: [\n          { q: \"AI product thinking starts from…\", options: [\"The biggest model\", \"The token price\", \"The latest framework\", \"The user’s real problem\"], answer: 3, explain: \"Solve a genuine need; the model is a means, not the point.\" },\n          { q: \"Because models make mistakes, good AI products…\", options: [\"Never ship\", \"Avoid users\", \"Hide all errors\", \"Design for being wrong — undo, review, clear confidence\"], answer: 3, explain: \"Make mistakes cheap and recoverable.\" }\n        ],\n        cards: [\n          { q: \"What is AI product thinking?\", a: \"Deciding what to build and why so AI solves a real problem, not a gimmick.\" },\n          { q: \"Right-sizing order of approaches?\", a: \"Prompt → RAG → fine-tune → agent: simplest that works wins.\" }\n        ],\n        recap: \"AI product thinking — the throughline of the course — means starting from the user’s real problem, designing for the model being wrong, setting honest expectations, measuring real value, and right-sizing the solution. That judgement is what makes you an AI engineer, not just a user.\"\n      }\n    ]\n  }\n  ]\n};\n<\u002Fscript>\n\n<!-- ============================================================ ENGINE -->\n<script>\n(function () {\n  \"use strict\";\n  var COURSE = window.COURSE;\n  var LS = \"llmCourse.v1\";\n  var ACCENTS = [\"#1f6feb\", \"#1f8a5b\", \"#b4530a\", \"#7c3aed\", \"#475569\"];\n\n  \u002F\u002F ---- state ----\n  var state = {\n    done: {}, current: null, notes: {},\n    fc: {}, \u002F\u002F flashcard index per topic\n    theme: \"light\", accent: \"#1f6feb\", font: \"serif\", density: \"roomy\",\n    collapsed: {}\n  };\n  try { var saved = JSON.parse(localStorage.getItem(LS)); if (saved) Object.assign(state, saved); } catch (e) {}\n  if (state.font !== \"serif\" && state.font !== \"sans\") state.font = \"serif\";\n  function save() { try { localStorage.setItem(LS, JSON.stringify(state)); } catch (e) {} }\n\n  \u002F\u002F ---- flatten topics for ordering ----\n  var FLAT = [];\n  COURSE.modules.forEach(function (m) { (m.topics || []).forEach(function (t) { t._mod = m; FLAT.push(t); }); });\n  function topicById(id) { for (var i=0;i<FLAT.length;i++) if (FLAT[i].id===id) return FLAT[i]; return null; }\n  function hasContent(t) { return !!(t.lesson || t.model || (t.quiz&&t.quiz.length) || (t.cards&&t.cards.length)); }\n\n  \u002F\u002F ---- icons ----\n  var IC = {\n    check: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"\u002F><\u002Fsvg>',\n    model: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z\"\u002F><path d=\"M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z\"\u002F><\u002Fsvg>',\n    warn: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"\u002F><path d=\"M12 9v4M12 17h.01\"\u002F><\u002Fsvg>',\n    book: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 19.5A2.5 2.5 0 0 1 6.5 17H20\"\u002F><path d=\"M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z\"\u002F><\u002Fsvg>',\n    quiz: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3\"\u002F><path d=\"M12 17h.01\"\u002F><circle cx=\"12\" cy=\"12\" r=\"10\"\u002F><\u002Fsvg>',\n    cards: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"6\" width=\"14\" height=\"12\" rx=\"2\"\u002F><path d=\"M18 8h2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H9\"\u002F><\u002Fsvg>',\n    recap: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 11 12 14 22 4\"\u002F><path d=\"M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11\"\u002F><\u002Fsvg>',\n    x: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"\u002F><\u002Fsvg>',\n    arrowL: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 12H5M12 19l-7-7 7-7\"\u002F><\u002Fsvg>',\n    arrowR: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M12 5l7 7-7 7\"\u002F><\u002Fsvg>',\n    sun: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4\"\u002F><path d=\"M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41\"\u002F><\u002Fsvg>',\n    moon: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z\"\u002F><\u002Fsvg>'\n  };\n\n  var $ = function (s, r) { retur
