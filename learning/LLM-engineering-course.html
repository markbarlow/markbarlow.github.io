n (r||document).querySelector(s); };\n  var el = function (tag, cls, html) { var e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; };\n\n  \u002F\u002F ---- theme \u002F appearance ----\n  function applyAppearance() {\n    var h = document.documentElement;\n    h.dataset.theme = state.theme;\n    h.dataset.font = state.font;\n    h.dataset.density = state.density === \"compact\" ? \"compact\" : \"roomy\";\n    h.style.setProperty(\"--accent\", state.accent);\n    $(\"#themeBtn\").innerHTML = state.theme === \"dark\" ? IC.sun : IC.moon;\n    syncSettingsUI();\n  }\n\n  \u002F\u002F ---- progress ----\n  function modStats(m) {\n    var ts = m.topics || [], d = 0;\n    ts.forEach(function (t) { if (state.done[t.id]) d++; });\n    return { done: d, total: ts.length };\n  }\n  function updateProgress() {\n    var total = FLAT.length, done = 0;\n    FLAT.forEach(function (t) { if (state.done[t.id]) done++; });\n    var pct = total ? Math.round(done\u002Ftotal*100) : 0;\n    $(\"#overallPct\").textContent = pct + \"%\";\n    $(\"#overallBar\").style.width = pct + \"%\";\n    \u002F\u002F module rings\n    COURSE.modules.forEach(function (m) {\n      var s = modStats(m), node = document.querySelector('[data-modring=\"'+m.id+'\"]');\n      if (node) {\n        var frac = s.total ? s.done\u002Fs.total : 0, c = 2*Math.PI*6;\n        var v = node.querySelector(\".val\");\n        v.style.strokeDasharray = c; v.style.strokeDashoffset = c*(1-frac);\n        node.parentNode.querySelector(\".mod-frac\").textContent = s.done + \"\u002F\" + s.total;\n      }\n    });\n  }\n\n  \u002F\u002F ---- sidebar ----\n  function buildNav() {\n    var nav = $(\"#nav\"); nav.innerHTML = \"\";\n    COURSE.modules.forEach(function (m, mi) {\n      var mod = el(\"div\", \"mod\"); mod.dataset.mod = m.id;\n      if (state.collapsed[m.id]) mod.classList.add(\"collapsed\");\n      var head = el(\"button\", \"mod-head\");\n      head.innerHTML =\n        '<svg class=\"mod-chev\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"\u002F><\u002Fsvg>' +\n        '<span class=\"mod-name\">' + esc(m.title) + '<\u002Fspan>' +\n        '<span class=\"mod-frac\">0\u002F0<\u002Fspan>' +\n        '<svg class=\"mod-ring\" data-modring=\"'+m.id+'\" viewBox=\"0 0 16 16\"><circle class=\"trk\" cx=\"8\" cy=\"8\" r=\"6\"\u002F><circle class=\"val\" cx=\"8\" cy=\"8\" r=\"6\"\u002F><\u002Fsvg>';\n      head.addEventListener(\"click\", function () {\n        mod.classList.toggle(\"collapsed\");\n        state.collapsed[m.id] = mod.classList.contains(\"collapsed\"); save();\n      });\n      mod.appendChild(head);\n      var ul = el(\"ul\", \"topics\");\n      (m.topics || []).forEach(function (t) {\n        var li = el(\"li\", \"topic\"); li.dataset.topic = t.id;\n        li.innerHTML = '<span class=\"tdot\">'+IC.check+'<\u002Fspan><span class=\"tname\">'+esc(t.title)+'<\u002Fspan>';\n        li.addEventListener(\"click\", function () { go(t.id); });\n        ul.appendChild(li);\n      });\n      mod.appendChild(ul);\n      nav.appendChild(mod);\n    });\n  }\n\n  function refreshNavStates() {\n    document.querySelectorAll(\".topic\").forEach(function (li) {\n      var id = li.dataset.topic;\n      li.classList.toggle(\"done\", !!state.done[id]);\n      li.classList.toggle(\"active\", id === state.current);\n    });\n  }\n\n  \u002F\u002F ---- search ----\n  function runSearch(q) {\n    q = (q||\"\").trim().toLowerCase();\n    COURSE.modules.forEach(function (m) {\n      var modEl = document.querySelector('[data-mod=\"'+m.id+'\"]'), anyVis = false;\n      (m.topics||[]).forEach(function (t) {\n        var li = modEl.querySelector('[data-topic=\"'+t.id+'\"]');\n        var hit = !q || t.title.toLowerCase().indexOf(q) >= 0 || m.title.toLowerCase().indexOf(q) >= 0;\n        li.classList.toggle(\"hidden\", !hit);\n        if (hit) anyVis = true;\n      });\n      modEl.classList.toggle(\"hidden\", !anyVis);\n      if (q && anyVis) modEl.classList.remove(\"collapsed\");\n    });\n  }\n\n  \u002F\u002F ---- render a topic ----\n  function go(id) {\n    var t = topicById(id); if (!t) return;\n    state.current = id; save();\n    refreshNavStates();\n    document.querySelector('[data-topic=\"'+id+'\"]').scrollIntoView ? null : null;\n    var side = $(\"#side\"); if (side.classList.contains(\"open\")) side.classList.remove(\"open\"), $(\"#scrim\").classList.remove(\"open\");\n    renderTopic(t);\n    $(\"#main\").scrollTop = 0;\n  }\n\n  function renderTopic(t) {\n    var r = $(\"#reading\"); r.innerHTML = \"\";\n    $(\"#crumb\").innerHTML = '<b>' + esc(t._mod.title) + '<\u002Fb> &nbsp;\u002F&nbsp; ' + esc(t.title);\n\n    r.appendChild(el(\"div\", \"t-kicker\", esc(t._mod.title)));\n    r.appendChild(el(\"h1\", \"t-title\", esc(t.title)));\n\n    if (!hasContent(t)) {\n      r.appendChild(el(\"div\", \"draft\", \"✍️ This topic is scaffolded but not yet written.<br>Ask to expand the <b>\" + esc(t._mod.title) + \"<\u002Fb> module and full content will appear here — lesson, mental model, mistakes, quiz, flashcards and recap.\"));\n    }\n\n    \u002F\u002F lesson\n    if (t.lesson) {\n      var lc = el(\"div\", \"lesson\"); lc.innerHTML = t.lesson; r.appendChild(lc);\n    }\n    \u002F\u002F mental model\n    if (t.model) {\n      r.appendChild(section(\"model-card\", IC.model, \"Mental model\", '<p>'+t.model+'<\u002Fp>'));\n    }\n    \u002F\u002F mistakes\n    if (t.mistakes && t.mistakes.length) {\n      var ml = '<ul class=\"mistakes\">' + t.mistakes.map(function (mk) {\n        var parts = typeof mk === \"string\" ? [mk, \"\"] : [mk.t, mk.d||\"\"];\n        return '<li><span class=\"x\">'+IC.x+'<\u002Fspan><div><b>'+parts[0]+'<\u002Fb>'+(parts[1]?'<small>'+parts[1]+'<\u002Fsmall>':'')+'<\u002Fdiv><\u002Fli>';\n      }).join(\"\") + '<\u002Ful>';\n      r.appendChild(section(\"\", IC.warn, \"Common mistakes to avoid\", ml));\n    }\n    \u002F\u002F glossary\n    if (t.terms && t.terms.length) {\n      var tl = '<dl class=\"terms\">' + t.terms.map(function (x) {\n        return '<div class=\"term\"><dt>'+esc(x.t)+'<\u002Fdt><dd>'+x.d+'<\u002Fdd><\u002Fdiv>';\n      }).join(\"\") + '<\u002Fdl>';\n      r.appendChild(section(\"\", IC.book, \"Key terms\", tl));\n    }\n    \u002F\u002F quiz\n    if (t.quiz && t.quiz.length) {\n      r.appendChild(buildQuiz(t));\n    }\n    \u002F\u002F flashcards\n    if (t.cards && t.cards.length) {\n      r.appendChild(buildCards(t));\n    }\n    \u002F\u002F recap\n    if (t.recap) {\n      var rc = el(\"div\", \"recap\");\n      rc.innerHTML = '<div class=\"rh\">'+IC.recap+'TL;DR<\u002Fdiv><p>'+t.recap+'<\u002Fp>';\n      r.appendChild(rc);\n    }\n\n    \u002F\u002F footer: complete + nav\n    var foot = el(\"div\", \"foot\");\n    var idx = FLAT.indexOf(t);\n    var prev = FLAT[idx-1], next = FLAT[idx+1];\n    var pb = el(\"button\", \"pgbtn prev\");\n    pb.innerHTML = IC.arrowL + '<span class=\"lab\"><small>Previous<\u002Fsmall><span>'+(prev?esc(prev.title):'—')+'<\u002Fspan><\u002Fspan>';\n    pb.disabled = !prev; if (prev) pb.addEventListener(\"click\", function(){ go(prev.id); });\n    var nb = el(\"button\", \"pgbtn next\");\n    nb.innerHTML = '<span class=\"lab\"><small>Next<\u002Fsmall><span>'+(next?esc(next.title):'—')+'<\u002Fspan><\u002Fspan>' + IC.arrowR;\n    nb.disabled = !next; if (next) nb.addEventListener(\"click\", function(){ go(next.id); });\n    foot.appendChild(pb); foot.appendChild(nb);\n\n    var cbWrap = el(\"div\", \"\"); cbWrap.style.cssText = \"width:100%;display:flex;margin:26px 0 0;\";\n    var cb = el(\"button\", \"complete-btn\");\n    function setCB() {\n      var d = !!state.done[t.id];\n      cb.classList.toggle(\"is-done\", d);\n      cb.innerHTML = IC.check + (d ? \"Completed — click to undo\" : \"Mark topic complete\");\n    }\n    setCB();\n    cb.addEventListener(\"click\", function () {\n      state.done[t.id] = !state.done[t.id]; save();\n      setCB(); refreshNavStates(); updateProgress();\n      if (state.done[t.id]) { toast(\"Nice — topic complete ✓\"); }\n    });\n    cbWrap.appendChild(cb);\n    r.appendChild(cbWrap);\n    r.appendChild(foot);\n  }\n\n  function section(extra, icon, title, bodyHtml) {\n    var c = el(\"div\", \"card\" + (extra?\" \"+extra:\"\"));\n    c.innerHTML = '<div class=\"card-h\"><span class=\"ic\">'+icon+'<\u002Fspan><b>'+title+'<\u002Fb><\u002Fdiv><div class=\"card-b\">'+bodyHtml+'<\u002Fdiv>';\n    return c;\n  }\n\n  \u002F\u002F ---- quiz ----\n  function buildQuiz(t) {\n    var c = el(\"div\", \"card\");\n    c.innerHTML = '<div class=\"card-h\"><span class=\"ic\">'+IC.quiz+'<\u002Fspan><b>Quick quiz<\u002Fb><\u002Fdiv>';\n    var body = el(\"div\", \"card-b\");\n    t.quiz.forEach(function (q, qi) {\n      var qd = el(\"div\", \"q\");\n      qd.innerHTML = '<p class=\"q-stem\"><span class=\"n\">Q'+(qi+1)+'<\u002Fspan>'+esc(q.q)+'<\u002Fp>';\n      var opts = el(\"div\", \"opts\");\n      q.options.forEach(function (opt, oi) {\n        var b = el(\"button\", \"opt\");\n        b.innerHTML = '<span class=\"mk\">'+IC.check+'<\u002Fspan><span>'+esc(opt)+'<\u002Fspan>';\n        b.addEventListener(\"click\", function () {\n          if (qd.dataset.locked) return;\n          qd.dataset.locked = \"1\";\n          var ex = qd.querySelector(\".q-explain\");\n          opts.querySelectorAll(\".opt\").forEach(function (o, i) {\n            o.classList.add(\"locked\");\n            if (i === q.answer) o.classList.add(\"correct\");\n          });\n          if (oi !== q.answer) b.classList.add(\"wrong\");\n          if (ex) ex.classList.add(\"show\");\n        });\n        opts.appendChild(b);\n      });\n      qd.appendChild(opts);\n      if (q.explain) qd.appendChild(el(\"p\", \"q-explain\", '<b>Why<\u002Fb> &nbsp;'+q.explain));\n      body.appendChild(qd);\n    });\n    c.appendChild(body);\n    return c;\n  }\n\n  \u002F\u002F ---- flashcards ----\n  function buildCards(t) {\n    var c = el(\"div\", \"card\");\n    c.innerHTML = '<div class=\"card-h\"><span class=\"ic\">'+IC.cards+'<\u002Fspan><b>Flashcards — test your recall<\u002Fb><\u002Fdiv>';\n    var body = el(\"div\", \"card-b\");\n    var stage = el(\"div\", \"fc-stage\");\n    var i = state.fc[t.id] || 0; if (i >= t.cards.length) i = 0;\n    var fc = el(\"div\", \"fc\");\n    function paint() {\n      var card = t.cards[i];\n      fc.classList.remove(\"flipped\");\n      fc.innerHTML =\n        '<div class=\"fc-face fc-front\"><span class=\"lab\">Prompt<\u002Fspan><div class=\"txt\">'+esc(card.q)+'<\u002Fdiv><span class=\"fc-tap\">tap to flip<\u002Fspan><\u002Fdiv>' +\n        '<div class=\"fc-face fc-back\"><span class=\"lab\">Recall<\u002Fspan><div class=\"txt\">'+card.a+'<\u002Fdiv><\u002Fdiv>';\n      count.textContent = (i+1) + \" \u002F \" + t.cards.length;\n    }\n    fc.addEventListener(\"click\", function () { fc.classList.toggle(\"flipped\"); });\n    stage.appendChild(fc);\n    body.appendChild(stage);\n\n    var foot = el(\"div\", \"fc-foot\");\n    var prev = el(\"button\", \"fc-prev\", IC.arrowL);\n    var count = el(\"span\", \"fc-count\");\n    var rate = el(\"div\", \"fc-rate\");\n    var again = el(\"button\", \"rate-btn again\", \"Again\");\n    var good = el(\"button\", \"rate-btn good\", \"Got it\");\n    rate.appendChild(again); rate.appendChild(good);\n    var next = el(\"button\", \"fc-next\", IC.arrowR);\n    function move(d) { i = (i + d + t.cards.length) % t.cards.length; state.fc[t.id]=i; save(); paint(); }\n    prev.addEventListener(\"click\", function(){ move(-1); });\n    next.addEventListener(\"click\", function(){ move(1); });\n    again.addEventListener(\"click\", function(){ move(1); });\n    good.addEventListener(\"click\", function(){ move(1); });\n    foot.appendChild(prev); foot.appendChild(count); foot.appendChild(rate); foot.appendChild(next);\n    body.appendChild(foot);\n    c.appendChild(body);\n    paint();\n    return c;\n  }\n\n  \u002F\u002F ---- settings ----\n  function syncSettingsUI() {\n    segSel(\"#segFont\", state.font);\n    segSel(\"#segDensity\", state.density);\n    document.querySelectorAll(\"#swatches .sw\").forEach(function (s) {\n      s.classList.toggle(\"sel\", s.dataset.c === state.accent);\n    });\n  }\n  function segSel(sel, v) {\n    document.querySelectorAll(sel + \" button\").forEach(function (b) { b.classList.toggle(\"sel\", b.dataset.v === v); });\n  }\n  function buildSettings() {\n    var sw = $(\"#swatches\");\n    ACCENTS.forEach(function (c) {\n      var b = el(\"button\", \"sw\"); b.dataset.c = c; b.style.background = c;\n      b.addEventListener(\"click\", function () { state.accent = c; save(); applyAppearance(); });\n      sw.appendChild(b);\n    });\n    bindSeg(\"#segFont\", \"font\");\n    bindSeg(\"#segDensity\", \"density\");\n    $(\"#setBtn\").addEventListener(\"click\", openPanel);\n    syncSettingsUI();\n    $(\"#setClose\").addEventListener(\"click\", closePanel);\n    $(\"#scrim\").addEventListener(\"click\", function(){ closePanel(); $(\"#side\").classList.remove(\"open\"); });\n    $(\"#resetBtn\").addEventListener(\"click\", function () {\n      if (confirm(\"Reset all progress, notes and flashcard positions? This cannot be undone.\")) {\n        state.done = {}; state.fc = {}; state.notes = {}; save();\n        refreshNavStates(); updateProgress();\n        var t = topicById(state.current); if (t) renderTopic(t);\n        toast(\"Progress reset\");\n      }\n    });\n  }\n  function bindSeg(sel, key) {\n    document.querySelectorAll(sel + \" button\").forEach(function (b) {\n      b.addEventListener(\"click\", function () { state[key] = b.dataset.v; save(); applyAppearance(); });\n    });\n  }\n  function openPanel() { $(\"#panel\").classList.add(\"open\"); $(\"#scrim\").classList.add(\"open\"); }\n  function closePanel() { $(\"#panel\").classList.remove(\"open\"); $(\"#scrim\").classList.remove(\"open\"); }\n\n  \u002F\u002F ---- misc ----\n  var toastTimer;\n  function toast(msg) {\n    var t = $(\"#toast\"); t.textContent = msg; t.classList.add(\"show\");\n    clearTimeout(toastTimer); toastTimer = setTimeout(function(){ t.classList.remove(\"show\"); }, 1900);\n  }\n  function esc(s) { return String(s).replace(\u002F[&<>\"]\u002Fg, function (c) { return ({\"&\":\"&amp;\",\"<\":\"&lt;\",\">\":\"&gt;\",'\"':\"&quot;\"})[c]; }); }\n\n  \u002F\u002F ---- keyboard ----\n  document.addEventListener(\"keydown\", function (e) {\n    if (e.target.matches(\"input, textarea\")) {\n      if (e.key === \"Escape\") e.target.blur();\n      return;\n    }\n    if (e.key === \"ArrowRight\") { var i=FLAT.indexOf(topicById(state.current)); if (FLAT[i+1]) go(FLAT[i+1].id); }\n    else if (e.key === \"ArrowLeft\") { var j=FLAT.indexOf(topicById(state.current)); if (FLAT[j-1]) go(FLAT[j-1].id); }\n    else if (e.key === \"t\" || e.key === \"T\") { state.theme = state.theme===\"dark\"?\"light\":\"dark\"; save(); applyAppearance(); }\n    else if (e.key === \"\u002F\") { e.preventDefault(); $(\"#search\").focus(); }\n  });\n\n  \u002F\u002F ---- init ----\n  function init() {\n    $(\"#courseTitle\").textContent = COURSE.title || \"Course\";\n    applyAppearance();\n    buildNav();\n    buildSettings();\n    refreshNavStates();\n    updateProgress();\n    $(\"#search\").addEventListener(\"input\", function (e) { runSearch(e.target.value); });\n    $(\"#themeBtn\").addEventListener(\"click\", function () { state.theme = state.theme===\"dark\"?\"light\":\"dark\"; save(); applyAppearance(); });\n    $(\"#menuBtn\").addEventListener(\"click\", function () { $(\"#side\").classList.toggle(\"open\"); $(\"#scrim\").classList.toggle(\"open\"); });\n    var start = (state.current && topicById(state.current)) ? state.current : (FLAT[0] && FLAT[0].id);\n    if (start) go(start);\n  }\n  init();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"</script>
