M4 chips). It lets Macs run and even fine-tune models efficiently using their <strong>unified memory<\u002Fstrong>.<\u002Fp>\" +\n          \"<div class='analogy'><p>Most AI tools were designed for NVIDIA GPUs — like software written for Windows. MLX is the version built natively for Mac, so it uses the hardware the way it was meant to be used.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Why it’s interesting<\u002Fh3>\" +\n          \"<ul><li><strong>Unified memory:<\u002Fstrong> on Apple chips the CPU and GPU share one big memory pool, so a Mac with 64–128GB can hold surprisingly large models — no separate VRAM ceiling.<\u002Fli>\" +\n          \"<li><strong>Native speed<\u002Fstrong> on Macs, often beating generic CPU paths.<\u002Fli>\" +\n          \"<li>Supports <strong>local fine-tuning<\u002Fstrong> (e.g. LoRA) on a laptop, not just inference.<\u002Fli><\u002Ful>\" +\n          \"<p>It’s Mac-only by design. On Apple hardware it’s a strong choice; for NVIDIA GPUs you’d use the PyTorch\u002FCUDA ecosystem instead. (For simple local chat on a Mac, Ollama also works great via Metal.)<\u002Fp>\",\n        model:\n          \"MLX is <strong>‘built for Mac’ AI<\u002Fstrong>: it taps Apple Silicon’s unified memory so laptops can run — and fine-tune — bigger models than their ‘VRAM’ would suggest.\",\n        mistakes: [\n          { t: \"Trying to use it off Apple Silicon\", d: \"MLX is designed for M-series chips; it’s not a cross-platform CUDA replacement.\" },\n          { t: \"Assuming Macs can’t fine-tune\", d: \"With unified memory + MLX, local LoRA fine-tuning on a Mac is realistic.\" },\n          { t: \"Expecting CUDA-library parity\", d: \"The NVIDIA ecosystem is larger; some tools\u002Fmodels land there first.\" }\n        ],\n        terms: [\n          { t: \"MLX\", d: \"Apple’s ML framework optimised for Apple Silicon.\" },\n          { t: \"Unified memory\", d: \"Shared CPU\u002FGPU memory pool on Apple chips — no separate VRAM cap.\" },\n          { t: \"Apple Silicon\", d: \"Apple’s M-series chips (M1–M4).\" }\n        ],\n        quiz: [\n          { q: \"MLX is built for…\", options: [\"Android phones\", \"Apple Silicon Macs\", \"Web browsers\", \"NVIDIA data centers\"], answer: 1, explain: \"It’s Apple’s framework for M-series chips.\" },\n          { q: \"Why can Macs run large models with MLX?\", options: [\"They use the cloud\", \"They have no memory limit\", \"Unified memory lets CPU\u002FGPU share one big pool\", \"Magic\"], answer: 2, explain: \"Shared memory removes the separate small-VRAM ceiling.\" }\n        ],\n        cards: [\n          { q: \"What is MLX?\", a: \"Apple’s ML framework optimised for Apple Silicon (M-series).\" },\n          { q: \"Why is unified memory a big deal?\", a: \"CPU\u002FGPU share one large pool, so Macs can hold bigger models than typical VRAM allows.\" }\n        ],\n        recap: \"MLX is Apple’s native ML framework for M-series chips. Thanks to unified memory, Macs can run and even LoRA-fine-tune surprisingly large models locally. It’s Mac-only; NVIDIA users stay in the PyTorch\u002FCUDA world.\"\n      },\n      {\n        id: \"huggingface\",\n        title: \"Hugging Face\",\n        lesson:\n          \"<p><strong>Hugging Face<\u002Fstrong> is the <strong>GitHub of AI<\u002Fstrong> — the central hub where the community shares models, datasets, and tools. If you want an open model or dataset, this is almost always where you get it.<\u002Fp>\" +\n          \"<div class='analogy'><p>An app store crossed with GitHub, for AI. Browse hundreds of thousands of models, click to download, and use shared code to load them in a few lines.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What lives there<\u002Fh3>\" +\n          \"<ul><li><strong>The Hub<\u002Fstrong> — models &amp; datasets you can download (or stream).<\u002Fli>\" +\n          \"<li><strong>transformers<\u002Fstrong> — the popular Python library to load and run models in a few lines.<\u002Fli>\" +\n          \"<li><strong>Spaces<\u002Fstrong> — hosted demos you can try in the browser.<\u002Fli>\" +\n          \"<li><strong>Tokenizers, datasets, accelerate<\u002Fstrong> — supporting libraries used everywhere.<\u002Fli><\u002Ful>\" +\n          \"<pre><code>from transformers import pipeline\\npipe = pipeline(\\\"text-generation\\\", model=\\\"some-org\u002Fsome-model\\\")\\nprint(pipe(\\\"Hello,\\\"))<\u002Fcode><\u002Fpre>\" +\n          \"<p>Practical notes: models come in <strong>safetensors<\u002Fstrong> format (the standard for the PyTorch world), many require accepting a <strong>licence<\u002Fstrong>, and the same model often has community <strong>GGUF<\u002Fstrong> versions for local use.<\u002Fp>\",\n        model:\n          \"Hugging Face is the <strong>GitHub\u002Fapp-store of AI<\u002Fstrong>: the hub for open models, datasets, and the <code>transformers<\u002Fcode> library that loads them in a few lines.\",\n        mistakes: [\n          { t: \"Ignoring model licences\", d: \"Many models gate access or restrict commercial use — read the licence before shipping.\" },\n          { t: \"Confusing the Hub with one library\", d: \"Hugging Face is a hub + several libraries (transformers, datasets, tokenizers), not a single tool.\" },\n          { t: \"Downloading the wrong variant\", d: \"safetensors for PyTorch\u002FGPU stacks; GGUF for llama.cpp\u002FOllama — grab the one your runner needs.\" }\n        ],\n        terms: [\n          { t: \"Hugging Face Hub\", d: \"The central repository for sharing models and datasets.\" },\n          { t: \"transformers\", d: \"Hugging Face’s Python library to load and run models.\" },\n          { t: \"safetensors\", d: \"A safe, standard file format for model weights in the PyTorch ecosystem.\" }\n        ],\n        quiz: [\n          { q: \"Hugging Face is best described as…\", options: [\"A GPU vendor\", \"A cloud-only API\", \"The community hub for models, datasets, and tools\", \"A single chatbot\"], answer: 2, explain: \"It’s the ‘GitHub of AI’ — a hub plus libraries.\" },\n          { q: \"Before using a downloaded model commercially, check…\", options: [\"Its colour\", \"The author’s avatar\", \"Its licence\u002Fterms\", \"The file date\"], answer: 2, explain: \"Licences vary and may restrict commercial use.\" }\n        ],\n        cards: [\n          { q: \"What is Hugging Face?\", a: \"The community hub for open models, datasets, and the transformers library.\" },\n          { q: \"safetensors vs GGUF?\", a: \"safetensors for PyTorch\u002FGPU stacks; GGUF for llama.cpp\u002FOllama local runners.\" }\n        ],\n        recap: \"Hugging Face is the GitHub\u002Fapp-store of AI — the hub for open models and datasets plus the transformers library to load them. Mind model licences and grab the right format (safetensors vs GGUF) for your runner.\"\n      },\n      {\n        id: \"unsloth\",\n        title: \"Unsloth\",\n        lesson:\n          \"<p><strong>Unsloth<\u002Fstrong> is a library that makes <strong>fine-tuning much faster and lighter<\u002Fstrong> — often roughly 2× the speed and a big memory saving — so you can train models like LoRA\u002FQLoRA on a single modest GPU (or a free cloud notebook).<\u002Fp>\" +\n          \"<div class='analogy'><p>Same destination, a faster route with better mileage. Unsloth rewrites the slow parts of training with hand-optimised code, so the same fine-tune finishes sooner and fits in less memory — without changing the result.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Why people reach for it<\u002Fh3>\" +\n          \"<ul><li><strong>Speed &amp; memory:<\u002Fstrong> optimised kernels cut training time and VRAM use.<\u002Fli>\" +\n          \"<li><strong>Beginner-friendly:<\u002Fstrong> ready-made notebooks for common models.<\u002Fli>\" +\n          \"<li><strong>Plays nicely<\u002Fstrong> with the Hugging Face ecosystem (PEFT\u002FTRL under the hood).<\u002Fli><\u002Ful>\" +\n          \"<p>It’s focused on <strong>training\u002Ffine-tuning<\u002Fstrong>, not serving. Think of it as the on-ramp that makes ‘fine-tune your own model on a laptop-class GPU’ realistic for individuals.<\u002Fp>\",\n        model:\n          \"Unsloth is a <strong>faster, leaner route to fine-tuning<\u002Fstrong>: optimised kernels cut time and VRAM so LoRA\u002FQLoRA fits on a single modest GPU — same result, less cost.\",\n        mistakes: [\n          { t: \"Expecting it to serve models\", d: \"It’s for training\u002Ffine-tuning; serving is a different tool (vLLM\u002FOllama).\" },\n          { t: \"Thinking speed changes results\", d: \"It optimises the computation; the fine-tuned quality is comparable, just cheaper to reach.\" },\n          { t: \"Skipping data quality\", d: \"Faster training doesn’t fix bad data — curation still rules the outcome.\" }\n        ],\n        terms: [\n          { t: \"Unsloth\", d: \"A library that speeds up and slims down LLM fine-tuning.\" },\n          { t: \"Optimised kernels\", d: \"Hand-tuned low-level code that runs key steps faster.\" },\n          { t: \"Free-tier training\", d: \"Fine-tuning on free\u002Fcheap cloud notebooks, made feasible by lower memory use.\" }\n        ],\n        quiz: [\n          { q: \"What is Unsloth for?\", options: [\"Drawing charts\", \"Faster, lower-memory fine-tuning\", \"Serving at scale\", \"Vector search\"], answer: 1, explain: \"It accelerates and slims fine-tuning like LoRA\u002FQLoRA.\" },\n          { q: \"Does Unsloth’s speedup hurt quality?\", options: [\"No — it optimises computation, results are comparable\", \"It needs no data\", \"It deletes data\", \"Yes, a lot\"], answer: 0, explain: \"It’s an efficiency tool; quality is comparable, cost is lower.\" }\n        ],\n        cards: [\n          { q: \"What is Unsloth?\", a: \"A library that makes LoRA\u002FQLoRA fine-tuning faster and lighter on memory.\" },\n          { q: \"Training or serving?\", a: \"Training\u002Ffine-tuning — not model serving.\" }\n        ],\n        recap: \"Unsloth speeds up and slims down fine-tuning with optimised kernels, making LoRA\u002FQLoRA feasible on a single modest GPU or free notebook. It’s a training tool — quality stays comparable, cost drops; serving is elsewhere.\"\n      },\n      {\n        id: \"axolotl\",\n        title: \"Axolotl\",\n        lesson:\n          \"<p><strong>Axolotl<\u002Fstrong> is a fine-tuning tool that lets you train models by <strong>editing a config file<\u002Fstrong> instead of writing training code. You describe <em>what<\u002Fem> you want — model, dataset, method — and it handles the <em>how<\u002Fem>.<\u002Fp>\" +\n          \"<pre><code># a slice of an Axolotl YAML config\\nbase_model: meta-llama\u002FLlama-3-8B\\nload_in_4bit: true\\nadapter: qlora\\ndatasets:\\n  - path: .\u002Fmy_data.jsonl\\n    type: alpaca<\u002Fcode><\u002Fpre>\" +\n          \"<div class='analogy'><p>Like ordering from a detailed menu instead of cooking from scratch. You tick the options (which model, LoRA or QLoRA, which dataset format) and the kitchen runs the recipe.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Where it fits<\u002Fh3>\" +\n          \"<ul><li>Great for <strong>reproducible, configurable<\u002Fstrong> fine-tunes — the config <em>is<\u002Fem> the recipe you can share and version.<\u002Fli>\" +\n          \"<li>Supports many <strong>models, dataset formats, and methods<\u002Fstrong> (full, LoRA, QLoRA, DPO).<\u002Fli>\" +\n          \"<li>More flexible than a one-click notebook, simpler than hand-writing training loops.<\u002Fli><\u002Ful>\",\n        model:\n          \"Axolotl is <strong>fine-tuning from a menu (YAML)<\u002Fstrong>: declare the model, data, and method in a config and it runs the training — reproducible and shareable, no training loop to write.\",\n        mistakes: [\n          { t: \"Mismatched dataset ‘type’\", d: \"The config’s dataset format must match your file’s actual shape, or training misreads it.\" },\n          { t: \"Treating it as a serving tool\", d: \"Axolotl trains; you serve the result elsewhere (vLLM\u002FOllama).\" },\n          { t: \"Copy-pasting configs blindly\", d: \"Settings like batch size and rank must suit your GPU and data — read what each does.\" }\n        ],\n        terms: [\n          { t: \"Axolotl\", d: \"A config-driven (YAML) fine-tuning framework.\" },\n          { t: \"YAML config\", d: \"A human-readable settings file describing the whole training run.\" },\n          { t: \"Dataset type\", d: \"The expected format\u002Ftemplate of your training data (e.g. alpaca, sharegpt).\" }\n        ],\n        quiz: [\n          { q: \"How do you mainly drive Axolotl?\", options: [\"By calling a cloud API\", \"By drawing diagrams\", \"By writing a training loop\", \"By editing a YAML config file\"], answer: 3, explain: \"You declare the run in config; it executes it.\" },\n          { q: \"A common Axolotl pitfall is…\", options: [\"Too few colours\", \"Saving checkpoints\", \"A dataset ‘type’ that doesn’t match your file’s format\", \"Using a GPU\"], answer: 2, explain: \"Mismatched dataset format makes training misread the data.\" }\n        ],\n        cards: [\n          { q: \"What is Axolotl?\", a: \"A config-driven (YAML) fine-tuning framework — declare model\u002Fdata\u002Fmethod, it trains.\" },\n          { q: \"Axolotl vs Unsloth?\", a: \"Both fine-tune; Axolotl is config-driven and broad, Unsloth focuses on speed\u002Fmemory.\" }\n        ],\n        recap: \"Axolotl lets you fine-tune by editing a YAML config instead of writing training code — reproducible, shareable, and supporting many models, formats, and methods. Match the dataset ‘type’ to your file; serve the result elsewhere.\"\n      },\n      {\n        id: \"peft\",\n        title: \"PEFT\",\n        lesson:\n          \"<p><strong>PEFT<\u002Fstrong> stands for <strong>Parameter-Efficient Fine-Tuning<\u002Fstrong> — the family of methods (and Hugging Face’s library by the same name) for fine-tuning by training only a <strong>tiny fraction<\u002Fstrong> of a model’s parameters.<\u002Fp>\" +\n          \"<div class='analogy'><p>Renovating one room instead of rebuilding the whole house. You get the change you need while leaving 99% of the structure untouched — far cheaper and faster.<\u002Fp><\u002Fdiv>\" +\n          \"<p>You’ve already met the star member: <strong>LoRA<\u002Fstrong> (and QLoRA). PEFT is the umbrella term that covers LoRA and its cousins, and the library makes them easy to apply:<\u002Fp>\" +\n          \"<pre><code>from peft import LoraConfig, get_peft_model\\nmodel = get_peft_model(base_model, LoraConfig(r=16, ...))\\n# now only the small adapter trains<\u002Fcode><\u002Fpre>\" +\n          \"<h3>Why it’s everywhere<\u002Fh3>\" +\n          \"<ul><li><strong>Cheap:<\u002Fstrong> train ~1% of params, not 100%.<\u002Fli>\" +\n          \"<li><strong>Small outputs:<\u002Fstrong> adapters are MBs and swappable.<\u002Fli>\" +\n          \"<li><strong>Standard:<\u002Fstrong> tools like Axolotl, TRL, and Unsloth use PEFT under the hood.<\u002Fli><\u002Ful>\",\n        model:\n          \"PEFT is the <strong>‘renovate one room’ umbrella<\u002Fstrong> for fine-tuning — train a tiny slice of parameters (LoRA &amp; friends) instead of the whole model. Cheap, small, and the industry default.\",\n        mistakes: [\n          { t: \"Thinking PEFT = LoRA only\", d: \"LoRA is the most popular member, but PEFT covers a whole family of efficient methods.\" },\n          { t: \"Expecting full-model power for huge domain shifts\", d: \"For deep changes you may still need fuller training; PEFT excels at targeted adaptation.\" },\n          { t: \"Losing the base model\", d: \"PEFT adapters need their matching base to run — keep both or merge them.\" }\n        ],\n        terms: [\n          { t: \"PEFT\", d: \"Parameter-Efficient Fine-Tuning — train a small fraction of parameters.\" },\n          { t: \"PEFT (library)\", d: \"Hugging Face’s library implementing LoRA and related methods.\" },\n          { t: \"Targeted adaptation\", d: \"Changing behaviour with minimal parameter updates.\" }\n        ],\n        quiz: [\n          { q: \"What does PEFT mean?\", options: [\"A GPU type\", \"A serving engine\", \"A dataset format\", \"Parameter-Efficient Fine-Tuning\"], answer: 3, explain: \"It’s the family of methods training only a few parameters.\" },\n          { q: \"LoRA is…\", options: [\"A serving tool\", \"The most popular member of the PEFT family\", \"Unrelated to PEFT\", \"A tokenizer\"], answer: 1, explain: \"LoRA\u002FQLoRA are flagship PEFT methods.\" }\n        ],\n        cards: [\n          { q: \"What is PEFT?\", a: \"Parameter-Efficient Fine-Tuning — train a tiny fraction of params (e.g. LoRA).\" },\n          { q: \"Is PEFT just LoRA?\", a: \"No — LoRA is the star, but PEFT is the whole efficient-tuning family.\" }\n        ],\n        recap: \"PEFT — Parameter-Efficient Fine-Tuning — trains a tiny slice of a model’s parameters (LoRA and cousins) instead of all of them. It’s cheap, produces small swappable adapters, and underpins tools like Axolotl, TRL, and Unsloth.\"\n      },\n      {\n        id: \"trl\",\n        title: \"TRL library\",\n        lesson:\n          \"<p><strong>TRL<\u002Fstrong> (Transformer Reinforcement Learning) is Hugging Face’s library for the <strong>training methods that shape behaviour<\u002Fstrong> — especially <strong>SFT, DPO, and RLHF<\u002Fstrong>. If PEFT is <em>how<\u002Fem> you train efficiently, TRL provides <em>which<\u002Fem> training recipe you run.<\u002Fp>\" +\n          \"<div class='analogy'><p>A set of standard recipe cards for teaching a model manners. Want supervised examples? Use the SFT card. Want preference tuning? The DPO card. TRL gives you the proven recipe so you don’t reinvent it.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What’s in the box<\u002Fh3>\" +\n          \"<ul><li><strong>SFTTrainer<\u002Fstrong> — supervised fine-tuning on example pairs.<\u002Fli>\" +\n          \"<li><strong>DPOTrainer<\u002Fstrong> — preference tuning from chosen\u002Frejected pairs.<\u002Fli>\" +\n          \"<li><strong>PPO\u002FRLHF<\u002Fstrong> tooling — the reward-based reinforcement loop.<\u002Fli><\u002Ful>\" +\n          \"<p>It works hand-in-hand with <strong>PEFT<\u002Fstrong> (so you can do, say, DPO with LoRA cheaply) and the rest of Hugging Face. Tools like Axolotl and Unsloth often call TRL trainers under the hood.<\u002Fp>\",\n        model:\n          \"TRL is the <strong>recipe-card box for behaviour training<\u002Fstrong>: ready-made SFT, DPO, and RLHF trainers you pair with PEFT — pick the recipe, plug in your data, train.\",\n        mistakes: [\n          { t: \"Picking the wrong trainer\", d: \"Match the method to your data: pairs → SFT, preferences → DPO, reward loop → PPO\u002FRLHF.\" },\n          { t: \"Running DPO\u002FRLHF without SFT first\", d: \"Preference methods usually refine an already instruction-tuned model.\" },\n          { t: \"Ignoring PEFT integration\", d: \"Combine TRL with LoRA\u002FQLoRA to keep these trainings cheap.\" }\n        ],\n        terms: [\n          { t: \"TRL\", d: \"Hugging Face’s library for SFT, DPO, and RLHF training.\" },\n          { t: \"SFTTrainer \u002F DPOTrainer\", d: \"Ready-made trainers for supervised and preference fine-tuning.\" },\n          { t: \"PPO\", d: \"A reinforcement-learning algorithm used in the RLHF loop.\" }\n        ],\n        quiz: [\n          { q: \"TRL mainly provides…\", options: [\"Trainers for SFT, DPO, and RLHF\", \"GPUs\", \"Vector databases\", \"Serving engines\"], answer: 0, explain: \"It implements the behaviour-shaping training recipes.\" },\n          { q: \"TRL is commonly paired with…\", options: [\"PEFT (e.g. LoRA) to keep training cheap\", \"A spreadsheet\", \"A web browser\", \"A tokenizer only\"], answer: 0, explain: \"TRL + PEFT lets you run DPO\u002FSFT efficiently.\" }\n        ],\n        cards: [\n          { q: \"What is TRL?\", a: \"Hugging Face’s library of SFT, DPO, and RLHF trainers.\" },\n          { q: \"TRL vs PEFT?\", a: \"TRL = which training recipe (SFT\u002FDPO\u002FRLHF); PEFT = how to train it efficiently (LoRA).\" }\n        ],\n        recap: \"TRL provides ready-made trainers for the behaviour-shaping methods — SFT, DPO, and RLHF. Pair it with PEFT (LoRA\u002FQLoRA) for cheap runs. Match the trainer to your data, and run SFT before preference methods.\"\n      }\n    ]\n  },\n  {\n    id: \"rag-memory\",\n    title: \"RAG & Memory\",\n    topics: [\n      {\n        id: \"rag\",\n        title: \"RAG\",\n        lesson:\n          \"<p><strong>RAG<\u002Fstrong> = <strong>Retrieval-Augmented Generation<\u002Fstrong>. Instead of relying only on what a model memorised in training, you <strong>look up relevant information first<\u002Fstrong> and paste it into the prompt, so the model answers from real, current sources.<\u002Fp>\" +\n          \"<div class='analogy'><p>Closed-book vs open-book exam. A plain LLM answers from memory (and may misremember). RAG hands it the open textbook — it reads the relevant page, then answers. Same student, far fewer made-up facts.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>The basic flow<\u002Fh3>\" +\n          \"<ul><li><strong>1. Retrieve<\u002Fstrong> — find the chunks of your documents most relevant to the question.<\u002Fli>\" +\n          \"<li><strong>2. Augment<\u002Fstrong> — stuff those chunks into the prompt as context.<\u002Fli>\" +\n          \"<li><strong>3. Generate<\u002Fstrong> — the model answers using that supplied context.<\u002Fli><\u002Ful>\" +\n          \"<p>Why it’s everywhere: it adds <strong>fresh, private, or niche knowledge<\u002Fstrong> without retraining, makes answers <strong>citable<\u002Fstrong>, and sharply <strong>cuts hallucinations<\u002Fstrong> — usually cheaper and faster than fine-tuning facts into the weights.<\u002Fp>\",\n        model:\n          \"RAG turns a <strong>closed-book exam into an open-book one<\u002Fstrong>: fetch the right pages first, then let the model answer from them — fresh facts, citations, fewer hallucinations, no retraining.\",\n        mistakes: [\n          { t: \"Retrieving the wrong chunks\", d: \"If retrieval surfaces irrelevant text, the answer is wrong no matter how good the model is — retrieval quality is everything.\" },\n          { t: \"Stuffing in too much\", d: \"Dumping 50 chunks bloats the prompt, costs more, and buries the useful bit (‘lost in the middle’).\" },\n          { t: \"Using RAG for behaviour\", d: \"RAG supplies knowledge; to change tone\u002Fformat you still fine-tune or prompt.\" }\n        ],\n        terms: [\n          { t: \"RAG\", d: \"Retrieval-Augmented Generation — fetch relevant text, then generate from it.\" },\n          { t: \"Retrieve \u002F augment \u002F generate\", d: \"The three RAG steps: find, insert into prompt, answer.\" },\n          { t: \"Grounding\", d: \"Tying answers to supplied sources so they’re accurate and citable.\" }\n        ],\n        quiz: [\n          { q: \"What does RAG add to a plain LLM?\", options: [\"A new tokenizer\", \"More parameters\", \"Relevant retrieved info inserted into the prompt\", \"A bigger GPU\"], answer: 2, explain: \"It fetches relevant context so the model answers from real sources.\" },\n          { q: \"RAG is the better choice than fine-tuning when you need…\", options: [\"A smaller model\", \"Fresh, private, or frequently-changing facts\", \"A new writing tone\", \"Lower VRAM\"], answer: 1, explain: \"RAG supplies changing knowledge without retraining.\" }\n        ],\n        cards: [\n          { q: \"What does RAG stand for?\", a: \"Retrieval-Augmented Generation — fetch relevant text, then generate from it.\" },\n          { q: \"RAG vs fine-tuning for facts?\", a: \"RAG adds fresh\u002Fprivate facts without retraining and makes answers citable.\" }\n        ],\n        recap: \"RAG makes the model take an open-book exam: retrieve relevant chunks, add them to the prompt, then generate. It injects fresh\u002Fprivate knowledge without retraining, enables citations, and cuts hallucinations. Retrieval quality is everything.\"\n      },\n      {\n        id: \"vector-databases\",\n        title: \"Vector databases\",\n        lesson:\n          \"<p>A <strong>vector database<\u002Fstrong> stores text (and other data) as <strong>embeddings<\u002Fstrong> — those meaning-coordinates from the Foundations module — and is built to answer one question blazingly fast: <em>“which stored items are closest in meaning to this query?”<\u002Fem><\u002Fp>\" +\n          \"<div class='analogy'><p>An ordinary database finds rows by exact match (‘WHERE name = Bob’). A vector database finds by <em>similarity<\u002Fem> (‘things that mean roughly this’). It’s less ‘filing cabinet,’ more ‘nearest-neighbour map.’<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What it does for RAG<\u002Fh3>\" +\n          \"<ul><li>You <strong>embed<\u002Fstrong> each document chunk and store the vectors.<\u002Fli>\" +\n          \"<li>At query time you embed the question and ask for the <strong>nearest vectors<\u002Fstrong>.<\u002Fli>\" +\n          \"<li>It returns the most relevant chunks in milliseconds — even across millions of items — using clever <strong>approximate<\u002Fstrong> search (ANN).<\u002Fli><\u002Ful>\" +\n          \"<p>Common options: <strong>FAISS<\u002Fstrong> (a local library), and services like <strong>Chroma, Qdrant, Weaviate, Pinecone, pgvector<\u002Fstrong>. Most also support <strong>metadata filters<\u002Fstrong> (e.g. only this user’s docs) alongside similarity.<\u002Fp>\",\n        model:\n          \"A vector database is a <strong>nearest-neighbour map<\u002Fstrong>: store meaning-coordinates, then instantly fetch the items closest to a query — similarity search, not exact match.\",\n        mistakes: [\n          { t: \"Mixing embedding models\", d: \"Vectors from different models live in different coordinate systems; never compare across them.\" },\n          { t: \"Skipping metadata filters\", d: \"Pure similarity can return another tenant’s or an outdated doc — filter by source\u002Fuser\u002Fdate too.\" },\n          { t: \"Expecting exact-keyword precision\", d: \"Similarity may miss exact IDs\u002Fcodes; combine with keyword search (hybrid) when needed.\" }\n        ],\n        terms: [\n          { t: \"Vector database\", d: \"A store optimised for similarity search over embeddings.\" },\n          { t: \"ANN\", d: \"Approximate Nearest Neighbour — fast ‘close enough’ similarity search at scale.\" },\n          { t: \"Metadata filter\", d: \"Restricting results by attributes (user, date, source) alongside similarity.\" }\n        ],\n        quiz: [\n          { q: \"What does a vector database search by?\", options: [\"Alphabetical order\", \"File size\", \"Exact text match\", \"Similarity of meaning (nearest vectors)\"], answer: 3, explain: \"It finds items closest in embedding space.\" },\n          { q: \"Why add metadata filters?\", options: [\"To restrict results to the right user\u002Fsource\u002Fdate, not just similar text\", \"They’re decorative\", \"For colour\", \"To slow search\"], answer: 0, explain: \"Filters prevent returning the wrong or stale documents.\" }\n        ],\n        cards: [\n          { q: \"What is a vector database?\", a: \"A store built for fast similarity search over embeddings.\" },\n          { q: \"What is ANN?\", a: \"Approximate Nearest Neighbour — fast ‘close enough’ similarity search at scale.\" }\n        ],\n        recap: \"A vector database stores embeddings and finds the items closest in meaning to a query, fast, using approximate nearest-neighbour search. It’s the retrieval engine behind RAG — use metadata filters and keep one embedding model.\"\n      },\n      {\n        id: \"chunking\",\n        title: \"Chunking\",\n        lesson:\n          \"<p><strong>Chunking<\u002Fstrong> is splitting your documents into <strong>smaller pieces<\u002Fstrong> before embedding them. You retrieve and feed the model <em>chunks<\u002Fem>, not whole books — so how you cut them hugely affects answer quality.<\u002Fp>\" +\n          \"<div class='analogy'><p>Cutting a pizza. Slices too big and you grab toppings you didn’t want (irrelevant text); too small and a single bite misses the cheese-and-sauce combo (split context). You want slices that each hold a complete, coherent bite.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Getting it right<\u002Fh3>\" +\n          \"<ul><li><strong>Size:<\u002Fstrong> a few hundred tokens is a common sweet spot — big enough to be meaningful, small enough to be precise.<\u002Fli>\" +\n          \"<li><strong>Overlap:<\u002Fstrong> repeat a little text between chunks so ideas split across a boundary aren’t lost.<\u002Fli>\" +\n          \"<li><strong>Respect structure:<\u002Fstrong> split on paragraphs\u002Fheadings, not mid-sentence, so each chunk stands alone.<\u002Fli><\u002Ful>\" +\n          \"<p>Bad chunking is one of the most common reasons RAG ‘doesn’t work’: the right answer was in the docs, but it got sliced apart or buried with junk. Fix retrieval at the chunk level first.<\u002Fp>\",\n        model:\n          \"Chunking is <strong>slicing the pizza right<\u002Fstrong>: each piece should be one coherent, self-contained idea — not so big it drags in junk, not so small it splits the point.\",\n        mistakes: [\n          { t: \"Chunks too large\", d: \"They pull in irrelevant text, dilute relevance, and waste prompt space.\" },\n          { t: \"Chunks too small\", d: \"A single idea gets split across pieces, so no chunk holds the full answer.\" },\n          { t: \"No overlap or structure\", d: \"Cutting mid-sentence with zero overlap loses context straddling the boundary.\" }\n        ],\n        terms: [\n          { t: \"Chunk\", d: \"A small piece of a document that gets embedded and retrieved.\" },\n          { t: \"Overlap\", d: \"Repeated text between adjacent chunks to preserve cross-boundary context.\" },\n          { t: \"Semantic chunking\", d: \"Splitting along meaning\u002Fstructure (paragraphs, headings) rather than fixed length.\" }\n        ],\n        quiz: [\n          { q: \"Why does chunk size matter?\", options: [\"Too big pulls in junk; too small splits ideas apart\", \"It sets the GPU speed\", \"It picks the model\", \"It changes the font\"], answer: 0, explain: \"Chunk size directly affects retrieval relevance and completeness.\" },\n          { q: \"What does chunk overlap help with?\", options: [\"Smaller files\", \"Preserving context that straddles a chunk boundary\", \"Faster GPUs\", \"Better fonts\"], answer: 1, explain: \"A little repeated text keeps split ideas intact.\" }\n        ],\n        cards: [\n          { q: \"What is chunking?\", a: \"Splitting documents into smaller pieces to embed and retrieve.\" },\n          { q: \"Why add overlap between chunks?\", a: \"So ideas split across a boundary aren’t lost.\" }\n        ],\n        recap: \"Chunking slices documents into coherent pieces for retrieval. Aim for a few hundred tokens, add some overlap, and split on structure — bad chunking is a top reason RAG fails even when the answer is in the docs.\"\n      },\n      {\n        id: \"retrieval-pipelines\",\n        title: \"Retrieval pipelines\",\n        lesson:\n          \"<p>A <strong>retrieval pipeline<\u002Fstrong> is the full set of steps that turn a user’s question into the <em>best<\u002Fem> context for the model. Real systems rarely stop at one similarity search — they add stages to boost relevance.<\u002Fp>\" +\n          \"<div class='analogy'><p>Like a hiring process: a wide screen pulls many résumés, then interviews and reference checks narrow to the best few. Retrieval does the same — cast a wide net, then re-rank down to the true top results.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Common stages<\u002Fh3>\" +\n          \"<ul><li><strong>Query rewriting<\u002Fstrong> — clean up or expand the question before searching.<\u002Fli>\" +\n          \"<li><strong>Hybrid search<\u002Fstrong> — combine semantic (vector) + keyword search for the best of both.<\u002Fli>\" +\n          \"<li><strong>Re-ranking<\u002Fstrong> — a smarter model re-scores the top candidates for precision.<\u002Fli>\" +\n          \"<li><strong>Assembly<\u002Fstrong> — pick the final chunks, de-duplicate, and fit them in the context budget.<\u002Fli><\u002Ful>\" +\n          \"<p>The guiding idea: <strong>retrieve broadly, then filter sharply.<\u002Fstrong> A great generator can’t fix bad retrieval, so most RAG quality work happens right here in the pipeline.<\u002Fp>\",\n        model:\n          \"A retrieval pipeline is a <strong>hiring funnel for context<\u002Fstrong>: cast a wide net (hybrid search), then interview and re-rank down to the few best chunks before the model answers.\",\n        mistakes: [\n          { t: \"Relying on one search pass\", d: \"A single vector query misses keyword hits; hybrid + re-ranking lifts quality a lot.\" },\n          { t: \"Never re-ranking\", d: \"Top-vector ≠ most relevant; a re-ranker fixes obvious mis-orderings.\" },\n          { t: \"Overflowing the context\", d: \"Even good chunks must fit the token budget — assemble and trim deliberately.\" }\n        ],\n        terms: [\n          { t: \"Retrieval pipeline\", d: \"The multi-stage process of fetching and refining context for RAG.\" },\n          { t: \"Hybrid search\", d: \"Combining semantic (vector) and keyword search.\" },\n          { t: \"Re-ranking\", d: \"Re-scoring top candidates with a more precise model.\" }\n        ],\n        quiz: [\n          { q: \"What does re-ranking do in a pipeline?\", options: [\"Trains the model\", \"Cleans datasets\", \"Re-scores top candidates for better precision\", \"Shrinks the GPU\"], answer: 2, explain: \"It reorders the shortlist by true relevance.\" },\n          { q: \"Why use hybrid search?\", options: [\"It’s prettier\", \"It avoids embeddings\", \"It needs no database\", \"Combines semantic + keyword to catch what either alone misses\"], answer: 3, explain: \"Vector search and keyword search cover different gaps.\" }\n        ],\n        cards: [\n          { q: \"What is a retrieval pipeline?\", a: \"The multi-stage process (rewrite, hybrid search, re-rank, assemble) that builds context for RAG.\" },\n          { q: \"Pipeline guiding principle?\", a: \"Retrieve broadly, then filter sharply — a good generator can’t fix bad retrieval.\" }\n        ],\n        recap: \"A retrieval pipeline refines a question into the best context through stages — query rewriting, hybrid search, re-ranking, and assembly. Retrieve broadly then filter sharply; most RAG quality work lives here, not in the generator.\"\n      },\n      {\n        id: \"memory-systems\",\n        title: \"AI memory systems\",\n        lesson:\n          \"<p>By default an LLM <strong>forgets everything<\u002Fstrong> once the context window scrolls past. A <strong>memory system<\u002Fstrong> gives an app the ability to <em>remember<\u002Fem> across turns and sessions by <strong>storing information outside the model<\u002Fstrong> and feeding it back when relevant.<\u002Fp>\" +\n          \"<div class='analogy'><p>The model is a colleague with no long-term memory — brilliant in the meeting, blank the next day. A memory system is the <em>notebook<\u002Fem> they keep: jot down what matters, flip back to it next time.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Common kinds of memory<\u002Fh3>\" +\n          \"<table class='compare'><tr><th>Type<\u002Fth><th>Holds<\u002Fth><\u002Ftr><tr><td>Short-term<\u002Ftd><td>The current conversation (the context window)<\u002Ftd><\u002Ftr><tr><td>Long-term<\u002Ftd><td>Facts\u002Fpreferences saved across sessions (often in a vector DB)<\u002Ftd><\u002Ftr><tr><td>Summary<\u002Ftd><td>A compressed recap of old turns to save tokens<\u002Ftd><\u002Ftr><\u002Ftable>\" +\n          \"<p>Mechanically it’s often <strong>RAG pointed at the conversation<\u002Fstrong>: store past messages\u002Ffacts as embeddings, retrieve the relevant ones, and inject them. Key challenges: deciding <em>what<\u002Fem> is worth remembering, and keeping memories <strong>fresh and non-contradictory<\u002Fstrong>.<\u002Fp>\",\n        model:\n          \"A memory system is the <strong>notebook<\u002Fstrong> for a forgetful colleague: store what matters outside the model and hand the right notes back when they’re needed — usually RAG over the conversation.\",\n        mistakes: [\n          { t: \"Remembering everything\", d: \"Storing every message is noisy and costly; decide what’s actually worth keeping.\" },\n          { t: \"Stale or conflicting memories\", d: \"Old facts (‘lives in Paris’) can contradict new ones — update and resolve, don’t just append.\" },\n          { t: \"Confusing context with memory\", d: \"The context window is temporary; durable memory must live in external storage.\" }\n        ],\n        terms: [\n          { t: \"Memory system\", d: \"External storage that lets an app remember across turns\u002Fsessions.\" },\n          { t: \"Short vs long-term memory\", d: \"Current context vs persisted facts recalled later.\" },\n          { t: \"Summarisation memory\", d: \"Compressing old turns into a short recap to save tokens.\" }\n        ],\n        quiz: [\n          { q: \"Why is a memory system needed at all?\", options: [\"Models never forget\", \"Tokens are free\", \"GPUs are slow\", \"LLMs forget once text leaves the context window\"], answer: 3, explain: \"Durable memory must live outside the model’s temporary context.\" },\n          { q: \"Long-term memory is often implemented with…\", options: [\"A faster tokenizer\", \"More parameters\", \"A bigger font\", \"RAG over stored embeddings of past info\"], answer: 3, explain: \"Store facts as vectors and retrieve the relevant ones.\" }\n        ],\n        cards: [\n          { q: \"What is an AI memory system?\", a: \"External storage that lets an app remember across turns\u002Fsessions, fed back via retrieval.\" },\n          { q: \"Context window vs memory?\", a: \"Context is temporary; durable memory lives in external storage.\" }\n        ],\n        recap: \"Memory systems give forgetful models a notebook: store facts outside the model and retrieve the relevant ones when needed — usually RAG over the conversation. Decide what’s worth keeping and keep memories fresh and consistent.\"\n      },\n      {\n        id: \"semantic-search\",\n        title: \"Semantic search\",\n        lesson:\n          \"<p><strong>Semantic search<\u002Fstrong> finds results by <strong>meaning<\u002Fstrong>, not just matching keywords. Search for <em>“ways to lower my electricity bill”<\u002Fem> and it can surface a doc titled <em>“reducing home energy costs”<\u002Fem> — no shared words, same intent.<\u002Fp>\" +\n          \"<div class='analogy'><p>Old keyword search is a literal librarian who only finds books with your exact words on the spine. Semantic search is a knowledgeable one who understands what you <em>mean<\u002Fem> and points you to the right shelf regardless of wording.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>How it works (you’ve seen the parts)<\u002Fh3>\" +\n          \"<ul><li><strong>Embed<\u002Fstrong> every document into a meaning-vector.<\u002Fli>\" +\n          \"<li><strong>Embed<\u002Fstrong> the query the same way.<\u002Fli>\" +\n          \"<li>Return the documents whose vectors are <strong>nearest<\u002Fstrong> — i.e. closest in meaning.<\u002Fli><\u002Ful>\" +\n          \"<p>It’s the retrieval engine under RAG and recommendations. Its weakness is the flip side of its strength: because it matches meaning, it can <strong>miss exact strings<\u002Fstrong> (product codes, names, error IDs). The fix is <strong>hybrid search<\u002Fstrong> — semantic + keyword together.<\u002Fp>\",\n        model:\n          \"Semantic search is the <strong>librarian who understands intent<\u002Fstrong>, not just spelling: match by meaning via embeddings. Pair it with keyword search when exact strings matter.\",\n        mistakes: [\n          { t: \"Expecting exact-match precision\", d: \"Meaning-matching can miss precise IDs\u002Fcodes — add keyword\u002Fhybrid search for those.\" },\n          { t: \"Reusing mismatched embeddings\", d: \"Query and documents must be embedded by the same model to compare fairly.\" },\n          { t: \"Confusing it with the LLM\", d: \"Semantic search retrieves; the LLM then reasons over what it returns.\" }\n        ],\n        terms: [\n          { t: \"Semantic search\", d: \"Finding results by meaning via embedding similarity.\" },\n          { t: \"Keyword search\", d: \"Classic exact\u002Fpartial word matching (e.g. BM25).\" },\n          { t: \"Hybrid search\", d: \"Combining semantic and keyword search for the strengths of both.\" }\n        ],\n        quiz: [\n          { q: \"Semantic search matches by…\", options: [\"Meaning, via embedding similarity\", \"Exact keywords only\", \"File size\", \"Date\"], answer: 0, explain: \"It finds intent-similar results even without shared words.\" },\n          { q: \"Its main weakness is…\", options: [\"It’s too literal\", \"It can miss exact strings like codes or IDs\", \"It can’t scale\", \"It needs no data\"], answer: 1, explain: \"Meaning-matching may overlook precise tokens; use hybrid search.\" }\n        ],\n        cards: [\n          { q: \"What is semantic search?\", a: \"Finding results by meaning (embedding similarity), not just keywords.\" },\n          { q: \"Fix for missing exact codes\u002FIDs?\", a: \"Hybrid search — combine semantic with keyword search.\" }\n        ],\n        recap: \"Semantic search retrieves by meaning using embedding similarity — a librarian who understands intent, not just spelling. It powers RAG and recommendations, but can miss exact strings, so combine it with keyword (hybrid) search.\"\n      }\n    ]\n  },\n  {\n    id: \"agents\",\n    title: \"Agents & Workflows\",\n    topics: [\n      {\n        id: \"prompt-engineering\",\n        title: \"Prompt engineering\",\n        lesson:\n          \"<p><strong>Prompt engineering<\u002Fstrong> is the craft of <strong>writing inputs that get good outputs<\u002Fstrong>. Since the model only responds to what you give it, the prompt is your main steering wheel — often more powerful (and always cheaper) than fine-tuning.<\u002Fp>\" +\n          \"<div class='analogy'><p>It’s like briefing a talented freelancer. Say <em>“make it nice”<\u002Fem> and you get a coin-flip. Say <em>“write a 3-bullet summary for busy execs, plain English, no jargon”<\u002Fem> and you get exactly what you need. The clearer the brief, the better the work.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>High-leverage techniques<\u002Fh3>\" +\n          \"<ul><li><strong>Be specific<\u002Fstrong> about role, format, length, and audience.<\u002Fli>\" +\n          \"<li><strong>Show examples<\u002Fstrong> (few-shot) — demonstrate the output you want.<\u002Fli>\" +\n          \"<li><strong>Ask for steps<\u002Fstrong> (‘think step by step’) on reasoning tasks.<\u002Fli>\" +\n          \"<li><strong>Give an out<\u002Fstrong> — allow ‘say I don’t know’ to curb hallucinations.<\u002Fli><\u002Ful>\" +\n          \"<p>Prompting is empirical: small wording changes can swing results, so <strong>iterate and test<\u002Fstrong> rather than expecting the first try to be perfect.<\u002Fp>\",\n        model:\n          \"A prompt is a <strong>brief to a freelancer<\u002Fstrong>: the clearer the role, format, and examples you give, the better the work. Iterate — it’s the cheapest, fastest steering wheel you have.\",\n        mistakes: [\n          { t: \"Being vague\", d: \"‘Make it good’ leaves everything to chance; specify format, length, audience, tone.\" },\n          { t: \"No examples\", d: \"One or two demonstrations (few-shot) often beat paragraphs of instructions.\" },\n          { t: \"One-and-done\", d: \"Prompting is empirical — test variations; tiny wording shifts move results.\" }\n        ],\n        terms: [\n          { t: \"Prompt engineering\", d: \"Crafting inputs to reliably get the outputs you want.\" },\n          { t: \"Few-shot\", d: \"Including example input\u002Foutput pairs in the prompt to guide the model.\" },\n          { t: \"Zero-shot\", d: \"Asking with instructions only, no examples.\" }\n        ],\n        quiz: [\n          { q: \"Why is prompt engineering high-leverage?\", options: [\"It changes the weights\", \"It buys GPUs\", \"It retrains the model\", \"The prompt is the main, cheapest way to steer outputs\"], answer: 3, explain: \"Output depends on input; good prompts beat the default for free.\" },\n          { q: \"‘Few-shot’ prompting means…\", options: [\"Using a small model\", \"Few GPUs\", \"Short answers\", \"Including example input\u002Foutput pairs\"], answer: 3, explain: \"You demonstrate the desired behaviour with examples.\" }\n        ],\n        cards: [\n          { q: \"What is prompt engineering?\", a: \"Crafting inputs that reliably produce the outputs you want.\" },\n          { q: \"Zero-shot vs few-shot?\", a: \"Zero-shot = instructions only; few-shot = include example pairs.\" }\n        ],\n        recap: \"Prompt engineering is briefing the model well — specify role, format, length, and audience, show examples, and allow ‘I don’t know.’ It’s the cheapest, most powerful steering wheel, and it rewards iteration and testing.\"\n      },\n      {\n        id: \"system-prompts\",\n        title: \"System prompts\",\n        lesson:\n          \"<p>A <strong>system prompt<\u002Fstrong> is a special instruction set <strong>at the very top<\u002Fstrong> of a conversation that defines the assistant’s <strong>role, rules, and personality<\u002Fstrong> — before the user says anything. It’s the standing brief the model follows throughout.<\u002Fp>\" +\n          \"<div class='analogy'><p>It’s the <em>job description and employee handbook<\u002Fem> you hand a new hire on day one. The user messages are the day-to-day requests; the system prompt is the constant ‘this is who you are and how we do things here.’<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What goes in one<\u002Fh3>\" +\n          \"<ul><li><strong>Role:<\u002Fstrong> ‘You are a careful financial support agent.’<\u002Fli>\" +\n          \"<li><strong>Rules:<\u002Fstrong> ‘Never give legal advice. Always cite the policy.’<\u002Fli>\" +\n          \"<li><strong>Format\u002Ftone:<\u002Fstrong> ‘Reply in short, friendly bullet points.’<\u002Fli>\" +\n          \"<li><strong>Boundaries:<\u002Fstrong> what to refuse or escalate.<\u002Fli><\u002Ful>\" +\n          \"<p>The system prompt carries <strong>more weight<\u002Fstrong> than ordinary messages, but it isn’t bulletproof — clever user inputs can sometimes override it (<em>prompt injection<\u002Fem>). Keep it clear, and don’t put true secrets in it.<\u002Fp>\",\n        model:\n          \"The system prompt is the <strong>job description + handbook<\u002Fstrong> given before any user request: it sets role, rules, tone, and boundaries that persist across the whole chat.\",\n        mistakes: [\n          { t: \"Putting secrets in it\", d: \"Users or injections can sometimes extract it — never store API keys or passwords there.\" },\n          { t: \"Overstuffing it\", d: \"A giant, contradictory system prompt confuses the model; keep it focused and prioritised.\" },\n          { t: \"Assuming it can’t be overridden\", d: \"Prompt injection can bypass it; validate inputs and don’t rely on it alone for safety.\" }\n        ],\n        terms: [\n          { t: \"System prompt\", d: \"Top-level instructions setting the assistant’s role, rules, and tone.\" },\n          { t: \"Prompt injection\", d: \"User\u002Fcontent input that tries to override the system instructions.\" },\n          { t: \"Persona\", d: \"The consistent character\u002Fvoice a system prompt establishes.\" }\n        ],\n        quiz: [\n          { q: \"What is a system prompt’s job?\", options: [\"To set the assistant’s role, rules, and tone up front\", \"To speed the GPU\", \"To tokenize text\", \"To store data\"], answer: 0, explain: \"It’s the standing brief defining behaviour before user input.\" },\n          { q: \"What should you NOT put in a system prompt?\", options: [\"A role\", \"Formatting rules\", \"Real secrets like API keys\", \"A persona\"], answer: 2, explain: \"It can be extracted; keep secrets out of it.\" }\n        ],\n        cards: [\n          { q: \"What is a system prompt?\", a: \"Top-of-conversation instructions setting role, rules, tone, and boundaries.\" },\n          { q: \"What is prompt injection?\", a: \"Input that tries to override the system prompt’s instructions.\" }\n        ],\n        recap: \"A system prompt is the job description and handbook set before any user message — defining role, rules, tone, and boundaries that persist. It carries weight but isn’t bulletproof to injection; keep it focused and secret-free.\"\n      },\n      {\n        id: \"tool-calling\",\n        title: \"Tool calling\",\n        lesson:\n          \"<p><strong>Tool calling<\u002Fstrong> lets a model <strong>do things, not just talk<\u002Fstrong> — search the web, query a database, send an email, run code — by asking your software to perform an action and return the result.<\u002Fp>\" +\n          \"<div class='analogy'><p>The model is a smart manager who can’t physically do tasks but can <em>delegate<\u002Fem>: ‘look up this order,’ ‘calculate this total.’ Tools are the staff who actually do the work and report back.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>The loop<\u002Fh3>\" +\n          \"<ul><li>You tell the model which <strong>tools exist<\u002Fstrong> and what each needs.<\u002Fli>\" +\n          \"<li>When useful, the model <strong>requests a tool<\u002Fstrong> with specific arguments.<\u002Fli>\" +\n          \"<li>Your code <strong>runs it<\u002Fstrong> and feeds the result back.<\u002Fli>\" +\n          \"<li>The model <strong>continues<\u002Fstrong> using that real data.<\u002Fli><\u002Ful>\" +\n          \"<p>This is what turns a chatbot into something that can act in the real world — check live inventory, book a slot, fetch fresh facts. It’s the backbone of <strong>agents<\u002Fstrong> (a couple of topics ahead).<\u002Fp>\",\n        model:\n          \"Tool calling makes the model a <strong>manager who delegates<\u002Fstrong>: it can’t act directly, so it asks your code to run a tool and uses the result — talk becomes action.\",\n        mistakes: [\n          { t: \"Trusting tool requests blindly\", d: \"The model can ask to call the wrong tool or pass bad arguments — validate before executing, especially for risky actions.\" },\n          { t: \"Vague tool descriptions\", d: \"If the model doesn’t understand what a tool does or needs, it calls it wrongly; describe clearly.\" },\n          { t: \"No error handling\", d: \"Tools fail (timeouts, bad input); return errors the model can recover from, not crashes.\" }\n        ],\n        terms: [\n          { t: \"Tool calling\", d: \"A model requesting your software to perform an action and return results.\" },\n          { t: \"Tool \u002F action\", d: \"A capability the model can invoke (search, DB query, send email).\" },\n          { t: \"Tool result\", d: \"The data your code returns for the model to continue with.\" }\n        ],\n        quiz: [\n          { q: \"What does tool calling let a model do?\", options: [\"Request real actions (search, DB, code) via your software\", \"Compress weights\", \"Add parameters\", \"Train itself\"], answer: 0, explain: \"It delegates actions and uses the returned results.\" },\n          { q: \"A key safety practice with tools is…\", options: [\"Hide the results\", \"Validate the model’s tool requests before executing risky ones\", \"Never describe tools\", \"Run every request instantly\"], answer: 1, explain: \"Models can request wrong\u002Funsafe calls; validate first.\" }\n        ],\n        cards: [\n          { q: \"What is tool calling?\", a: \"Letting a model request real actions from your software and use the results.\" },\n          { q: \"Why validate tool requests?\", a: \"The model can call the wrong tool or pass bad args — check before executing.\" }\n        ],\n        recap: \"Tool calling lets a model delegate real actions — search, query, send, run — through your code, turning talk into action. It’s the backbone of agents. Describe tools clearly, validate requests, and handle errors gracefully.\"\n      },\n      {\n        id: \"function-calling\",\n        title: \"Function calling\",\n        lesson:\n          \"<p><strong>Function calling<\u002Fstrong> is the <strong>structured, technical form of tool calling<\u002Fstrong>: the model outputs a <strong>precise, machine-readable request<\u002Fstrong> (usually JSON) naming a function and its arguments, so your code can run it without guesswork.<\u002Fp>\" +\n          \"<pre><code>\u002F\u002F the model emits something like:\\n{ \\\"name\\\": \\\"get_weather\\\",\\n  \\\"arguments\\\": { \\\"city\\\": \\\"Paris\\\", \\\"unit\\\": \\\"celsius\\\" } }<\u002Fcode><\u002Fpre>\" +\n          \"<div class='analogy'><p>If tool calling is ‘the model asks for help,’ function calling is filling in a <em>precise order form<\u002Fem> — exact field names, exact values — instead of a vague verbal request. The structure is what makes it reliable for software.<\u002Fp><\u002Fdiv>\" +\n          \"<p>You define each function with a <strong>schema<\u002Fstrong> (name, description, parameters and their types). The model fills it in; your code validates and executes. The terms ‘tool calling’ and ‘function calling’ are often used interchangeably — function calling emphasises the <strong>structured JSON output<\u002Fstrong> that makes the action programmatic and dependable.<\u002Fp>\" +\n          \"<p>Because the output is structured, function calling is also handy just to get <strong>reliable JSON<\u002Fstrong> out of a model, even when no real ‘action’ runs.<\u002Fp>\",\n        model:\n          \"Function calling is a <strong>precise order form<\u002Fstrong>: the model emits structured JSON (function name + typed arguments) so your code runs it reliably — the dependable, machine-readable side of tool calling.\",\n        mistakes: [\n          { t: \"Skipping schema validation\", d: \"Models can produce slightly-off JSON or invalid values; validate against the schema before running.\" },\n          { t: \"Fuzzy parameter descriptions\", d: \"Unclear types\u002Fdescriptions lead to wrong arguments — define each field precisely.\" },\n          { t: \"Assuming the function actually ran\", d: \"The model only requests it; your code must execute and return the result.\" }\n        ],\n        terms: [\n          { t: \"Function calling\", d: \"A model emitting structured JSON specifying a function and arguments.\" },\n          { t: \"Schema\", d: \"The definition of a function’s name, parameters, and types the model fills in.\" },\n          { t: \"Structured output\", d: \"Machine-readable JSON the model produces on demand.\" }\n        ],\n        quiz: [\n          { q: \"Function calling differs from plain tool calling by emphasising…\", options: [\"Longer answers\", \"Structured, machine-readable JSON output\", \"More GPUs\", \"Bigger models\"], answer: 1, explain: \"It’s the precise JSON form that makes actions programmatic.\" },\n          { q: \"Function calling is also useful just to…\", options: [\"Speed the tokenizer\", \"Get reliable structured JSON from a model\", \"Quantize weights\", \"Train models\"], answer: 1, explain: \"Structured output is valuable even without running an action.\" }\n        ],\n        cards: [\n          { q: \"What is function calling?\", a: \"A model emitting structured JSON (function + typed arguments) for your code to run.\" },\n          { q: \"Tool vs function calling?\", a: \"Often interchangeable; function calling stresses the structured JSON form.\" }\n        ],\n        recap: \"Function calling is the structured form of tool calling: the model outputs precise JSON (function name + typed arguments) defined by a schema, which your code validates and runs. It’s also a reliable way to get structured JSON out of a model.\"\n      },\n      {\n        id: \"ai-agents\",\n        title: \"AI agents\",\n        lesson:\n          \"<p>An <strong>AI agent<\u002Fstrong> is a model that can <strong>pursue a goal over multiple steps<\u002Fstrong> — deciding what to do, using tools, observing results, and adjusting — rather than answering in a single shot.<\u002Fp>\" +\n          \"<div class='analogy'><p>A chatbot is a vending machine: one request, one response. An agent is an <em>intern<\u002Fem>: give it a goal (‘book me a meeting room for Friday’) and it figures out the steps, checks the calendar, handles snags, and reports back.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>The core loop (‘think–act–observe’)<\u002Fh3>\" +\n          \"<ul><li><strong>Think:<\u002Fstrong> decide the next step toward the goal.<\u002Fli>\" +\n          \"<li><strong>Act:<\u002Fstrong> call a tool (search, API, code).<\u002Fli>\" +\n          \"<li><strong>Observe:<\u002Fstrong> read the result.<\u002Fli>\" +\n          \"<li><strong>Repeat<\u002Fstrong> until the goal is met (or it gives up).<\u002Fli><\u002Ful>\" +\n          \"<p>Agents = an LLM + tools + memory + a loop. They’re powerful but <strong>less predictable<\u002Fstrong>: more autonomy means more ways to go wrong, loop forever, or take costly actions. Good agents have <strong>guardrails<\u002Fstrong> — step limits, approvals for risky actions, and clear stopping conditions.<\u002Fp>\",\n        model:\n          \"An agent is an <strong>intern with a goal<\u002Fstrong>: it loops think → act → observe with tools and memory until done — far more capable than a chatbot, and far more in need of guardrails.\",\n        mistakes: [\n          { t: \"No stopping conditions\", d: \"Without step\u002Fcost limits, agents can loop forever or rack up huge bills.\" },\n          { t: \"Too much autonomy too soon\", d: \"Let it take risky actions (payments, deletes) only behind human approval.\" },\n          { t: \"Using an agent when a single call would do\", d: \"Agents add cost and unpredictability; reach for them only when multi-step autonomy is truly needed.\" }\n        ],\n        terms: [\n          { t: \"AI agent\", d: \"An LLM that pursues a goal over multiple tool-using steps.\" },\n          { t: \"Think–act–observe\", d: \"The agent loop: decide, use a tool, read the result, repeat.\" },\n          { t: \"Guardrails\", d: \"Limits and approvals that keep an agent safe and bounded.\" }\n        ],\n        quiz: [\n          { q: \"How does an agent differ from a chatbot?\", options: [\"It can’t use tools\", \"It’s smaller\", \"It never stops\", \"It pursues a goal over multiple tool-using steps\"], answer: 3, explain: \"Agents loop through steps toward a goal, not one-shot replies.\" },\n          { q: \"A must-have for safe agents is…\", options: [\"More emoji\", \"Guardrails: step\u002Fcost limits and approvals for risky actions\", \"Bigger fonts\", \"No tools\"], answer: 1, explain: \"Autonomy needs bounds to avoid loops and costly mistakes.\" }\n        ],\n        cards: [\n          { q: \"What is an AI agent?\", a: \"An LLM that loops think–act–observe with tools\u002Fmemory to pursue a goal.\" },\n          { q: \"Why do agents need guardrails?\", a: \"Autonomy can loop forever or take costly\u002Frisky actions — bound it.\" }\n        ],\n        recap: \"An AI agent is an LLM plus tools, memory, and a think–act–observe loop that pursues a goal over many steps — an intern, not a vending machine. It’s powerful but unpredictable, so use stopping conditions and approvals for risky actions.\"\n      },\n      {\n        id: \"agentic-workflows\",\n        title: \"Agentic workflows\",\n        lesson:\n          \"<p>An <strong>agentic workflow<\u002Fstrong> is a <strong>designed sequence of AI steps<\u002Fstrong> to accomplish a task — somewhere between a rigid script and a fully free agent. You lay out the stages; the model fills in the smart parts.<\u002Fp>\" +\n          \"<div class='analogy'><p>A recipe with judgement. The steps are fixed (chop → sauté → simmer), but a skilled cook adapts seasoning along the way. You provide the structure; the model provides the flexibility within each step.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Common patterns<\u002Fh3>\" +\n          \"<ul><li><strong>Chaining:<\u002Fstrong> output of one step feeds the next (draft → critique → revise).<\u002Fli>\" +\n          \"<li><strong>Routing:<\u002Fstrong> classify the request, then send it down the right branch.<\u002Fli>\" +\n          \"<li><strong>Parallel + combine:<\u002Fstrong> do several sub-tasks at once, then merge.<\u002Fli>\" +\n          \"<li><strong>Reflection:<\u002Fstrong> the model checks and improves its own output.<\u002Fli><\u002Ful>\" +\n          \"<p>Key insight: <strong>structure beats raw autonomy<\u002Fstrong> for most real tasks. A well-designed workflow is more reliable, debuggable, and cheaper than a free-roaming agent — reach for full agents only when the path genuinely can’t be predefined.<\u002Fp>\",\n        model:\n          \"An agentic workflow is a <strong>recipe with judgement<\u002Fstrong>: you fix the steps (chain, route, reflect), the model adds smarts within them — more reliable and debuggable than a free agent.\",\n        mistakes: [\n          { t: \"Defaulting to a free agent\", d: \"Most tasks have a predictable shape; a structured workflow is more reliable and cheaper.\" },\n          { t: \"No checks between steps\", d: \"Errors compound down a chain; validate or add reflection between stages.\" },\n          { t: \"Over-engineering simple tasks\", d: \"If one prompt does the job, don’t build a five-step pipeline.\" }\n        ],\n        terms: [\n          { t: \"Agentic workflow\", d: \"A designed multi-step AI process with structure plus model flexibility.\" },\n          { t: \"Chaining\", d: \"Feeding one step’s output into the next.\" },\n          { t: \"Reflection\", d: \"Having the model critique and improve its own output.\" }\n        ],\n        quiz: [\n          { q: \"An agentic workflow sits between…\", options: [\"Two datasets\", \"Two tokenizers\", \"Two GPUs\", \"A rigid script and a fully free agent\"], answer: 3, explain: \"You design the steps; the model adds flexibility within them.\" },\n          { q: \"Why often prefer a workflow over a free agent?\", options: [\"It needs no model\", \"More reliable, debuggable, and cheaper for predictable tasks\", \"It looks nicer\", \"It’s always smarter\"], answer: 1, explain: \"Structure beats raw autonomy for most real tasks.\" }\n        ],\n        cards: [\n          { q: \"What is an agentic workflow?\", a: \"A designed multi-step AI process (chain\u002Froute\u002Freflect) with structure plus model flexibility.\" },\n          { q: \"Workflow vs free agent?\", a: \"Workflows are more reliable\u002Fdebuggable; use free agents only when the path can’t be predefined.\" }\n        ],\n        recap: \"An agentic workflow is a recipe with judgement — you design the steps (chaining, routing, reflection) and the model fills in the smarts. For most predictable tasks it beats a free-roaming agent on reliability, debuggability, and cost.\"\n      },\n      {\n        id: \"multi-agent\",\n        title: \"Multi-agent systems\",\n        lesson:\n          \"<p>A <strong>multi-agent system<\u002Fstrong> uses <strong>several specialised agents working together<\u002Fstrong>, each with a focused role, often coordinated by a ‘manager’ agent — instead of one agent trying to do everything.<\u002Fp>\" +\n          \"<div class='analogy'><p>A company instead of a solo freelancer. A manager delegates to a researcher, a writer, and an editor; each is good at one thing, and the manager combines their work. Specialisation can beat a single generalist juggling it all.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Common shapes<\u002Fh3>\" +\n          \"<ul><li><strong>Manager + workers:<\u002Fstrong> one agent plans and delegates to specialists.<\u002Fli>\" +\n          \"<li><strong>Pipeline:<\u002Fstrong> agents hand off in sequence (research → draft → review).<\u002Fli>\" +\n          \"<li><strong>Debate\u002Fcritique:<\u002Fstrong> agents challenge each other to improve quality.<\u002Fli><\u002Ful>\" +\n          \"<p>The promise is better quality on complex tasks through specialisation and division of labour. The cost is real: <strong>more complexity, more tokens (money), more latency, and more failure modes<\u002Fstrong>. Use multi-agent only when one agent or a workflow genuinely can’t cope — and watch for agents confusing each other.<\u002Fp>\",\n        model:\n          \"A multi-agent system is a <strong>company, not a freelancer<\u002Fstrong>: a manager delegates to specialists who collaborate. Powerful for complex tasks, but it multiplies cost, latency, and ways to fail.\",\n        mistakes: [\n          { t: \"Using many agents when one would do\", d: \"Each agent adds tokens, latency, and failure modes; justify the extra complexity.\" },\n          { t: \"Vague roles\", d: \"Overlapping or unclear responsibilities make agents duplicate work or conflict.\" },\n          { t: \"No coordination limits\", d: \"Agents can loop, argue, or amplify each other’s mistakes — bound the interaction.\" }\n        ],\n        terms: [\n          { t: \"Multi-agent system\", d: \"Several specialised agents collaborating on a task.\" },\n          { t: \"Orchestrator \u002F manager\", d: \"An agent that plans and delegates to worker agents.\" },\n          { t: \"Hand-off\", d: \"Passing work and context from one agent to the next.\" }\n        ],\n        quiz: [\n          { q: \"A multi-agent system uses…\", options: [\"One do-everything agent\", \"Only tools\", \"Several specialised agents collaborating\", \"No models\"], answer: 2, explain: \"Specialised roles divide the labour, often via a manager.\" },\n          { q: \"A real cost of multi-agent systems is…\", options: [\"Smaller models\", \"More complexity, tokens, latency, and failure modes\", \"Nothing\", \"Less data\"], answer: 1, explain: \"Coordination multiplies cost and ways to go wrong.\" }\n        ],\n        cards: [\n          { q: \"What is a multi-agent system?\", a: \"Several specialised agents collaborating, often via a manager\u002Forchestrator.\" },\n          { q: \"Main trade-off of multi-agent?\", a: \"Better specialisation but more complexity, cost, latency, and failure modes.\" }\n        ],\n        recap: \"Multi-agent systems split work across specialised agents — a company, not a freelancer — coordinated as manager\u002Fworkers, pipelines, or debates. They can lift quality on complex tasks but multiply cost, latency, and failure modes; use sparingly.\"\n      },\n      {\n        id: \"browser-agents\",\n        title: \"Browser agents\",\n        lesson:\n          \"<p>A <strong>browser agent<\u002Fstrong> is an AI agent that can <strong>operate a web browser<\u002Fstrong> — read pages, click buttons, fill forms, and navigate — to complete tasks on real websites, even ones without an API.<\u002Fp>\" +\n          \"<div class='analogy'><p>A virtual assistant sitting at a computer, using the same screen and mouse you would. If a site has no ‘official’ programmatic access, the agent just uses it like a person: look, click, type.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>How it sees and acts<\u002Fh3>\" +\n          \"<ul><li><strong>Perceive:<\u002Fstrong> read the page (its text\u002FHTML, or a screenshot for vision models).<\u002Fli>\" +\n          \"<li><strong>Decide:<\u002Fstrong> choose the next action toward the goal.<\u002Fli>\" +\n          \"<li><strong>Act:<\u002Fstrong> click, type, scroll, or navigate — then re-read and repeat.<\u002Fli><\u002Ful>\" +\n          \"<p>This unlocks tasks like ‘compare prices across three shops’ or ‘fill this application,’ but it’s the <strong>frontier and the riskiest<\u002Fstrong> kind of agent: pages change, actions can be irreversible (purchases, submissions), and malicious page content can attempt <strong>prompt injection<\u002Fstrong>. Strong guardrails and human approval for consequential steps are essential.<\u002Fp>\",\n        model:\n          \"A browser agent is an <strong>assistant at a keyboard<\u002Fstrong>: it looks at the page, clicks and types like a person, and loops toward the goal — powerful for API-less sites, and the riskiest agent to let loose.\",\n        mistakes: [\n          { t: \"Letting it take irreversible actions unattended\", d: \"Purchases, submissions, and deletes need human approval — they can’t be undone.\" },\n          { t: \"Ignoring prompt injection from pages\", d: \"Malicious page text can try to hijack the agent; isolate and distrust page content.\" },\n          { t: \"Assuming reliability on changing sites\", d: \"Layouts shift and break flows; build in retries, checks, and graceful failure.\" }\n        ],\n        terms: [\n          { t: \"Browser agent\", d: \"An agent that perceives and operates web pages to complete tasks.\" },\n          { t: \"Perceive–decide–act\", d: \"The browser-agent loop over a live page.\" },\n          { t: \"Prompt injection (web)\", d: \"Hostile page content trying to override the agent’s instructions.\" }\n        ],\n        quiz: [\n          { q: \"What makes browser agents special?\", options: [\"They operate real web pages like a human (click, type, navigate)\", \"They only use APIs\", \"They never fail\", \"They’re tiny models\"], answer: 0, explain: \"They can use sites that have no programmatic API.\" },\n          { q: \"A key risk of browser agents is…\", options: [\"Too few tokens\", \"Irreversible actions and prompt injection from pages\", \"Nothing\", \"Small fonts\"], answer: 1, explain: \"Consequential actions and hostile page content demand guardrails.\" }\n        ],\n        cards: [\n          { q: \"What is a browser agent?\", a: \"An agent that reads and operates web pages (click\u002Ftype\u002Fnavigate) to do tasks.\" },\n          { q: \"Top browser-agent risks?\", a: \"Irreversible actions and prompt injection from page content — gate risky steps.\" }\n        ],\n        recap: \"Browser agents drive a real browser — perceiving pages and clicking\u002Ftyping like a person — to handle tasks on API-less sites. They’re the frontier and the riskiest agent: guard against irreversible actions and page-borne prompt injection.\"\n      }\n    ]\n  },\n  {\n    id: \"model-types\",\n    title: \"Model Types\",\n    topics: [\n      {\n        id: \"vlms\",\n        title: \"VLMs (vision-language)\",\n        lesson:\n          \"<p>A <strong>VLM<\u002Fstrong> (Vision-Language Model) can <strong>see and read at the same time<\u002Fstrong> — you give it an image (or several) plus text, and it reasons about both together. ‘What’s wrong in this diagram?’ or ‘read the total off this receipt.’<\u002Fp>\" +\n          \"<div class='analogy'><p>A regular LLM is a brilliant person who can only read text slipped under the door. A VLM is the same person with their <em>eyes open<\u002Fem> — they can look at the picture you hold up and talk about it.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>How it works (at a glance)<\u002Fh3>\" +\n          \"<p>An image gets turned into <strong>tokens too<\u002Fstrong> (via a vision encoder), then fed alongside text tokens into the same model. So the picture and the words share one stream of attention.<\u002Fp>\" +\n          \"<h3>What they’re used for<\u002Fh3>\" +\n          \"<ul><li>Describing images, reading charts\u002Fscreenshots, extracting data from documents.<\u002Fli>\" +\n          \"<li>Powering <strong>browser\u002Fcomputer-use agents<\u002Fstrong> that ‘see’ the screen.<\u002Fli>\" +\n          \"<li>Visual Q&amp;A and accessibility.<\u002Fli><\u002Ful>\" +\n          \"<p>Watch-outs: images eat <strong>lots of tokens<\u002Fstrong> (cost), and VLMs can still <strong>hallucinate<\u002Fstrong> details that aren’t in the picture — verify for high-stakes reading.<\u002Fp>\",\n        model:\n          \"A VLM is an <strong>LLM with its eyes open<\u002Fstrong>: images become tokens fed alongside text, so it can look and read in one stream. Great for screens and documents — but pixels cost tokens, and it can still misread.\",\n        mistakes: [\n          { t: \"Trusting every detail it ‘reads’\", d: \"VLMs can hallucinate text\u002Fobjects not in the image — verify critical extractions.\" },\n          { t: \"Forgetting images are expensive\", d: \"A single high-res image can cost as much as a long paragraph in tokens.\" },\n          { t: \"Feeding tiny\u002Fblurry images\", d: \"Low-resolution inputs hurt accuracy; give it a clear, readable image.\" }\n        ],\n        terms: [\n          { t: \"VLM\", d: \"Vision-Language Model — handles images and text together.\" },\n          { t: \"Vision encoder\", d: \"The part that turns an image into tokens the model can process.\" },\n          { t: \"Multimodal\", d: \"Working across more than one input type (e.g. text + image).\" }\n        ],\n        quiz: [\n          { q: \"What can a VLM do that a text-only LLM can’t?\", options: [\"Train faster\", \"Skip tokenization\", \"Use less memory\", \"Reason about images and text together\"], answer: 3, explain: \"VLMs accept visual input alongside text.\" },\n          { q: \"A practical cost of images in VLMs is…\", options: [\"They shrink the model\", \"They consume many tokens\", \"They’re free\", \"They speed inference\"], answer: 1, explain: \"Images turn into many tokens, raising cost.\" }\n        ],\n        cards: [\n          { q: \"What is a VLM?\", a: \"A vision-language model that reasons over images and text together.\" },\n          { q: \"Two VLM watch-outs?\", a: \"Images cost many tokens, and it can hallucinate details not in the image.\" }\n        ],\n        recap: \"VLMs are LLMs with their eyes open — images become tokens fed alongside text, enabling document reading, chart Q&A, and screen-using agents. Mind that images are token-expensive and VLMs can still misread, so verify high-stakes extractions.\"\n      },\n      {\n        id: \"slms\",\n        title: \"SLMs (small models)\",\n        lesson:\n          \"<p>An <strong>SLM<\u002Fstrong> (Small Language Model) is just that — a model with relatively <strong>few parameters<\u002Fstrong> (think ~1–8B, sometimes under 1B). They trade some raw capability for being <strong>fast, cheap, and runnable almost anywhere<\u002Fstrong> — even on a phone.<\u002Fp>\" +\n          \"<div class='analogy'><p>A scooter vs a truck. The truck (huge model) hauls anything but is expensive and slow to park. For most short trips around town, the nimble scooter gets you there faster and cheaper.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>Why small is often smart<\u002Fh3>\" +\n          \"<ul><li><strong>Cheap &amp; fast:<\u002Fstrong> lower latency, lower cost per call, runs on-device.<\u002Fli>\" +\n          \"<li><strong>Private:<\u002Fstrong> small enough to run locally, so data needn’t leave the device.<\u002Fli>\" +\n          \"<li><strong>Specialise-able:<\u002Fstrong> fine-tune a small model on one task and it can rival a giant on <em>that<\u002Fem> task.<\u002Fli><\u002Ful>\" +\n          \"<p>The catch: SLMs have <strong>less general knowledge and weaker reasoning<\u002Fstrong> on hard, open-ended problems. The modern pattern is <strong>right-sizing<\u002Fstrong> — use a small model for the many easy jobs and escalate to a big one only when needed.<\u002Fp>\",\n        model:\n          \"An SLM is a <strong>scooter, not a truck<\u002Fstrong>: fast, cheap, and runs anywhere — perfect for the many easy jobs, especially when fine-tuned, with a big model on standby for the hard ones.\",\n        mistakes: [\n          { t: \"Expecting frontier reasoning\", d: \"Small models struggle on hard open-ended tasks; match the model to the difficulty.\" },\n          { t: \"Skipping fine-tuning\", d: \"A fine-tuned SLM often beats a giant on its narrow task — don’t judge it raw.\" },\n          { t: \"Defaulting to the biggest model\", d: \"Most requests are easy; a giant model wastes cost and latency on them.\" }\n        ],\n        terms: [\n          { t: \"SLM\", d: \"Small Language Model — relatively few parameters; fast, cheap, local-friendly.\" },\n          { t: \"On-device\", d: \"Running directly on a phone\u002Flaptop without the cloud.\" },\n          { t: \"Right-sizing\", d: \"Picking the smallest model that does the job well.\" }\n        ],\n        quiz: [\n          { q: \"The main appeal of SLMs is…\", options: [\"No training needed\", \"Speed, low cost, and running on-device\", \"Best possible reasoning\", \"Largest knowledge\"], answer: 1, explain: \"They’re cheap, fast, and local-friendly.\" },\n          { q: \"When can a small model rival a giant?\", options: [\"When fine-tuned on a specific narrow task\", \"Only offline\", \"Never\", \"Only with more GPUs\"], answer: 0, explain: \"Specialisation closes the gap on that task.\" }\n        ],\n        cards: [\n          { q: \"What is an SLM?\", a: \"A small language model — few parameters; fast, cheap, runs on-device.\" },\n          { q: \"What is right-sizing?\", a: \"Using the smallest model that does the job, escalating only when needed.\" }\n        ],\n        recap: \"SLMs are small, fast, cheap models that run almost anywhere — a scooter, not a truck. They trade general reasoning for efficiency and privacy, and a fine-tuned SLM can rival a giant on its narrow task. Right-size: small by default, big when needed.\"\n      },\n      {\n        id: \"dense-models\",\n        title: \"Dense models\",\n        lesson:\n          \"<p>A <strong>dense model<\u002Fstrong> is the ‘standard’ kind: for every token, <strong>all<\u002Fstrong> of its parameters are used. If it’s a 7B dense model, all 7 billion weights fire on every single token.<\u002Fp>\" +\n          \"<div class='analogy'><p>A small company where <em>everyone<\u002Fem> attends <em>every<\u002Fem> meeting. Lots of brainpower on each decision — but you pay every salary for every meeting, whether or not each person was needed.<\u002Fp><\u002Fdiv>\" +\n          \"<h3>What that means in practice<\u002Fh3>\" +\n          \"<ul><li><strong>Predictable:<\u002Fstrong> compute and memory scale straightforwardly with size.<\u002Fli>\" +\n          \"<li><strong>Strong per-parameter:<\u002Fstrong> all capacity is always engaged.<\u002Fli>\" +\n          \"<li><strong>Costly to scale:<\u002Fstrong> doubling parameters roughly doubles the work per token.<\u002Fli><\u002Ful>\" +\n          \"<p>Dense is the default and the baseline. The main alternative — <strong>MoE<\u002Fstrong> (next topic) — was invented precisely to break the ‘use everything every time’ cost. Most models you’ve met are dense; you bring up ‘dense’ mainly to contrast with MoE.<\u002Fp>\",\n        model:\n          \"A dense model is <strong>everyone in every meeting<\u002Fstrong>: all parameters fire on every token — simple and strong, but you pay full compute for each token, every time.\",\n        mistakes: [\n          { t: \"Thinking ‘dense’ is a feature\", d: \"It’s the default design; the term mostly exists to contrast with MoE.\" },\n          { t: \"Assuming dense always beats MoE\", d: \"MoE can match quality at lower per-token compute; ‘best’ depends on the setup.\" },\n          { t: \"Ignoring the scaling cost\", d: \"Per-token cost rises with size — bigger dense models are pricier to run, not just to trai
