title: LLM Engineering
description: ''
modules:
- id: foundations
  title: Foundations
  topics:
  - id: llm-basics
    title: LLM basics
    lesson_format: html
    lesson: |-
      <p>A <strong>Large Language Model (LLM)</strong> is a computer program that has read an enormous amount of text and learned the patterns of how words follow each other. When you give it some words, its only real job is to guess the next word — then the next, then the next — until it has written a full answer.</p><div class='analogy'><p>Think of the autocomplete on your phone. You type <em>“I’m running a bit…”</em> and it suggests <em>“late.”</em> An LLM is the same idea, scaled up billions of times and trained on a huge slice of the internet, so its guesses are good enough to write essays, code, and explanations.</p></div><p>The word <strong>“large”</strong> is doing a lot of work. These models have learned from trillions of words and have billions of internal dials (called <em>parameters</em>) that store what they’ve learned. That scale is why they can hold a conversation instead of just finishing one sentence.</p><h3>What an LLM is — and is not</h3><p>It is <strong>not</strong> a database that looks up facts, and it does not “understand” the way a person does. It is a very sophisticated pattern-matcher for language. That single fact explains most of its strengths (fluent writing) and most of its weaknesses (it can sound confident while being wrong).</p>
    model: |-
      An LLM is a <strong>next-word prediction machine</strong>. Everything else — answering questions, writing code, summarising — is that one trick repeated, one word at a time.
    terms:
    - term: LLM
      def: |-
        Large Language Model — a program trained on lots of text to predict and generate language.
    - term: Parameter
      def: |-
        One of the billions of internal numbers a model adjusts during training to store what it has learned.
    - term: Generation
      def: The act of the model producing text, one token (word-piece) at a time.
    mistakes:
    - title: Thinking the model “knows” facts
      detail: |-
        It predicts likely text. Likely-sounding and true are not the same thing — always verify important facts.
    - title: Assuming bigger is always better
      detail: |-
        A smaller model that fits your task and budget often beats a giant one you can’t afford to run.
    - title: Expecting the same answer every time
      detail: |-
        Models add a bit of randomness, so the same prompt can give different wording on different runs.
    cards:
    - q: In one line, what is an LLM?
      a: A next-word prediction machine trained on huge amounts of text.
    - q: Does an LLM look facts up in a database?
      a: No — it predicts likely text, which is why it can be fluent but wrong.
    quiz:
    - q: At its core, what is an LLM actually doing when it answers you?
      correct: Predicting the next word over and over
      distractors:
      - Copying the closest webpage it has seen
      - Running a fixed script written by engineers
      - Searching a database of stored answers
      explain: It generates text token by token by predicting what is most likely to come next.
    - q: Why can the same prompt give slightly different answers?
      correct: Models include some controlled randomness when picking words
      distractors:
      - It’s a bug
      - The internet changed
      - The model retrains every time
      explain: Sampling adds variety so output isn’t robotically identical each run.
    recap: |-
      An LLM reads tons of text, learns word patterns, and answers by predicting the next word again and again. Fluent ≠ factual — treat it as a brilliant guesser, not an oracle.
  - id: how-models-work
    title: How AI models work
    lesson_format: html
    lesson: |-
      <p>Every AI model is really just a giant <strong>maths function</strong>: numbers go in, numbers come out. The magic is in <em>which</em> numbers and how they were tuned.</p><h3>The three-step loop</h3><ul><li><strong>Input → numbers.</strong> Your text is chopped into pieces and turned into lists of numbers the computer can work with.</li><li><strong>Numbers → numbers.</strong> Those numbers flow through many layers of multiplications and additions, shaped by the model’s parameters.</li><li><strong>Numbers → output.</strong> The final numbers are turned back into a word (or pixel, or sound).</li></ul><div class='analogy'><p>Picture a row of coffee filters. Raw beans (your input) pour in the top; each filter removes or emphasises something; what drips out the bottom is the finished coffee (the answer). “Training” is adjusting every filter until the coffee tastes right.</p></div><p>During <strong>training</strong>, the model makes a guess, checks how wrong it was, and nudges its parameters a tiny bit in the right direction. Do that billions of times and the function slowly becomes good at the task.</p>
    model: |-
      A model is a <strong>stack of adjustable filters</strong>. Training is the slow process of tuning every filter until the right thing comes out the bottom.
    terms:
    - term: Layer
      def: One stage of the model’s maths; outputs of one layer feed the next.
    - term: Weights
      def: Another word for parameters — the tuned numbers inside each layer.
    - term: Loss
      def: A score of how wrong the model’s guess was; training tries to make it small.
    mistakes:
    - title: Believing there’s a “little brain” inside
      detail: There’s no reasoning homunculus — it’s layers of arithmetic tuned by examples.
    - title: Confusing training with using
      detail: |-
        Training (tuning the filters) happens once and is expensive; using the trained model (inference) is comparatively cheap and fast.
    cards:
    - q: What is a model, mathematically?
      a: 'A big function: numbers in, numbers out, shaped by tuned parameters.'
    - q: What is 'loss'?
      a: A score of how wrong a guess was; training minimises it.
    quiz:
    - q: What does “training” a model mean in plain terms?
      correct: Slowly nudging its internal numbers to reduce mistakes
      distractors:
      - Writing more rules by hand
      - Restarting it until it works
      - Downloading more data into a database
      explain: Training adjusts weights to lower the loss — the measure of error.
    - q: Which step happens every time you use a trained model?
      correct: Inference
      distractors:
      - Buying more GPUs
      - Re-labelling data
      - Training
      explain: Using a finished model to get an answer is called inference.
    recap: |-
      Models are stacks of tunable maths. Training nudges the numbers to cut mistakes; using the result is inference. No magic brain — just arithmetic tuned by examples.
  - id: tokens
    title: Tokens
    lesson_format: html
    lesson: |-
      <p>Models don’t read whole words the way we do. They read <strong>tokens</strong> — small chunks of text. A token is often a word, but long or rare words get split into pieces.</p><p>For English, a rough rule of thumb is <strong>1 token ≈ ¾ of a word</strong>, or about 4 characters. So <em>“unbelievable”</em> might become <code>un</code> + <code>believ</code> + <code>able</code> (3 tokens), while <em>“cat”</em> is just one.</p><div class='analogy'><p>Think of Lego. You don’t describe a castle brick-by-brick using whole walls — you use standard bricks. Tokens are the standard language-bricks the model snaps together.</p></div><h3>Why you should care</h3><ul><li><strong>Cost.</strong> Most AI APIs charge per token, not per word.</li><li><strong>Limits.</strong> A model’s memory (context window) is measured in tokens.</li><li><strong>Speed.</strong> More tokens to read or write = slower responses.</li></ul>
    model: |-
      Tokens are <strong>language Lego bricks</strong>. The model counts bricks, not words — and you pay and wait per brick.
    terms:
    - term: Token
      def: A chunk of text (word or word-piece) that the model actually processes.
    - term: Tokens-per-word
      def: Roughly 1.3 for English; higher for code and other languages.
    mistakes:
    - title: Counting words instead of tokens
      detail: |-
        Code, emoji, and non-English text use far more tokens per word than you’d expect.
    - title: Forgetting the prompt counts too
      detail: |-
        Your instructions, examples, and the model’s reply all consume tokens from the same budget.
    cards:
    - q: What is a token?
      a: A small chunk of text — a word or word-piece — that the model processes.
    - q: Why do tokens matter practically?
      a: Cost, context limits, and speed are all measured in tokens.
    quiz:
    - q: Roughly how many tokens is one English word?
      correct: About 1.3
      distractors:
      - Exactly 1
      - It’s always 4
      - About 5
      explain: ≈1.3 tokens per English word, or ~¾ word per token.
    - q: Which uses the MOST tokens for the same visible length?
      correct: A dense block of code with symbols
      distractors:
      - Plain English prose
      - A short name
      - A single common word
      explain: Symbols and rare strings get split into many small tokens.
    recap: |-
      Models see tokens (word-pieces), not words. ~1.3 tokens per English word. Cost, memory limits, and speed are all counted in tokens — including your prompt.
  - id: tokenization
    title: Tokenization
    lesson_format: html
    lesson: |-
      <p><strong>Tokenization</strong> is the step that turns your raw text into tokens before the model sees it. A small program called a <em>tokenizer</em> does this, using a fixed vocabulary it learned ahead of time.</p><p>The most common method is <strong>subword</strong> tokenization (e.g. BPE — Byte Pair Encoding). It keeps frequent words whole and breaks rare ones into reusable pieces, so the model can still handle words it has never seen.</p><pre><code>"tokenizing"  ->  ["token", "izing"]
      "GPT-4"       ->  ["G", "PT", "-", "4"]</code></pre><div class='analogy'><p>It’s like spelling an unfamiliar name on the phone: you break it into familiar syllables the other person already knows. The tokenizer breaks unknown words into known pieces.</p></div><p>Every model ships with its <strong>own</strong> tokenizer. The same sentence can become a different number of tokens on different models — which is why token counts (and bills) vary between providers.</p>
    model: |-
      The tokenizer is a <strong>translator at the door</strong>: it converts human text into the model’s numbered vocabulary on the way in, and back again on the way out.
    terms:
    - term: Tokenizer
      def: The program that splits text into tokens and maps them to numbers.
    - term: BPE
      def: |-
        Byte Pair Encoding — a popular method that merges frequent character pairs into subword tokens.
    - term: Vocabulary
      def: The fixed list of tokens a model knows (often 30k–200k entries).
    mistakes:
    - title: Assuming one tokenizer fits all models
      detail: Each model family has its own; never reuse counts across providers.
    - title: Ignoring whitespace and capitalisation
      detail: “ Cat”, “cat”, and “Cat” can be different tokens — small changes shift counts.
    cards:
    - q: What does a tokenizer do?
      a: Splits text into tokens and maps them to numbers the model uses.
    - q: What is BPE?
      a: 'Byte Pair Encoding: merges frequent character pairs into subword tokens.'
    quiz:
    - q: Why use subword tokenization instead of whole words?
      correct: So the model can handle rare or unseen words from familiar pieces
      distractors:
      - It looks nicer
      - To make text longer
      - It removes the need for training
      explain: Subwords let unseen words be built from known pieces.
    - q: Do two different models always produce the same token count for a sentence?
      correct: No — each has its own tokenizer
      distractors:
      - Yes, always
      - Only for code
      - Only for English
      explain: Different vocabularies mean different counts.
    recap: |-
      Tokenization converts text into the model’s numbered vocabulary, usually with subwords so rare words still work. Each model has its own tokenizer, so counts differ across providers.
  - id: context-windows
    title: Context windows
    lesson_format: html
    lesson: |-
      <p>The <strong>context window</strong> is how much text a model can “hold in mind” at once, measured in tokens. It covers <em>everything</em> in the conversation: the system instructions, your messages, any documents you paste, and the model’s own replies.</p><div class='analogy'><p>Think of a desk of a fixed size. You can spread out only so many papers before older ones fall off the edge. The context window is that desk — once it’s full, the earliest text drops away.</p></div><p>Windows have grown fast — from a couple of thousand tokens to hundreds of thousands. But bigger isn’t free: more context means <strong>slower</strong> and <strong>more expensive</strong> responses, and models often pay less attention to stuff buried in the middle (the “lost in the middle” effect).</p><h3>Practical takeaways</h3><ul><li>Put the most important instructions near the start or end, not buried mid-way.</li><li>Don’t dump entire documents if you only need a paragraph — trim first.</li></ul>
    model: |-
      The context window is a <strong>desk of fixed size</strong>. Everything shares the space, and when it’s full the oldest papers slide off the edge.
    terms:
    - term: Context window
      def: Max tokens a model can consider at once, including prompt and reply.
    - term: Lost in the middle
      def: Tendency to under-use information placed in the centre of a long context.
    mistakes:
    - title: Thinking the model remembers past chats
      detail: |-
        It only ‘remembers’ what’s currently in the window. Close the chat and it’s gone unless you store it yourself.
    - title: Stuffing the window to the brim
      detail: Long context is slower, costlier, and the middle gets less attention.
    cards:
    - q: What is the context window?
      a: |-
        The max tokens a model can hold at once — prompt, history, docs, and reply combined.
    - q: What is 'lost in the middle'?
      a: Models under-use info placed in the centre of a long context.
    quiz:
    - q: What counts toward the context window?
      correct: 'Everything: instructions, history, pasted docs, and the reply'
      distractors:
      - Only your latest message
      - Only documents
      - Only the model’s reply
      explain: The whole conversation shares the token budget.
    - q: A downside of using a very long context is…
      correct: It’s slower and more expensive, and the middle may be ignored
      distractors:
      - It retrains the model
      - It’s always more accurate
      - Nothing — bigger is strictly better
      explain: Cost, latency, and the lost-in-the-middle effect all rise.
    recap: |-
      The context window is the model’s desk — a fixed token budget shared by everything in the chat. Bigger windows cost more and slow down, and mid-context info gets less attention.
  - id: embeddings
    title: Embeddings
    lesson_format: html
    lesson: |-
      <p>An <strong>embedding</strong> turns a piece of text into a list of numbers (a <em>vector</em>) that captures its <strong>meaning</strong>. Texts with similar meaning get similar number-lists, even if they share no words.</p><div class='analogy'><p>Imagine a giant map where every idea has a location. “Dog” and “puppy” sit close together; “dog” and “tax form” sit far apart. An embedding is just those map coordinates for a piece of text.</p></div><p>Because meaning becomes geometry, you can measure <strong>closeness</strong> between texts with simple maths. That’s the engine behind semantic search, recommendations, and Retrieval (RAG) — find the chunks whose vectors are nearest to the question’s vector.</p><pre><code>"How do I reset my password?"
        ~ near ~  "steps to recover a forgotten login"
        ~ far  ~  "history of the Roman Empire"</code></pre>
    model: |-
      An embedding is a <strong>GPS coordinate for meaning</strong>. Similar ideas land near each other; distance on the map = difference in meaning.
    terms:
    - term: Embedding
      def: A numeric vector representing the meaning of text.
    - term: Vector
      def: An ordered list of numbers (e.g. 768 or 1536 of them).
    - term: Cosine similarity
      def: A common way to score how close two vectors point in the same direction.
    mistakes:
    - title: Comparing embeddings from different models
      detail: |-
        Each model’s ‘map’ is its own coordinate system — vectors aren’t interchangeable.
    - title: Expecting exact-keyword behaviour
      detail: |-
        Embeddings match meaning, not spelling — great for synonyms, but can miss exact codes or IDs.
    cards:
    - q: What is an embedding?
      a: A vector of numbers that represents the meaning of text.
    - q: How do you compare two embeddings?
      a: Measure distance/closeness, often with cosine similarity.
    quiz:
    - q: Two sentences with the same meaning but no shared words will have…
      correct: Similar embeddings (close vectors)
      distractors:
      - Identical text
      - No embedding at all
      - Very different embeddings
      explain: Embeddings capture meaning, so similar meaning → nearby vectors.
    - q: Embeddings are the core of which feature?
      correct: Semantic search / retrieval
      distractors:
      - Spell-check
      - Faster GPUs
      - Bigger context windows
      explain: Nearest-vector lookup powers semantic search and RAG.
    recap: |-
      Embeddings are coordinates for meaning: similar ideas get nearby vectors. Measuring closeness powers semantic search and RAG. Don’t mix vectors from different models.
  - id: transformers
    title: Transformers
    lesson_format: html
    lesson: |-
      <p>The <strong>Transformer</strong> is the design (architecture) behind almost every modern LLM. Its breakthrough was reading all the words in a sentence <strong>at the same time</strong> rather than strictly one after another, while still tracking how each word relates to the others.</p><p>Older designs (RNNs) read left-to-right like reading with a finger, which was slow and forgetful over long passages. Transformers look at the whole passage at once, which is faster to train and far better at long-range connections.</p><div class='analogy'><p>Reading a contract: an RNN reads word by word and may forget clause 2 by the time it reaches clause 40. A Transformer spreads the whole page on the table and can glance back to any clause instantly.</p></div><p>The part that lets it do this is the <strong>attention mechanism</strong> (next topic). Stack many attention layers and you get a Transformer.</p>
    model: |-
      A Transformer reads the <strong>whole page at once</strong> and lets every word look at every other word — instead of crawling left to right.
    terms:
    - term: Transformer
      def: The neural-network architecture using attention layers, introduced in 2017.
    - term: Architecture
      def: The overall design/blueprint of a model, separate from its trained weights.
    - term: RNN
      def: An older sequential design that processed text one step at a time.
    mistakes:
    - title: Confusing the architecture with a specific model
      detail: ‘Transformer’ is the blueprint; GPT, Llama, etc. are buildings made from it.
    - title: Thinking it reads in order like we do
      detail: |-
        It processes positions in parallel; word order is added separately as ‘position’ information.
    cards:
    - q: What is a Transformer?
      a: |-
        The architecture behind modern LLMs that uses attention to read all words at once.
    - q: Transformer vs RNN — the key difference?
      a: |-
        Transformers process in parallel and handle long-range links; RNNs crawl step by step.
    quiz:
    - q: What made Transformers a leap over older RNNs?
      correct: They process the whole sequence in parallel and link distant words well
      distractors:
      - They have no parameters
      - They use less electricity
      - They don’t need training
      explain: Parallel processing + attention = faster training and better long-range links.
    - q: ‘Transformer’ refers to…
      correct: The architecture/blueprint many models are built from
      distractors:
      - A tokenizer
      - A type of GPU
      - A single specific model
      explain: It’s the design; GPT and Llama are instances of it.
    recap: |-
      The Transformer reads a whole passage at once and uses attention to relate every word to every other — faster to train and better over long text than the older sequential RNNs.
  - id: attention
    title: Attention mechanism
    lesson_format: html
    lesson: |-
      <p><strong>Attention</strong> is how a Transformer decides which other words matter when it’s processing a given word. For each word, it asks: <em>“which of the other words should I focus on to understand this one?”</em> and weighs them accordingly.</p><div class='analogy'><p>In the sentence <em>“The trophy didn’t fit in the suitcase because it was too big,”</em> what does <em>“it”</em> mean? Attention lets the model put more weight on <em>“trophy”</em> than <em>“suitcase,”</em> resolving the pronoun — exactly what you do when you re-read and glance back.</p></div><p>Mechanically, each word produces a <strong>query</strong> (what am I looking for?), and every word offers a <strong>key</strong> (what do I contain?). Matching queries to keys decides how much of each word’s <strong>value</strong> to blend in. Models run many of these in parallel — <strong>multi-head attention</strong> — so different ‘heads’ can track grammar, topic, tone, etc.</p>
    model: |-
      Attention is <strong>spotlights</strong>: for every word, the model shines brighter light on the other words that help explain it, and dimmer light on the rest.
    terms:
    - term: Attention
      def: Mechanism that weighs how much each token should consider every other token.
    - term: Query / Key / Value
      def: Three vectors per token; query·key sets the weight, value is what gets blended.
    - term: Multi-head
      def: |-
        Running several attention patterns in parallel to capture different relationships.
    mistakes:
    - title: Thinking attention = importance ranking only
      detail: |-
        It’s relational — how much word A should listen to word B — not a single global ‘top words’ list.
    - title: Ignoring its cost
      detail: |-
        Standard attention compares every word with every other, so cost grows fast with length — the reason long context is pricey.
    cards:
    - q: In one line, what is attention?
      a: A way for each word to weigh how much to focus on every other word.
    - q: What are Query, Key, Value?
      a: 'Per-token vectors: query·key sets focus weight; value is what gets mixed in.'
    quiz:
    - q: What problem does attention solve in the ‘it was too big’ example?
      correct: Deciding which earlier word a word refers to
      distractors:
      - Counting tokens
      - Choosing a font
      - Spelling
      explain: It weights related words to resolve meaning like pronouns.
    - q: Why does long context get expensive with standard attention?
      correct: Every token is compared with every other token
      distractors:
      - It retrains the model
      - More disk space
      - Bigger fonts
      explain: All-pairs comparison grows quickly as length increases.
    recap: |-
      Attention lets every word focus on the other words that explain it, using query–key–value matching across multiple heads. It’s powerful but compares all pairs — which is why long context costs more.
  - id: parameters
    title: Parameters
    lesson_format: html
    lesson: |-
      <p><strong>Parameters</strong> (also called weights) are the model’s learned numbers — the dials that training adjusts. When you hear “a 7B model,” that means <strong>7 billion</strong> parameters.</p><div class='analogy'><p>Imagine a mixing desk with billions of sliders. Training is the long process of setting every slider so the right sound comes out. The finished positions of all those sliders <em>are</em> the model.</p></div><p>More parameters generally means more capacity to learn, but also <strong>more memory and compute</strong> to run. A rough guide: at common precision, every billion parameters needs about <strong>2&nbsp;GB</strong> of memory just to load (less if you <em>quantize</em> — a later topic).</p><table class='compare'><tr><th>Size</th><th>Feel</th><th>Runs on</th></tr><tr><td>~1–3B</td><td>Snappy, basic</td><td>A laptop / phone</td></tr><tr><td>~7–13B</td><td>Solid all-rounder</td><td>One good GPU</td></tr><tr><td>70B+</td><td>Strong reasoning</td><td>Multiple GPUs / cloud</td></tr></table>
    model: |-
      Parameters are <strong>billions of tiny sliders</strong>. The trained model is just the final position of every slider — and more sliders means more memory to hold them.
    terms:
    - term: Parameter / weight
      def: A learned number inside the model; adjusted during training.
    - term: B (as in 7B)
      def: Billions of parameters.
    - term: Capacity
      def: How much a model can potentially learn; loosely tied to parameter count.
    mistakes:
    - title: Assuming more parameters always wins
      detail: |-
        A well-tuned small model can beat a poorly-used large one — and it’s cheaper to run.
    - title: Forgetting parameters ≠ knowledge you can edit
      detail: |-
        You can’t open a model and edit a fact; knowledge is smeared across all the weights.
    cards:
    - q: What are parameters?
      a: The model’s learned numbers (weights) — the dials training adjusts.
    - q: What does '7B' mean?
      a: 7 billion parameters.
    quiz:
    - q: What does ‘7B’ describe?
      correct: 7 billion parameters
      distractors:
      - 7 benchmarks passed
      - 7 GB file size always
      - 7 billion words of training
      explain: B = billions of parameters.
    - q: A practical cost of more parameters is…
      correct: More memory and compute to run
      distractors:
      - Smaller files
      - Nothing
      - No training needed
      explain: Capacity rises but so do memory and compute needs.
    recap: |-
      Parameters are the billions of learned dials that make up a model. More can mean more capability but always more memory and compute. Bigger isn’t automatically better for your task.
  - id: train-vs-infer
    title: Training vs inference
    lesson_format: html
    lesson: |-
      <p>These are the two phases of a model’s life. <strong>Training</strong> is teaching the model (setting the parameters). <strong>Inference</strong> is using the trained model to get answers.</p><div class='analogy'><p>Training is like years of medical school — slow, expensive, done once. Inference is the doctor seeing a patient — fast, repeated, cheap by comparison. You don’t re-do medical school for every appointment.</p></div><table class='compare'><tr><th></th><th>Training</th><th>Inference</th></tr><tr><th>Goal</th><td>Learn / set weights</td><td>Produce an answer</td></tr><tr><th>When</th><td>Once (or occasional updates)</td><td>Every request</td></tr><tr><th>Cost</th><td>Huge, many GPUs, days–months</td><td>Small per request</td></tr><tr><th>Changes the model?</th><td>Yes</td><td>No</td></tr></table><p>Key point: normal use (and even fine-tuning prompts) does <strong>not</strong> change the base model. Inference leaves the weights untouched.</p>
    model: |-
      Training = <strong>going to school</strong> (slow, once, changes you). Inference = <strong>doing the job</strong> (fast, repeated, no learning).
    terms:
    - term: Training
      def: The process of setting a model’s parameters from data.
    - term: Inference
      def: Running a trained model to generate output.
    - term: Fine-tuning
      def: A smaller, extra round of training on top of a base model.
    mistakes:
    - title: Thinking chatting with a model trains it
      detail: |-
        Inference doesn’t update weights; the model doesn’t ‘learn’ from your chat unless you explicitly fine-tune.
    - title: Budgeting them the same way
      detail: |-
        Training is a big one-off; inference is an ongoing per-request cost — plan each separately.
    cards:
    - q: Training vs inference?
      a: |-
        Training sets the weights (slow, once); inference uses the model (fast, repeated).
    - q: Does inference change the model?
      a: No — weights stay fixed during inference.
    quiz:
    - q: Which phase changes the model’s weights?
      correct: Training
      distractors:
      - Inference
      - Neither
      - Both equally
      explain: Only training updates the parameters.
    - q: Does normal chatting teach the model new things?
      correct: No — inference doesn’t update weights
      distractors:
      - Yes, instantly
      - Only on weekends
      - Only with images
      explain: It must be explicitly trained/fine-tuned to learn.
    recap: |-
      Training teaches the model and sets its weights — expensive and occasional. Inference is everyday use — cheap per request and leaves the model unchanged. Chatting alone never trains it.
  - id: open-vs-closed
    title: Open-source vs closed-source models
    lesson_format: html
    lesson: |-
      <p><strong>Closed</strong> models (like the ones behind many popular chat apps) live on a company’s servers. You send text, you get text back through an API — but you can’t see or download the weights.</p><p><strong>Open</strong> (open-weight) models can be downloaded and run on your own hardware. You control them fully, can fine-tune them, and run offline — but you’re responsible for the compute and setup.</p><table class='compare'><tr><th></th><th>Closed (API)</th><th>Open-weight</th></tr><tr><th>Setup</th><td>None — just call the API</td><td>You host and maintain it</td></tr><tr><th>Privacy</th><td>Data leaves your machine</td><td>Can stay fully local</td></tr><tr><th>Cost shape</th><td>Pay per token</td><td>Pay for hardware/time</td></tr><tr><th>Customise</th><td>Limited</td><td>Full — fine-tune freely</td></tr><tr><th>Top-end quality</th><td>Often the frontier</td><td>Closing the gap fast</td></tr></table><div class='analogy'><p>Closed is <em>riding in a taxi</em>: effortless, you pay per trip, you don’t touch the engine. Open is <em>owning a car</em>: more setup and upkeep, but it’s yours to drive anywhere and modify.</p></div>
    model: |-
      Closed = <strong>taxi</strong> (easy, pay per ride, can’t touch the engine). Open = <strong>owning a car</strong> (more upkeep, full control, drive it offline).
    terms:
    - term: Open-weight
      def: A model whose trained weights you can download and run yourself.
    - term: Closed / proprietary
      def: A model accessible only via the provider’s API.
    - term: API
      def: A way to use a remote model by sending requests over the internet.
    mistakes:
    - title: Choosing on hype, not fit
      detail: |-
        Pick based on privacy needs, budget shape, and customisation — not which name is trending.
    - title: Assuming open = free
      detail: The weights are free, but GPUs, electricity, and engineering time are not.
    - title: Confusing ‘open-weight’ with ‘fully open’
      detail: |-
        Many models share weights but not their training data or full licence freedoms — read the licence.
    cards:
    - q: Open vs closed in one line?
      a: Open = download & run/fine-tune yourself; closed = use via the provider’s API.
    - q: Does open-weight mean free?
      a: The weights are free, but you pay for hardware, power, and setup.
    quiz:
    - q: A key advantage of open-weight models is…
      correct: You can run them locally/offline and fine-tune freely
      distractors:
      - Zero cost
      - No hardware needed
      - They’re always smarter
      explain: Control, privacy, and customisation — though you supply the compute.
    - q: Closed models are best described as…
      correct: Accessed via an API on the provider’s servers
      distractors:
      - Downloadable files
      - Impossible to use
      - Always free
      explain: You call them remotely and can’t see the weights.
    recap: |-
      Closed models are effortless APIs you rent per token but can’t inspect. Open-weight models you download, control, fine-tune, and run offline — at the cost of hardware and upkeep. Choose by fit, not hype.
- id: datasets
  title: Datasets & Training
  topics:
  - id: sft-datasets
    title: SFT datasets
    lesson_format: html
    lesson: |-
      <p><strong>SFT</strong> stands for <strong>Supervised Fine-Tuning</strong>. An SFT dataset is simply a big pile of <strong>example pairs</strong>: an input (what the user might say) and the ideal output (what you want the model to say back).</p><div class='analogy'><p>It’s like training a new hire by showing them a binder of <em>“when a customer asks X, reply Y.”</em> Show enough good examples and they pick up the house style. SFT shows the model thousands of these worked examples.</p></div><p>Each example usually has a few parts — an optional <em>instruction/system</em> line, the <em>user</em> message, and the <em>assistant</em> answer you’re teaching:</p><pre><code>{
        "instruction": "Reply like a friendly support agent.",
        "input": "My order hasn't arrived.",
        "output": "So sorry about that! Can you share your order number so I can track it?"
      }</code></pre><p>The model learns to imitate the <strong>output</strong> given the input. That means your data quality <em>is</em> your model quality — sloppy or off-brand answers teach sloppy, off-brand behaviour.</p>
    model: |-
      An SFT dataset is a <strong>worked-example binder</strong>. The model copies the style and substance of the answers you show it — so every example is a vote for how it should behave.
    terms:
    - term: SFT
      def: Supervised Fine-Tuning — training on input→ideal-output example pairs.
    - term: Example pair
      def: One input and its target answer; the basic unit of an SFT dataset.
    - term: Supervised
      def: ‘With answers provided’ — the dataset includes the correct output to imitate.
    mistakes:
    - title: Chasing quantity over quality
      detail: A few thousand clean, on-target examples usually beat a million messy ones.
    - title: Inconsistent answer style
      detail: |-
        If examples disagree on tone or format, the model learns a muddled average of all of them.
    - title: Leaking the wrong behaviour
      detail: |-
        Examples that hedge, ramble, or refuse teach the model to hedge, ramble, and refuse.
    cards:
    - q: What does SFT stand for?
      a: Supervised Fine-Tuning — training on input→ideal-output pairs.
    - q: Quality vs quantity for SFT data?
      a: A few thousand clean, consistent examples beat a million messy ones.
    quiz:
    - q: What does an SFT dataset mainly consist of?
      correct: Input → ideal-output example pairs
      distractors:
      - Raw web pages
      - Only questions, no answers
      - Images
      explain: SFT trains on pairs of input and the desired response.
    - q: What most determines the quality of an SFT-tuned model?
      correct: The quality and consistency of the example answers
      distractors:
      - The model’s name
      - The file format
      - The number of GPUs
      explain: The model imitates your examples, so their quality is decisive.
    recap: |-
      SFT teaches a model by showing it input→ideal-answer pairs, like a binder of worked examples. The model imitates what you show, so clean, consistent, on-brand answers matter far more than sheer volume.
  - id: instruction-tuning
    title: Instruction tuning
    lesson_format: html
    lesson: |-
      <p><strong>Instruction tuning</strong> is a specific kind of SFT where the examples are written as <strong>instructions and their responses</strong>. It’s what turns a raw “predict next word” model into a helpful assistant that <em>follows directions</em>.</p><div class='analogy'><p>A fresh base model is like a brilliant person who only ever finishes your sentences. Instruction tuning teaches them: <em>“when I ask you to do something, actually do that thing”</em> — summarise, translate, list, explain — instead of just continuing the text.</p></div><p>The dataset covers a <strong>wide variety of task types</strong> so the skill of “following instructions” generalises:</p><ul><li><code>Summarise this email in one line.</code></li><li><code>Translate to French: …</code></li><li><code>List three risks of …</code></li></ul><p>After instruction tuning, the model handles tasks it never saw exactly, because it learned the general habit of obeying instructions — not just memorised answers.</p>
    model: |-
      Instruction tuning flips a model from <strong>“finish my text”</strong> to <strong>“follow my request.”</strong> Variety in the tasks is what makes the obedience generalise.
    terms:
    - term: Instruction tuning
      def: SFT using instruction→response examples to make a model follow directions.
    - term: Base model
      def: |-
        A pretrained model before instruction tuning; good at completing text, not obeying requests.
    - term: Generalisation
      def: Performing well on new tasks not seen exactly in training.
    mistakes:
    - title: Too few task types
      detail: |-
        If every example is summarisation, the model gets great at summarising and stays weak elsewhere.
    - title: Confusing it with teaching facts
      detail: Instruction tuning teaches behaviour (following directions), not new knowledge.
    - title: Vague instructions in the data
      detail: |-
        Fuzzy prompts paired with great answers teach the model to guess; keep instructions clear.
    cards:
    - q: Instruction tuning turns a base model into…?
      a: An assistant that follows directions instead of just completing text.
    - q: Why use varied task types?
      a: So the instruction-following skill generalises to unseen tasks.
    quiz:
    - q: What is the main goal of instruction tuning?
      correct: Teach the model to follow directions, not just continue text
      distractors:
      - Add new facts
      - Make the model bigger
      - Speed up inference
      explain: It converts a text-completer into an instruction-follower.
    - q: Why include many different task types in the dataset?
      correct: So the ‘follow instructions’ skill generalises to new tasks
      distractors:
      - It has no effect
      - To use more disk
      - To slow training
      explain: Variety makes the obedience skill transfer beyond seen examples.
    recap: |-
      Instruction tuning is SFT with instruction→response examples. It teaches the habit of obeying requests rather than just continuing text, and broad task variety makes that obedience generalise to new tasks.
  - id: preference-datasets
    title: Preference datasets
    lesson_format: html
    lesson: |-
      <p>SFT teaches the model <em>one</em> good answer per prompt. But often there isn’t a single right answer — there’s <strong>better</strong> and <strong>worse</strong>. A <strong>preference dataset</strong> captures that by showing the model <strong>two answers and which one humans preferred</strong>.</p><pre><code>{
        "prompt": "Explain gravity to a 5-year-old.",
        "chosen":   "It's the invisible pull that keeps your feet on the ground.",
        "rejected": "Gravity is a fundamental force described by general relativity..."
      }</code></pre><div class='analogy'><p>Instead of handing the trainee a perfect script, you show them two replies and say <em>“this one’s better — see why?”</em> Over many comparisons they internalise your taste, not just your words.</p></div><p>These <em>chosen vs rejected</em> pairs are the fuel for preference-based training methods like <strong>DPO</strong> and <strong>RLHF</strong> (later module). They’re how you tune <em>tone, helpfulness, and safety</em> — the fuzzy stuff that’s hard to write as one ideal answer.</p>
    model: |-
      A preference dataset teaches <strong>taste, not scripts</strong>: ‘this answer beats that answer.’ It shapes the qualities too subtle to pin down in a single perfect response.
    terms:
    - term: Preference data
      def: |-
        Examples of a prompt with a preferred (‘chosen’) and dispreferred (‘rejected’) answer.
    - term: Chosen / rejected
      def: The better and worse responses in a preference pair.
    - term: Reward signal
      def: The notion of ‘better’ that preference data provides to training.
    mistakes:
    - title: Pairs that aren’t comparable
      detail: |-
        Chosen and rejected should answer the same prompt; comparing apples to oranges teaches noise.
    - title: Rejected answer is obviously broken
      detail: |-
        If ‘rejected’ is gibberish, the model learns ‘avoid gibberish,’ not real preference. Make it a plausible-but-worse answer.
    - title: Inconsistent rater taste
      detail: If different labellers prefer opposite things, the signal cancels out.
    cards:
    - q: What does a preference dataset contain?
      a: A prompt plus a ‘chosen’ (better) and ‘rejected’ (worse) answer.
    - q: What are preference datasets used for?
      a: Preference training like DPO/RLHF — tuning tone, helpfulness, safety.
    quiz:
    - q: How does a preference example differ from an SFT example?
      correct: It gives two answers and says which is better
      distractors:
      - It has no prompt
      - It only has images
      - It’s always shorter
      explain: Preference data compares a chosen vs rejected answer.
    - q: What should the ‘rejected’ answer ideally be?
      correct: A plausible but clearly worse response
      distractors:
      - Random gibberish
      - Empty
      - Identical to chosen
      explain: Plausible-but-worse gives a meaningful preference signal.
    recap: |-
      Preference data shows the model two answers and which one humans liked better. It teaches taste rather than a single script and fuels methods like DPO and RLHF for tuning tone, helpfulness, and safety.
  - id: synthetic-datasets
    title: Synthetic datasets
    lesson_format: html
    lesson: |-
      <p>A <strong>synthetic dataset</strong> is training data <strong>generated by an AI model</strong> rather than collected from humans. You prompt a strong model to produce examples, then use those examples to train (often a smaller) model.</p><div class='analogy'><p>Think of a master chef writing out hundreds of practice recipes for an apprentice. The apprentice never had to invent them — they learn from the master’s generated examples. That’s a strong model teaching a smaller one.</p></div><h3>Why people use it</h3><ul><li><strong>Cheap and fast.</strong> Generating 10,000 examples costs far less than paying humans to write them.</li><li><strong>Coverage.</strong> You can target rare cases (‘give me 500 tricky refund scenarios’) on demand.</li><li><strong>Privacy.</strong> No real customer data required.</li></ul><p>The catch: synthetic data inherits the generator’s <strong>biases and mistakes</strong>, and training only on a model’s own output can cause <em>model collapse</em> — quality slowly degrading like a photocopy of a photocopy. Always spot-check and mix in real data.</p>
    model: |-
      Synthetic data is a <strong>strong model writing the textbook</strong> for a smaller one. Cheap and scalable — but a photocopy of a photocopy fades, so check it and blend in real examples.
    terms:
    - term: Synthetic data
      def: Training examples produced by an AI model rather than humans.
    - term: Distillation
      def: Training a smaller model on a larger model’s outputs.
    - term: Model collapse
      def: Quality decline when models train repeatedly on AI-generated data.
    mistakes:
    - title: Trusting it blindly
      detail: |-
        Generated examples can be confidently wrong; review a sample before training on them.
    - title: 100% synthetic loops
      detail: |-
        Training only on a model’s own output risks ‘model collapse’ — declining quality and diversity.
    - title: Ignoring licence/terms
      detail: |-
        Some providers restrict using their outputs to train competing models — check before you generate.
    cards:
    - q: What is a synthetic dataset?
      a: Training data generated by an AI model instead of collected from humans.
    - q: What is model collapse?
      a: Declining quality/diversity when models keep training on AI-generated data.
    quiz:
    - q: What is synthetic data?
      correct: Training examples generated by an AI model
      distractors:
      - Data from sensors
      - Only numbers
      - Encrypted data
      explain: It’s AI-generated training data, often from a stronger model.
    - q: A key risk of training only on synthetic data is…
      correct: Model collapse — fading quality and diversity
      distractors:
      - It’s too accurate
      - It can’t be generated quickly
      - It needs no review
      explain: Repeatedly learning from AI output degrades quality over time.
    recap: |-
      Synthetic datasets are AI-generated examples — cheap, fast, and good for rare cases. But they inherit the generator’s flaws and risk model collapse if used alone, so review them and mix in real data.
  - id: data-curation
    title: Data curation
    lesson_format: html
    lesson: |-
      <p><strong>Data curation</strong> is the deliberate work of <strong>choosing what goes into your dataset</strong> — and just as importantly, what stays out. It’s the difference between a random pile of data and a carefully selected teaching set.</p><div class='analogy'><p>A great teacher doesn’t hand students the entire library. They pick the right books, in the right order, for the lesson. Curation is that editorial judgement applied to training data.</p></div><h3>What curation decides</h3><ul><li><strong>Relevance</strong> — does this example match the task we care about?</li><li><strong>Balance</strong> — are all the important cases represented, not just the easy ones?</li><li><strong>Diversity</strong> — enough variety to generalise, without 1,000 near-duplicates.</li><li><strong>Quality bar</strong> — is this example good enough to imitate?</li></ul><p>The guiding principle is <strong>“garbage in, garbage out.”</strong> Most real-world model improvements come from better curation, not bigger models.</p>
    model: |-
      Curation is being a <strong>picky editor</strong>, not a hoarder. You’re choosing the syllabus — relevance, balance, diversity, quality — because the model becomes what it’s fed.
    terms:
    - term: Curation
      def: Selecting, balancing, and filtering examples to form a high-quality dataset.
    - term: Class balance
      def: Having a fair representation of each important case or category.
    - term: Diversity
      def: Variety across examples so the model generalises rather than memorises.
    mistakes:
    - title: Collecting everything ‘just in case’
      detail: More isn’t better; irrelevant or low-quality data dilutes the good signal.
    - title: Hidden imbalance
      detail: If 90% of examples are one easy case, the model nails that and fumbles the rest.
    - title: Near-duplicate overload
      detail: Many slight variations of the same example waste capacity and skew the model.
    cards:
    - q: What is data curation?
      a: Deliberately selecting, balancing, and filtering examples for quality.
    - q: Why curate instead of collecting everything?
      a: Garbage in, garbage out — irrelevant/low-quality data dilutes the signal.
    quiz:
    - q: Data curation is mainly about…
      correct: Deliberately choosing what to include and exclude
      distractors:
      - Compressing files
      - Collecting as much data as possible
      - Renaming columns
      explain: It’s editorial selection for relevance, balance, and quality.
    - q: Why is class balance important?
      correct: So the model handles all important cases, not just the common one
      distractors:
      - It speeds the GPU
      - It looks tidy
      - It reduces file size
      explain: Imbalance makes the model strong on the majority case and weak elsewhere.
    recap: |-
      Curation is editorial judgement over your dataset: relevance, balance, diversity, and a quality bar. Better curation — not bigger models — drives most real-world gains. Garbage in, garbage out.
  - id: dataset-cleaning
    title: Dataset cleaning
    lesson_format: html
    lesson: |-
      <p>If curation is <em>choosing</em> the right examples, <strong>cleaning</strong> is <em>fixing</em> the ones you keep. It’s the unglamorous step of removing errors, duplicates, and junk so the model learns from tidy data.</p><h3>The usual cleaning checklist</h3><ul><li><strong>Deduplicate</strong> — drop exact and near-identical copies.</li><li><strong>Remove junk</strong> — broken encoding, HTML tags, empty fields, truncated text.</li><li><strong>Strip PII</strong> — names, emails, phone numbers, secrets you don’t want memorised.</li><li><strong>Filter toxicity / off-topic</strong> — content you don’t want the model to imitate.</li><li><strong>Fix formatting</strong> — consistent fields, no stray whitespace.</li></ul><div class='analogy'><p>It’s washing vegetables before cooking. The recipe (training) can be perfect, but grit in the ingredients ends up in the meal.</p></div><p>One sneaky issue: <strong>train/test leakage</strong> — if a test example also appears in training, your scores look great but are fake. De-duplicate <em>across</em> splits too.</p>
    model: |-
      Cleaning is <strong>washing the ingredients</strong>. Dedupe, de-junk, de-PII — because any grit left in the data ends up baked into the model.
    terms:
    - term: Deduplication
      def: Removing exact or near-identical examples.
    - term: PII
      def: Personally Identifiable Information — names, emails, phone numbers, etc.
    - term: Leakage
      def: Test data accidentally present in training, inflating measured performance.
    mistakes:
    - title: Skipping de-duplication
      detail: Duplicates make the model over-weight repeated examples and inflate scores.
    - title: Train/test leakage
      detail: Test items hiding in training data give fake-good results — clean across splits.
    - title: Leaving PII in
      detail: |-
        Models can memorise and later regurgitate emails, keys, or names left in the data.
    cards:
    - q: What does dataset cleaning involve?
      a: Dedupe, remove junk, strip PII, filter toxic/off-topic, fix formatting.
    - q: What is leakage?
      a: Test data hiding in training, producing fake-good evaluation scores.
    quiz:
    - q: What is train/test leakage?
      correct: Test examples also appearing in training, faking high scores
      distractors:
      - A type of GPU
      - Slow data loading
      - A memory bug
      explain: Overlap between splits makes evaluation results misleadingly good.
    - q: Why remove PII from training data?
      correct: So the model can’t memorise and leak personal info
      distractors:
      - It’s not necessary
      - To save space
      - To make it colourful
      explain: Models can regurgitate memorised personal data — strip it first.
    recap: |-
      Cleaning fixes the data you keep: deduplicate, remove junk and PII, filter toxic content, and standardise formatting. Watch for train/test leakage, which fakes high scores. Grit in the data ends up in the model.
  - id: dataset-formatting
    title: Dataset formatting
    lesson_format: html
    lesson: |-
      <p>Models expect data in a <strong>specific shape</strong>. <strong>Formatting</strong> is converting your cleaned examples into the exact structure the training tool and model expect — usually JSON lines with named fields, wrapped in a <em>chat template</em>.</p><p>The most common container is <strong>JSONL</strong> (one JSON object per line):</p><pre><code>{"messages":[{"role":"system","content":"You are helpful."},
                   {"role":"user","content":"Hi!"},
                   {"role":"assistant","content":"Hello! How can I help?"}]}</code></pre><p>Each model family also has a <strong>chat template</strong> — special marker tokens that show where each turn starts and ends (e.g. who is speaking). Using the <em>wrong</em> template is one of the most common fine-tuning bugs: training runs fine, but the model behaves oddly because the turns were marked incorrectly.</p><div class='analogy'><p>Same letter, wrong envelope. The content can be perfect, but if it’s not addressed in the format the postal system expects, it gets misrouted.</p></div>
    model: |-
      Formatting is <strong>putting the right letter in the right envelope</strong>. The model only reads correctly if turns are marked with its expected chat template.
    terms:
    - term: JSONL
      def: JSON Lines — one JSON object per line; the common training file format.
    - term: Chat template
      def: |-
        The model-specific pattern of marker tokens that delimits each conversation turn.
    - term: Role
      def: 'Who is speaking in a turn: system, user, or assistant.'
    mistakes:
    - title: Using the wrong chat template
      detail: |-
        Mismatched role markers make the model learn broken turn boundaries — a top cause of weird outputs.
    - title: Invalid JSON
      detail: |-
        A single missing comma or unescaped quote can break the whole file; validate before training.
    - title: Forgetting special tokens
      detail: Omitting end-of-turn markers can make the model ramble or never stop.
    cards:
    - q: What format is common for training data?
      a: JSONL — one JSON object (example) per line.
    - q: What’s a frequent formatting bug?
      a: Using the wrong chat template, so turn boundaries are marked incorrectly.
    quiz:
    - q: What is JSONL?
      correct: A file format with one JSON object per line
      distractors:
      - A GPU type
      - A model
      - A tokenizer
      explain: JSON Lines stores one example per line.
    - q: Why does the chat template matter?
      correct: Wrong turn markers make the model behave oddly
      distractors:
      - It changes the colour
      - It speeds the GPU
      - It compresses data
      explain: Each model expects specific role/turn markers; the wrong ones break behaviour.
    recap: |-
      Formatting shapes cleaned data into what the tool/model expect — usually JSONL with system/user/assistant roles and the model’s chat template. Wrong templates or invalid JSON are top fine-tuning bugs.
  - id: fine-tuning-basics
    title: Fine-tuning basics
    lesson_format: html
    lesson: |-
      <p><strong>Fine-tuning</strong> takes an already-trained model and gives it a <strong>short extra round of training</strong> on your own data, to specialise it for your task, tone, or domain.</p><div class='analogy'><p>A general doctor going for a few months of specialist training. They don’t re-learn medicine from scratch — they build on it to become a cardiologist. Fine-tuning specialises an existing model instead of starting over.</p></div><h3>When fine-tuning helps — and when it doesn’t</h3><table class='compare'><tr><th>Good fit</th><th>Usually NOT the answer</th></tr><tr><td>Lock in a consistent style/format</td><td>Adding fresh, changing facts (use RAG)</td></tr><tr><td>Teach a narrow skill or domain</td><td>One-off tweaks (just edit the prompt)</td></tr><tr><td>Shrink long prompts into the model</td><td>You only have a handful of examples</td></tr></table><p>Rule of thumb: <strong>try prompting first</strong>, then <strong>RAG</strong> for knowledge, and reach for fine-tuning when you need consistent <em>behaviour</em> that prompts can’t reliably get. Most people fine-tune cheaply with <strong>LoRA/QLoRA</strong> (next module) rather than retraining every weight.</p>
    model: |-
      Fine-tuning is <strong>specialist school</strong> for a model that already finished general school. Use it to fix <em>behaviour and style</em>, not to inject changing <em>facts</em>.
    terms:
    - term: Fine-tuning
      def: Extra training on top of a pretrained model to specialise it.
    - term: Base vs fine-tuned
      def: Base is the general model; fine-tuned is your specialised version.
    - term: LoRA/QLoRA
      def: Cheap fine-tuning methods that train a small add-on instead of all weights.
    mistakes:
    - title: Fine-tuning to add knowledge
      detail: |-
        For facts that change, RAG (retrieval) is usually better and cheaper than baking them into weights.
    - title: Reaching for it too early
      detail: Try a better prompt and few-shot examples first; they’re free and instant.
    - title: Too little or messy data
      detail: A handful of inconsistent examples won’t move the model and can make it worse.
    cards:
    - q: What is fine-tuning?
      a: A short extra round of training on your data to specialise a pretrained model.
    - q: Facts vs behaviour — which is fine-tuning for?
      a: Behaviour/style; use RAG for changing facts.
    quiz:
    - q: Fine-tuning is best for…
      correct: Locking in consistent behaviour, style, or a narrow skill
      distractors:
      - Making the model bigger
      - Replacing the tokenizer
      - Adding daily-changing facts
      explain: It shapes behaviour/style; changing facts are better handled by RAG.
    - q: Before fine-tuning, you should usually try…
      correct: Better prompting and few-shot examples
      distractors:
      - Buying more GPUs
      - Nothing
      - Deleting the model
      explain: Prompting/few-shot is free and instant; fine-tune when that’s not enough.
    recap: |-
      Fine-tuning is specialist school for an existing model — best for consistent behaviour, style, or a narrow skill. Try prompting and RAG first; fine-tune when you need reliable behaviour, usually cheaply via LoRA/QLoRA.
  - id: continued-pretraining
    title: Continued pretraining
    lesson_format: html
    lesson: |-
      <p><strong>Continued pretraining</strong> (a.k.a. domain-adaptive pretraining) keeps training a base model on a <strong>large pile of raw text</strong> from a new domain — no question/answer pairs, just lots of documents — so it absorbs the <em>vocabulary and style</em> of that field.</p><div class='analogy'><p>Imagine a smart generalist moving to a new country and reading thousands of local newspapers for months. They’re not memorising answers — they’re soaking up the language, idioms, and norms. That’s continued pretraining for, say, legal or medical text.</p></div><h3>How it differs from fine-tuning</h3><table class='compare'><tr><th></th><th>Continued pretraining</th><th>Fine-tuning (SFT)</th></tr><tr><th>Data</th><td>Raw text, lots of it</td><td>Input→output examples</td></tr><tr><th>Teaches</th><td>Domain language &amp; knowledge</td><td>Specific behaviour/format</td></tr><tr><th>Scale</th><td>Large (GBs of text)</td><td>Smaller (curated pairs)</td></tr></table><p>The usual recipe: <strong>continued pretraining first</strong> (learn the domain), then <strong>SFT/instruction tuning</strong> (learn to be helpful in it). Watch out for <em>catastrophic forgetting</em> — over-training on narrow text can make the model worse at general tasks.</p>
    model: |-
      Continued pretraining is <strong>immersion abroad</strong>: read mountains of domain text to absorb its language, then do SFT to learn how to act helpfully within it.
    terms:
    - term: Continued pretraining
      def: Further base-model training on large raw domain text.
    - term: Domain adaptation
      def: Making a general model fluent in a specific field.
    - term: Catastrophic forgetting
      def: Losing earlier general skills after over-training on narrow data.
    mistakes:
    - title: Expecting it to follow instructions
      detail: |-
        Raw-text training builds domain fluency, not obedience — you still need SFT afterward.
    - title: Catastrophic forgetting
      detail: Over-fitting to narrow text can erode general ability; mix in some general data.
    - title: Using tiny data
      detail: It needs a lot of text to shift the model; small piles barely move it.
    cards:
    - q: What is continued pretraining?
      a: Further training a base model on large raw domain text to absorb its language.
    - q: Typical order with SFT?
      a: Continued pretraining first (domain), then SFT (helpful behaviour).
    quiz:
    - q: Continued pretraining uses what kind of data?
      correct: Large amounts of raw domain text
      distractors:
      - Preference pairs
      - Input→output pairs
      - Only images
      explain: It trains on lots of raw text to absorb domain language.
    - q: What is catastrophic forgetting?
      correct: Losing general skills after over-training on narrow data
      distractors:
      - A tokenizer bug
      - A storage error
      - A faster GPU mode
      explain: Narrow over-training can erode previously learned general ability.
    recap: |-
      Continued pretraining immerses a base model in lots of raw domain text to absorb its language and knowledge. Do it before SFT, use enough data, and guard against catastrophic forgetting of general skills.
  - id: hallucination-reduction
    title: Hallucination reduction
    lesson_format: html
    lesson: |-
      <p>A <strong>hallucination</strong> is when a model states something false <strong>with full confidence</strong> — a made-up citation, a wrong date, an invented API. It happens because the model predicts <em>plausible</em> text, and plausible isn’t always true.</p><div class='analogy'><p>Picture a student who never says “I don’t know.” Faced with a hard exam question, they write a confident, well-phrased guess. Sometimes it’s right, sometimes it’s elegant nonsense. LLMs have the same instinct.</p></div><h3>Practical ways to reduce it</h3><ul><li><strong>Ground it (RAG).</strong> Give the model the real source text and tell it to answer only from that.</li><li><strong>Allow “I don’t know.”</strong> In prompts and training data, reward admitting uncertainty over guessing.</li><li><strong>Ask for citations</strong> the answer must point back to, so claims are checkable.</li><li><strong>Lower randomness</strong> (temperature) for factual tasks.</li><li><strong>Verify</strong> critical outputs with a second check or tool.</li></ul><p>You can’t fully eliminate hallucinations — but grounding plus permission to say “I’m not sure” cuts them dramatically.</p>
    model: |-
      A hallucination is a <strong>confident guess</strong>, not a lie. Fix it by giving the model real sources to lean on and making ‘I don’t know’ an acceptable answer.
    terms:
    - term: Hallucination
      def: A confident but false or fabricated model output.
    - term: Grounding
      def: Tying answers to provided source text so claims are checkable.
    - term: Temperature
      def: A setting controlling randomness; lower is steadier for factual tasks.
    mistakes:
    - title: Trusting confident tone as truth
      detail: Fluency and confidence are not evidence — always verify high-stakes claims.
    - title: Punishing ‘I don’t know’
      detail: If your data/prompts never reward uncertainty, the model learns to always guess.
    - title: Expecting fine-tuning alone to fix facts
      detail: |-
        Grounding with retrieval (RAG) usually beats trying to memorise every fact in weights.
    cards:
    - q: What is a hallucination?
      a: A confident but false/fabricated model output.
    - q: Best ways to reduce hallucinations?
      a: |-
        Ground in real sources (RAG), allow ‘I don’t know’, ask for citations, lower temperature.
    quiz:
    - q: Why do hallucinations happen?
      correct: It predicts plausible text, which isn’t always true
      distractors:
      - The model is broken
      - Bad internet
      - Too few GPUs
      explain: Plausible-sounding ≠ factual; the model optimises for likely text.
    - q: Which most reliably reduces hallucinations?
      correct: Grounding answers in real sources (RAG) and allowing ‘I don’t know’
      distractors:
      - More emoji
      - Higher temperature
      - Bigger fonts
      explain: Grounding plus permitting uncertainty cuts confident guessing.
    recap: |-
      Hallucinations are confident guesses, not lies — the model predicts plausible text. Reduce them by grounding answers in real sources, rewarding ‘I don’t know’, requesting citations, and verifying critical claims.
- id: fine-tuning
  title: Fine-Tuning
  topics:
  - id: lora
    title: LoRA
    lesson_format: html
    lesson: |-
      <p><strong>LoRA</strong> (Low-Rank Adaptation) is a cheap, popular way to fine-tune. Instead of updating all of a model’s billions of weights, you <strong>freeze the original model</strong> and train a tiny set of new “adapter” weights bolted on the side.</p><div class='analogy'><p>You don’t rewrite an entire textbook to add your notes — you stick on a few sticky-notes. LoRA is those sticky-notes: small, removable add-ons that change behaviour without touching the original pages.</p></div><p>The trick is mathematical: the big change a full fine-tune would make can be approximated by two <strong>small</strong> matrices multiplied together (that’s the “low-rank” part). Training only those small matrices needs a fraction of the memory and time.</p><h3>Why people love it</h3><ul><li><strong>Cheap.</strong> Train on one modest GPU instead of a cluster.</li><li><strong>Tiny output.</strong> The adapter is a few MB, not many GB.</li><li><strong>Swappable.</strong> Keep one base model and snap different LoRAs on for different tasks.</li></ul>
    model: |-
      LoRA is <strong>sticky-notes on a frozen textbook</strong>: train a small add-on, leave the giant model untouched, and swap notes per task.
    terms:
    - term: LoRA
      def: Low-Rank Adaptation — fine-tuning small add-on matrices instead of all weights.
    - term: Adapter
      def: The small trained add-on that modifies a frozen base model’s behaviour.
    - term: Rank
      def: The size of the LoRA matrices; higher = more capacity but more memory.
    mistakes:
    - title: Setting the rank wrong
      detail: |-
        Rank too low = not enough capacity to learn; too high = wasted memory and overfitting risk. Tune it.
    - title: Forgetting the base model
      detail: |-
        A LoRA adapter is useless without its matching base; you ship both (or merge them).
    - title: Mixing mismatched bases
      detail: An adapter trained on one base won’t behave on a different base model.
    cards:
    - q: What is LoRA?
      a: Fine-tuning small add-on matrices while freezing the base model.
    - q: What is ‘rank’ in LoRA?
      a: The size of the adapter matrices — higher means more capacity but more memory.
    quiz:
    - q: What does LoRA train instead of all the weights?
      correct: Small add-on adapter matrices
      distractors:
      - Only the embeddings
      - A new tokenizer
      - The whole model again
      explain: It freezes the base and trains tiny low-rank matrices.
    - q: A big practical benefit of LoRA is…
      correct: Cheap training and tiny, swappable adapters
      distractors:
      - It needs no base model
      - It removes the tokenizer
      - It makes models larger
      explain: Low memory cost and small, task-swappable outputs.
    recap: |-
      LoRA freezes the base model and trains tiny low-rank adapter matrices — cheap, fast, and producing small swappable add-ons. Tune the rank, and always keep the matching base model.
  - id: qlora
    title: QLoRA
    lesson_format: html
    lesson: |-
      <p><strong>QLoRA</strong> = <strong>Quantized LoRA</strong>. It takes LoRA one step cheaper: first <strong>shrink the frozen base model</strong> with quantization (store its weights in 4 bits instead of 16), then train LoRA adapters on top.</p><div class='analogy'><p>LoRA let you add sticky-notes to the textbook. QLoRA also <em>photo-shrinks the textbook</em> to pocket size first, so the whole thing fits on a small desk (a single consumer GPU) — while you still write full-quality notes.</p></div><p>The clever part: the giant base is kept in low-precision 4-bit (saving most of the memory), but the <strong>adapters are trained in full precision</strong>, so you keep most of the quality. This is why people can fine-tune a 70B model on a single 24–48GB GPU.</p><table class='compare'><tr><th></th><th>Full fine-tune</th><th>LoRA</th><th>QLoRA</th></tr><tr><th>Memory</th><td>Huge</td><td>Low</td><td>Lowest</td></tr><tr><th>Base stored as</th><td>16-bit</td><td>16-bit</td><td>4-bit</td></tr></table>
    model: |-
      QLoRA = <strong>shrink the book, then sticky-note it</strong>. 4-bit base for cheap memory + full-precision adapters for quality = fine-tune big models on one GPU.
    terms:
    - term: QLoRA
      def: Quantized LoRA — LoRA on top of a 4-bit-quantized frozen base model.
    - term: 4-bit
      def: Storing each weight in 4 bits instead of 16 to slash memory use.
    - term: Precision
      def: How many bits represent each number; fewer bits = smaller but less exact.
    mistakes:
    - title: Expecting zero quality loss
      detail: |-
        4-bit quantization costs a little accuracy; usually small, but test it for your task.
    - title: Confusing it with quantizing the output
      detail: |-
        QLoRA quantizes the base for training; you still decide how to quantize for serving separately.
    - title: Under-powered settings on hard tasks
      detail: |-
        Very low rank + 4-bit can underfit complex behaviours; bump rank if results are weak.
    cards:
    - q: What is QLoRA?
      a: LoRA trained on top of a 4-bit quantized base model to save memory.
    - q: Why can QLoRA fine-tune huge models on one GPU?
      a: The 4-bit base slashes memory while full-precision adapters keep quality.
    quiz:
    - q: What does the ‘Q’ in QLoRA add over plain LoRA?
      correct: Quantizing the frozen base to 4-bit to save memory
      distractors:
      - Bigger adapters
      - Cloud hosting
      - Faster tokenizer
      explain: It compresses the base to 4-bit so training fits in less memory.
    - q: In QLoRA, the adapters are trained in…
      correct: Full/higher precision to preserve quality
      distractors:
      - Images
      - No precision
      - 4-bit too
      explain: Base is 4-bit; adapters stay higher-precision for quality.
    recap: |-
      QLoRA quantizes the frozen base to 4-bit, then trains full-precision LoRA adapters on top — letting you fine-tune very large models on a single GPU with only a small quality cost.
  - id: dpo
    title: DPO
    lesson_format: html
    lesson: |-
      <p><strong>DPO</strong> (Direct Preference Optimization) teaches a model <strong>which answers humans prefer</strong> — using the chosen/rejected preference pairs from the last module — but in a simple, direct way that skips the complicated machinery of older methods (RLHF).</p><div class='analogy'><p>Coaching by comparison. You show the model two responses and say <em>“more like this one, less like that one,”</em> and it nudges itself to make the preferred answer more likely and the rejected one less likely. Repeat over many pairs.</p></div><p>Why it’s popular: RLHF needs a separate <em>reward model</em> and a tricky reinforcement-learning loop. DPO gets similar results with <strong>plain fine-tuning on preference pairs</strong> — fewer moving parts, more stable, easier to run.</p><table class='compare'><tr><th></th><th>DPO</th><th>RLHF</th></tr><tr><th>Reward model</th><td>Not needed</td><td>Required</td></tr><tr><th>Complexity</th><td>Lower, more stable</td><td>Higher, fiddly</td></tr><tr><th>Input</th><td>Chosen/rejected pairs</td><td>Chosen/rejected pairs</td></tr></table>
    model: |-
      DPO is <strong>‘more like this, less like that’</strong> applied directly to preference pairs — the simple, stable cousin of RLHF with no separate reward model.
    terms:
    - term: DPO
      def: Direct Preference Optimization — training directly on chosen/rejected pairs.
    - term: Reward model
      def: A separate model that scores answers; required by RLHF but not DPO.
    - term: Alignment
      def: Shaping a model toward preferred, helpful, safe behaviour.
    mistakes:
    - title: Weak preference data
      detail: DPO is only as good as the pairs; noisy or inconsistent preferences teach noise.
    - title: Over-optimising
      detail: |-
        Push too hard and the model can drift from the base, getting repetitive or bland — keep the base anchor.
    - title: Skipping SFT first
      detail: DPO usually refines an already instruction-tuned model; run SFT before it.
    cards:
    - q: What does DPO do?
      a: Trains directly on chosen/rejected pairs to prefer better answers.
    - q: DPO vs RLHF key difference?
      a: DPO needs no separate reward model or RL loop — simpler and more stable.
    quiz:
    - q: What is DPO’s main advantage over RLHF?
      correct: Similar results without a separate reward model or RL loop
      distractors:
      - It needs no data
      - It’s always smarter
      - It trains the tokenizer
      explain: DPO is simpler and more stable — direct training on preference pairs.
    - q: DPO trains on…
      correct: Chosen vs rejected answer pairs
      distractors:
      - Nothing
      - Images
      - Raw text only
      explain: It uses preference pairs to push toward preferred answers.
    recap: |-
      DPO aligns a model to human preferences by training directly on chosen/rejected pairs — ‘more like this, less like that.’ It achieves RLHF-like results without a reward model or fiddly RL loop. Run SFT first.
  - id: rlhf
    title: RLHF
    lesson_format: html
    lesson: |-
      <p><strong>RLHF</strong> = <strong>Reinforcement Learning from Human Feedback</strong>. It’s the classic recipe that made chat assistants feel helpful and polite. The idea: let humans judge answers, turn those judgements into a <em>reward</em>, and train the model to chase that reward.</p><h3>The three steps</h3><ul><li><strong>1. SFT</strong> — first teach basic instruction-following with example answers.</li><li><strong>2. Reward model</strong> — humans rank answers; you train a separate model to predict ‘how much would a human like this?’</li><li><strong>3. RL loop</strong> — the main model generates answers, the reward model scores them, and the model updates to score higher.</li></ul><div class='analogy'><p>Like training a dog with treats. The reward model is the ‘treat dispenser’ that learned your preferences; the RL step is the dog trying behaviours and repeating the ones that earn treats.</p></div><p>RLHF is powerful but <strong>complex and finicky</strong> — three stages, a separate reward model, and an unstable RL loop. That’s exactly why simpler alternatives like <strong>DPO</strong> have become popular for many teams.</p>
    model: |-
      RLHF is <strong>training with treats</strong>: a reward model learns human taste, then the model practises to earn higher rewards. Powerful, but three fiddly stages.
    terms:
    - term: RLHF
      def: Reinforcement Learning from Human Feedback — align models via a learned reward.
    - term: Reward model
      def: A model trained to predict how much humans would like an answer.
    - term: Reward hacking
      def: Exploiting the reward to score high without truly being better.
    mistakes:
    - title: Reward hacking
      detail: |-
        Models find loopholes that score high but aren’t actually good (e.g. overly long, sycophantic answers).
    - title: Believing it adds knowledge
      detail: |-
        RLHF shapes behaviour and tone, not facts — it won’t make the model more correct about the world.
    - title: Underestimating its complexity
      detail: |-
        Three stages and an unstable RL loop; for many goals DPO is simpler and good enough.
    cards:
    - q: What are RLHF’s three steps?
      a: SFT, train a reward model from human rankings, then an RL loop to chase reward.
    - q: Why do teams prefer DPO sometimes?
      a: RLHF is complex/unstable; DPO gets similar results more simply.
    quiz:
    - q: What does the reward model in RLHF do?
      correct: Predicts how much a human would like an answer
      distractors:
      - Generates final answers
      - Tokenizes text
      - Stores facts
      explain: It scores answers as a stand-in for human preference.
    - q: What is ‘reward hacking’?
      correct: Scoring high via loopholes without truly being better
      distractors:
      - A faster tokenizer
      - A storage format
      - Stealing GPUs
      explain: The model games the reward instead of genuinely improving.
    recap: |-
      RLHF aligns models in three stages — SFT, a human-preference reward model, then an RL loop chasing that reward. It’s powerful but complex and prone to reward hacking, which is why simpler DPO is often chosen.
  - id: quantization
    title: Quantization
    lesson_format: html
    lesson: |-
      <p><strong>Quantization</strong> shrinks a model by storing its numbers with <strong>fewer bits</strong> — e.g. 16-bit → 8-bit → 4-bit. Smaller numbers mean less memory and faster maths, so big models fit on smaller hardware.</p><div class='analogy'><p>Like saving a photo as a smaller JPEG. The image looks almost the same but the file is a fraction of the size. Push the compression too far, though, and you start to see fuzziness. Same trade-off with model weights.</p></div><table class='compare'><tr><th>Precision</th><th>Memory for 7B</th><th>Quality</th></tr><tr><td>16-bit (full)</td><td>~14 GB</td><td>Best</td></tr><tr><td>8-bit</td><td>~7 GB</td><td>Nearly identical</td></tr><tr><td>4-bit</td><td>~3.5 GB</td><td>Slightly lower, usually fine</td></tr></table><p>The sweet spot for running models locally is often <strong>4-bit</strong> — a big memory saving for a small quality dip. Common formats you’ll see: <code>Q4_K_M</code>, <code>Q5</code>, <code>Q8</code> (GGUF), and methods like GPTQ/AWQ.</p>
    model: |-
      Quantization is <strong>saving the model as a smaller JPEG</strong>: fewer bits per number = far less memory, with a small, usually acceptable quality dip.
    terms:
    - term: Quantization
      def: Storing model weights with fewer bits to save memory and speed.
    - term: Bit-width
      def: Bits per number (16, 8, 4…); fewer means smaller and less exact.
    - term: GPTQ / AWQ
      def: Popular methods to quantize a model with minimal quality loss.
    mistakes:
    - title: Going too low too fast
      detail: 2–3 bit can degrade noticeably; 4-bit is usually the safe floor for quality.
    - title: Assuming all quant methods are equal
      detail: GPTQ, AWQ, and GGUF quants differ in quality and speed — test for your model.
    - title: Confusing training vs serving quant
      detail: Quantizing to run (serving) is separate from QLoRA quantizing to train.
    cards:
    - q: What is quantization?
      a: Storing model weights with fewer bits to save memory and speed up maths.
    - q: Common local sweet spot?
      a: 4-bit — large memory savings with a small quality cost.
    quiz:
    - q: What does quantization reduce?
      correct: Bits per weight, cutting memory use
      distractors:
      - The context window
      - The number of topics
      - The dataset size
      explain: Fewer bits per number means smaller, faster models.
    - q: A common local sweet spot is…
      correct: 4-bit
      distractors:
      - 32-bit
      - No quantization
      - 2-bit
      explain: 4-bit gives big savings for a small quality dip.
    recap: |-
      Quantization stores weights with fewer bits (16→8→4), shrinking memory and speeding maths like a smaller JPEG. 4-bit is the usual local sweet spot; go too low and quality visibly drops.
  - id: model-checkpoints
    title: Model checkpoints
    lesson_format: html
    lesson: |-
      <p>A <strong>checkpoint</strong> is a <strong>saved snapshot of a model’s weights</strong> at a moment in training. Think of it as a “save game” — you can stop, reload, or share the model exactly as it was.</p><div class='analogy'><p>Just like saving your progress in a video game before a boss fight. If training goes wrong later, you don’t start over — you reload the last good checkpoint.</p></div><h3>Why checkpoints matter</h3><ul><li><strong>Resume</strong> long training runs after a crash without losing days of work.</li><li><strong>Compare</strong> versions — keep the checkpoint that scored best, not just the last one.</li><li><strong>Share / deploy</strong> — a checkpoint <em>is</em> the model you hand to others.</li></ul><p>A common gotcha: the <strong>final</strong> checkpoint isn’t always the best — a model can <em>overfit</em> late in training and get worse. Teams often keep several and pick the one with the best validation score (‘early stopping’).</p>
    model: |-
      A checkpoint is a <strong>save game for a model</strong>. Save often, keep the best — not necessarily the last — and you can always reload instead of restarting.
    terms:
    - term: Checkpoint
      def: A saved snapshot of model weights during or after training.
    - term: Overfitting
      def: When a model memorises training data and does worse on new data.
    - term: Early stopping
      def: Halting training at the best validation point to avoid overfitting.
    mistakes:
    - title: Keeping only the final checkpoint
      detail: Late training can overfit; the best checkpoint may be an earlier one.
    - title: Not saving often enough
      detail: A crash between rare saves can cost hours or days of compute.
    - title: Losing the config
      detail: A checkpoint needs its tokenizer/config to load correctly — save them together.
    cards:
    - q: What is a checkpoint?
      a: A saved snapshot of model weights you can reload, compare, or deploy.
    - q: Best vs last checkpoint?
      a: Keep the best (by validation); the last can be overfit.
    quiz:
    - q: What is a model checkpoint?
      correct: A saved snapshot of the model’s weights
      distractors:
      - A tokenizer
      - A benchmark
      - A type of GPU
      explain: It’s a ‘save game’ of the weights at a point in training.
    - q: Why isn’t the final checkpoint always best?
      correct: The model can overfit late in training
      distractors:
      - Files corrupt
      - It loses the tokenizer
      - It’s smaller
      explain: Overfitting can make later checkpoints worse than earlier ones.
    recap: |-
      Checkpoints are save-games of a model’s weights — for resuming runs, comparing versions, and deploying. Save often and keep the best by validation score, since the final checkpoint can be overfit.
  - id: adapter-tuning
    title: Adapter tuning
    lesson_format: html
    lesson: |-
      <p><strong>Adapter tuning</strong> is the general family that LoRA belongs to: instead of retraining a whole model, you insert <strong>small trainable modules (“adapters”)</strong> and train only those. The big model stays frozen.</p><div class='analogy'><p>Camera lenses. You keep one camera body (the base model) and screw on different lenses (adapters) for portraits, macro, or wide-angle. Each lens is small, cheap, and swappable — the body never changes.</p></div><h3>Why it’s a big deal</h3><ul><li><strong>One base, many skills.</strong> Store one large model and dozens of small adapters, loading whichever task you need.</li><li><strong>Cheap to train and store.</strong> Adapters are MBs, not GBs.</li><li><strong>Composable.</strong> You can even hot-swap adapters per request on a server.</li></ul><p>This approach is also called <strong>PEFT</strong> — Parameter-Efficient Fine-Tuning (covered in the tooling module). LoRA/QLoRA are the most common kinds of adapter tuning today.</p>
    model: |-
      Adapter tuning is <strong>swappable lenses on one camera body</strong>: train small modules per task, keep the giant base frozen and shared.
    terms:
    - term: Adapter tuning
      def: Training small inserted modules while freezing the base model.
    - term: PEFT
      def: Parameter-Efficient Fine-Tuning — the umbrella term for these methods.
    - term: Hot-swap
      def: Loading/unloading adapters at serving time without changing the base.
    mistakes:
    - title: Expecting adapters to rewrite the model
      detail: |-
        They nudge behaviour; for deep domain shifts you may still need continued pretraining.
    - title: Adapter/base mismatch
      detail: An adapter only works with the exact base it was trained on.
    - title: Stacking too many blindly
      detail: |-
        Combining many adapters can interfere; test the combination, don’t assume it composes cleanly.
    cards:
    - q: What is adapter tuning?
      a: Training small inserted modules while keeping the base model frozen.
    - q: What’s the umbrella term?
      a: PEFT — Parameter-Efficient Fine-Tuning (LoRA/QLoRA are examples).
    quiz:
    - q: In adapter tuning, what stays frozen?
      correct: The large base model
      distractors:
      - Nothing
      - The adapters
      - The tokenizer only
      explain: The base is frozen; only the small adapters train.
    - q: A key benefit of adapters is…
      correct: One base model can serve many small swappable skills
      distractors:
      - They replace the base
      - They need no base
      - They’re always huge
      explain: Store one base + many tiny task adapters.
    recap: |-
      Adapter tuning trains small swappable modules on a frozen base — one camera body, many lenses. It’s cheap, storable, and composable, and is the PEFT family that LoRA and QLoRA belong to.
  - id: gguf-models
    title: GGUF models
    lesson_format: html
    lesson: |-
      <p><strong>GGUF</strong> is a <strong>file format</strong> for packaging a model so it runs easily on regular computers — especially with <code>llama.cpp</code> and tools built on it like Ollama and LM Studio. It bundles the weights, tokenizer, and settings into one tidy file.</p><div class='analogy'><p>Think of GGUF like a <em>.zip or .mp4</em> for models: a single self-contained file your player knows how to open. You download one file and it just runs — no fiddly setup.</p></div><h3>What to know in practice</h3><ul><li>GGUF files usually come <strong>pre-quantized</strong>. You’ll pick a variant like <code>Q4_K_M</code> (4-bit, balanced) or <code>Q8_0</code> (8-bit, higher quality, bigger).</li><li>It’s optimised to run on <strong>CPU as well as GPU</strong>, which is why it’s the go-to for laptops and local use.</li><li>It replaced the older ‘GGML’ format — if you see GGML, it’s the legacy version.</li></ul><p>Rule of thumb for picking a file: <strong>more bits = better quality but bigger and slower</strong>. <code>Q4_K_M</code> is a popular default that fits most machines.</p>
    model: |-
      GGUF is the <strong>.mp4 of local models</strong>: one self-contained, pre-quantized file that runs on a laptop. Pick the bit-variant that balances quality against your RAM.
    terms:
    - term: GGUF
      def: A single-file model format for llama.cpp-based local runners.
    - term: Q4_K_M / Q8_0
      def: Quantization variants inside a GGUF; more bits = better but bigger.
    - term: llama.cpp
      def: The popular C++ engine that runs GGUF models on CPU/GPU.
    mistakes:
    - title: Grabbing the biggest file
      detail: An 8-bit GGUF may not fit your RAM; match the variant to your machine.
    - title: Wrong runner
      detail: |-
        GGUF is for llama.cpp-family tools; other stacks (e.g. vLLM) prefer different formats.
    - title: Confusing format with method
      detail: GGUF is packaging; the quantization (Q4, Q8) is the compression inside it.
    cards:
    - q: What is GGUF?
      a: |-
        A single-file, usually pre-quantized model format for llama.cpp-family local tools.
    - q: What does Q4_K_M mean?
      a: A balanced 4-bit quantization variant inside a GGUF file.
    quiz:
    - q: What is GGUF?
      correct: A single-file model format for local runners like llama.cpp
      distractors:
      - A benchmark
      - A GPU brand
      - A training method
      explain: It’s a packaging format, not a training technique.
    - q: When picking a GGUF variant, more bits means…
      correct: Better quality but a bigger, slower file
      distractors:
      - Worse quality
      - No difference
      - Fewer tokens
      explain: Higher bit-width trades size/speed for quality.
    recap: |-
      GGUF is the ‘.mp4’ of local models — one self-contained, pre-quantized file that runs on CPU/GPU via llama.cpp, Ollama, and friends. Pick a bit-variant (like Q4_K_M) that balances quality with your RAM.
- id: inference
  title: Inference & Optimization
  topics:
  - id: kv-cache
    title: KV cache
    lesson_format: html
    lesson: |-
      <p>When a model writes an answer, it produces <strong>one token at a time</strong>, and for each new token it normally has to look back over everything written so far. The <strong>KV cache</strong> stores that look-back work so it doesn’t get redone every step.</p><div class='analogy'><p>Imagine writing a story and re-reading the <em>entire</em> page before adding each new word. Exhausting. Instead you keep notes in the margin about what matters. The KV cache is those margin notes — computed once, reused for every following word.</p></div><p>The name: attention turns each earlier token into a <strong>Key</strong> and a <strong>Value</strong>. The cache saves those K and V so generating token #500 doesn’t recompute tokens #1–499 from scratch. This is the single biggest reason generation is fast.</p><p>The catch: the cache <strong>lives in memory (VRAM)</strong> and grows with conversation length. Long chats = big KV cache = more memory used per user. Managing it well is central to serving many users at once.</p>
    model: |-
      The KV cache is <strong>margin notes for the model</strong>: compute each token’s key/value once, reuse them forever — fast generation, but the notes pile up in memory as the chat grows.
    terms:
    - term: KV cache
      def: Stored attention Keys and Values for past tokens, reused during generation.
    - term: Autoregressive
      def: Generating one token at a time, each depending on the previous ones.
    - term: Prefill vs decode
      def: Prefill processes the prompt; decode generates new tokens using the cache.
    mistakes:
    - title: Forgetting it eats VRAM
      detail: |-
        Long contexts and many concurrent users blow up KV-cache memory — often the real serving bottleneck.
    - title: Thinking it stores text
      detail: It stores computed key/value tensors, not the raw words.
    - title: Assuming it’s free across requests
      detail: |-
        By default the cache is per-conversation; reusing it across requests needs special techniques (prefix caching).
    cards:
    - q: What is the KV cache?
      a: Stored attention keys/values for past tokens, reused so generation stays fast.
    - q: What’s its main cost?
      a: VRAM that grows with context length and number of users.
    quiz:
    - q: What does the KV cache save?
      correct: Computed attention keys/values for past tokens
      distractors:
      - The GPU
      - The tokenizer
      - The raw text
      explain: It caches K/V so earlier tokens aren’t recomputed each step.
    - q: A practical downside of the KV cache is…
      correct: It consumes VRAM that grows with context length
      distractors:
      - It needs the internet
      - It deletes the model
      - It slows generation
      explain: Memory use scales with conversation length and users.
    recap: |-
      The KV cache stores each token’s attention keys/values so the model doesn’t recompute the whole history per step — the key to fast generation. The cost is VRAM that grows with context length and concurrent users.
  - id: flash-attention
    title: Flash Attention
    lesson_format: html
    lesson: |-
      <p><strong>Flash Attention</strong> is a smarter way to compute the attention step that is <strong>much faster and uses far less memory</strong> — without changing the model’s answers. It’s a pure efficiency win.</p><div class='analogy'><p>Same recipe, better kitchen workflow. Instead of dirtying every bowl (writing huge intermediate results to slow memory), the chef works in small batches on the counter (fast on-chip memory) and never lets things pile up. The dish is identical; it’s just cooked more efficiently.</p></div><p>Technically, standard attention creates a giant intermediate table comparing every token to every other and writes it to slow GPU memory. Flash Attention <strong>fuses the steps</strong> and processes in tiles using ultra-fast on-chip memory, so that giant table never has to be stored.</p><h3>Why you care</h3><ul><li><strong>Longer contexts</strong> become feasible (memory no longer explodes with length).</li><li><strong>Faster</strong> training and inference, same results.</li><li>It’s usually a <strong>flag to switch on</strong>, not something you build.</li></ul>
    model: |-
      Flash Attention is a <strong>tidier kitchen, same recipe</strong>: it computes attention in fast on-chip tiles instead of dumping a giant table to slow memory — faster and lighter, identical output.
    terms:
    - term: Flash Attention
      def: A memory-efficient, fused algorithm for computing attention.
    - term: On-chip memory (SRAM)
      def: Tiny ultra-fast GPU memory used to avoid slow trips to VRAM.
    - term: Kernel fusion
      def: Combining steps into one operation to avoid writing intermediates to memory.
    mistakes:
    - title: Thinking it changes the answers
      detail: It’s mathematically equivalent — only speed and memory improve, not quality.
    - title: Assuming it’s always on
      detail: Some stacks/hardware need it explicitly enabled or a compatible GPU.
    - title: Expecting it to fix a small model
      detail: It optimises the attention step; it won’t make a weak model smarter.
    cards:
    - q: What is Flash Attention?
      a: A faster, memory-light way to compute attention with identical results.
    - q: Does it change model output?
      a: No — only speed and memory improve.
    quiz:
    - q: What does Flash Attention improve?
      correct: Attention speed and memory use, with identical results
      distractors:
      - The model’s accuracy
      - The tokenizer
      - The dataset
      explain: It’s an efficiency optimisation, not a quality change.
    - q: How does it save memory?
      correct: It avoids storing the giant all-pairs attention table in slow memory
      distractors:
      - It shortens prompts
      - It deletes weights
      - It quantizes the model
      explain: Tiled, fused computation skips the huge intermediate table.
    recap: |-
      Flash Attention computes attention in fast on-chip tiles instead of writing a giant table to slow memory — faster, lighter, and mathematically identical. It enables longer contexts and is usually just a flag to enable.
  - id: speculative-decoding
    title: Speculative decoding
    lesson_format: html
    lesson: |-
      <p><strong>Speculative decoding</strong> speeds up generation by using a <strong>small fast model to guess ahead</strong>, then letting the big model <strong>check several guesses at once</strong> instead of producing every token itself.</p><div class='analogy'><p>A junior writer drafts the next few words quickly; the senior editor skims and approves the ones that are right, fixing only where the draft went wrong. Approving a batch is much faster than writing every word from scratch.</p></div><h3>How it works</h3><ul><li>A tiny <strong>draft model</strong> proposes, say, the next 4 tokens.</li><li>The big <strong>target model</strong> verifies all 4 in a single pass.</li><li>Correct guesses are kept; the first wrong one is corrected and the rest discarded.</li></ul><p>The output is <strong>identical</strong> to what the big model would have produced alone — it’s just faster when the draft model guesses well. Best gains on predictable text; less benefit on highly surprising content.</p>
    model: |-
      Speculative decoding is a <strong>junior drafting, senior approving</strong>: a small model guesses several tokens, the big model verifies them in one pass — same output, fewer slow steps.
    terms:
    - term: Speculative decoding
      def: Using a small draft model to propose tokens the big model verifies in batches.
    - term: Draft / target model
      def: The small guesser and the large verifier, respectively.
    - term: Acceptance rate
      def: How often the big model approves the draft’s guesses; higher = faster.
    mistakes:
    - title: Expecting different (worse) output
      detail: |-
        Verification guarantees the same result as the big model alone — quality is unchanged.
    - title: Mismatched draft model
      detail: If the draft model guesses poorly, few tokens are accepted and you gain little.
    - title: Assuming it always helps
      detail: On very unpredictable text, acceptance drops and the speedup shrinks.
    cards:
    - q: What is speculative decoding?
      a: A small draft model proposes tokens; the big model verifies them in batches.
    - q: Effect on output quality?
      a: None — output is identical to the big model alone, just faster.
    quiz:
    - q: How does speculative decoding speed things up?
      correct: A small model guesses ahead and the big model verifies batches
      distractors:
      - By skipping verification
      - By shrinking the model
      - By using more RAM
      explain: Batch verification beats generating every token one by one.
    - q: What happens to output quality?
      correct: It’s identical to the big model alone
      distractors:
      - It loses tokens
      - It gets worse
      - It becomes random
      explain: Verification ensures the same result as the target model.
    recap: |-
      Speculative decoding uses a small draft model to guess several tokens that the big model verifies in one pass — junior drafts, senior approves. Output is identical and it’s faster when guesses are accepted often.
  - id: inference-optimization
    title: Inference optimization
    lesson_format: html
    lesson: |-
      <p><strong>Inference optimization</strong> is the umbrella goal: make a model serve answers <strong>faster, cheaper, and to more users</strong> — without (much) quality loss. It’s where most production AI engineering effort goes.</p><p>The main levers, most of which have their own topic:</p><table class='compare'><tr><th>Lever</th><th>What it buys you</th></tr><tr><td>Quantization</td><td>Smaller, faster, fits cheaper GPUs</td><td></td></tr><tr><td>KV cache + paging</td><td>Avoids recompute; serves more users</td></tr><tr><td>Flash Attention</td><td>Faster, longer contexts</td></tr><tr><td>Batching</td><td>More requests per GPU-second</td></tr><tr><td>Speculative decoding</td><td>Lower latency per answer</td></tr></table><div class='analogy'><p>Think of it like tuning a restaurant kitchen: prep ingredients ahead (cache), cook several orders together (batching), use a faster stove (Flash Attention), and serve smaller portions where nobody notices (quantization). Same food, far more covers per night.</p></div><p>The golden rule: <strong>measure first.</strong> Find the actual bottleneck (memory? compute? latency?) before optimising, or you’ll speed up the wrong thing.</p>
    model: |-
      Inference optimization is <strong>tuning the kitchen</strong>: combine quantization, caching, batching, and faster attention to serve more covers per night — but measure to find the real bottleneck first.
    terms:
    - term: Latency
      def: Time to get a response (or first token).
    - term: Throughput
      def: Total tokens/requests served per second across users.
    - term: Bottleneck
      def: The limiting resource — memory, compute, or bandwidth.
    mistakes:
    - title: Optimising before measuring
      detail: |-
        Guessing the bottleneck wastes effort; profile latency, memory, and throughput first.
    - title: Chasing one metric only
      detail: Latency, throughput, and cost trade off — improving one can hurt another.
    - title: Ignoring quality regressions
      detail: |-
        Aggressive speedups (low-bit quant) can quietly degrade answers; always re-evaluate.
    cards:
    - q: What is inference optimization?
      a: Serving a model faster, cheaper, and to more users without much quality loss.
    - q: First rule of optimising?
      a: Measure to find the real bottleneck before changing anything.
    quiz:
    - q: What should you do before optimising inference?
      correct: Measure to find the real bottleneck
      distractors:
      - Delete the cache
      - Buy more GPUs
      - Quantize to 2-bit
      explain: Profile first so you fix the actual limiting factor.
    - q: Latency and throughput…
      correct: Can trade off against each other
      distractors:
      - Are the same thing
      - Never matter
      - Are set by the tokenizer
      explain: E.g. big batches raise throughput but can raise per-request latency.
    recap: |-
      Inference optimization combines quantization, KV caching, Flash Attention, batching, and speculative decoding to serve more users faster and cheaper. Measure first — latency, throughput, and cost trade off, so fix the real bottleneck.
  - id: model-serving
    title: Model serving
    lesson_format: html
    lesson: |-
      <p><strong>Model serving</strong> is the engineering of <strong>running a model as a live service</strong> that apps can call — taking requests, scheduling them on GPUs, and returning answers reliably at scale.</p><div class='analogy'><p>A trained model is a chef who can cook. Serving is the whole <em>restaurant</em> around them — taking orders, queuing tickets, plating, and handling a rush without the kitchen melting down.</p></div><h3>What a serving system handles</h3><ul><li><strong>An API endpoint</strong> apps send prompts to.</li><li><strong>Batching &amp; scheduling</strong> — combining many users’ requests efficiently.</li><li><strong>Streaming</strong> tokens back as they’re generated.</li><li><strong>Scaling</strong> across GPUs and handling failures.</li></ul><p>Popular serving engines include <strong>vLLM</strong>, <strong>TGI</strong>, and <strong>Ollama</strong> (local). They bake in the optimizations (KV cache paging, batching) so you don’t hand-roll them. Key metrics: <strong>time-to-first-token</strong>, <strong>tokens/second</strong>, and <strong>requests handled concurrently</strong>.</p>
    model: |-
      Serving is the <strong>restaurant around the chef</strong>: an API, a scheduler that batches orders, streaming plates out, and scaling for the dinner rush — not just the cooking itself.
    terms:
    - term: Serving
      def: Running a model as a scalable, callable live service.
    - term: Time-to-first-token (TTFT)
      def: How long until the first output token appears.
    - term: Continuous batching
      def: Dynamically merging incoming requests to keep GPUs busy.
    mistakes:
    - title: Testing only single requests
      detail: Real load is many concurrent users; benchmark concurrency, not one-at-a-time.
    - title: Ignoring time-to-first-token
      detail: |-
        Users feel responsiveness via the first token; raw tokens/sec isn’t the whole story.
    - title: Reinventing the engine
      detail: |-
        Mature servers (vLLM/TGI) handle batching and caching — rarely worth building from scratch.
    cards:
    - q: What is model serving?
      a: 'Running a model as a scalable live service: API, batching, streaming, scaling.'
    - q: Name common serving engines.
      a: vLLM, TGI, and Ollama (local).
    quiz:
    - q: Model serving is mainly about…
      correct: Running it as a reliable, scalable live service
      distractors:
      - Training the model
      - Quantizing weights
      - Writing datasets
      explain: It’s the production system around a trained model.
    - q: Which metric best reflects perceived responsiveness?
      correct: Time-to-first-token
      distractors:
      - Disk size
      - Vocabulary size
      - Parameter count
      explain: Users notice how quickly the first token arrives.
    recap: |-
      Serving is the restaurant around the model: an API, request scheduling/batching, token streaming, and scaling across GPUs. Use engines like vLLM or TGI, and judge them by time-to-first-token, tokens/sec, and concurrency.
  - id: batch-inference
    title: Batch inference
    lesson_format: html
    lesson: |-
      <p><strong>Batch inference</strong> means processing <strong>many inputs together in one go</strong> rather than one at a time. GPUs are built for parallel work, so handling 32 prompts at once is far more efficient than 32 separate runs.</p><div class='analogy'><p>A bus vs 32 taxis. Same passengers, one trip. The bus (batch) uses the road far more efficiently — lower cost per passenger — even if any single rider could’ve gotten a taxi door-to-door slightly faster.</p></div><table class='compare'><tr><th></th><th>Offline batch</th><th>Online (real-time)</th></tr><tr><th>Use</th><td>Process 1M docs overnight</td><td>Live chat responses</td></tr><tr><th>Goal</th><td>Max throughput, low cost</td><td>Low latency per user</td></tr></table><p>For live services, modern servers use <strong>continuous batching</strong>: they don’t wait to gather a fixed group — they slot new requests into the running batch on the fly, getting batch efficiency <em>and</em> low latency. The trade-off to know: <strong>bigger batches raise throughput but can add a little latency</strong> per request.</p>
    model: |-
      Batch inference is a <strong>bus, not taxis</strong>: process many inputs together for big efficiency gains. Continuous batching gets that efficiency live without making users wait for a full bus.
    terms:
    - term: Batch inference
      def: Running many inputs through the model together for efficiency.
    - term: Continuous batching
      def: Adding new requests into a running batch dynamically.
    - term: Throughput vs latency
      def: Total work/sec vs time per single request; batching favours throughput.
    mistakes:
    - title: Batching real-time work naively
      detail: |-
        Waiting to fill a fixed batch adds latency; use continuous batching for live traffic.
    - title: Batches too big for memory
      detail: Each item adds KV-cache VRAM; oversized batches cause out-of-memory errors.
    - title: Assuming batching helps a single user
      detail: |-
        One user’s lone request gets no batching benefit; it shines under concurrent load.
    cards:
    - q: What is batch inference?
      a: Processing many inputs together to use the GPU efficiently.
    - q: What is continuous batching?
      a: |-
        Dynamically adding new requests to a running batch for live, low-latency serving.
    quiz:
    - q: Why is batch inference efficient?
      correct: GPUs process many inputs in parallel cheaply
      distractors:
      - It skips the model
      - It uses the internet
      - It shrinks the model
      explain: Parallel hardware handles a batch far better than one-by-one.
    - q: What does continuous batching achieve?
      correct: Batch efficiency with low latency for live traffic
      distractors:
      - Smaller datasets
      - Bigger models
      - No GPU use
      explain: It slots new requests into a running batch on the fly.
    recap: |-
      Batch inference runs many inputs together — a bus, not taxis — for big GPU efficiency. Offline batches maximise throughput; continuous batching brings that efficiency to live traffic. Watch batch size against VRAM.
  - id: gpu-basics
    title: GPU basics
    lesson_format: html
    lesson: |-
      <p>A <strong>GPU</strong> (Graphics Processing Unit) is the hardware that makes modern AI practical. Where a CPU has a few powerful cores that do tasks one after another, a GPU has <strong>thousands of small cores</strong> doing many simple maths operations <strong>at the same time</strong>.</p><div class='analogy'><p>A CPU is a few master chefs cooking complex dishes sequentially. A GPU is a stadium of line cooks each chopping one onion at once. For ‘multiply these millions of numbers together’ — exactly what models do — the stadium wins overwhelmingly.</p></div><h3>What matters when picking a GPU</h3><ul><li><strong>VRAM</strong> (memory) — decides what size model fits at all. The #1 spec for LLMs.</li><li><strong>Compute</strong> (FLOPS) — how fast the maths runs.</li><li><strong>Memory bandwidth</strong> — how fast data moves to the cores; often the real speed limit for generation.</li></ul><p>You’ll hear names like the data-center <strong>A100/H100</strong> and consumer <strong>RTX</strong> cards. Apple’s <strong>M-series</strong> chips share memory between CPU/GPU (‘unified memory’), which is why Macs can run surprisingly large local models.</p>
    model: |-
      A GPU is a <strong>stadium of line cooks</strong> doing simple maths in parallel. For LLMs, the seat count that matters most is <strong>VRAM</strong> — it decides what fits at all.
    terms:
    - term: GPU
      def: Hardware with thousands of cores for massively parallel maths.
    - term: FLOPS
      def: Floating-point operations per second — a measure of compute speed.
    - term: Memory bandwidth
      def: Rate of moving data between VRAM and the cores.
    mistakes:
    - title: Focusing on compute over VRAM
      detail: |-
        For LLMs, if the model doesn’t fit in VRAM it won’t run at all — memory comes first.
    - title: Ignoring memory bandwidth
      detail: |-
        Token generation is often bandwidth-bound, not compute-bound; raw FLOPS can mislead.
    - title: Assuming a gaming GPU equals a data-center one
      detail: They differ in VRAM, interconnects, and multi-GPU scaling.
    cards:
    - q: Why GPUs for AI?
      a: Thousands of cores do the model’s parallel matrix maths simultaneously.
    - q: Most important GPU spec for LLMs?
      a: VRAM — it determines what model size fits.
    quiz:
    - q: Why are GPUs better than CPUs for AI?
      correct: Thousands of cores do parallel maths at once
      distractors:
      - They store more files
      - They’re cheaper always
      - They use the internet
      explain: Massive parallelism suits the model’s matrix maths.
    - q: 'For running LLMs, the #1 spec is usually…'
      correct: VRAM (memory capacity)
      distractors:
      - Fan size
      - Number of USB ports
      - Clock speed
      explain: VRAM decides whether the model fits at all.
    recap: |-
      GPUs run AI by doing massively parallel maths — a stadium of line cooks vs a CPU’s few chefs. For LLMs, VRAM matters most (what fits), with memory bandwidth often the real speed limit for generation.
  - id: vram-basics
    title: VRAM basics
    lesson_format: html
    lesson: |-
      <p><strong>VRAM</strong> is the GPU’s own fast memory — the workbench where the model and its working data must <strong>physically fit</strong> to run. If a model doesn’t fit in VRAM, it either won’t run or gets painfully slow.</p><h3>What’s competing for VRAM</h3><ul><li><strong>The weights</strong> — roughly <em>2&nbsp;GB per billion params</em> at 16-bit (about <em>0.5&nbsp;GB/B</em> at 4-bit).</li><li><strong>The KV cache</strong> — grows with context length and number of users.</li><li><strong>Overhead</strong> — activations and framework buffers.</li></ul><div class='analogy'><p>VRAM is the size of your desk. The model is a big book you must lay open on it, and the KV cache is the growing stack of notes beside it. Too small a desk and you simply can’t work.</p></div><p>Quick estimate for fitting a model: <strong>params × bytes-per-param + room for KV cache</strong>. A 7B model at 4-bit (~4&nbsp;GB) fits an 8&nbsp;GB card; the same model at 16-bit (~14&nbsp;GB) does not. This is exactly why quantization matters so much for local use.</p>
    model: |-
      VRAM is the <strong>desk size</strong>: the model must lie open on it, with room for the growing KV-cache notes. Too small a desk = it won’t run. Quantization shrinks the book to fit.
    terms:
    - term: VRAM
      def: The GPU’s dedicated memory where the model and working data must fit.
    - term: Bytes per param
      def: ~2 at 16-bit, ~1 at 8-bit, ~0.5 at 4-bit.
    - term: OOM
      def: Out Of Memory — the error when something doesn’t fit in VRAM.
    mistakes:
    - title: Counting only the weights
      detail: |-
        The KV cache and overhead also need VRAM — leave headroom or you’ll hit out-of-memory.
    - title: Ignoring context length
      detail: |-
        Long contexts inflate KV-cache memory fast; a model that fits empty may not fit a long chat.
    - title: Forgetting precision changes the math
      detail: Same model is ~4× smaller at 4-bit than 16-bit — precision decides if it fits.
    cards:
    - q: What is VRAM?
      a: The GPU’s fast memory where the model and working data must physically fit.
    - q: Rough VRAM for weights at 16-bit?
      a: ~2 GB per billion parameters (~0.5 GB/B at 4-bit).
    quiz:
    - q: Roughly how much VRAM do a 7B model’s weights need at 16-bit?
      correct: ~14 GB
      distractors:
      - ~1.5 GB
      - ~70 GB
      - ~0.5 GB
      explain: ~2 GB per billion params at 16-bit ≈ 14 GB.
    - q: Besides weights, what else consumes VRAM?
      correct: The KV cache and overhead, growing with context/users
      distractors:
      - The tokenizer file only
      - Nothing
      - The internet
      explain: KV cache plus activations/buffers need headroom too.
    recap: |-
      VRAM is the desk the model must fit on — weights (~2 GB/B at 16-bit), plus a KV cache that grows with context and users. Leave headroom, mind context length, and use quantization to make big models fit.
  - id: latency-quality
    title: Latency vs quality tradeoffs
    lesson_format: html
    lesson: |-
      <p>Almost every inference choice is a <strong>trade-off triangle</strong>: <strong>speed</strong>, <strong>quality</strong>, and <strong>cost</strong>. Push one corner and you usually pull on another. Good engineering is picking the right balance for <em>your</em> use case, not maxing one blindly.</p><table class='compare'><tr><th>Choice</th><th>Faster/Cheaper</th><th>Higher quality</th></tr><tr><td>Model size</td><td>Smaller model</td><td>Bigger model</td></tr><tr><td>Quantization</td><td>4-bit</td><td>16-bit</td></tr><tr><td>Output length</td><td>Short answers</td><td>Long, detailed</td></tr><tr><td>Reasoning steps</td><td>Answer directly</td><td>Think step-by-step</td></tr></table><div class='analogy'><p>Like shipping a package: <em>overnight</em> (fast, pricey), <em>standard</em> (balanced), or <em>economy</em> (cheap, slow). There’s no universally ‘best’ option — it depends on what the delivery is for.</p></div><p>Match the tier to the job: a <strong>live chat</strong> needs low latency (favor a smaller/quantized model, short first response), while an <strong>overnight report</strong> can use a big model at full quality. Many systems route easy requests to a cheap model and hard ones to a strong model.</p>
    model: |-
      It’s a <strong>speed–quality–cost triangle</strong>: you pick two, you pay on the third. Choose the shipping tier that fits the job, and route easy vs hard requests differently.
    terms:
    - term: Trade-off triangle
      def: Speed, quality, and cost — improving one tends to cost another.
    - term: Model routing
      def: Sending easy requests to cheap models and hard ones to strong models.
    - term: Good enough
      def: The minimum quality that satisfies the use case; the real target.
    mistakes:
    - title: Using the biggest model for everything
      detail: Most requests are easy; a huge model wastes money and latency on them.
    - title: Optimising speed past the point users notice
      detail: Below a certain latency, users can’t tell — extra effort there is wasted.
    - title: Ignoring quality floors
      detail: |-
        Cutting cost with low-bit quant or tiny models can drop below an acceptable quality bar — measure it.
    cards:
    - q: What three things trade off in inference?
      a: Speed, quality, and cost — improve one and you usually pay on another.
    - q: What is model routing?
      a: Sending easy requests to cheap models and hard ones to strong models.
    quiz:
    - q: The core inference trade-off is between…
      correct: Speed, quality, and cost
      distractors:
      - CPU and RAM only
      - Tokens and words
      - Colour and font
      explain: These three pull against each other in most choices.
    - q: A smart way to balance them across requests is…
      correct: Route easy requests to cheap models, hard ones to strong models
      distractors:
      - Never quantize
      - One giant model for all
      - Always use 2-bit
      explain: Routing matches cost/quality to each request’s difficulty.
    recap: |-
      Inference is a speed–quality–cost triangle — pick the tier that fits the job rather than maxing one blindly. Use small/quantized models for live chat, big models for offline quality, and route easy vs hard requests differently.
- id: local-ecosystem
  title: Local AI Ecosystem
  topics:
  - id: llama-cpp
    title: llama.cpp
    lesson_format: html
    lesson: |-
      <p><strong>llama.cpp</strong> is a small, fast engine (written in C++) that <strong>runs LLMs on ordinary computers</strong> — including on the CPU alone, with no giant data-center GPU required. It’s the foundation that much of the local-AI world is built on.</p><div class='analogy'><p>If models are engines, llama.cpp is a brilliantly efficient car that runs on regular fuel. It made ‘run a real LLM on your laptop’ go from impossible to ordinary.</p></div><h3>Why it matters</h3><ul><li>Runs the <strong>GGUF</strong> format (one self-contained, quantized file).</li><li>Works on <strong>CPU, and most GPUs</strong> (Apple Metal, NVIDIA, AMD).</li><li>It’s the engine <em>inside</em> friendlier tools like <strong>Ollama</strong> and <strong>LM Studio</strong> — so even if you never touch it directly, you’re probably using it.</li></ul><p>It’s lower-level than Ollama: more control and efficiency, but you deal with files and flags. Most beginners use it through a wrapper; power users call it directly.</p>
    model: |-
      llama.cpp is the <strong>efficient engine under the hood</strong> of local AI: it runs quantized GGUF models on everyday hardware, and most friendly local tools are wrappers around it.
    terms:
    - term: llama.cpp
      def: A C++ engine for running LLMs efficiently on CPU/GPU.
    - term: GGUF
      def: The single-file quantized model format llama.cpp uses.
    - term: Wrapper
      def: A friendlier tool built on top of an engine (e.g. Ollama over llama.cpp).
    mistakes:
    - title: Thinking it’s a chat app
      detail: |-
        It’s an engine/library; the nice chat UI you use is usually a wrapper (Ollama, LM Studio).
    - title: Loading the wrong format
      detail: It runs GGUF — not raw Hugging Face safetensors directly.
    - title: Ignoring the quant choice
      detail: Pick a GGUF quant (e.g. Q4_K_M) that fits your RAM; too big won’t load.
    cards:
    - q: What is llama.cpp?
      a: A fast C++ engine that runs quantized GGUF models on CPU/GPU.
    - q: What popular tools wrap it?
      a: Ollama and LM Studio.
    quiz:
    - q: What is llama.cpp?
      correct: A C++ engine that runs LLMs on regular hardware
      distractors:
      - A dataset
      - A tokenizer
      - A cloud provider
      explain: It’s the efficient local-inference engine, runnable even on CPU.
    - q: Which format does llama.cpp run?
      correct: GGUF
      distractors:
      - PDF
      - MP3
      - CSV
      explain: It loads single-file quantized GGUF models.
    recap: |-
      llama.cpp is the efficient C++ engine that runs quantized GGUF models on everyday hardware — even CPU-only. It powers friendlier tools like Ollama and LM Studio, so you’re likely using it even indirectly.
  - id: ollama
    title: Ollama
    lesson_format: html
    lesson: |-
      <p><strong>Ollama</strong> is the <strong>easy button</strong> for running models locally. It wraps llama.cpp in a simple tool: install it, type one command, and a model downloads and runs — with a built-in API so your apps can call it too.</p><pre><code>ollama run llama3        # download + chat in one line
      ollama pull mistral      # just download
      # then your app calls http://localhost:11434</code></pre><div class='analogy'><p>If llama.cpp is the engine, Ollama is the <em>turn-key car</em>: you don’t pop the hood or pick fuel grades. It handles downloading, quantization choice, and serving for you.</p></div><h3>Why beginners love it</h3><ul><li><strong>One-command</strong> model download and run.</li><li><strong>Local API</strong> on your machine — swap it in where you’d call a cloud API.</li><li><strong>Model library</strong> with sensible default quantizations.</li></ul><p>Trade-off: convenience over control. For maximum throughput serving many users, teams often move to <strong>vLLM</strong>; for a single developer or a local app, Ollama is usually perfect.</p>
    model: |-
      Ollama is the <strong>turn-key car</strong> over llama.cpp’s engine: one command to download, run, and serve a local model with an API — convenience over fine control.
    terms:
    - term: Ollama
      def: A user-friendly local model runner built on llama.cpp, with a local API.
    - term: Local API
      def: An endpoint on your own machine your apps can call like a cloud API.
    - term: Model library
      def: Ollama’s catalogue of ready-to-pull models with default quants.
    mistakes:
    - title: Expecting data-center throughput
      detail: |-
        It’s tuned for local/single-user ease; heavy multi-user serving favours vLLM/TGI.
    - title: Forgetting it exposes a local API
      detail: Point your app at localhost:11434 instead of hand-running the model.
    - title: Picking a model too big for your RAM
      detail: Even with easy defaults, a 70B model won’t fit a small machine.
    cards:
    - q: What is Ollama?
      a: |-
        A turn-key local runner over llama.cpp: one command to download, run, and serve with an API.
    - q: Ollama vs vLLM?
      a: Ollama = local ease; vLLM = high-throughput multi-user serving.
    quiz:
    - q: What is Ollama best described as?
      correct: An easy local model runner with a built-in API
      distractors:
      - A training framework
      - A GPU
      - A vector database
      explain: It’s a convenient wrapper to download, run, and serve models locally.
    - q: When might you outgrow Ollama?
      correct: For high-throughput multi-user serving (use vLLM)
      distractors:
      - For a single developer
      - For small models
      - For offline use
      explain: Heavy concurrent serving favours engines like vLLM/TGI.
    recap: |-
      Ollama is the easy button for local models — one command to download, run, and serve via a local API, built on llama.cpp. Great for single users and local apps; switch to vLLM for heavy multi-user throughput.
  - id: vllm
    title: vLLM
    lesson_format: html
    lesson: |-
      <p><strong>vLLM</strong> is a high-performance <strong>serving engine</strong> built to run models for <strong>many users at once</strong>, fast and efficiently. Where Ollama optimises for one-person ease, vLLM optimises for <em>throughput at scale</em>.</p><div class='analogy'><p>Ollama is your personal car. vLLM is a <em>fleet of buses with an expert dispatcher</em> — it keeps the GPUs packed with passengers so cost-per-rider drops dramatically under load.</p></div><h3>Its signature trick: PagedAttention</h3><p>vLLM manages the KV cache like a computer manages RAM — in small <strong>pages</strong> instead of one big reserved block. This wastes far less memory, so it can serve <strong>more users with longer contexts</strong> on the same GPU. Combined with <strong>continuous batching</strong>, it delivers excellent tokens/second under heavy concurrent load.</p><p>It speaks an <strong>OpenAI-compatible API</strong>, so apps written for cloud APIs often work against vLLM with just a URL change. It’s a common choice for self-hosting open models in production.</p>
    model: |-
      vLLM is a <strong>bus fleet with a smart dispatcher</strong>: PagedAttention + continuous batching pack the GPU efficiently, serving many users with long contexts at high throughput.
    terms:
    - term: vLLM
      def: A high-throughput GPU serving engine for LLMs.
    - term: PagedAttention
      def: Managing the KV cache in small pages to cut memory waste.
    - term: OpenAI-compatible API
      def: An endpoint that mimics the popular API shape, easing drop-in use.
    mistakes:
    - title: Using it for a single local chat
      detail: Its edge is concurrency; for one user, Ollama is simpler and just as good.
    - title: Undersizing the GPU
      detail: It’s GPU-first; it shines on proper GPUs, not CPU-only laptops.
    - title: Ignoring API compatibility
      detail: |-
        Its OpenAI-compatible endpoint means you often don’t need to rewrite clients — use that.
    cards:
    - q: What is vLLM?
      a: A high-throughput GPU serving engine for many concurrent users.
    - q: What is PagedAttention?
      a: Managing the KV cache in small pages to cut memory waste and serve more users.
    quiz:
    - q: vLLM is optimised primarily for…
      correct: High-throughput serving of many concurrent users
      distractors:
      - Drawing graphics
      - Training datasets
      - Single-user laptop ease
      explain: It maximises throughput under concurrent load.
    - q: What does PagedAttention improve?
      correct: KV-cache memory efficiency
      distractors:
      - Tokenizer speed
      - Dataset cleaning
      - Font rendering
      explain: Paging the KV cache reduces memory waste, serving more users.
    recap: |-
      vLLM is a production serving engine built for concurrency: PagedAttention and continuous batching pack the GPU to serve many users with long contexts fast. It offers an OpenAI-compatible API for easy drop-in.
  - id: mlx
    title: MLX
    lesson_format: html
    lesson: |-
      <p><strong>MLX</strong> is Apple’s machine-learning framework, built specifically for <strong>Apple Silicon</strong> (M1/M2/M3/M4 chips). It lets Macs run and even fine-tune models efficiently using their <strong>unified memory</strong>.</p><div class='analogy'><p>Most AI tools were designed for NVIDIA GPUs — like software written for Windows. MLX is the version built natively for Mac, so it uses the hardware the way it was meant to be used.</p></div><h3>Why it’s interesting</h3><ul><li><strong>Unified memory:</strong> on Apple chips the CPU and GPU share one big memory pool, so a Mac with 64–128GB can hold surprisingly large models — no separate VRAM ceiling.</li><li><strong>Native speed</strong> on Macs, often beating generic CPU paths.</li><li>Supports <strong>local fine-tuning</strong> (e.g. LoRA) on a laptop, not just inference.</li></ul><p>It’s Mac-only by design. On Apple hardware it’s a strong choice; for NVIDIA GPUs you’d use the PyTorch/CUDA ecosystem instead. (For simple local chat on a Mac, Ollama also works great via Metal.)</p>
    model: |-
      MLX is <strong>‘built for Mac’ AI</strong>: it taps Apple Silicon’s unified memory so laptops can run — and fine-tune — bigger models than their ‘VRAM’ would suggest.
    terms:
    - term: MLX
      def: Apple’s ML framework optimised for Apple Silicon.
    - term: Unified memory
      def: Shared CPU/GPU memory pool on Apple chips — no separate VRAM cap.
    - term: Apple Silicon
      def: Apple’s M-series chips (M1–M4).
    mistakes:
    - title: Trying to use it off Apple Silicon
      detail: MLX is designed for M-series chips; it’s not a cross-platform CUDA replacement.
    - title: Assuming Macs can’t fine-tune
      detail: With unified memory + MLX, local LoRA fine-tuning on a Mac is realistic.
    - title: Expecting CUDA-library parity
      detail: The NVIDIA ecosystem is larger; some tools/models land there first.
    cards:
    - q: What is MLX?
      a: Apple’s ML framework optimised for Apple Silicon (M-series).
    - q: Why is unified memory a big deal?
      a: |-
        CPU/GPU share one large pool, so Macs can hold bigger models than typical VRAM allows.
    quiz:
    - q: MLX is built for…
      correct: Apple Silicon Macs
      distractors:
      - Android phones
      - Web browsers
      - NVIDIA data centers
      explain: It’s Apple’s framework for M-series chips.
    - q: Why can Macs run large models with MLX?
      correct: Unified memory lets CPU/GPU share one big pool
      distractors:
      - They use the cloud
      - They have no memory limit
      - Magic
      explain: Shared memory removes the separate small-VRAM ceiling.
    recap: |-
      MLX is Apple’s native ML framework for M-series chips. Thanks to unified memory, Macs can run and even LoRA-fine-tune surprisingly large models locally. It’s Mac-only; NVIDIA users stay in the PyTorch/CUDA world.
  - id: huggingface
    title: Hugging Face
    lesson_format: html
    lesson: |-
      <p><strong>Hugging Face</strong> is the <strong>GitHub of AI</strong> — the central hub where the community shares models, datasets, and tools. If you want an open model or dataset, this is almost always where you get it.</p><div class='analogy'><p>An app store crossed with GitHub, for AI. Browse hundreds of thousands of models, click to download, and use shared code to load them in a few lines.</p></div><h3>What lives there</h3><ul><li><strong>The Hub</strong> — models &amp; datasets you can download (or stream).</li><li><strong>transformers</strong> — the popular Python library to load and run models in a few lines.</li><li><strong>Spaces</strong> — hosted demos you can try in the browser.</li><li><strong>Tokenizers, datasets, accelerate</strong> — supporting libraries used everywhere.</li></ul><pre><code>from transformers import pipeline
      pipe = pipeline("text-generation", model="some-org/some-model")
      print(pipe("Hello,"))</code></pre><p>Practical notes: models come in <strong>safetensors</strong> format (the standard for the PyTorch world), many require accepting a <strong>licence</strong>, and the same model often has community <strong>GGUF</strong> versions for local use.</p>
    model: |-
      Hugging Face is the <strong>GitHub/app-store of AI</strong>: the hub for open models, datasets, and the <code>transformers</code> library that loads them in a few lines.
    terms:
    - term: Hugging Face Hub
      def: The central repository for sharing models and datasets.
    - term: transformers
      def: Hugging Face’s Python library to load and run models.
    - term: safetensors
      def: A safe, standard file format for model weights in the PyTorch ecosystem.
    mistakes:
    - title: Ignoring model licences
      detail: |-
        Many models gate access or restrict commercial use — read the licence before shipping.
    - title: Confusing the Hub with one library
      detail: |-
        Hugging Face is a hub + several libraries (transformers, datasets, tokenizers), not a single tool.
    - title: Downloading the wrong variant
      detail: |-
        safetensors for PyTorch/GPU stacks; GGUF for llama.cpp/Ollama — grab the one your runner needs.
    cards:
    - q: What is Hugging Face?
      a: The community hub for open models, datasets, and the transformers library.
    - q: safetensors vs GGUF?
      a: safetensors for PyTorch/GPU stacks; GGUF for llama.cpp/Ollama local runners.
    quiz:
    - q: Hugging Face is best described as…
      correct: The community hub for models, datasets, and tools
      distractors:
      - A GPU vendor
      - A cloud-only API
      - A single chatbot
      explain: It’s the ‘GitHub of AI’ — a hub plus libraries.
    - q: Before using a downloaded model commercially, check…
      correct: Its licence/terms
      distractors:
      - Its colour
      - The author’s avatar
      - The file date
      explain: Licences vary and may restrict commercial use.
    recap: |-
      Hugging Face is the GitHub/app-store of AI — the hub for open models and datasets plus the transformers library to load them. Mind model licences and grab the right format (safetensors vs GGUF) for your runner.
  - id: unsloth
    title: Unsloth
    lesson_format: html
    lesson: |-
      <p><strong>Unsloth</strong> is a library that makes <strong>fine-tuning much faster and lighter</strong> — often roughly 2× the speed and a big memory saving — so you can train models like LoRA/QLoRA on a single modest GPU (or a free cloud notebook).</p><div class='analogy'><p>Same destination, a faster route with better mileage. Unsloth rewrites the slow parts of training with hand-optimised code, so the same fine-tune finishes sooner and fits in less memory — without changing the result.</p></div><h3>Why people reach for it</h3><ul><li><strong>Speed &amp; memory:</strong> optimised kernels cut training time and VRAM use.</li><li><strong>Beginner-friendly:</strong> ready-made notebooks for common models.</li><li><strong>Plays nicely</strong> with the Hugging Face ecosystem (PEFT/TRL under the hood).</li></ul><p>It’s focused on <strong>training/fine-tuning</strong>, not serving. Think of it as the on-ramp that makes ‘fine-tune your own model on a laptop-class GPU’ realistic for individuals.</p>
    model: |-
      Unsloth is a <strong>faster, leaner route to fine-tuning</strong>: optimised kernels cut time and VRAM so LoRA/QLoRA fits on a single modest GPU — same result, less cost.
    terms:
    - term: Unsloth
      def: A library that speeds up and slims down LLM fine-tuning.
    - term: Optimised kernels
      def: Hand-tuned low-level code that runs key steps faster.
    - term: Free-tier training
      def: Fine-tuning on free/cheap cloud notebooks, made feasible by lower memory use.
    mistakes:
    - title: Expecting it to serve models
      detail: It’s for training/fine-tuning; serving is a different tool (vLLM/Ollama).
    - title: Thinking speed changes results
      detail: |-
        It optimises the computation; the fine-tuned quality is comparable, just cheaper to reach.
    - title: Skipping data quality
      detail: Faster training doesn’t fix bad data — curation still rules the outcome.
    cards:
    - q: What is Unsloth?
      a: A library that makes LoRA/QLoRA fine-tuning faster and lighter on memory.
    - q: Training or serving?
      a: Training/fine-tuning — not model serving.
    quiz:
    - q: What is Unsloth for?
      correct: Faster, lower-memory fine-tuning
      distractors:
      - Drawing charts
      - Serving at scale
      - Vector search
      explain: It accelerates and slims fine-tuning like LoRA/QLoRA.
    - q: Does Unsloth’s speedup hurt quality?
      correct: No — it optimises computation, results are comparable
      distractors:
      - It needs no data
      - It deletes data
      - Yes, a lot
      explain: It’s an efficiency tool; quality is comparable, cost is lower.
    recap: |-
      Unsloth speeds up and slims down fine-tuning with optimised kernels, making LoRA/QLoRA feasible on a single modest GPU or free notebook. It’s a training tool — quality stays comparable, cost drops; serving is elsewhere.
  - id: axolotl
    title: Axolotl
    lesson_format: html
    lesson: |-
      <p><strong>Axolotl</strong> is a fine-tuning tool that lets you train models by <strong>editing a config file</strong> instead of writing training code. You describe <em>what</em> you want — model, dataset, method — and it handles the <em>how</em>.</p><pre><code># a slice of an Axolotl YAML config
      base_model: meta-llama/Llama-3-8B
      load_in_4bit: true
      adapter: qlora
      datasets:
        - path: ./my_data.jsonl
          type: alpaca</code></pre><div class='analogy'><p>Like ordering from a detailed menu instead of cooking from scratch. You tick the options (which model, LoRA or QLoRA, which dataset format) and the kitchen runs the recipe.</p></div><h3>Where it fits</h3><ul><li>Great for <strong>reproducible, configurable</strong> fine-tunes — the config <em>is</em> the recipe you can share and version.</li><li>Supports many <strong>models, dataset formats, and methods</strong> (full, LoRA, QLoRA, DPO).</li><li>More flexible than a one-click notebook, simpler than hand-writing training loops.</li></ul>
    model: |-
      Axolotl is <strong>fine-tuning from a menu (YAML)</strong>: declare the model, data, and method in a config and it runs the training — reproducible and shareable, no training loop to write.
    terms:
    - term: Axolotl
      def: A config-driven (YAML) fine-tuning framework.
    - term: YAML config
      def: A human-readable settings file describing the whole training run.
    - term: Dataset type
      def: The expected format/template of your training data (e.g. alpaca, sharegpt).
    mistakes:
    - title: Mismatched dataset ‘type’
      detail: |-
        The config’s dataset format must match your file’s actual shape, or training misreads it.
    - title: Treating it as a serving tool
      detail: Axolotl trains; you serve the result elsewhere (vLLM/Ollama).
    - title: Copy-pasting configs blindly
      detail: |-
        Settings like batch size and rank must suit your GPU and data — read what each does.
    cards:
    - q: What is Axolotl?
      a: |-
        A config-driven (YAML) fine-tuning framework — declare model/data/method, it trains.
    - q: Axolotl vs Unsloth?
      a: |-
        Both fine-tune; Axolotl is config-driven and broad, Unsloth focuses on speed/memory.
    quiz:
    - q: How do you mainly drive Axolotl?
      correct: By editing a YAML config file
      distractors:
      - By calling a cloud API
      - By drawing diagrams
      - By writing a training loop
      explain: You declare the run in config; it executes it.
    - q: A common Axolotl pitfall is…
      correct: A dataset ‘type’ that doesn’t match your file’s format
      distractors:
      - Too few colours
      - Saving checkpoints
      - Using a GPU
      explain: Mismatched dataset format makes training misread the data.
    recap: |-
      Axolotl lets you fine-tune by editing a YAML config instead of writing training code — reproducible, shareable, and supporting many models, formats, and methods. Match the dataset ‘type’ to your file; serve the result elsewhere.
  - id: peft
    title: PEFT
    lesson_format: html
    lesson: |-
      <p><strong>PEFT</strong> stands for <strong>Parameter-Efficient Fine-Tuning</strong> — the family of methods (and Hugging Face’s library by the same name) for fine-tuning by training only a <strong>tiny fraction</strong> of a model’s parameters.</p><div class='analogy'><p>Renovating one room instead of rebuilding the whole house. You get the change you need while leaving 99% of the structure untouched — far cheaper and faster.</p></div><p>You’ve already met the star member: <strong>LoRA</strong> (and QLoRA). PEFT is the umbrella term that covers LoRA and its cousins, and the library makes them easy to apply:</p><pre><code>from peft import LoraConfig, get_peft_model
      model = get_peft_model(base_model, LoraConfig(r=16, ...))
      # now only the small adapter trains</code></pre><h3>Why it’s everywhere</h3><ul><li><strong>Cheap:</strong> train ~1% of params, not 100%.</li><li><strong>Small outputs:</strong> adapters are MBs and swappable.</li><li><strong>Standard:</strong> tools like Axolotl, TRL, and Unsloth use PEFT under the hood.</li></ul>
    model: |-
      PEFT is the <strong>‘renovate one room’ umbrella</strong> for fine-tuning — train a tiny slice of parameters (LoRA &amp; friends) instead of the whole model. Cheap, small, and the industry default.
    terms:
    - term: PEFT
      def: Parameter-Efficient Fine-Tuning — train a small fraction of parameters.
    - term: PEFT (library)
      def: Hugging Face’s library implementing LoRA and related methods.
    - term: Targeted adaptation
      def: Changing behaviour with minimal parameter updates.
    mistakes:
    - title: Thinking PEFT = LoRA only
      detail: |-
        LoRA is the most popular member, but PEFT covers a whole family of efficient methods.
    - title: Expecting full-model power for huge domain shifts
      detail: |-
        For deep changes you may still need fuller training; PEFT excels at targeted adaptation.
    - title: Losing the base model
      detail: PEFT adapters need their matching base to run — keep both or merge them.
    cards:
    - q: What is PEFT?
      a: Parameter-Efficient Fine-Tuning — train a tiny fraction of params (e.g. LoRA).
    - q: Is PEFT just LoRA?
      a: No — LoRA is the star, but PEFT is the whole efficient-tuning family.
    quiz:
    - q: What does PEFT mean?
      correct: Parameter-Efficient Fine-Tuning
      distractors:
      - A GPU type
      - A serving engine
      - A dataset format
      explain: It’s the family of methods training only a few parameters.
    - q: LoRA is…
      correct: The most popular member of the PEFT family
      distractors:
      - A serving tool
      - Unrelated to PEFT
      - A tokenizer
      explain: LoRA/QLoRA are flagship PEFT methods.
    recap: |-
      PEFT — Parameter-Efficient Fine-Tuning — trains a tiny slice of a model’s parameters (LoRA and cousins) instead of all of them. It’s cheap, produces small swappable adapters, and underpins tools like Axolotl, TRL, and Unsloth.
  - id: trl
    title: TRL library
    lesson_format: html
    lesson: |-
      <p><strong>TRL</strong> (Transformer Reinforcement Learning) is Hugging Face’s library for the <strong>training methods that shape behaviour</strong> — especially <strong>SFT, DPO, and RLHF</strong>. If PEFT is <em>how</em> you train efficiently, TRL provides <em>which</em> training recipe you run.</p><div class='analogy'><p>A set of standard recipe cards for teaching a model manners. Want supervised examples? Use the SFT card. Want preference tuning? The DPO card. TRL gives you the proven recipe so you don’t reinvent it.</p></div><h3>What’s in the box</h3><ul><li><strong>SFTTrainer</strong> — supervised fine-tuning on example pairs.</li><li><strong>DPOTrainer</strong> — preference tuning from chosen/rejected pairs.</li><li><strong>PPO/RLHF</strong> tooling — the reward-based reinforcement loop.</li></ul><p>It works hand-in-hand with <strong>PEFT</strong> (so you can do, say, DPO with LoRA cheaply) and the rest of Hugging Face. Tools like Axolotl and Unsloth often call TRL trainers under the hood.</p>
    model: |-
      TRL is the <strong>recipe-card box for behaviour training</strong>: ready-made SFT, DPO, and RLHF trainers you pair with PEFT — pick the recipe, plug in your data, train.
    terms:
    - term: TRL
      def: Hugging Face’s library for SFT, DPO, and RLHF training.
    - term: SFTTrainer / DPOTrainer
      def: Ready-made trainers for supervised and preference fine-tuning.
    - term: PPO
      def: A reinforcement-learning algorithm used in the RLHF loop.
    mistakes:
    - title: Picking the wrong trainer
      detail: |-
        Match the method to your data: pairs → SFT, preferences → DPO, reward loop → PPO/RLHF.
    - title: Running DPO/RLHF without SFT first
      detail: Preference methods usually refine an already instruction-tuned model.
    - title: Ignoring PEFT integration
      detail: Combine TRL with LoRA/QLoRA to keep these trainings cheap.
    cards:
    - q: What is TRL?
      a: Hugging Face’s library of SFT, DPO, and RLHF trainers.
    - q: TRL vs PEFT?
      a: |-
        TRL = which training recipe (SFT/DPO/RLHF); PEFT = how to train it efficiently (LoRA).
    quiz:
    - q: TRL mainly provides…
      correct: Trainers for SFT, DPO, and RLHF
      distractors:
      - GPUs
      - Vector databases
      - Serving engines
      explain: It implements the behaviour-shaping training recipes.
    - q: TRL is commonly paired with…
      correct: PEFT (e.g. LoRA) to keep training cheap
      distractors:
      - A spreadsheet
      - A web browser
      - A tokenizer only
      explain: TRL + PEFT lets you run DPO/SFT efficiently.
    recap: |-
      TRL provides ready-made trainers for the behaviour-shaping methods — SFT, DPO, and RLHF. Pair it with PEFT (LoRA/QLoRA) for cheap runs. Match the trainer to your data, and run SFT before preference methods.
- id: rag-memory
  title: RAG & Memory
  topics:
  - id: rag
    title: RAG
    lesson_format: html
    lesson: |-
      <p><strong>RAG</strong> = <strong>Retrieval-Augmented Generation</strong>. Instead of relying only on what a model memorised in training, you <strong>look up relevant information first</strong> and paste it into the prompt, so the model answers from real, current sources.</p><div class='analogy'><p>Closed-book vs open-book exam. A plain LLM answers from memory (and may misremember). RAG hands it the open textbook — it reads the relevant page, then answers. Same student, far fewer made-up facts.</p></div><h3>The basic flow</h3><ul><li><strong>1. Retrieve</strong> — find the chunks of your documents most relevant to the question.</li><li><strong>2. Augment</strong> — stuff those chunks into the prompt as context.</li><li><strong>3. Generate</strong> — the model answers using that supplied context.</li></ul><p>Why it’s everywhere: it adds <strong>fresh, private, or niche knowledge</strong> without retraining, makes answers <strong>citable</strong>, and sharply <strong>cuts hallucinations</strong> — usually cheaper and faster than fine-tuning facts into the weights.</p>
    model: |-
      RAG turns a <strong>closed-book exam into an open-book one</strong>: fetch the right pages first, then let the model answer from them — fresh facts, citations, fewer hallucinations, no retraining.
    terms:
    - term: RAG
      def: Retrieval-Augmented Generation — fetch relevant text, then generate from it.
    - term: Retrieve / augment / generate
      def: 'The three RAG steps: find, insert into prompt, answer.'
    - term: Grounding
      def: Tying answers to supplied sources so they’re accurate and citable.
    mistakes:
    - title: Retrieving the wrong chunks
      detail: |-
        If retrieval surfaces irrelevant text, the answer is wrong no matter how good the model is — retrieval quality is everything.
    - title: Stuffing in too much
      detail: |-
        Dumping 50 chunks bloats the prompt, costs more, and buries the useful bit (‘lost in the middle’).
    - title: Using RAG for behaviour
      detail: RAG supplies knowledge; to change tone/format you still fine-tune or prompt.
    cards:
    - q: What does RAG stand for?
      a: Retrieval-Augmented Generation — fetch relevant text, then generate from it.
    - q: RAG vs fine-tuning for facts?
      a: RAG adds fresh/private facts without retraining and makes answers citable.
    quiz:
    - q: What does RAG add to a plain LLM?
      correct: Relevant retrieved info inserted into the prompt
      distractors:
      - A new tokenizer
      - More parameters
      - A bigger GPU
      explain: It fetches relevant context so the model answers from real sources.
    - q: RAG is the better choice than fine-tuning when you need…
      correct: Fresh, private, or frequently-changing facts
      distractors:
      - A smaller model
      - A new writing tone
      - Lower VRAM
      explain: RAG supplies changing knowledge without retraining.
    recap: |-
      RAG makes the model take an open-book exam: retrieve relevant chunks, add them to the prompt, then generate. It injects fresh/private knowledge without retraining, enables citations, and cuts hallucinations. Retrieval quality is everything.
  - id: vector-databases
    title: Vector databases
    lesson_format: html
    lesson: |-
      <p>A <strong>vector database</strong> stores text (and other data) as <strong>embeddings</strong> — those meaning-coordinates from the Foundations module — and is built to answer one question blazingly fast: <em>“which stored items are closest in meaning to this query?”</em></p><div class='analogy'><p>An ordinary database finds rows by exact match (‘WHERE name = Bob’). A vector database finds by <em>similarity</em> (‘things that mean roughly this’). It’s less ‘filing cabinet,’ more ‘nearest-neighbour map.’</p></div><h3>What it does for RAG</h3><ul><li>You <strong>embed</strong> each document chunk and store the vectors.</li><li>At query time you embed the question and ask for the <strong>nearest vectors</strong>.</li><li>It returns the most relevant chunks in milliseconds — even across millions of items — using clever <strong>approximate</strong> search (ANN).</li></ul><p>Common options: <strong>FAISS</strong> (a local library), and services like <strong>Chroma, Qdrant, Weaviate, Pinecone, pgvector</strong>. Most also support <strong>metadata filters</strong> (e.g. only this user’s docs) alongside similarity.</p>
    model: |-
      A vector database is a <strong>nearest-neighbour map</strong>: store meaning-coordinates, then instantly fetch the items closest to a query — similarity search, not exact match.
    terms:
    - term: Vector database
      def: A store optimised for similarity search over embeddings.
    - term: ANN
      def: Approximate Nearest Neighbour — fast ‘close enough’ similarity search at scale.
    - term: Metadata filter
      def: Restricting results by attributes (user, date, source) alongside similarity.
    mistakes:
    - title: Mixing embedding models
      detail: |-
        Vectors from different models live in different coordinate systems; never compare across them.
    - title: Skipping metadata filters
      detail: |-
        Pure similarity can return another tenant’s or an outdated doc — filter by source/user/date too.
    - title: Expecting exact-keyword precision
      detail: |-
        Similarity may miss exact IDs/codes; combine with keyword search (hybrid) when needed.
    cards:
    - q: What is a vector database?
      a: A store built for fast similarity search over embeddings.
    - q: What is ANN?
      a: Approximate Nearest Neighbour — fast ‘close enough’ similarity search at scale.
    quiz:
    - q: What does a vector database search by?
      correct: Similarity of meaning (nearest vectors)
      distractors:
      - Alphabetical order
      - File size
      - Exact text match
      explain: It finds items closest in embedding space.
    - q: Why add metadata filters?
      correct: To restrict results to the right user/source/date, not just similar text
      distractors:
      - They’re decorative
      - For colour
      - To slow search
      explain: Filters prevent returning the wrong or stale documents.
    recap: |-
      A vector database stores embeddings and finds the items closest in meaning to a query, fast, using approximate nearest-neighbour search. It’s the retrieval engine behind RAG — use metadata filters and keep one embedding model.
  - id: chunking
    title: Chunking
    lesson_format: html
    lesson: |-
      <p><strong>Chunking</strong> is splitting your documents into <strong>smaller pieces</strong> before embedding them. You retrieve and feed the model <em>chunks</em>, not whole books — so how you cut them hugely affects answer quality.</p><div class='analogy'><p>Cutting a pizza. Slices too big and you grab toppings you didn’t want (irrelevant text); too small and a single bite misses the cheese-and-sauce combo (split context). You want slices that each hold a complete, coherent bite.</p></div><h3>Getting it right</h3><ul><li><strong>Size:</strong> a few hundred tokens is a common sweet spot — big enough to be meaningful, small enough to be precise.</li><li><strong>Overlap:</strong> repeat a little text between chunks so ideas split across a boundary aren’t lost.</li><li><strong>Respect structure:</strong> split on paragraphs/headings, not mid-sentence, so each chunk stands alone.</li></ul><p>Bad chunking is one of the most common reasons RAG ‘doesn’t work’: the right answer was in the docs, but it got sliced apart or buried with junk. Fix retrieval at the chunk level first.</p>
    model: |-
      Chunking is <strong>slicing the pizza right</strong>: each piece should be one coherent, self-contained idea — not so big it drags in junk, not so small it splits the point.
    terms:
    - term: Chunk
      def: A small piece of a document that gets embedded and retrieved.
    - term: Overlap
      def: Repeated text between adjacent chunks to preserve cross-boundary context.
    - term: Semantic chunking
      def: |-
        Splitting along meaning/structure (paragraphs, headings) rather than fixed length.
    mistakes:
    - title: Chunks too large
      detail: They pull in irrelevant text, dilute relevance, and waste prompt space.
    - title: Chunks too small
      detail: A single idea gets split across pieces, so no chunk holds the full answer.
    - title: No overlap or structure
      detail: Cutting mid-sentence with zero overlap loses context straddling the boundary.
    cards:
    - q: What is chunking?
      a: Splitting documents into smaller pieces to embed and retrieve.
    - q: Why add overlap between chunks?
      a: So ideas split across a boundary aren’t lost.
    quiz:
    - q: Why does chunk size matter?
      correct: Too big pulls in junk; too small splits ideas apart
      distractors:
      - It sets the GPU speed
      - It picks the model
      - It changes the font
      explain: Chunk size directly affects retrieval relevance and completeness.
    - q: What does chunk overlap help with?
      correct: Preserving context that straddles a chunk boundary
      distractors:
      - Smaller files
      - Faster GPUs
      - Better fonts
      explain: A little repeated text keeps split ideas intact.
    recap: |-
      Chunking slices documents into coherent pieces for retrieval. Aim for a few hundred tokens, add some overlap, and split on structure — bad chunking is a top reason RAG fails even when the answer is in the docs.
  - id: retrieval-pipelines
    title: Retrieval pipelines
    lesson_format: html
    lesson: |-
      <p>A <strong>retrieval pipeline</strong> is the full set of steps that turn a user’s question into the <em>best</em> context for the model. Real systems rarely stop at one similarity search — they add stages to boost relevance.</p><div class='analogy'><p>Like a hiring process: a wide screen pulls many résumés, then interviews and reference checks narrow to the best few. Retrieval does the same — cast a wide net, then re-rank down to the true top results.</p></div><h3>Common stages</h3><ul><li><strong>Query rewriting</strong> — clean up or expand the question before searching.</li><li><strong>Hybrid search</strong> — combine semantic (vector) + keyword search for the best of both.</li><li><strong>Re-ranking</strong> — a smarter model re-scores the top candidates for precision.</li><li><strong>Assembly</strong> — pick the final chunks, de-duplicate, and fit them in the context budget.</li></ul><p>The guiding idea: <strong>retrieve broadly, then filter sharply.</strong> A great generator can’t fix bad retrieval, so most RAG quality work happens right here in the pipeline.</p>
    model: |-
      A retrieval pipeline is a <strong>hiring funnel for context</strong>: cast a wide net (hybrid search), then interview and re-rank down to the few best chunks before the model answers.
    terms:
    - term: Retrieval pipeline
      def: The multi-stage process of fetching and refining context for RAG.
    - term: Hybrid search
      def: Combining semantic (vector) and keyword search.
    - term: Re-ranking
      def: Re-scoring top candidates with a more precise model.
    mistakes:
    - title: Relying on one search pass
      detail: |-
        A single vector query misses keyword hits; hybrid + re-ranking lifts quality a lot.
    - title: Never re-ranking
      detail: Top-vector ≠ most relevant; a re-ranker fixes obvious mis-orderings.
    - title: Overflowing the context
      detail: Even good chunks must fit the token budget — assemble and trim deliberately.
    cards:
    - q: What is a retrieval pipeline?
      a: |-
        The multi-stage process (rewrite, hybrid search, re-rank, assemble) that builds context for RAG.
    - q: Pipeline guiding principle?
      a: |-
        Retrieve broadly, then filter sharply — a good generator can’t fix bad retrieval.
    quiz:
    - q: What does re-ranking do in a pipeline?
      correct: Re-scores top candidates for better precision
      distractors:
      - Trains the model
      - Cleans datasets
      - Shrinks the GPU
      explain: It reorders the shortlist by true relevance.
    - q: Why use hybrid search?
      correct: Combines semantic + keyword to catch what either alone misses
      distractors:
      - It’s prettier
      - It avoids embeddings
      - It needs no database
      explain: Vector search and keyword search cover different gaps.
    recap: |-
      A retrieval pipeline refines a question into the best context through stages — query rewriting, hybrid search, re-ranking, and assembly. Retrieve broadly then filter sharply; most RAG quality work lives here, not in the generator.
  - id: memory-systems
    title: AI memory systems
    lesson_format: html
    lesson: |-
      <p>By default an LLM <strong>forgets everything</strong> once the context window scrolls past. A <strong>memory system</strong> gives an app the ability to <em>remember</em> across turns and sessions by <strong>storing information outside the model</strong> and feeding it back when relevant.</p><div class='analogy'><p>The model is a colleague with no long-term memory — brilliant in the meeting, blank the next day. A memory system is the <em>notebook</em> they keep: jot down what matters, flip back to it next time.</p></div><h3>Common kinds of memory</h3><table class='compare'><tr><th>Type</th><th>Holds</th></tr><tr><td>Short-term</td><td>The current conversation (the context window)</td></tr><tr><td>Long-term</td><td>Facts/preferences saved across sessions (often in a vector DB)</td></tr><tr><td>Summary</td><td>A compressed recap of old turns to save tokens</td></tr></table><p>Mechanically it’s often <strong>RAG pointed at the conversation</strong>: store past messages/facts as embeddings, retrieve the relevant ones, and inject them. Key challenges: deciding <em>what</em> is worth remembering, and keeping memories <strong>fresh and non-contradictory</strong>.</p>
    model: |-
      A memory system is the <strong>notebook</strong> for a forgetful colleague: store what matters outside the model and hand the right notes back when they’re needed — usually RAG over the conversation.
    terms:
    - term: Memory system
      def: External storage that lets an app remember across turns/sessions.
    - term: Short vs long-term memory
      def: Current context vs persisted facts recalled later.
    - term: Summarisation memory
      def: Compressing old turns into a short recap to save tokens.
    mistakes:
    - title: Remembering everything
      detail: Storing every message is noisy and costly; decide what’s actually worth keeping.
    - title: Stale or conflicting memories
      detail: |-
        Old facts (‘lives in Paris’) can contradict new ones — update and resolve, don’t just append.
    - title: Confusing context with memory
      detail: The context window is temporary; durable memory must live in external storage.
    cards:
    - q: What is an AI memory system?
      a: |-
        External storage that lets an app remember across turns/sessions, fed back via retrieval.
    - q: Context window vs memory?
      a: Context is temporary; durable memory lives in external storage.
    quiz:
    - q: Why is a memory system needed at all?
      correct: LLMs forget once text leaves the context window
      distractors:
      - Models never forget
      - Tokens are free
      - GPUs are slow
      explain: Durable memory must live outside the model’s temporary context.
    - q: Long-term memory is often implemented with…
      correct: RAG over stored embeddings of past info
      distractors:
      - A faster tokenizer
      - More parameters
      - A bigger font
      explain: Store facts as vectors and retrieve the relevant ones.
    recap: |-
      Memory systems give forgetful models a notebook: store facts outside the model and retrieve the relevant ones when needed — usually RAG over the conversation. Decide what’s worth keeping and keep memories fresh and consistent.
  - id: semantic-search
    title: Semantic search
    lesson_format: html
    lesson: |-
      <p><strong>Semantic search</strong> finds results by <strong>meaning</strong>, not just matching keywords. Search for <em>“ways to lower my electricity bill”</em> and it can surface a doc titled <em>“reducing home energy costs”</em> — no shared words, same intent.</p><div class='analogy'><p>Old keyword search is a literal librarian who only finds books with your exact words on the spine. Semantic search is a knowledgeable one who understands what you <em>mean</em> and points you to the right shelf regardless of wording.</p></div><h3>How it works (you’ve seen the parts)</h3><ul><li><strong>Embed</strong> every document into a meaning-vector.</li><li><strong>Embed</strong> the query the same way.</li><li>Return the documents whose vectors are <strong>nearest</strong> — i.e. closest in meaning.</li></ul><p>It’s the retrieval engine under RAG and recommendations. Its weakness is the flip side of its strength: because it matches meaning, it can <strong>miss exact strings</strong> (product codes, names, error IDs). The fix is <strong>hybrid search</strong> — semantic + keyword together.</p>
    model: |-
      Semantic search is the <strong>librarian who understands intent</strong>, not just spelling: match by meaning via embeddings. Pair it with keyword search when exact strings matter.
    terms:
    - term: Semantic search
      def: Finding results by meaning via embedding similarity.
    - term: Keyword search
      def: Classic exact/partial word matching (e.g. BM25).
    - term: Hybrid search
      def: Combining semantic and keyword search for the strengths of both.
    mistakes:
    - title: Expecting exact-match precision
      detail: |-
        Meaning-matching can miss precise IDs/codes — add keyword/hybrid search for those.
    - title: Reusing mismatched embeddings
      detail: Query and documents must be embedded by the same model to compare fairly.
    - title: Confusing it with the LLM
      detail: Semantic search retrieves; the LLM then reasons over what it returns.
    cards:
    - q: What is semantic search?
      a: Finding results by meaning (embedding similarity), not just keywords.
    - q: Fix for missing exact codes/IDs?
      a: Hybrid search — combine semantic with keyword search.
    quiz:
    - q: Semantic search matches by…
      correct: Meaning, via embedding similarity
      distractors:
      - Exact keywords only
      - File size
      - Date
      explain: It finds intent-similar results even without shared words.
    - q: Its main weakness is…
      correct: It can miss exact strings like codes or IDs
      distractors:
      - It’s too literal
      - It can’t scale
      - It needs no data
      explain: Meaning-matching may overlook precise tokens; use hybrid search.
    recap: |-
      Semantic search retrieves by meaning using embedding similarity — a librarian who understands intent, not just spelling. It powers RAG and recommendations, but can miss exact strings, so combine it with keyword (hybrid) search.
- id: agents
  title: Agents & Workflows
  topics:
  - id: prompt-engineering
    title: Prompt engineering
    lesson_format: html
    lesson: |-
      <p><strong>Prompt engineering</strong> is the craft of <strong>writing inputs that get good outputs</strong>. Since the model only responds to what you give it, the prompt is your main steering wheel — often more powerful (and always cheaper) than fine-tuning.</p><div class='analogy'><p>It’s like briefing a talented freelancer. Say <em>“make it nice”</em> and you get a coin-flip. Say <em>“write a 3-bullet summary for busy execs, plain English, no jargon”</em> and you get exactly what you need. The clearer the brief, the better the work.</p></div><h3>High-leverage techniques</h3><ul><li><strong>Be specific</strong> about role, format, length, and audience.</li><li><strong>Show examples</strong> (few-shot) — demonstrate the output you want.</li><li><strong>Ask for steps</strong> (‘think step by step’) on reasoning tasks.</li><li><strong>Give an out</strong> — allow ‘say I don’t know’ to curb hallucinations.</li></ul><p>Prompting is empirical: small wording changes can swing results, so <strong>iterate and test</strong> rather than expecting the first try to be perfect.</p>
    model: |-
      A prompt is a <strong>brief to a freelancer</strong>: the clearer the role, format, and examples you give, the better the work. Iterate — it’s the cheapest, fastest steering wheel you have.
    terms:
    - term: Prompt engineering
      def: Crafting inputs to reliably get the outputs you want.
    - term: Few-shot
      def: Including example input/output pairs in the prompt to guide the model.
    - term: Zero-shot
      def: Asking with instructions only, no examples.
    mistakes:
    - title: Being vague
      detail: |-
        ‘Make it good’ leaves everything to chance; specify format, length, audience, tone.
    - title: No examples
      detail: One or two demonstrations (few-shot) often beat paragraphs of instructions.
    - title: One-and-done
      detail: Prompting is empirical — test variations; tiny wording shifts move results.
    cards:
    - q: What is prompt engineering?
      a: Crafting inputs that reliably produce the outputs you want.
    - q: Zero-shot vs few-shot?
      a: Zero-shot = instructions only; few-shot = include example pairs.
    quiz:
    - q: Why is prompt engineering high-leverage?
      correct: The prompt is the main, cheapest way to steer outputs
      distractors:
      - It changes the weights
      - It buys GPUs
      - It retrains the model
      explain: Output depends on input; good prompts beat the default for free.
    - q: ‘Few-shot’ prompting means…
      correct: Including example input/output pairs
      distractors:
      - Using a small model
      - Few GPUs
      - Short answers
      explain: You demonstrate the desired behaviour with examples.
    recap: |-
      Prompt engineering is briefing the model well — specify role, format, length, and audience, show examples, and allow ‘I don’t know.’ It’s the cheapest, most powerful steering wheel, and it rewards iteration and testing.
  - id: system-prompts
    title: System prompts
    lesson_format: html
    lesson: |-
      <p>A <strong>system prompt</strong> is a special instruction set <strong>at the very top</strong> of a conversation that defines the assistant’s <strong>role, rules, and personality</strong> — before the user says anything. It’s the standing brief the model follows throughout.</p><div class='analogy'><p>It’s the <em>job description and employee handbook</em> you hand a new hire on day one. The user messages are the day-to-day requests; the system prompt is the constant ‘this is who you are and how we do things here.’</p></div><h3>What goes in one</h3><ul><li><strong>Role:</strong> ‘You are a careful financial support agent.’</li><li><strong>Rules:</strong> ‘Never give legal advice. Always cite the policy.’</li><li><strong>Format/tone:</strong> ‘Reply in short, friendly bullet points.’</li><li><strong>Boundaries:</strong> what to refuse or escalate.</li></ul><p>The system prompt carries <strong>more weight</strong> than ordinary messages, but it isn’t bulletproof — clever user inputs can sometimes override it (<em>prompt injection</em>). Keep it clear, and don’t put true secrets in it.</p>
    model: |-
      The system prompt is the <strong>job description + handbook</strong> given before any user request: it sets role, rules, tone, and boundaries that persist across the whole chat.
    terms:
    - term: System prompt
      def: Top-level instructions setting the assistant’s role, rules, and tone.
    - term: Prompt injection
      def: User/content input that tries to override the system instructions.
    - term: Persona
      def: The consistent character/voice a system prompt establishes.
    mistakes:
    - title: Putting secrets in it
      detail: |-
        Users or injections can sometimes extract it — never store API keys or passwords there.
    - title: Overstuffing it
      detail: |-
        A giant, contradictory system prompt confuses the model; keep it focused and prioritised.
    - title: Assuming it can’t be overridden
      detail: |-
        Prompt injection can bypass it; validate inputs and don’t rely on it alone for safety.
    cards:
    - q: What is a system prompt?
      a: Top-of-conversation instructions setting role, rules, tone, and boundaries.
    - q: What is prompt injection?
      a: Input that tries to override the system prompt’s instructions.
    quiz:
    - q: What is a system prompt’s job?
      correct: To set the assistant’s role, rules, and tone up front
      distractors:
      - To speed the GPU
      - To tokenize text
      - To store data
      explain: It’s the standing brief defining behaviour before user input.
    - q: What should you NOT put in a system prompt?
      correct: Real secrets like API keys
      distractors:
      - A role
      - Formatting rules
      - A persona
      explain: It can be extracted; keep secrets out of it.
    recap: |-
      A system prompt is the job description and handbook set before any user message — defining role, rules, tone, and boundaries that persist. It carries weight but isn’t bulletproof to injection; keep it focused and secret-free.
  - id: tool-calling
    title: Tool calling
    lesson_format: html
    lesson: |-
      <p><strong>Tool calling</strong> lets a model <strong>do things, not just talk</strong> — search the web, query a database, send an email, run code — by asking your software to perform an action and return the result.</p><div class='analogy'><p>The model is a smart manager who can’t physically do tasks but can <em>delegate</em>: ‘look up this order,’ ‘calculate this total.’ Tools are the staff who actually do the work and report back.</p></div><h3>The loop</h3><ul><li>You tell the model which <strong>tools exist</strong> and what each needs.</li><li>When useful, the model <strong>requests a tool</strong> with specific arguments.</li><li>Your code <strong>runs it</strong> and feeds the result back.</li><li>The model <strong>continues</strong> using that real data.</li></ul><p>This is what turns a chatbot into something that can act in the real world — check live inventory, book a slot, fetch fresh facts. It’s the backbone of <strong>agents</strong> (a couple of topics ahead).</p>
    model: |-
      Tool calling makes the model a <strong>manager who delegates</strong>: it can’t act directly, so it asks your code to run a tool and uses the result — talk becomes action.
    terms:
    - term: Tool calling
      def: A model requesting your software to perform an action and return results.
    - term: Tool / action
      def: A capability the model can invoke (search, DB query, send email).
    - term: Tool result
      def: The data your code returns for the model to continue with.
    mistakes:
    - title: Trusting tool requests blindly
      detail: |-
        The model can ask to call the wrong tool or pass bad arguments — validate before executing, especially for risky actions.
    - title: Vague tool descriptions
      detail: |-
        If the model doesn’t understand what a tool does or needs, it calls it wrongly; describe clearly.
    - title: No error handling
      detail: |-
        Tools fail (timeouts, bad input); return errors the model can recover from, not crashes.
    cards:
    - q: What is tool calling?
      a: Letting a model request real actions from your software and use the results.
    - q: Why validate tool requests?
      a: The model can call the wrong tool or pass bad args — check before executing.
    quiz:
    - q: What does tool calling let a model do?
      correct: Request real actions (search, DB, code) via your software
      distractors:
      - Compress weights
      - Add parameters
      - Train itself
      explain: It delegates actions and uses the returned results.
    - q: A key safety practice with tools is…
      correct: Validate the model’s tool requests before executing risky ones
      distractors:
      - Hide the results
      - Never describe tools
      - Run every request instantly
      explain: Models can request wrong/unsafe calls; validate first.
    recap: |-
      Tool calling lets a model delegate real actions — search, query, send, run — through your code, turning talk into action. It’s the backbone of agents. Describe tools clearly, validate requests, and handle errors gracefully.
  - id: function-calling
    title: Function calling
    lesson_format: html
    lesson: |-
      <p><strong>Function calling</strong> is the <strong>structured, technical form of tool calling</strong>: the model outputs a <strong>precise, machine-readable request</strong> (usually JSON) naming a function and its arguments, so your code can run it without guesswork.</p><pre><code>// the model emits something like:
      { "name": "get_weather",
        "arguments": { "city": "Paris", "unit": "celsius" } }</code></pre><div class='analogy'><p>If tool calling is ‘the model asks for help,’ function calling is filling in a <em>precise order form</em> — exact field names, exact values — instead of a vague verbal request. The structure is what makes it reliable for software.</p></div><p>You define each function with a <strong>schema</strong> (name, description, parameters and their types). The model fills it in; your code validates and executes. The terms ‘tool calling’ and ‘function calling’ are often used interchangeably — function calling emphasises the <strong>structured JSON output</strong> that makes the action programmatic and dependable.</p><p>Because the output is structured, function calling is also handy just to get <strong>reliable JSON</strong> out of a model, even when no real ‘action’ runs.</p>
    model: |-
      Function calling is a <strong>precise order form</strong>: the model emits structured JSON (function name + typed arguments) so your code runs it reliably — the dependable, machine-readable side of tool calling.
    terms:
    - term: Function calling
      def: A model emitting structured JSON specifying a function and arguments.
    - term: Schema
      def: The definition of a function’s name, parameters, and types the model fills in.
    - term: Structured output
      def: Machine-readable JSON the model produces on demand.
    mistakes:
    - title: Skipping schema validation
      detail: |-
        Models can produce slightly-off JSON or invalid values; validate against the schema before running.
    - title: Fuzzy parameter descriptions
      detail: |-
        Unclear types/descriptions lead to wrong arguments — define each field precisely.
    - title: Assuming the function actually ran
      detail: The model only requests it; your code must execute and return the result.
    cards:
    - q: What is function calling?
      a: |-
        A model emitting structured JSON (function + typed arguments) for your code to run.
    - q: Tool vs function calling?
      a: Often interchangeable; function calling stresses the structured JSON form.
    quiz:
    - q: Function calling differs from plain tool calling by emphasising…
      correct: Structured, machine-readable JSON output
      distractors:
      - Longer answers
      - More GPUs
      - Bigger models
      explain: It’s the precise JSON form that makes actions programmatic.
    - q: Function calling is also useful just to…
      correct: Get reliable structured JSON from a model
      distractors:
      - Speed the tokenizer
      - Quantize weights
      - Train models
      explain: Structured output is valuable even without running an action.
    recap: |-
      Function calling is the structured form of tool calling: the model outputs precise JSON (function name + typed arguments) defined by a schema, which your code validates and runs. It’s also a reliable way to get structured JSON out of a model.
  - id: ai-agents
    title: AI agents
    lesson_format: html
    lesson: |-
      <p>An <strong>AI agent</strong> is a model that can <strong>pursue a goal over multiple steps</strong> — deciding what to do, using tools, observing results, and adjusting — rather than answering in a single shot.</p><div class='analogy'><p>A chatbot is a vending machine: one request, one response. An agent is an <em>intern</em>: give it a goal (‘book me a meeting room for Friday’) and it figures out the steps, checks the calendar, handles snags, and reports back.</p></div><h3>The core loop (‘think–act–observe’)</h3><ul><li><strong>Think:</strong> decide the next step toward the goal.</li><li><strong>Act:</strong> call a tool (search, API, code).</li><li><strong>Observe:</strong> read the result.</li><li><strong>Repeat</strong> until the goal is met (or it gives up).</li></ul><p>Agents = an LLM + tools + memory + a loop. They’re powerful but <strong>less predictable</strong>: more autonomy means more ways to go wrong, loop forever, or take costly actions. Good agents have <strong>guardrails</strong> — step limits, approvals for risky actions, and clear stopping conditions.</p>
    model: |-
      An agent is an <strong>intern with a goal</strong>: it loops think → act → observe with tools and memory until done — far more capable than a chatbot, and far more in need of guardrails.
    terms:
    - term: AI agent
      def: An LLM that pursues a goal over multiple tool-using steps.
    - term: Think–act–observe
      def: 'The agent loop: decide, use a tool, read the result, repeat.'
    - term: Guardrails
      def: Limits and approvals that keep an agent safe and bounded.
    mistakes:
    - title: No stopping conditions
      detail: Without step/cost limits, agents can loop forever or rack up huge bills.
    - title: Too much autonomy too soon
      detail: Let it take risky actions (payments, deletes) only behind human approval.
    - title: Using an agent when a single call would do
      detail: |-
        Agents add cost and unpredictability; reach for them only when multi-step autonomy is truly needed.
    cards:
    - q: What is an AI agent?
      a: An LLM that loops think–act–observe with tools/memory to pursue a goal.
    - q: Why do agents need guardrails?
      a: Autonomy can loop forever or take costly/risky actions — bound it.
    quiz:
    - q: How does an agent differ from a chatbot?
      correct: It pursues a goal over multiple tool-using steps
      distractors:
      - It can’t use tools
      - It’s smaller
      - It never stops
      explain: Agents loop through steps toward a goal, not one-shot replies.
    - q: A must-have for safe agents is…
      correct: 'Guardrails: step/cost limits and approvals for risky actions'
      distractors:
      - More emoji
      - Bigger fonts
      - No tools
      explain: Autonomy needs bounds to avoid loops and costly mistakes.
    recap: |-
      An AI agent is an LLM plus tools, memory, and a think–act–observe loop that pursues a goal over many steps — an intern, not a vending machine. It’s powerful but unpredictable, so use stopping conditions and approvals for risky actions.
  - id: agentic-workflows
    title: Agentic workflows
    lesson_format: html
    lesson: |-
      <p>An <strong>agentic workflow</strong> is a <strong>designed sequence of AI steps</strong> to accomplish a task — somewhere between a rigid script and a fully free agent. You lay out the stages; the model fills in the smart parts.</p><div class='analogy'><p>A recipe with judgement. The steps are fixed (chop → sauté → simmer), but a skilled cook adapts seasoning along the way. You provide the structure; the model provides the flexibility within each step.</p></div><h3>Common patterns</h3><ul><li><strong>Chaining:</strong> output of one step feeds the next (draft → critique → revise).</li><li><strong>Routing:</strong> classify the request, then send it down the right branch.</li><li><strong>Parallel + combine:</strong> do several sub-tasks at once, then merge.</li><li><strong>Reflection:</strong> the model checks and improves its own output.</li></ul><p>Key insight: <strong>structure beats raw autonomy</strong> for most real tasks. A well-designed workflow is more reliable, debuggable, and cheaper than a free-roaming agent — reach for full agents only when the path genuinely can’t be predefined.</p>
    model: |-
      An agentic workflow is a <strong>recipe with judgement</strong>: you fix the steps (chain, route, reflect), the model adds smarts within them — more reliable and debuggable than a free agent.
    terms:
    - term: Agentic workflow
      def: A designed multi-step AI process with structure plus model flexibility.
    - term: Chaining
      def: Feeding one step’s output into the next.
    - term: Reflection
      def: Having the model critique and improve its own output.
    mistakes:
    - title: Defaulting to a free agent
      detail: |-
        Most tasks have a predictable shape; a structured workflow is more reliable and cheaper.
    - title: No checks between steps
      detail: Errors compound down a chain; validate or add reflection between stages.
    - title: Over-engineering simple tasks
      detail: If one prompt does the job, don’t build a five-step pipeline.
    cards:
    - q: What is an agentic workflow?
      a: |-
        A designed multi-step AI process (chain/route/reflect) with structure plus model flexibility.
    - q: Workflow vs free agent?
      a: |-
        Workflows are more reliable/debuggable; use free agents only when the path can’t be predefined.
    quiz:
    - q: An agentic workflow sits between…
      correct: A rigid script and a fully free agent
      distractors:
      - Two datasets
      - Two tokenizers
      - Two GPUs
      explain: You design the steps; the model adds flexibility within them.
    - q: Why often prefer a workflow over a free agent?
      correct: More reliable, debuggable, and cheaper for predictable tasks
      distractors:
      - It needs no model
      - It looks nicer
      - It’s always smarter
      explain: Structure beats raw autonomy for most real tasks.
    recap: |-
      An agentic workflow is a recipe with judgement — you design the steps (chaining, routing, reflection) and the model fills in the smarts. For most predictable tasks it beats a free-roaming agent on reliability, debuggability, and cost.
  - id: multi-agent
    title: Multi-agent systems
    lesson_format: html
    lesson: |-
      <p>A <strong>multi-agent system</strong> uses <strong>several specialised agents working together</strong>, each with a focused role, often coordinated by a ‘manager’ agent — instead of one agent trying to do everything.</p><div class='analogy'><p>A company instead of a solo freelancer. A manager delegates to a researcher, a writer, and an editor; each is good at one thing, and the manager combines their work. Specialisation can beat a single generalist juggling it all.</p></div><h3>Common shapes</h3><ul><li><strong>Manager + workers:</strong> one agent plans and delegates to specialists.</li><li><strong>Pipeline:</strong> agents hand off in sequence (research → draft → review).</li><li><strong>Debate/critique:</strong> agents challenge each other to improve quality.</li></ul><p>The promise is better quality on complex tasks through specialisation and division of labour. The cost is real: <strong>more complexity, more tokens (money), more latency, and more failure modes</strong>. Use multi-agent only when one agent or a workflow genuinely can’t cope — and watch for agents confusing each other.</p>
    model: |-
      A multi-agent system is a <strong>company, not a freelancer</strong>: a manager delegates to specialists who collaborate. Powerful for complex tasks, but it multiplies cost, latency, and ways to fail.
    terms:
    - term: Multi-agent system
      def: Several specialised agents collaborating on a task.
    - term: Orchestrator / manager
      def: An agent that plans and delegates to worker agents.
    - term: Hand-off
      def: Passing work and context from one agent to the next.
    mistakes:
    - title: Using many agents when one would do
      detail: |-
        Each agent adds tokens, latency, and failure modes; justify the extra complexity.
    - title: Vague roles
      detail: Overlapping or unclear responsibilities make agents duplicate work or conflict.
    - title: No coordination limits
      detail: |-
        Agents can loop, argue, or amplify each other’s mistakes — bound the interaction.
    cards:
    - q: What is a multi-agent system?
      a: Several specialised agents collaborating, often via a manager/orchestrator.
    - q: Main trade-off of multi-agent?
      a: Better specialisation but more complexity, cost, latency, and failure modes.
    quiz:
    - q: A multi-agent system uses…
      correct: Several specialised agents collaborating
      distractors:
      - One do-everything agent
      - Only tools
      - No models
      explain: Specialised roles divide the labour, often via a manager.
    - q: A real cost of multi-agent systems is…
      correct: More complexity, tokens, latency, and failure modes
      distractors:
      - Smaller models
      - Nothing
      - Less data
      explain: Coordination multiplies cost and ways to go wrong.
    recap: |-
      Multi-agent systems split work across specialised agents — a company, not a freelancer — coordinated as manager/workers, pipelines, or debates. They can lift quality on complex tasks but multiply cost, latency, and failure modes; use sparingly.
  - id: browser-agents
    title: Browser agents
    lesson_format: html
    lesson: |-
      <p>A <strong>browser agent</strong> is an AI agent that can <strong>operate a web browser</strong> — read pages, click buttons, fill forms, and navigate — to complete tasks on real websites, even ones without an API.</p><div class='analogy'><p>A virtual assistant sitting at a computer, using the same screen and mouse you would. If a site has no ‘official’ programmatic access, the agent just uses it like a person: look, click, type.</p></div><h3>How it sees and acts</h3><ul><li><strong>Perceive:</strong> read the page (its text/HTML, or a screenshot for vision models).</li><li><strong>Decide:</strong> choose the next action toward the goal.</li><li><strong>Act:</strong> click, type, scroll, or navigate — then re-read and repeat.</li></ul><p>This unlocks tasks like ‘compare prices across three shops’ or ‘fill this application,’ but it’s the <strong>frontier and the riskiest</strong> kind of agent: pages change, actions can be irreversible (purchases, submissions), and malicious page content can attempt <strong>prompt injection</strong>. Strong guardrails and human approval for consequential steps are essential.</p>
    model: |-
      A browser agent is an <strong>assistant at a keyboard</strong>: it looks at the page, clicks and types like a person, and loops toward the goal — powerful for API-less sites, and the riskiest agent to let loose.
    terms:
    - term: Browser agent
      def: An agent that perceives and operates web pages to complete tasks.
    - term: Perceive–decide–act
      def: The browser-agent loop over a live page.
    - term: Prompt injection (web)
      def: Hostile page content trying to override the agent’s instructions.
    mistakes:
    - title: Letting it take irreversible actions unattended
      detail: Purchases, submissions, and deletes need human approval — they can’t be undone.
    - title: Ignoring prompt injection from pages
      detail: |-
        Malicious page text can try to hijack the agent; isolate and distrust page content.
    - title: Assuming reliability on changing sites
      detail: Layouts shift and break flows; build in retries, checks, and graceful failure.
    cards:
    - q: What is a browser agent?
      a: An agent that reads and operates web pages (click/type/navigate) to do tasks.
    - q: Top browser-agent risks?
      a: Irreversible actions and prompt injection from page content — gate risky steps.
    quiz:
    - q: What makes browser agents special?
      correct: They operate real web pages like a human (click, type, navigate)
      distractors:
      - They only use APIs
      - They never fail
      - They’re tiny models
      explain: They can use sites that have no programmatic API.
    - q: A key risk of browser agents is…
      correct: Irreversible actions and prompt injection from pages
      distractors:
      - Too few tokens
      - Nothing
      - Small fonts
      explain: Consequential actions and hostile page content demand guardrails.
    recap: |-
      Browser agents drive a real browser — perceiving pages and clicking/typing like a person — to handle tasks on API-less sites. They’re the frontier and the riskiest agent: guard against irreversible actions and page-borne prompt injection.
- id: model-types
  title: Model Types
  topics:
  - id: vlms
    title: VLMs (vision-language)
    lesson_format: html
    lesson: |-
      <p>A <strong>VLM</strong> (Vision-Language Model) can <strong>see and read at the same time</strong> — you give it an image (or several) plus text, and it reasons about both together. ‘What’s wrong in this diagram?’ or ‘read the total off this receipt.’</p><div class='analogy'><p>A regular LLM is a brilliant person who can only read text slipped under the door. A VLM is the same person with their <em>eyes open</em> — they can look at the picture you hold up and talk about it.</p></div><h3>How it works (at a glance)</h3><p>An image gets turned into <strong>tokens too</strong> (via a vision encoder), then fed alongside text tokens into the same model. So the picture and the words share one stream of attention.</p><h3>What they’re used for</h3><ul><li>Describing images, reading charts/screenshots, extracting data from documents.</li><li>Powering <strong>browser/computer-use agents</strong> that ‘see’ the screen.</li><li>Visual Q&amp;A and accessibility.</li></ul><p>Watch-outs: images eat <strong>lots of tokens</strong> (cost), and VLMs can still <strong>hallucinate</strong> details that aren’t in the picture — verify for high-stakes reading.</p>
    model: |-
      A VLM is an <strong>LLM with its eyes open</strong>: images become tokens fed alongside text, so it can look and read in one stream. Great for screens and documents — but pixels cost tokens, and it can still misread.
    terms:
    - term: VLM
      def: Vision-Language Model — handles images and text together.
    - term: Vision encoder
      def: The part that turns an image into tokens the model can process.
    - term: Multimodal
      def: Working across more than one input type (e.g. text + image).
    mistakes:
    - title: Trusting every detail it ‘reads’
      detail: |-
        VLMs can hallucinate text/objects not in the image — verify critical extractions.
    - title: Forgetting images are expensive
      detail: A single high-res image can cost as much as a long paragraph in tokens.
    - title: Feeding tiny/blurry images
      detail: Low-resolution inputs hurt accuracy; give it a clear, readable image.
    cards:
    - q: What is a VLM?
      a: A vision-language model that reasons over images and text together.
    - q: Two VLM watch-outs?
      a: Images cost many tokens, and it can hallucinate details not in the image.
    quiz:
    - q: What can a VLM do that a text-only LLM can’t?
      correct: Reason about images and text together
      distractors:
      - Train faster
      - Skip tokenization
      - Use less memory
      explain: VLMs accept visual input alongside text.
    - q: A practical cost of images in VLMs is…
      correct: They consume many tokens
      distractors:
      - They shrink the model
      - They’re free
      - They speed inference
      explain: Images turn into many tokens, raising cost.
    recap: |-
      VLMs are LLMs with their eyes open — images become tokens fed alongside text, enabling document reading, chart Q&A, and screen-using agents. Mind that images are token-expensive and VLMs can still misread, so verify high-stakes extractions.
  - id: slms
    title: SLMs (small models)
    lesson_format: html
    lesson: |-
      <p>An <strong>SLM</strong> (Small Language Model) is just that — a model with relatively <strong>few parameters</strong> (think ~1–8B, sometimes under 1B). They trade some raw capability for being <strong>fast, cheap, and runnable almost anywhere</strong> — even on a phone.</p><div class='analogy'><p>A scooter vs a truck. The truck (huge model) hauls anything but is expensive and slow to park. For most short trips around town, the nimble scooter gets you there faster and cheaper.</p></div><h3>Why small is often smart</h3><ul><li><strong>Cheap &amp; fast:</strong> lower latency, lower cost per call, runs on-device.</li><li><strong>Private:</strong> small enough to run locally, so data needn’t leave the device.</li><li><strong>Specialise-able:</strong> fine-tune a small model on one task and it can rival a giant on <em>that</em> task.</li></ul><p>The catch: SLMs have <strong>less general knowledge and weaker reasoning</strong> on hard, open-ended problems. The modern pattern is <strong>right-sizing</strong> — use a small model for the many easy jobs and escalate to a big one only when needed.</p>
    model: |-
      An SLM is a <strong>scooter, not a truck</strong>: fast, cheap, and runs anywhere — perfect for the many easy jobs, especially when fine-tuned, with a big model on standby for the hard ones.
    terms:
    - term: SLM
      def: Small Language Model — relatively few parameters; fast, cheap, local-friendly.
    - term: On-device
      def: Running directly on a phone/laptop without the cloud.
    - term: Right-sizing
      def: Picking the smallest model that does the job well.
    mistakes:
    - title: Expecting frontier reasoning
      detail: |-
        Small models struggle on hard open-ended tasks; match the model to the difficulty.
    - title: Skipping fine-tuning
      detail: A fine-tuned SLM often beats a giant on its narrow task — don’t judge it raw.
    - title: Defaulting to the biggest model
      detail: Most requests are easy; a giant model wastes cost and latency on them.
    cards:
    - q: What is an SLM?
      a: A small language model — few parameters; fast, cheap, runs on-device.
    - q: What is right-sizing?
      a: Using the smallest model that does the job, escalating only when needed.
    quiz:
    - q: The main appeal of SLMs is…
      correct: Speed, low cost, and running on-device
      distractors:
      - No training needed
      - Best possible reasoning
      - Largest knowledge
      explain: They’re cheap, fast, and local-friendly.
    - q: When can a small model rival a giant?
      correct: When fine-tuned on a specific narrow task
      distractors:
      - Only offline
      - Never
      - Only with more GPUs
      explain: Specialisation closes the gap on that task.
    recap: |-
      SLMs are small, fast, cheap models that run almost anywhere — a scooter, not a truck. They trade general reasoning for efficiency and privacy, and a fine-tuned SLM can rival a giant on its narrow task. Right-size: small by default, big when needed.
  - id: dense-models
    title: Dense models
    lesson_format: html
    lesson: |-
      <p>A <strong>dense model</strong> is the ‘standard’ kind: for every token, <strong>all</strong> of its parameters are used. If it’s a 7B dense model, all 7 billion weights fire on every single token.</p><div class='analogy'><p>A small company where <em>everyone</em> attends <em>every</em> meeting. Lots of brainpower on each decision — but you pay every salary for every meeting, whether or not each person was needed.</p></div><h3>What that means in practice</h3><ul><li><strong>Predictable:</strong> compute and memory scale straightforwardly with size.</li><li><strong>Strong per-parameter:</strong> all capacity is always engaged.</li><li><strong>Costly to scale:</strong> doubling parameters roughly doubles the work per token.</li></ul><p>Dense is the default and the baseline. The main alternative — <strong>MoE</strong> (next topic) — was invented precisely to break the ‘use everything every time’ cost. Most models you’ve met are dense; you bring up ‘dense’ mainly to contrast with MoE.</p>
    model: |-
      A dense model is <strong>everyone in every meeting</strong>: all parameters fire on every token — simple and strong, but you pay full compute for each token, every time.
    terms:
    - term: Dense model
      def: A model where all parameters are used for every token.
    - term: Active parameters
      def: Parameters actually used per token — in dense models, all of them.
    - term: Baseline
      def: The standard design others (like MoE) are compared against.
    mistakes:
    - title: Thinking ‘dense’ is a feature
      detail: It’s the default design; the term mostly exists to contrast with MoE.
    - title: Assuming dense always beats MoE
      detail: MoE can match quality at lower per-token compute; ‘best’ depends on the setup.
    - title: Ignoring the scaling cost
      detail: |-
        Per-token cost rises with size — bigger dense models are pricier to run, not just to train.
    cards:
    - q: What is a dense model?
      a: One where all parameters are used for every token (the default design).
    - q: Dense vs MoE in one line?
      a: Dense uses all params per token; MoE uses only a relevant subset.
    quiz:
    - q: In a dense model, how many parameters are used per token?
      correct: All of them
      distractors:
      - A small subset
      - None
      - Only the embeddings
      explain: Every parameter fires on every token.
    - q: Why does the term ‘dense’ even come up?
      correct: To contrast with MoE models that use only part of the network
      distractors:
      - It means small
      - It means quantized
      - It’s a special feature
      explain: Dense is the default; the label distinguishes it from MoE.
    recap: |-
      Dense models use all their parameters on every token — the standard, predictable design where everyone attends every meeting. Strong but costly to scale per token. The term mainly exists to contrast with the cheaper-per-token MoE approach.
  - id: moe-models
    title: MoE models
    lesson_format: html
    lesson: |-
      <p><strong>MoE</strong> = <strong>Mixture of Experts</strong>. Instead of using every parameter on every token (dense), an MoE model contains many ‘expert’ sub-networks and a <strong>router</strong> that picks just a <strong>few experts per token</strong>. Most of the model sits idle for any given token.</p><div class='analogy'><p>A hospital with many specialists. You don’t see <em>every</em> doctor for a sore throat — a triage nurse (the router) sends you to the right couple of specialists. Huge total expertise on staff; only a few consulted per visit.</p></div><h3>Why it’s clever</h3><ul><li><strong>Big capacity, lower cost:</strong> a model can have, say, 100B+ total parameters but only ‘activate’ ~10B per token — quality of a big model at the speed of a smaller one.</li><li>The router <strong>learns</strong> which experts suit which tokens.</li></ul><table class='compare'><tr><th></th><th>Dense</th><th>MoE</th></tr><tr><th>Params used/token</th><td>All</td><td>A few experts</td></tr><tr><th>Memory to load</th><td>= size</td><td>Full size (all experts)</td></tr></table><p>Catch: you still need <strong>VRAM for all the experts</strong> (they all must be loaded), and routing adds complexity. So MoE saves <em>compute</em>, not memory.</p>
    model: |-
      MoE is a <strong>hospital of specialists with a triage nurse</strong>: a router sends each token to a few relevant experts. Big-model quality at small-model compute — but you still pay memory to keep all experts on staff.
    terms:
    - term: MoE
      def: Mixture of Experts — many expert sub-networks, few used per token.
    - term: Router / gating
      def: The part that picks which experts handle each token.
    - term: Active vs total params
      def: Used per token vs the full count that must be loaded.
    mistakes:
    - title: Thinking MoE saves memory
      detail: All experts must be loaded into VRAM; MoE cuts compute per token, not memory.
    - title: Comparing total vs active params naively
      detail: |-
        A ‘100B MoE’ may only use ~10B/token — compare active params for speed, total for memory.
    - title: Expecting it to always win
      detail: Routing adds complexity and can be uneven; dense is still simpler and strong.
    cards:
    - q: What is an MoE model?
      a: |-
        Mixture of Experts — a router activates only a few expert sub-networks per token.
    - q: Does MoE save memory or compute?
      a: Compute per token — all experts still must be loaded into VRAM.
    quiz:
    - q: What does an MoE router do?
      correct: Picks a few experts to handle each token
      distractors:
      - Serves the API
      - Compresses weights
      - Tokenizes text
      explain: It routes each token to the most relevant experts.
    - q: MoE mainly saves…
      correct: Compute per token (not memory)
      distractors:
      - Memory
      - Nothing
      - Disk only
      explain: All experts load into VRAM; only a few compute per token.
    recap: |-
      MoE models hold many expert sub-networks and route each token to just a few — big-model quality at lower per-token compute, like a hospital triaging to specialists. But all experts must be loaded, so MoE saves compute, not memory.
  - id: coding-models
    title: Coding models
    lesson_format: html
    lesson: |-
      <p><strong>Coding models</strong> are LLMs specialised for <strong>programming</strong> — trained heavily on source code so they’re strong at writing, explaining, fixing, and completing code across many languages.</p><div class='analogy'><p>A general writer vs a technical author who lives in code all day. Both write, but the specialist knows the syntax, libraries, and idioms cold — and makes fewer rookie mistakes.</p></div><h3>What makes them different</h3><ul><li><strong>Code-heavy training</strong> and code-aware tokenization (handling indentation, symbols well).</li><li><strong>Fill-in-the-middle</strong> ability — completing code with context on <em>both</em> sides, not just before (key for autocomplete).</li><li>Often paired with <strong>large context windows</strong> to fit whole files or repos.</li></ul><p>They power IDE autocomplete and coding assistants. Caveats: they can <strong>confidently produce buggy or insecure code</strong> and <strong>invent libraries/APIs</strong> that don’t exist — always review, run, and test. They’re a fast pair-programmer, not an infallible one.</p>
    model: |-
      A coding model is a <strong>specialist pair-programmer</strong>: trained on mountains of code, great at writing/fixing/completing it (including fill-in-the-middle). Fast and fluent — but it can confidently ship bugs, so review and test.
    terms:
    - term: Coding model
      def: An LLM specialised for programming tasks.
    - term: Fill-in-the-middle (FIM)
      def: Completing code using context both before and after the cursor.
    - term: Autocomplete
      def: Suggesting the next code as you type, powered by such models.
    mistakes:
    - title: Trusting code without running it
      detail: Generated code can be subtly wrong or insecure — review, run, and test it.
    - title: Accepting invented APIs
      detail: Models hallucinate functions/libraries that don’t exist; check the docs.
    - title: Ignoring security
      detail: |-
        Code may include vulnerabilities or leaked secrets patterns — audit before shipping.
    cards:
    - q: What is a coding model?
      a: An LLM specialised for writing, fixing, and completing code.
    - q: What is fill-in-the-middle?
      a: |-
        Completing code using context both before and after the cursor (for autocomplete).
    quiz:
    - q: What is ‘fill-in-the-middle’?
      correct: Completing code using context on both sides of the cursor
      distractors:
      - Centering text
      - A dataset
      - A GPU mode
      explain: FIM uses surrounding code, key for autocomplete.
    - q: A key caution with coding models is…
      correct: They can confidently produce buggy/insecure or invented code
      distractors:
      - They need no review
      - They can’t write code
      - They never err
      explain: Always review, run, and test generated code.
    recap: |-
      Coding models are LLMs specialised on source code — strong at writing, fixing, and completing it, including fill-in-the-middle for autocomplete. They’re a fast pair-programmer, but can confidently produce buggy, insecure, or invented code, so always review and test.
  - id: reasoning-models
    title: Reasoning models
    lesson_format: html
    lesson: |-
      <p><strong>Reasoning models</strong> are trained to <strong>think before they answer</strong> — generating a hidden chain of internal steps to work through hard problems (maths, logic, multi-step planning) instead of blurting the first response.</p><div class='analogy'><p>A student who shows their working vs one who guesses instantly. On a tricky maths problem, the one who pauses, writes out steps, and checks gets it right far more often. Reasoning models build in that pause.</p></div><h3>What’s different</h3><ul><li>They produce extra <strong>‘thinking’ tokens</strong> (often hidden) before the final answer.</li><li>They’re trained to <strong>self-check and backtrack</strong>, which lifts accuracy on hard problems.</li><li>You can sometimes spend more <strong>‘thinking time’</strong> for better answers (test-time compute).</li></ul><table class='compare'><tr><th></th><th>Standard model</th><th>Reasoning model</th></tr><tr><th>Best at</th><td>Fast, everyday tasks</td><td>Hard, multi-step problems</td></tr><tr><th>Cost/latency</th><td>Lower</td><td>Higher (more tokens, slower)</td></tr></table><p>Trade-off: that thinking costs <strong>more tokens, money, and time</strong>. Use reasoning models for genuinely hard problems; for simple tasks they’re overkill (slower and pricier for no benefit).</p>
    model: |-
      A reasoning model is the <strong>student who shows their working</strong>: it spends hidden ‘thinking’ tokens to plan and self-check before answering. Big wins on hard problems — overkill (slow, pricey) for easy ones.
    terms:
    - term: Reasoning model
      def: A model trained to generate internal steps before answering.
    - term: Chain of thought
      def: The step-by-step working a model produces to reason.
    - term: Test-time compute
      def: Spending more thinking/tokens at answer time to improve quality.
    mistakes:
    - title: Using them for everything
      detail: |-
        On simple tasks they’re slower and costlier for no gain — reserve them for hard problems.
    - title: Expecting instant replies
      detail: The ‘thinking’ adds latency and tokens by design.
    - title: Assuming they never err
      detail: Reasoning lowers but doesn’t eliminate mistakes — still verify critical answers.
    cards:
    - q: What is a reasoning model?
      a: One trained to generate internal step-by-step thinking before answering.
    - q: Main trade-off of reasoning models?
      a: Better on hard problems, but more tokens, cost, and latency.
    quiz:
    - q: What do reasoning models do differently?
      correct: Generate internal thinking steps before answering
      distractors:
      - Use no tokens
      - Only handle images
      - Skip training
      explain: They ‘think’ (often hidden) before giving the final answer.
    - q: When are reasoning models a poor choice?
      correct: Simple everyday tasks where they’re slow and costly
      distractors:
      - Hard maths
      - Multi-step logic
      - Planning
      explain: Their extra thinking is overkill for easy tasks.
    recap: |-
      Reasoning models think before answering — producing hidden step-by-step working to crack hard maths, logic, and planning, and self-checking as they go. That accuracy costs more tokens, money, and time, so save them for genuinely hard problems.
- id: deployment
  title: Deployment
  topics:
  - id: local-inference
    title: Local inference
    lesson_format: html
    lesson: |-
      <p><strong>Local inference</strong> means running a model on <strong>your own machine</strong> — your laptop, desktop, or server — instead of calling someone else’s cloud API. The model file lives on your disk and the maths happens on your hardware.</p><div class='analogy'><p>Cooking at home vs ordering delivery. Delivery (cloud API) is effortless but you pay per meal and your order goes to their kitchen. Cooking at home (local) means buying equipment once, then everything stays in your kitchen, free per meal, even with the internet down.</p></div><h3>Why run locally</h3><ul><li><strong>Privacy:</strong> data never leaves your machine.</li><li><strong>No per-call cost:</strong> after hardware, inference is ‘free.’</li><li><strong>Offline:</strong> works with no internet.</li><li><strong>Control:</strong> pick the model, version, and settings.</li></ul><p>The trade-offs: you’re limited by <strong>your hardware</strong> (VRAM decides model size), you handle <strong>setup and updates</strong>, and a laptop won’t match a data-center GPU’s speed. Tools like <strong>Ollama</strong> and <strong>LM Studio</strong> make local inference approachable; <strong>llama.cpp</strong> sits underneath.</p>
    model: |-
      Local inference is <strong>cooking at home</strong>: buy the equipment once, then run private, offline, per-call-free — bounded by your own hardware and the setup you maintain.
    terms:
    - term: Local inference
      def: Running a model on your own hardware rather than a cloud API.
    - term: Local runner
      def: Software like Ollama or LM Studio that runs models locally.
    - term: Offline-capable
      def: Works without an internet connection.
    mistakes:
    - title: Picking a model too big for your hardware
      detail: VRAM/RAM caps model size; an oversized model won’t load or crawls.
    - title: Expecting cloud-grade speed
      detail: A laptop can’t match a data-center GPU; right-size your expectations and model.
    - title: Forgetting maintenance
      detail: Local means you handle updates, drivers, and storage yourself.
    cards:
    - q: What is local inference?
      a: Running a model on your own hardware instead of a cloud API.
    - q: Main trade-off of local inference?
      a: Privacy/offline/free-per-call vs hardware limits and self-maintenance.
    quiz:
    - q: A key benefit of local inference is…
      correct: Privacy, no per-call cost, and offline use
      distractors:
      - Unlimited speed
      - Always the best quality
      - No hardware needed
      explain: Data stays put, calls are free, and it works offline.
    - q: What mainly limits which model you can run locally?
      correct: Your hardware (especially VRAM)
      distractors:
      - The font
      - The browser
      - Your keyboard
      explain: Memory capacity decides the model size that fits.
    recap: |-
      Local inference runs models on your own hardware — private, offline, and free per call after the equipment, like cooking at home. The cost is hardware limits (VRAM caps model size), self-maintenance, and no data-center speed.
  - id: on-device-ai
    title: On-device AI
    lesson_format: html
    lesson: |-
      <p><strong>On-device AI</strong> is local inference taken to <strong>phones, tablets, wearables, and other small gadgets</strong> — the model runs on the device in your pocket, not a server. It’s a stricter version of ‘local,’ with tight power, memory, and heat limits.</p><div class='analogy'><p>If local inference is a home kitchen, on-device is a <em>camping stove</em>: it cooks anywhere with no hookup, but you’re limited to small, efficient meals — you’re not roasting a whole turkey on it.</p></div><h3>What makes it hard — and worth it</h3><ul><li><strong>Constraints:</strong> small memory, limited battery, no big GPU — so models must be tiny and heavily <strong>quantized</strong> (SLMs shine here).</li><li><strong>Payoffs:</strong> instant responses (no network round-trip), works on a plane, and <strong>maximum privacy</strong> — data never leaves the device.</li><li>Phones increasingly ship <strong>NPUs</strong> (neural chips) to run these models efficiently.</li></ul><p>Typical uses: keyboard suggestions, voice transcription, photo features, and offline assistants. Big reasoning tasks still go to the cloud — a common pattern is <strong>on-device for quick/private, cloud for heavy</strong>.</p>
    model: |-
      On-device AI is a <strong>camping stove</strong>: it runs anywhere with no connection and total privacy, but only small, efficient (quantized SLM) ‘meals’ — heavy cooking still goes to the cloud kitchen.
    terms:
    - term: On-device AI
      def: Running models directly on phones/wearables/small gadgets.
    - term: NPU
      def: Neural Processing Unit — a chip for efficient on-device ML.
    - term: Hybrid
      def: 'Splitting work: on-device for light/private, cloud for heavy.'
    mistakes:
    - title: Trying to run big models on a phone
      detail: Memory/battery/heat limits demand small, quantized models — not 70B giants.
    - title: Ignoring battery and heat
      detail: Sustained inference drains battery and throttles; budget for it.
    - title: Assuming it replaces the cloud
      detail: |-
        On-device handles light/private tasks; heavy reasoning usually still needs the cloud.
    cards:
    - q: What is on-device AI?
      a: Running models directly on phones/wearables/gadgets, under tight constraints.
    - q: Common on-device pattern?
      a: Hybrid — on-device for light/private tasks, cloud for heavy reasoning.
    quiz:
    - q: On-device AI is best suited to…
      correct: Small, quantized models for quick, private tasks
      distractors:
      - Only servers
      - Giant reasoning models
      - Training from scratch
      explain: Tight constraints favour small efficient models.
    - q: A standout benefit of on-device AI is…
      correct: Maximum privacy and offline, instant responses
      distractors:
      - Unlimited compute
      - Best accuracy always
      - No model needed
      explain: Data stays on the device and there’s no network round-trip.
    recap: |-
      On-device AI runs models on phones and gadgets — a camping stove offering instant, offline, maximally private inference, but only for small quantized models. Heavy reasoning still goes to the cloud, so hybrid splits are common.
  - id: api-serving
    title: API serving
    lesson_format: html
    lesson: |-
      <p><strong>API serving</strong> is exposing a model behind a <strong>web endpoint</strong> so any app can use it by sending a request over the internet (or your network) and getting an answer back — no need to bundle the model into each app.</p><div class='analogy'><p>A central power plant vs everyone owning a generator. Apps just ‘plug into the socket’ (call the API); the heavy machinery lives in one place you maintain and scale.</p></div><h3>What it gives you</h3><ul><li><strong>One model, many apps:</strong> update it in one place; every client benefits.</li><li><strong>Standard shape:</strong> most expose an <strong>OpenAI-compatible</strong> endpoint, so clients are easy to swap.</li><li><strong>Centralised control:</strong> auth, rate limits, logging, and cost tracking in one spot.</li></ul><pre><code>POST /v1/chat/completions
      { "model": "my-model", "messages": [{"role":"user","content":"Hi"}] }</code></pre><p>You can call a <strong>provider’s</strong> API (no infra) or self-host one with <strong>vLLM/TGI/Ollama</strong>. Things to handle: <strong>authentication</strong> (API keys), <strong>rate limiting</strong>, <strong>streaming</strong> responses, and <strong>monitoring</strong>.</p>
    model: |-
      API serving is a <strong>power plant with sockets</strong>: the model lives in one managed place and apps plug in over the network — one update, many clients, central auth and limits.
    terms:
    - term: API serving
      def: Exposing a model via a network endpoint apps can call.
    - term: Endpoint
      def: The URL apps send requests to (e.g. /v1/chat/completions).
    - term: Rate limiting
      def: Capping requests per client to control load and cost.
    mistakes:
    - title: Exposing it without auth/limits
      detail: An open endpoint invites abuse and runaway cost — require keys and rate-limit.
    - title: Skipping streaming
      detail: |-
        Without token streaming, users wait for the whole answer; stream for responsiveness.
    - title: No monitoring
      detail: |-
        Track latency, errors, and spend, or problems hide until the bill or outage arrives.
    cards:
    - q: What is API serving?
      a: Exposing a model behind a network endpoint that apps call for answers.
    - q: Three things to handle in API serving?
      a: Auth (keys), rate limiting, streaming/monitoring.
    quiz:
    - q: API serving lets you…
      correct: Run the model once and let many apps call it over the network
      distractors:
      - Avoid models entirely
      - Train faster
      - Bundle the model into every app
      explain: One central model serves many clients via an endpoint.
    - q: A must-have when exposing an API is…
      correct: Authentication and rate limiting
      distractors:
      - No logging
      - Bigger fonts
      - More emoji
      explain: Keys and limits prevent abuse and runaway cost.
    recap: |-
      API serving puts a model behind a network endpoint so many apps can call it — a power plant with sockets, updated in one place. Use a standard (often OpenAI-compatible) shape and handle auth, rate limits, streaming, and monitoring.
  - id: cloud-gpus
    title: Cloud GPUs
    lesson_format: html
    lesson: |-
      <p><strong>Cloud GPUs</strong> are powerful GPUs you <strong>rent by the hour</strong> from providers instead of buying. You spin one up, run training or serving, and shut it down — paying only for the time you use.</p><div class='analogy'><p>Renting a pro kitchen by the hour vs building one at home. For an occasional big event (training a model), renting the high-end gear is far cheaper than owning a $30k oven you rarely use.</p></div><h3>When to rent vs own</h3><table class='compare'><tr><th>Rent (cloud)</th><th>Own (local)</th></tr><tr><td>Occasional big jobs (training)</td><td>Constant, predictable use</td></tr><tr><td>Need top-tier GPUs (A100/H100)</td><td>Privacy / no recurring bill</td></tr><tr><td>Scale up/down on demand</td><td>Full control of hardware</td></tr></table><h3>Watch the meter</h3><ul><li><strong>Idle = paying:</strong> a GPU left running bills even when doing nothing — shut it down.</li><li><strong>Egress &amp; storage</strong> can add hidden cost beyond the GPU hour.</li><li><strong>Spot/preemptible</strong> instances are cheaper but can be reclaimed mid-job.</li></ul>
    model: |-
      Cloud GPUs are a <strong>pro kitchen rented by the hour</strong>: access top-tier hardware on demand, pay only while it runs — perfect for occasional heavy jobs, but the meter never sleeps, so shut it off.
    terms:
    - term: Cloud GPU
      def: A rentable GPU billed by the hour from a provider.
    - term: Spot / preemptible
      def: Discounted instances that can be reclaimed at short notice.
    - term: Egress
      def: Charges for moving data out of the cloud provider.
    mistakes:
    - title: Leaving GPUs running idle
      detail: |-
        You’re billed by time, not use — forgetting to stop instances is the classic costly mistake.
    - title: Ignoring hidden costs
      detail: Storage and data egress add up beyond the headline GPU/hour price.
    - title: Spot instances for fragile jobs
      detail: |-
        Cheaper spot/preemptible GPUs can vanish mid-run — checkpoint, or use on-demand for critical work.
    cards:
    - q: What are cloud GPUs?
      a: Powerful GPUs rented by the hour instead of bought.
    - q: Classic cloud-GPU mistake?
      a: Leaving instances running idle — you pay for time, not use.
    quiz:
    - q: Cloud GPUs are billed mainly by…
      correct: Time the instance runs
      distractors:
      - Files stored only
      - Number of tokens
      - Per user
      explain: You pay for runtime, so idle instances still cost money.
    - q: Renting beats owning when…
      correct: You need top GPUs for occasional big jobs and want to scale on demand
      distractors:
      - Use is constant and predictable
      - You need offline privacy
      - You want no bills ever
      explain: On-demand access to high-end GPUs suits occasional heavy work.
    recap: |-
      Cloud GPUs let you rent top-tier hardware by the hour — a pro kitchen on demand, ideal for occasional heavy jobs and scaling. But billing is by runtime (idle still costs), with hidden storage/egress fees, and spot instances can be reclaimed.
  - id: edge-ai
    title: Edge AI basics
    lesson_format: html
    lesson: |-
      <p><strong>Edge AI</strong> runs models at the <strong>‘edge’ of the network — close to where data is created</strong> — like a factory sensor, a store camera, a car, or a smart speaker, rather than in a distant cloud data center.</p><div class='analogy'><p>A local branch office vs head office. Instead of sending every question to HQ (the cloud) and waiting for a reply, the branch handles it on the spot. Faster, and the paperwork never leaves the building.</p></div><h3>Why push AI to the edge</h3><ul><li><strong>Low latency:</strong> no round-trip to the cloud — vital for cars, robots, live video.</li><li><strong>Reliability:</strong> keeps working if the network drops.</li><li><strong>Privacy/bandwidth:</strong> raw data (e.g. video) is processed locally; only results are sent.</li></ul><p>How it relates to terms you know: <strong>on-device AI</strong> (phones) is one flavour of edge; edge also covers dedicated boxes and industrial hardware. Like on-device, the edge has <strong>limited compute</strong>, so models are small and <strong>quantized</strong>. A frequent design is <strong>edge + cloud</strong>: handle the fast/common case locally, escalate hard cases to the cloud.</p>
    model: |-
      Edge AI is a <strong>branch office</strong>: process data where it’s born — fast, network-resilient, and private — using small quantized models, escalating the hard cases to the cloud HQ.
    terms:
    - term: Edge AI
      def: Running models near where data is created, not in a central cloud.
    - term: Edge device
      def: Hardware at the data source (sensor, camera, car, speaker).
    - term: Edge + cloud
      def: Handling common cases locally and escalating hard ones to the cloud.
    mistakes:
    - title: Over-spec’ing the model
      detail: Edge hardware is constrained; use small, quantized models, not giants.
    - title: Confusing edge with cloud
      detail: |-
        Edge is near the data source for low latency/offline; cloud is centralised power.
    - title: Forgetting fleet management
      detail: Many edge devices need updates and monitoring at scale — plan for it.
    cards:
    - q: What is edge AI?
      a: |-
        Running models near where data is created (sensors, cameras, cars), not in the cloud.
    - q: Edge vs on-device?
      a: |-
        On-device (phones) is one flavour of edge; edge also covers dedicated/industrial hardware.
    quiz:
    - q: Edge AI runs models…
      correct: Close to where data is created
      distractors:
      - Only on phones
      - Only in big data centers
      - Without any model
      explain: The ‘edge’ is near the data source — sensors, cameras, cars.
    - q: A key reason to use edge AI is…
      correct: Low latency and working even if the network drops
      distractors:
      - No model needed
      - Bigger models
      - Unlimited compute
      explain: Local processing avoids the cloud round-trip and survives outages.
    recap: |-
      Edge AI runs models close to where data is created — a branch office handling things on the spot for low latency, reliability, and privacy. Hardware is constrained, so models are small and quantized, often paired with the cloud for hard cases.
- id: evaluation
  title: Evaluation
  topics:
  - id: benchmarks
    title: AI benchmarks
    lesson_format: html
    lesson: |-
      <p><strong>Benchmarks</strong> are <strong>standardised tests for models</strong> — fixed sets of questions with known answers that everyone runs, so you can compare models on the same yardstick. You’ll see names like MMLU (general knowledge), GSM8K (maths), HumanEval (coding).</p><div class='analogy'><p>Like the SAT for models. A single score lets you line candidates up side by side. But just as a high SAT doesn’t guarantee a great employee, a high benchmark doesn’t guarantee a great fit for <em>your</em> task.</p></div><h3>How to read them sensibly</h3><ul><li><strong>Match the test to your need:</strong> a top coding score is irrelevant if you’re doing customer support.</li><li><strong>Beware contamination:</strong> if benchmark questions leaked into training data, scores are inflated and meaningless.</li><li><strong>Look at multiple benchmarks</strong> plus your own tests — one number hides weaknesses.</li></ul><p>Benchmarks are a useful <strong>first filter</strong>, not the final word. The model that tops a leaderboard may still lose on <em>your</em> data — which is why your own evaluation set matters most.</p>
    model: |-
      A benchmark is the <strong>SAT for models</strong>: a shared yardstick for quick comparison — useful as a first filter, but a high score never guarantees a good fit for your specific task.
    terms:
    - term: Benchmark
      def: A standardised test with known answers for comparing models.
    - term: Contamination
      def: Benchmark questions leaking into training data, inflating scores.
    - term: Leaderboard
      def: A ranking of models by benchmark scores.
    mistakes:
    - title: Picking a model on one leaderboard number
      detail: A single benchmark hides weaknesses; check several plus your own tests.
    - title: Ignoring contamination
      detail: |-
        Leaked test questions inflate scores — a suspiciously perfect result is a red flag.
    - title: Mismatching test and task
      detail: |-
        Great maths scores don’t help a writing task; match the benchmark to your use case.
    cards:
    - q: What is a benchmark?
      a: A standardised test with known answers used to compare models.
    - q: What is benchmark contamination?
      a: Test questions leaking into training data, inflating scores.
    quiz:
    - q: What are AI benchmarks for?
      correct: Comparing models on a standardised test
      distractors:
      - Serving APIs
      - Training models
      - Cleaning data
      explain: They’re shared yardsticks for comparison.
    - q: Why be cautious about a perfect benchmark score?
      correct: It may signal contamination (leaked test data)
      distractors:
      - It’s always great
      - Benchmarks don’t matter
      - It means low cost
      explain: Leaked questions inflate scores misleadingly.
    recap: |-
      Benchmarks are the SAT for models — standardised tests for quick side-by-side comparison and a useful first filter. But match the test to your task, watch for contamination, check several, and trust your own evaluation set most.
  - id: human-evals
    title: Human evals
    lesson_format: html
    lesson: |-
      <p><strong>Human evaluation</strong> means having <strong>people judge model outputs</strong> — rating quality, picking the better of two answers, or flagging problems. For fuzzy qualities like helpfulness, tone, and safety, humans are still the gold standard.</p><div class='analogy'><p>Automated benchmarks are like grading a multiple-choice test — fast and objective. Human eval is like judging an essay: slower and more subjective, but the only way to assess things a tick-box can’t capture.</p></div><h3>Common forms</h3><ul><li><strong>Pairwise:</strong> ‘Which answer is better, A or B?’ (easy and reliable).</li><li><strong>Rating scales:</strong> score helpfulness 1–5.</li><li><strong>Rubric-based:</strong> check specific criteria (accurate? safe? on-tone?).</li></ul><p>The catch: it’s <strong>slow, costly, and subjective</strong>. Reduce noise with <strong>clear guidelines</strong>, multiple raters per item, and agreement checks. A popular middle ground is <strong>LLM-as-judge</strong> — using a strong model to approximate human ratings cheaply — but it has its own biases and should be validated against real humans.</p>
    model: |-
      Human eval is <strong>judging an essay, not a quiz</strong>: the gold standard for fuzzy qualities like helpfulness and tone. Slow and subjective, so use clear rubrics and multiple raters — or an LLM-judge, validated against humans.
    terms:
    - term: Human eval
      def: People judging model outputs for quality and problems.
    - term: Pairwise comparison
      def: Choosing the better of two answers — simple and reliable.
    - term: LLM-as-judge
      def: Using a strong model to approximate human ratings cheaply.
    mistakes:
    - title: Vague instructions to raters
      detail: Without a clear rubric, scores are noisy and inconsistent across people.
    - title: One rater per item
      detail: Single opinions are unreliable; use multiple raters and check agreement.
    - title: Trusting LLM-as-judge blindly
      detail: |-
        It’s cheap but biased (e.g. favouring longer answers) — validate against human ratings.
    cards:
    - q: What is human evaluation?
      a: Having people judge model outputs for quality, tone, safety, etc.
    - q: What is LLM-as-judge?
      a: |-
        Using a strong model to approximate human ratings cheaply (validate against humans).
    quiz:
    - q: Human eval is especially valuable for…
      correct: Fuzzy qualities like helpfulness, tone, and safety
      distractors:
      - Exact maths answers
      - Token counts
      - File sizes
      explain: Humans judge subjective qualities tick-boxes miss.
    - q: What is ‘LLM-as-judge’?
      correct: Using a strong model to approximate human ratings
      distractors:
      - A courtroom AI
      - A tokenizer
      - A benchmark
      explain: A cheaper stand-in for human raters — but validate it.
    recap: |-
      Human evals have people judge outputs — the gold standard for fuzzy qualities like helpfulness and tone, like grading an essay. They’re slow and subjective, so use clear rubrics and multiple raters; LLM-as-judge is a cheaper stand-in to validate against humans.
  - id: cost-per-token
    title: Cost-per-token analysis
    lesson_format: html
    lesson: |-
      <p>Most AI usage is <strong>billed per token</strong>, and crucially <strong>input and output tokens are priced separately</strong> (output is usually pricier). <strong>Cost-per-token analysis</strong> is working out what your real spend will be — before the bill surprises you.</p><div class='analogy'><p>Like a phone plan charging per minute, with incoming and outgoing calls at different rates. A single call is trivial; a call center’s monthly bill needs real math. Same with tokens at scale.</p></div><h3>The back-of-envelope</h3><pre><code>cost = (input_tokens  × input_price)
           + (output_tokens × output_price)
      # then × requests per day × 30 for monthly</code></pre><p>What blows budgets up: <strong>long prompts</strong> (system prompt + RAG context repeated every call), <strong>long outputs</strong>, and <strong>reasoning models</strong> that spend many hidden ‘thinking’ tokens. Levers to cut cost: trim prompts, cap output length, <strong>cache</strong> repeated context, and <strong>route</strong> easy requests to cheaper/smaller models.</p>
    model: |-
      Cost-per-token analysis is <strong>reading the phone plan before the call-center opens</strong>: input and output are metered separately, so estimate <em>tokens × price × volume</em> up front and trim the biggest drivers.
    terms:
    - term: Cost per token
      def: Price charged for each input/output token, billed separately.
    - term: Input vs output pricing
      def: Different rates; output is typically more expensive.
    - term: Caching
      def: Reusing repeated context to avoid re-paying for it each call.
    mistakes:
    - title: Forgetting input ≠ output price
      detail: Output usually costs more; mixing them up underestimates the bill.
    - title: Ignoring repeated context
      detail: A big system prompt or RAG block is paid on every call — it adds up fast.
    - title: Overlooking reasoning ‘thinking’ tokens
      detail: Reasoning models bill for hidden steps; budget for far more output than you see.
    cards:
    - q: How is most AI usage billed?
      a: Per token, with input and output priced separately (output usually higher).
    - q: Top levers to cut token cost?
      a: |-
        Trim prompts, cap output, cache repeated context, route easy requests to cheaper models.
    quiz:
    - q: In token pricing, input and output tokens are…
      correct: Priced separately, output usually higher
      distractors:
      - Counted as one
      - Always the same price
      - Free
      explain: They’re billed at different rates; output costs more.
    - q: A common hidden cost driver is…
      correct: Long repeated context (system prompt + RAG) on every call
      distractors:
      - Small models
      - Short prompts
      - Caching
      explain: Repeated context is paid every request and adds up.
    recap: |-
      Cost-per-token analysis estimates real spend up front: input and output tokens are metered separately (output costs more), times your volume. Long repeated context and reasoning ‘thinking’ tokens blow budgets — trim, cap, cache, and route to control them.
  - id: speed-benchmarking
    title: Speed benchmarking
    lesson_format: html
    lesson: |-
      <p><strong>Speed benchmarking</strong> measures how <strong>fast</strong> a model responds. ‘Fast’ has two distinct meanings, and confusing them leads to bad decisions.</p><table class='compare'><tr><th>Metric</th><th>Means</th><th>Felt by</th></tr><tr><td><strong>Latency (TTFT)</strong></td><td>Time to the <em>first</em> token</td><td>How snappy it feels to start</td></tr><tr><td><strong>Throughput (tok/s)</strong></td><td>Tokens generated per second</td><td>How fast the answer streams / total capacity</td></tr></table><div class='analogy'><p>Ordering at a café: <strong>latency</strong> is how long before the barista <em>starts</em> your drink; <strong>throughput</strong> is how many drinks the café makes per hour. A chatty user cares about the first; a busy shop owner cares about the second.</p></div><h3>Measuring fairly</h3><ul><li>Test under <strong>realistic load</strong> (many concurrent users), not one lonely request.</li><li>Use <strong>your real prompt sizes</strong> — long inputs change the numbers.</li><li>Report <strong>percentiles</strong> (p95/p99), not just the average — tail latency is what users complain about.</li></ul>
    model: |-
      Speed has two faces: <strong>latency</strong> (when the barista starts your drink) and <strong>throughput</strong> (drinks per hour). Measure both under real load and real prompt sizes, and watch the slow tail (p95/p99).
    terms:
    - term: Latency / TTFT
      def: Time to first token — how quickly a response starts.
    - term: Throughput
      def: Tokens (or requests) produced per second.
    - term: p95 / p99
      def: Percentile latencies showing the slow tail, not just the average.
    mistakes:
    - title: Confusing latency with throughput
      detail: |-
        Fast first-token ≠ high total capacity; optimise the one your users actually feel.
    - title: Benchmarking a single request
      detail: Real performance shows under concurrent load, not one isolated call.
    - title: Reporting only the average
      detail: |-
        Averages hide bad tail latency; p95/p99 reveal the experience users complain about.
    cards:
    - q: Latency vs throughput?
      a: Latency = time to first token (snappiness); throughput = tokens/sec (capacity).
    - q: Why use p95/p99, not averages?
      a: Averages hide the slow tail that users actually notice and complain about.
    quiz:
    - q: Time-to-first-token measures…
      correct: How quickly a response starts (latency)
      distractors:
      - Cost
      - Total tokens per second
      - Model size
      explain: TTFT is the latency users feel at the start.
    - q: Why report p95/p99 latency?
      correct: Averages hide the slow tail users actually complain about
      distractors:
      - They’re cheaper
      - They look nicer
      - They measure cost
      explain: Tail latency reflects real worst-case experience.
    recap: |-
      Speed benchmarking separates latency (time to first token — how snappy it feels) from throughput (tokens/sec — total capacity). Measure both under realistic concurrent load with your real prompt sizes, and report p95/p99 to catch the slow tail.
  - id: quality-benchmarking
    title: Quality benchmarking
    lesson_format: html
    lesson: |-
      <p><strong>Quality benchmarking</strong> is measuring how <em>good</em> a model’s answers are <strong>for your specific task</strong> — not on generic public tests, but on examples that look like your real work.</p><div class='analogy'><p>A test drive on <em>your</em> daily commute, not the showroom’s smooth track. The only quality that matters is how it performs on the roads you actually drive.</p></div><h3>Building your own eval set</h3><ul><li><strong>Collect real examples</strong> — 50–200 representative inputs from your use case.</li><li><strong>Define ‘good’</strong> — a rubric or known-correct answers (the ‘golden set’).</li><li><strong>Score consistently</strong> — exact-match where possible; human or LLM-judge for open-ended.</li><li><strong>Re-run on every change</strong> — model swaps, prompt edits, new versions.</li></ul><p>This is the single highest-value habit in applied AI: a small, trusted eval set turns ‘it feels better’ into <strong>evidence</strong>, catches <strong>regressions</strong> before users do, and lets you compare options objectively. Combine it with cost and speed, and you can choose models on facts, not vibes.</p>
    model: |-
      Quality benchmarking is a <strong>test drive on your own commute</strong>: judge models on a small, trusted set of your real examples. It turns ‘feels better’ into evidence and catches regressions before users do.
    terms:
    - term: Quality benchmarking
      def: Measuring answer quality on your own task-specific examples.
    - term: Golden set
      def: A trusted set of inputs with known-good answers for evaluation.
    - term: Regression
      def: A change that quietly makes quality worse than before.
    mistakes:
    - title: Judging quality by vibes
      detail: ‘It seems better’ isn’t evidence; a fixed eval set makes comparisons objective.
    - title: Relying only on public benchmarks
      detail: They don’t reflect your data; build a task-specific golden set.
    - title: Never re-running it
      detail: |-
        Without re-testing on changes, prompt/model tweaks can silently cause regressions.
    cards:
    - q: What is quality benchmarking?
      a: Measuring answer quality on a trusted set of your own real examples.
    - q: What is a golden set?
      a: A trusted set of inputs with known-good answers used to evaluate quality.
    quiz:
    - q: The best measure of quality for your app is…
      correct: Your own task-specific eval set
      distractors:
      - A public leaderboard
      - Token price
      - Model size
      explain: Real examples from your use case matter most.
    - q: Why re-run your eval set on every change?
      correct: To catch regressions before users do
      distractors:
      - For fun
      - To use more GPUs
      - It’s required by law
      explain: Changes can silently degrade quality; testing catches it.
    recap: |-
      Quality benchmarking judges models on your own task — a test drive on your real commute, not the showroom track. Build a small golden set, score it consistently, and re-run on every change to turn ‘feels better’ into evidence and catch regressions early.
- id: real-world
  title: Real-World Skills
  topics:
  - id: chatbots
    title: Building chatbots
    lesson_format: html
    lesson: |-
      <p>A <strong>chatbot</strong> is the most common AI product: a back-and-forth conversation where the model answers in context. Simple to start, but a <em>good</em> one is more than ‘call the model and print the reply.’</p><div class='analogy'><p>The model is a brilliant temp who forgets everything between sentences. Your job as builder is to give them a name badge (persona), a notepad (conversation history), and a reference binder (knowledge) so they act like a real team member.</p></div><h3>The anatomy of a solid chatbot</h3><ul><li><strong>System prompt</strong> — role, tone, rules, boundaries.</li><li><strong>Conversation history</strong> — feed past turns back so it remembers the thread (within the context window).</li><li><strong>RAG</strong> — pull in your real docs so answers are grounded, not guessed.</li><li><strong>Streaming</strong> — show tokens as they arrive so it feels fast.</li><li><strong>Guardrails</strong> — handle off-topic, unsafe, or ‘I don’t know’ cases gracefully.</li></ul><p>Start tiny (model + system prompt), then add history, then RAG, then polish. Most ‘bad chatbot’ complaints trace back to <strong>missing grounding</strong> (hallucinations) or <strong>lost context</strong> (forgetting the conversation).</p>
    model: |-
      A chatbot is a <strong>temp given a badge, a notepad, and a binder</strong>: system prompt (who), history (memory of the thread), and RAG (real knowledge). Build it up in that order.
    terms:
    - term: Conversation history
      def: Past turns fed back so the bot remembers the thread.
    - term: Grounding (RAG)
      def: Supplying real documents so answers are factual and citable.
    - term: Guardrails
      def: Rules for handling unsafe, off-topic, or unknown queries.
    mistakes:
    - title: No grounding
      detail: 'Without RAG/sources, the bot confidently makes things up — the #1 complaint.'
    - title: Dropping conversation history
      detail: Forget to feed past turns and it ‘forgets’ what was just said.
    - title: Skipping streaming
      detail: Waiting for the whole reply feels sluggish; stream tokens for responsiveness.
    cards:
    - q: Core parts of a solid chatbot?
      a: System prompt, conversation history, RAG grounding, streaming, guardrails.
    - q: Two top chatbot failure modes?
      a: No grounding (hallucination) and dropped history (forgetting context).
    quiz:
    - q: The most common cause of a ‘bad chatbot’ is…
      correct: Missing grounding (hallucinations) or lost context
      distractors:
      - Too many GPUs
      - Too small a font
      - Streaming
      explain: Ungrounded answers and forgotten context drive most complaints.
    - q: What makes a chatbot ‘remember’ the conversation?
      correct: Feeding past turns (history) back into the prompt
      distractors:
      - A new tokenizer
      - A bigger model
      - More VRAM
      explain: History within the context window provides memory.
    recap: |-
      A good chatbot is a temp given a badge (system prompt), a notepad (history), and a binder (RAG). Build up from model + prompt to history to grounding to polish — most failures come from missing grounding or lost context.
  - id: copilots
    title: Building AI copilots
    lesson_format: html
    lesson: |-
      <p>A <strong>copilot</strong> is AI <strong>embedded inside a tool to assist while you work</strong> — suggesting code in an editor, drafting replies in an inbox, summarising in a doc. Unlike a standalone chatbot, it lives <em>in context</em> and the human stays in charge.</p><div class='analogy'><p>A driving copilot, not a self-driving car. It reads the map, suggests turns, and warns of hazards — but your hands stay on the wheel. The human accepts, edits, or ignores each suggestion.</p></div><h3>What makes copilots work</h3><ul><li><strong>Rich context:</strong> it sees what you’re doing (the file, the email thread, the selection) — that context is its superpower.</li><li><strong>In-place suggestions:</strong> right where you work, not in a separate window.</li><li><strong>Easy accept/reject/edit:</strong> low-friction control keeps the human in the loop.</li><li><strong>Non-intrusive:</strong> helpful when wanted, invisible when not.</li></ul><p>Design rule: <strong>augment, don’t replace.</strong> The best copilots make a skilled person faster and keep them in control — wrong suggestions are cheap to dismiss, so the bar is ‘often helpful,’ not ‘always perfect.’</p>
    model: |-
      A copilot is a <strong>navigator, not a driverless car</strong>: it uses rich in-app context to suggest, while the human accepts, edits, or ignores. Augment the expert; keep them in control.
    terms:
    - term: Copilot
      def: AI embedded in a tool to assist a user in context.
    - term: Human-in-the-loop
      def: The user reviews and controls each AI suggestion.
    - term: Context awareness
      def: The copilot seeing your current work to give relevant help.
    mistakes:
    - title: Trying to fully automate
      detail: |-
        Copilots assist; removing human control turns small errors into shipped mistakes.
    - title: Starving it of context
      detail: Its value comes from seeing your work — feed it the file/thread/selection.
    - title: High-friction UX
      detail: If accepting/rejecting is clumsy, users stop using it; make control effortless.
    cards:
    - q: What is an AI copilot?
      a: AI embedded in a tool to assist you in context, with the human in control.
    - q: Copilot design rule?
      a: Augment, don’t replace — keep the human in the loop with easy accept/reject.
    quiz:
    - q: A copilot differs from a chatbot by…
      correct: Living inside a tool, in-context, with the human in control
      distractors:
      - Being bigger
      - Never using a model
      - Working offline only
      explain: It assists in-place while you stay in charge.
    - q: A copilot’s ‘superpower’ is…
      correct: Rich context about what you’re doing
      distractors:
      - No UI
      - A huge model
      - Full autonomy
      explain: Seeing your current work makes its help relevant.
    recap: |-
      A copilot is AI embedded in a tool — a navigator, not a driverless car. Its power is rich in-app context; its rule is augment-don’t-replace, with effortless accept/reject keeping the human in control. Aim for ‘often helpful,’ not ‘always perfect.’
  - id: ai-automation
    title: AI automation
    lesson_format: html
    lesson: |-
      <p><strong>AI automation</strong> uses models to <strong>handle tasks with little or no human involvement</strong> — sorting incoming emails, tagging tickets, extracting data from documents, generating routine reports. The goal: remove repetitive work, not impress with chat.</p><div class='analogy'><p>A tireless assistant doing the boring paperwork. They don’t need to be a genius — they need to be <em>reliable</em> at the same dull task thousands of times without complaint.</p></div><h3>Where AI fits in automation</h3><ul><li>It shines on tasks that are <strong>fuzzy</strong> (free text, varied formats) where old rule-based automation broke.</li><li>Often a <strong>small step</strong> in a bigger pipeline: classify → route → act.</li><li>Best with a <strong>narrow, well-defined job</strong> and structured output (function calling).</li></ul><p>Crucial design choice: <strong>match autonomy to the stakes.</strong> Auto-tagging tickets can run unattended; auto-issuing refunds needs a human check or tight limits. Always log decisions and have a <strong>fallback</strong> for low-confidence cases (‘send to a human’).</p>
    model: |-
      AI automation is a <strong>tireless paperwork clerk</strong>: reliable on narrow, fuzzy tasks at scale. Match autonomy to the stakes, log everything, and route low-confidence cases to a human.
    terms:
    - term: AI automation
      def: Using models to handle tasks with little/no human involvement.
    - term: Pipeline step
      def: AI as one stage (e.g. classify) within a larger automated flow.
    - term: Fallback
      def: Routing low-confidence or risky cases to a human.
    mistakes:
    - title: Automating high-stakes actions unchecked
      detail: Refunds, deletes, sends — gate these behind approval or strict limits.
    - title: No fallback for uncertainty
      detail: When the model is unsure, route to a human instead of guessing.
    - title: Over-scoping the task
      detail: Narrow, well-defined jobs work; vague ‘do everything’ automations fail.
    cards:
    - q: What is AI automation?
      a: Using models to handle narrow, repetitive tasks with little human involvement.
    - q: Key automation safety rule?
      a: |-
        Match autonomy to stakes; log decisions and route low-confidence cases to a human.
    quiz:
    - q: AI automation is best for…
      correct: Narrow, repetitive, fuzzy tasks at scale
      distractors:
      - Impressive open chat
      - Training models
      - Drawing UIs
      explain: Reliability on a well-defined job is the point.
    - q: For high-stakes automated actions you should…
      correct: Add human approval or tight limits and a fallback
      distractors:
      - Use a bigger font
      - Skip logging
      - Run them unattended
      explain: Match autonomy to stakes; gate risky actions.
    recap: |-
      AI automation is a tireless clerk handling narrow, fuzzy, repetitive tasks at scale — often one step in a bigger pipeline. Keep jobs well-defined, match autonomy to the stakes, log decisions, and fall back to a human when confidence is low.
  - id: saas-workflows
    title: AI SaaS workflows
    lesson_format: html
    lesson: |-
      <p><strong>AI SaaS workflows</strong> are about turning AI features into a real <strong>software product people pay for</strong> — which means thinking beyond the model: pricing, reliability, multi-user data, and margins.</p><div class='analogy'><p>A great recipe isn’t a restaurant. To run the restaurant you need consistent service, sensible prices, clean tables for every guest, and a kitchen that doesn’t lose money per dish. AI SaaS is the restaurant around the recipe.</p></div><h3>What changes at product scale</h3><ul><li><strong>Unit economics:</strong> if each user costs more in tokens than they pay, you lose money as you grow. Track cost-per-user.</li><li><strong>Multi-tenancy:</strong> strict data isolation so one customer never sees another’s data (filter RAG by tenant!).</li><li><strong>Reliability:</strong> handle provider outages, rate limits, and retries — don’t let one API hiccup break the app.</li><li><strong>Caching &amp; routing:</strong> cut cost by caching repeats and routing easy work to cheaper models.</li></ul><p>The mindset shift: a demo proves it <em>can</em> work once; a SaaS proves it works <strong>reliably, securely, and profitably</strong> for thousands of users.</p>
    model: |-
      AI SaaS is the <strong>restaurant, not the recipe</strong>: pricing that beats token cost, strict per-tenant isolation, and reliability under load. A demo works once; a product works profitably for thousands.
    terms:
    - term: Unit economics
      def: Cost vs revenue per user — must be sustainable to scale.
    - term: Multi-tenancy
      def: Serving many customers with strict data isolation between them.
    - term: Resilience
      def: Staying up despite provider outages, rate limits, and errors.
    mistakes:
    - title: Ignoring unit economics
      detail: |-
        If token cost per user exceeds revenue, scaling loses more money — model the margins early.
    - title: Weak tenant isolation
      detail: Cross-customer data leaks are catastrophic; filter every retrieval by tenant.
    - title: No resilience to provider issues
      detail: Outages and rate limits happen — add retries, fallbacks, and graceful errors.
    cards:
    - q: What do AI SaaS workflows add beyond the model?
      a: Pricing/unit economics, multi-tenant isolation, reliability, caching/routing.
    - q: Demo vs SaaS mindset?
      a: A demo works once; a SaaS works reliably, securely, and profitably at scale.
    quiz:
    - q: Why do unit economics matter in AI SaaS?
      correct: If per-user token cost beats revenue, growth loses money
      distractors:
      - They speed the GPU
      - They set the font
      - They don’t
      explain: Margins must be sustainable to scale profitably.
    - q: A critical multi-tenant requirement is…
      correct: Strict data isolation between customers (filter RAG by tenant)
      distractors:
      - Bigger models
      - One shared chat
      - No caching
      explain: Customers must never see each other’s data.
    recap: |-
      AI SaaS is the restaurant around the recipe: it demands sustainable unit economics, strict multi-tenant data isolation, and resilience to provider issues. A demo proves it can work once; a product proves it works profitably for thousands.
  - id: coding-workflows
    title: AI coding workflows
    lesson_format: html
    lesson: |-
      <p><strong>AI coding workflows</strong> are how you actually <strong>build software with AI as a partner</strong> — using coding models and copilots effectively across the day, from autocomplete to whole features.</p><div class='analogy'><p>AI is a fast, eager junior developer: great at boilerplate and first drafts, occasionally confidently wrong. You’re the senior reviewing every pull request — you ship nothing you haven’t understood.</p></div><h3>A practical loop</h3><ul><li><strong>Scaffold:</strong> let AI draft boilerplate, tests, and repetitive code.</li><li><strong>Steer with context:</strong> give it the relevant files, types, and examples — vague prompts get vague code.</li><li><strong>Review &amp; run:</strong> read it, run it, test it — never paste-and-pray.</li><li><strong>Iterate in small steps:</strong> small, checkable changes beat giant AI-written dumps.</li></ul><p>Biggest leverage: <strong>tests and small diffs.</strong> AI is fastest when each change is small enough to verify quickly. Biggest danger: <strong>shipping code you don’t understand</strong> — if you can’t explain it, you can’t maintain or debug it later.</p>
    model: |-
      AI coding is <strong>pairing with an eager junior</strong>: brilliant at drafts and boilerplate, sometimes confidently wrong. You stay the reviewing senior — small diffs, real tests, ship nothing you don’t understand.
    terms:
    - term: AI coding workflow
      def: Practices for building software with AI as a coding partner.
    - term: Small diffs
      def: Tiny, verifiable changes that are easy to review and test.
    - term: Paste-and-pray
      def: Shipping AI code without reading or testing it (an anti-pattern).
    mistakes:
    - title: Paste-and-pray
      detail: |-
        Shipping unread AI code invites subtle bugs and security holes — review and run it.
    - title: Giant one-shot generations
      detail: Big AI dumps are hard to verify; prefer small, checkable diffs.
    - title: Starving it of context
      detail: Without the relevant files/types, it guesses and invents APIs — feed it context.
    cards:
    - q: Mental model for AI coding?
      a: An eager junior dev — great at drafts, sometimes wrong; you review every change.
    - q: Biggest AI-coding danger?
      a: Shipping code you don’t understand; use small diffs, context, and tests.
    quiz:
    - q: The biggest danger in AI coding is…
      correct: Shipping code you don’t understand
      distractors:
      - Small diffs
      - Typing too fast
      - Using tests
      explain: Ununderstood code can’t be maintained or debugged safely.
    - q: AI coding works best with…
      correct: Small, checkable diffs and real tests
      distractors:
      - Giant one-shot generations
      - No context
      - No review
      explain: Small verifiable steps plus context and tests are the leverage.
    recap: |-
      AI coding workflows treat the model as an eager junior dev — great at boilerplate and drafts, sometimes confidently wrong. Steer it with context, work in small diffs backed by tests, and never ship code you don’t understand.
  - id: orchestration
    title: AI orchestration systems
    lesson_format: html
    lesson: |-
      <p><strong>AI orchestration</strong> is the <strong>conductor layer</strong> that coordinates many AI pieces — models, tools, retrieval, agents, and plain code — into one reliable system. As apps grow past a single model call, orchestration is what keeps them coherent.</p><div class='analogy'><p>An orchestra conductor. The violinist (one model), percussionist (a tool), and pianist (retrieval) are each skilled, but without a conductor coordinating who plays when, you get noise. Orchestration is the conductor.</p></div><h3>What it handles</h3><ul><li><strong>Flow control:</strong> which step runs when, branching, loops, retries.</li><li><strong>State &amp; memory:</strong> passing context between steps.</li><li><strong>Error handling:</strong> what to do when a step fails or a tool times out.</li><li><strong>Observability:</strong> tracing each step to debug and measure.</li></ul><p>Frameworks (e.g. LangChain, LlamaIndex, or your own code) help, but the principle matters more than the tool: <strong>keep it as simple as the task allows.</strong> Over-orchestrating turns a 2-step job into a fragile 10-box diagram. Add complexity only when the task truly needs it — and make every step <strong>observable</strong> so you can debug it.</p>
    model: |-
      Orchestration is the <strong>conductor</strong> coordinating models, tools, and retrieval into one coherent system — flow, state, errors, and tracing. Keep the score as simple as the music allows.
    terms:
    - term: Orchestration
      def: Coordinating multiple AI/code components into one reliable system.
    - term: Flow control
      def: Deciding which steps run when, with branching, loops, and retries.
    - term: Observability
      def: Tracing each step to debug and measure the system.
    mistakes:
    - title: Over-orchestrating
      detail: Don’t build a 10-box pipeline for a 2-step task; complexity is fragile and slow.
    - title: No observability
      detail: Without per-step tracing, multi-step systems are nearly impossible to debug.
    - title: Ignoring partial failures
      detail: |-
        Any step (tool/model) can fail — plan retries and fallbacks, don’t assume success.
    cards:
    - q: What is AI orchestration?
      a: |-
        The conductor layer coordinating models, tools, and retrieval into one reliable system.
    - q: Two orchestration principles?
      a: Keep it as simple as the task allows; make every step observable.
    quiz:
    - q: AI orchestration mainly does what?
      correct: Coordinates models, tools, and retrieval into one reliable flow
      distractors:
      - Quantizes weights
      - Draws charts
      - Trains models
      explain: It’s the conductor layer over many AI pieces.
    - q: A common orchestration mistake is…
      correct: Over-orchestrating a simple task into a fragile pipeline
      distractors:
      - Handling errors
      - Keeping it simple
      - Adding tracing
      explain: Needless complexity makes systems fragile and hard to debug.
    recap: |-
      Orchestration is the conductor coordinating models, tools, and retrieval — handling flow, state, errors, and tracing. Frameworks help, but the principle rules: keep it as simple as the task allows and make every step observable for debugging.
  - id: product-thinking
    title: AI product thinking
    lesson_format: html
    lesson: |-
      <p><strong>AI product thinking</strong> is the most important skill of all: deciding <strong>what to build and why</strong>, so AI solves a real problem instead of being a gimmick bolted on. The model is a means, not the point.</p><div class='analogy'><p>Owning a powerful new power tool doesn’t mean drilling holes everywhere. The craft is knowing <em>which</em> holes the project actually needs. AI is the tool; the user’s problem is the project.</p></div><h3>Principles that separate good AI products from demos</h3><ul><li><strong>Start from the problem,</strong> not ‘let’s add AI.’ Would a user pay for this outcome without knowing AI was involved?</li><li><strong>Design for being wrong:</strong> models err, so make mistakes cheap — easy undo, human review, clear confidence.</li><li><strong>Set expectations:</strong> show sources, allow ‘I don’t know,’ don’t over-promise certainty.</li><li><strong>Measure real value:</strong> time saved, tasks completed — not ‘messages sent.’</li><li><strong>Right-size:</strong> the cheapest, simplest approach that solves it (prompt &gt; RAG &gt; fine-tune &gt; agent) usually wins.</li></ul><p>The throughline of this whole course: powerful tech only matters when it’s aimed at a genuine need, designed for its own fallibility, and delivered reliably and affordably. That judgement — not any single technique — is what makes you an AI <em>engineer</em>, not just an AI user.</p>
    model: |-
      AI product thinking is <strong>‘which holes does this project need?’</strong>: start from the user’s problem, design for the model being wrong, set honest expectations, and pick the simplest approach that works.
    terms:
    - term: AI product thinking
      def: Deciding what to build and why so AI solves a real problem.
    - term: Design for failure
      def: Making model mistakes cheap via undo, review, and clear confidence.
    - term: Right-sizing
      def: Choosing the simplest approach that solves the problem.
    mistakes:
    - title: AI for AI’s sake
      detail: Bolting a chatbot on without a real problem creates a gimmick users ignore.
    - title: Designing as if the model is perfect
      detail: |-
        It will be wrong sometimes; make errors cheap with undo, review, and confidence cues.
    - title: Reaching for the heaviest solution
      detail: Try prompt → RAG → fine-tune → agent in that order; don’t over-engineer.
    cards:
    - q: What is AI product thinking?
      a: Deciding what to build and why so AI solves a real problem, not a gimmick.
    - q: Right-sizing order of approaches?
      a: 'Prompt → RAG → fine-tune → agent: simplest that works wins.'
    quiz:
    - q: AI product thinking starts from…
      correct: The user’s real problem
      distractors:
      - The biggest model
      - The token price
      - The latest framework
      explain: Solve a genuine need; the model is a means, not the point.
    - q: Because models make mistakes, good AI products…
      correct: Design for being wrong — undo, review, clear confidence
      distractors:
      - Never ship
      - Avoid users
      - Hide all errors
      explain: Make mistakes cheap and recoverable.
    recap: |-
      AI product thinking — the throughline of the course — means starting from the user’s real problem, designing for the model being wrong, setting honest expectations, measuring real value, and right-sizing the solution. That judgement is what makes you an AI engineer, not just a user.
